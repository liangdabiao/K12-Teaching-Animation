<style>
:root{--bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;--accent:#fbbf24;--accent2:#06b6d4;--line:#243a5e;--good:#34d399;--warn:#fbbf24;--bad:#f87171;}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}

.back{color:var(--accent2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap;background:rgba(6,182,212,.06)}
.back:hover{background:rgba(6,182,212,.14)}
.title{font-size:15px;font-weight:600}.subtitle{font-size:12px;color:var(--muted)}

.card{flex:1;min-width:160px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.card.s2::before{background:var(--accent2)}.card.s3::before{background:var(--good)}.card.s4::before{background:var(--bad)}
.card h4{margin:0 0 4px;font-size:13px}.card .v{font-size:11px;color:var(--muted);line-height:1.5}
.card .num{position:absolute;right:8px;top:6px;font-size:24px;font-weight:700;color:rgba(255,255,255,.07)}
main{flex:1;display:flex;min-height:0}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}

.badge{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--accent);color:#1a1a1a;font-size:11px;font-weight:600}
.body{color:var(--muted);margin:0 0 10px}.body strong{color:var(--ink)}

.points li{margin-bottom:3px}.points li strong{color:var(--accent)}
.stepbar{display:flex;gap:6px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);overflow-x:auto}
.step{flex:1;min-width:100px;padding:8px 10px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}
.step:hover{background:#1e345a;border-color:var(--accent2)}

button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}
button:hover{background:#1e345a}button.primary{background:var(--accent);border-color:var(--accent);color:#1a1a1a;font-weight:600}

@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}

<div class="cards">

  <aside class="panel"><h2><span class="badge" id="stepBadge">基础</span><span id="stepTitle">函数定义</span></h2><p class="body" id="stepBody"></p><div class="points" id="stepPoints"></div></aside>
</main>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(520,Math.min(1100,r.width-12));cv.height=Math.max(400,Math.min(600,r.height-12));}
window.addEventListener('resize',()=>{fit();draw();});fit();
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawText(t,x,y,c,fs,a,b){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=a||'center';ctx.textBaseline=b||'middle';ctx.fillText(t,x,y);}

const STEPS=[
  {tag:'基础',name:'函数定义',body:'用 <code>def</code> 关键字定义函数，后跟<strong>函数名</strong>、<strong>圆括号参数</strong>、冒号、缩进函数体，最后用 <code>return</code> 返回结果。无 return 时默认返回 <code>None</code>。函数让代码<strong>可复用、易维护</strong>。',points:{title:'语法要素',items:['<strong>def</strong>：函数定义关键字','<strong>函数名</strong>：小写下划线命名（snake_case）','<strong>参数</strong>：圆括号内，可空','<strong>函数体</strong>：必须 4 空格缩进','<strong>return</strong>：可省略，默认返回 None']}},
  {tag:'参数',name:'五种参数类型',body:'Python 函数支持<strong>位置参数</strong>、<strong>关键字参数</strong>、<strong>默认参数</strong>、<strong>可变参数 *args</strong>、<strong>关键字可变参数 **kwargs</strong>，灵活组合让函数既强大又易用。',points:{title:'参数速查',items:['<strong>位置参数</strong>：按顺序传入 f(1,2)','<strong>关键字参数</strong>：name=value 指定','<strong>默认参数</strong>：def f(x=10) 可省略','<strong>*args</strong>：多余位置打包成元组','<strong>**kwargs</strong>：多余关键字打包字典']}},
  {tag:'返回',name:'返回值与多值',body:'<code>return</code> 可以返回<strong>多个值</strong>（实际为元组），调用方使用<strong>元组解包</strong>接收。无 return 则返回 None。函数遇到 return 立即结束。',points:{title:'返回值规则',items:['<strong>单值</strong>：return x','<strong>多值</strong>：return a, b, c → 元组','<strong>解包</strong>：x, y, z = f()','<strong>无 return</strong>：返回 None','<strong>遇到 return</strong>：函数立即结束']}},
  {tag:'作用域',name:'LEGB 作用域',body:'Python 变量查找遵循 <strong>LEGB 规则</strong>：L（Local 局部）→ E（Enclosed 嵌套）→ G（Global 全局）→ B（Built-in 内置）。用 <code>global</code>、<code>nonlocal</code> 修改外层变量。',points:{title:'LEGB 层次',items:['<strong>L Local</strong>：函数内部局部变量','<strong>E Enclosed</strong>：外层嵌套函数','<strong>G Global</strong>：模块级全局','<strong>B Built-in</strong>：int/len/print 内置','<strong>global/nonlocal</strong>：跨层赋值']}},
  {tag:'模块',name:'模块导入方式',body:'用 <code>import</code> 引入模块，三种写法：<strong>import 模块</strong>、<strong>from 模块 import 名字</strong>、<strong>import 模块 as 别名</strong>。模块让代码分文件组织、避免重复造轮子。',points:{title:'导入语法',items:['<strong>import math</strong>：math.sqrt()','<strong>from math import sqrt</strong>：直接 sqrt()','<strong>import math as m</strong>：m.pi 简写','<strong>避免</strong>：from m import * 污染命名空间','<strong>自定义模块</strong>：import mymodule']}},
  {tag:'标准库',name:'math 与 random',body:'<strong>math</strong> 提供数学常数与函数：<code>pi</code>、<code>sqrt()</code>、<code>sin()</code>、<code>ceil()</code>。<strong>random</strong> 生成随机数：<code>randint(a,b)</code>、<code>random()</code>、<code>choice(seq)</code>、<code>shuffle()</code>。',points:{title:'两大数学库',items:['<strong>math.pi</strong>：圆周率 3.14159','<strong>math.sqrt(16)</strong>：= 4.0','<strong>random.randint(1,10)</strong>：1-10 整数','<strong>random.random()</strong>：0-1 浮点','<strong>random.choice()</strong>：序列随机取元素']}},
  {tag:'标准库',name:'time 与 datetime',body:'<strong>time</strong>：时间戳 <code>time()</code>、延时 <code>sleep(n)</code>。<strong>datetime</strong>：日期对象 <code>datetime.now()</code>、格式化字符串 <code>strftime</code>。<strong>os</strong>：操作系统接口。',points:{title:'时间相关库',items:['<strong>time.time()</strong>：Unix 时间戳秒','<strong>time.sleep(1)</strong>：暂停 1 秒','<strong>datetime.now()</strong>：当前日期时间','<strong>os.getcwd()</strong>：当前工作目录','<strong>os.listdir()</strong>：列出目录文件']}},
  {tag:'生态',name:'第三方库与 pip',body:'<strong>第三方库</strong>用 <code>pip install 包名</code> 安装，扩展 Python 能力：numpy、requests、pandas、matplotlib、flask、pygame 等。PyPI 是官方包仓库。',points:{title:'pip 包管理',items:['<strong>安装</strong>：pip install numpy','<strong>卸载</strong>：pip uninstall numpy','<strong>列表</strong>：pip list 查看已装','<strong>升级</strong>：pip install -U numpy','<strong>源</strong>：PyPI 官方仓库']}},
];

let stepIdx=0,playing=false,lastT=0,speed=1,stepTime=0,t=0;
const STEP_DURATION=3.4;

// ===== 辅助：绘制等宽代码行（带语法着色片段）=====
function drawMonoLine(x,y,parts){
  ctx.textAlign='left';
  ctx.textBaseline='middle';
  ctx.font='15px Consolas,Monaco,monospace';
  let cur=x;
  parts.forEach(p=>{
    ctx.fillStyle=p.c||'#e8eef8';
    ctx.fillText(p.t,cur,y);
    cur+=ctx.measureText(p.t).width;
  });
}

// ===== 辅助：绘制带光晕的箭头 =====
function drawGlowArrow(x1,y1,x2,y2,color,glow){
  ctx.strokeStyle=color;ctx.lineWidth=3;
  ctx.shadowColor=color;ctx.shadowBlur=glow||10;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  const ang=Math.atan2(y2-y1,x2-x1);
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-10*Math.cos(ang-0.4),y2-10*Math.sin(ang-0.4));
  ctx.lineTo(x2-10*Math.cos(ang+0.4),y2-10*Math.sin(ang+0.4));
  ctx.fill();
  ctx.shadowBlur=0;
}

// ===== 场景：函数定义 =====
function drawDefScene(time){
  const W=cv.width,H=cv.height;
  drawText('函数定义 · def + return',W/2,28,'#fbbf24',16);
  drawText('把一段可重复使用的代码"打包"成函数',W/2,48,'#9ab0d0',12);
  // 代码块
  ctx.fillStyle='rgba(52,211,153,0.06)';ctx.strokeStyle='#34d399';ctx.lineWidth=1.5;
  roundRect(80,68,W-160,180,10);ctx.fill();ctx.stroke();
  drawText('edit.py',100,84,'#5a6a8a',10,'left');
  const lines=[
    {t:'def ',c:'#06b6d4'},{t:'greet',c:'#fbbf24'},{t:'(',c:'#fff'},{t:'name',c:'#a78bfa'},{t:', age=10)',c:'#fff'},
  ];
  drawMonoLine(100,108,lines);
  drawMonoLine(100,134,[{t:'    message = ',c:'#9ab0d0'},{t:'"Hello, "',c:'#fde68a'},{t:' + name',c:'#9ab0d0'}]);
  drawMonoLine(100,160,[{t:'    ',c:'#9ab0d0'},{t:'return',c:'#f87171'},{t:' message',c:'#9ab0d0'}]);
  drawText('# 调用：greet("Alice") → "Hello, Alice"',100,195,'#5a6a8a',12,'left');
  drawText('# greet("Bob", age=20) → "Hello, Bob"',100,218,'#5a6a8a',12,'left');
  drawText('def 关键字 · 函数名 · 参数 · 冒号 · 缩进 · return',W/2,268,'#9ab0d0',12);
  // 执行流程动画
  const ph=(Math.floor(time*1.2))%4;
  const phases=[
    '1. 定义函数（不执行）',
    '2. 调用 greet("Alice")',
    '3. 执行函数体（创建局部作用域）',
    '4. return 返回结果给调用方',
  ];
  phases.forEach((p,i)=>{
    const y=290+i*36;
    const active=i===ph;
    ctx.fillStyle=active?'rgba(251,191,36,0.18)':'rgba(255,255,255,0.03)';
    ctx.strokeStyle=active?'#fbbf24':'#243a5e';ctx.lineWidth=1.5;
    roundRect(100,y,W-200,28,6);ctx.fill();ctx.stroke();
    drawText(p,W/2,y+14,active?'#fbbf24':'#9ab0d0',12);
  });
  drawText('函数 = 输入(参数) → 处理(函数体) → 输出(返回值)',W/2,H-22,'#34d399',12);
}

// ===== 场景：参数类型 =====
function drawParamScene(time){
  const W=cv.width,H=cv.height;
  drawText('五种参数类型 · Parameters',W/2,28,'#fbbf24',16);
  drawText('灵活组合让函数既强大又易用',W/2,48,'#9ab0d0',12);
  const types=[
    {n:'位置参数 positional',code:'f(1, 2, 3)',c:'#06b6d4',d:'按顺序传入'},
    {n:'关键字参数 keyword',code:'f(name="Bob")',c:'#34d399',d:'name=value 指定'},
    {n:'默认参数 default',code:'def f(x=10)',c:'#a78bfa',d:'可省略'},
    {n:'可变参数 *args',code:'def f(*args)',c:'#fbbf24',d:'多余位置→元组'},
    {n:'关键字可变 **kwargs',code:'def f(**kw)',c:'#f87171',d:'多余关键字→字典'},
  ];
  types.forEach((tp,i)=>{
    const y=68+i*78;
    const pulse=0.5+0.5*Math.sin(time*2+i*0.7);
    ctx.fillStyle=tp.c+'22';ctx.strokeStyle=tp.c;ctx.lineWidth=2;
    ctx.shadowColor=tp.c;ctx.shadowBlur=8*pulse;
    roundRect(70,y,W-140,66,10);ctx.fill();ctx.stroke();
    ctx.shadowBlur=0;
    drawText(tp.n,100,y+18,tp.c,14,'left');
    ctx.font='13px Consolas,monospace';ctx.fillStyle='#fde68a';ctx.textAlign='left';
    ctx.fillText(tp.code,100,y+40);
    drawText(tp.d,W-100,y+30,'#9ab0d0',11,'right');
  });
  drawText('声明顺序：位置参数 → 默认参数 → *args → 关键字参数 → **kwargs',W/2,H-22,'#34d399',12);
}

// ===== 场景：返回值 =====
function drawReturnScene(time){
  const W=cv.width,H=cv.height;
  drawText('返回值 · 单值 / 多值元组 / None',W/2,28,'#fbbf24',16);
  drawText('return 把函数计算的结果送回给调用方',W/2,48,'#9ab0d0',12);
  // 代码
  ctx.fillStyle='rgba(52,211,153,0.06)';ctx.strokeStyle='#34d399';ctx.lineWidth=1.5;
  roundRect(60,65,W/2-80,180,10);ctx.fill();ctx.stroke();
  drawText('单值返回',80,85,'#34d399',13,'left');
  drawMonoLine(80,115,[{t:'def ',c:'#06b6d4'},{t:'square',c:'#fbbf24'},{t:'(x):',c:'#fff'}]);
  drawMonoLine(80,140,[{t:'    return x*x',c:'#9ab0d0'}]);
  drawText('square(5) → 25',80,175,'#fde68a',12,'left');
  drawText('type: int',80,205,'#5a6a8a',11,'left');
  drawText('type: int',80,225,'#5a6a8a',11,'left');
  // 多值
  ctx.fillStyle='rgba(251,191,36,0.06)';ctx.strokeStyle='#fbbf24';ctx.lineWidth=1.5;
  roundRect(W/2+20,65,W/2-80,180,10);ctx.fill();ctx.stroke();
  drawText('多值返回（实为元组）',W/2+40,85,'#fbbf24',13,'left');
  drawMonoLine(W/2+40,115,[{t:'def ',c:'#06b6d4'},{t:'minmax',c:'#fbbf24'},{t:'(L):',c:'#fff'}]);
  drawMonoLine(W/2+40,140,[{t:'    return ',c:'#9ab0d4'},{t:'min',c:'#34d399'},{t:'(L), ',c:'#9ab0d0'},{t:'max',c:'#34d399'},{t:'(L)',c:'#9ab0d0'}]);
  drawText('lo, hi = minmax([3,1,4,1,5])',W/2+40,175,'#fde68a',12,'left');
  drawText('解包：lo=1, hi=5',W/2+40,205,'#5a6a8a',11,'left');
  drawText('返回 (1, 5) 元组 → 解包',W/2+40,225,'#5a6a8a',11,'left');
  // 调用栈箭头
  const arrow=(Math.sin(time*3)*0.5+0.5);
  ctx.strokeStyle='#06b6d4';ctx.lineWidth=3;
  ctx.shadowColor='#06b6d4';ctx.shadowBlur=12*arrow;
  ctx.beginPath();ctx.moveTo(W/2-10,150);ctx.lineTo(W/2+15,150);ctx.stroke();
  ctx.fillStyle='#06b6d4';
  ctx.beginPath();ctx.moveTo(W/2+15,150);ctx.lineTo(W/2+5,145);ctx.lineTo(W/2+5,155);ctx.fill();
  ctx.shadowBlur=0;
  // None 演示
  ctx.fillStyle='rgba(248,113,113,0.08)';ctx.strokeStyle='#f87171';ctx.lineWidth=1.5;
  roundRect(60,265,W-120,90,10);ctx.fill();ctx.stroke();
  drawText('无 return 时函数默认返回 None',80,285,'#f87171',13,'left');
  drawMonoLine(80,315,[{t:'def ',c:'#06b6d4'},{t:'hello',c:'#fbbf24'},{t:'(): print("hi")',c:'#9ab0d0'}]);
  drawText('r = hello()  # 打印 hi，r 的值是 None',80,340,'#fde68a',12,'left');
  drawText('多值实际返回元组 (min, max)，再用 lo, hi 解包',W/2,H-22,'#9ab0d0',12);
}

// ===== 场景：LEGB 作用域 =====
function drawScopeScene(time){
  const W=cv.width,H=cv.height;
  drawText('LEGB 作用域查找规则',W/2,28,'#fbbf24',16);
  drawText('Python 找变量时从内向外逐层查找',W/2,48,'#9ab0d0',12);
  const cx=W/2,cy=H/2+15;
  // 四层同心圆
  const layers=[
    {r:170,c:'#f87171',n:'B Built-in 内置',d:'len, int, print, range'},
    {r:130,c:'#a78bfa',n:'G Global 全局',d:'x = 100  模块级'},
    {r:90,c:'#34d399',n:'E Enclosed 嵌套',d:'外层函数变量'},
    {r:50,c:'#06b6d4',n:'L Local 局部',d:'函数内 x'},
  ];
  layers.forEach(L=>{
    ctx.fillStyle=L.c+'18';ctx.strokeStyle=L.c;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(cx,cy,L.r,0,7);ctx.fill();ctx.stroke();
  });
  // 标注（旋转跟随）
  const ang=time*0.6;
  layers.forEach((L,i)=>{
    const a=ang+i*1.3;
    const tx=cx+Math.cos(a)*L.r*0.65;
    const ty=cy+Math.sin(a)*L.r*0.65;
    drawText(L.n,tx,ty-8,L.c,11);
    drawText(L.d,tx,ty+8,'#9ab0d0',10);
  });
  // 中心高亮 L
  ctx.fillStyle='#06b6d4';ctx.shadowColor='#06b6d4';ctx.shadowBlur=18;
  ctx.beginPath();ctx.arc(cx,cy,9,0,7);ctx.fill();
  ctx.shadowBlur=0;
  drawText('查找顺序：L → E → G → B（找不到报 NameError）',W/2,H-52,'#fbbf24',12);
  drawText('global x   修改全局变量',cx-140,H-28,'#34d399',12);
  drawText('nonlocal x   修改外层嵌套变量',cx+140,H-28,'#06b6d4',12);
}

// ===== 主分发：根据当前步骤渲染对应场景 =====
function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  // 绘制背景网格点（装饰）
  ctx.fillStyle='rgba(36,58,94,0.35)';
  for(let gx=20;gx<cv.width;gx+=40){
    for(let gy=20;gy<cv.height;gy+=40){
      ctx.fillRect(gx,gy,1,1);
    }
  }
  // 根据步骤索引调用对应场景绘制函数
  if(stepIdx===0)drawDefScene(t);
  else if(stepIdx===1)drawParamScene(t);
  else if(stepIdx===2)drawReturnScene(t);
  else if(stepIdx===3)drawScopeScene(t);
  else if(stepIdx===4)drawImportScene(t);
  else if(stepIdx===5)drawMathScene(t);
  else if(stepIdx===6)drawTimeScene(t);
  else if(stepIdx===7)drawPipScene(t);
  // 底部进度条
  const progress=(stepIdx+1)/STEPS.length;
  ctx.fillStyle='rgba(36,58,94,0.6)';
  ctx.fillRect(0,cv.height-3,cv.width,3);
  ctx.fillStyle='#fbbf24';
  ctx.fillRect(0,cv.height-3,cv.width*progress,3);
}

function syncStep(){
  const s=STEPS[stepIdx];
  document.getElementById('stepBadge').textContent=s.tag;
  document.getElementById('stepTitle').textContent=s.name;
  document.getElementById('stepBody').innerHTML=s.body;
  document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?.title||'')+'</h4><ul>'+((s.points?.items||[]).map(x=>'<li>'+x+'</li>').join(''))+'</ul>';
  document.querySelectorAll('.step').forEach((el,i)=>el.classList.toggle('active',i===stepIdx));
  statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;
  stepTime=0;
}

function update(dt){
  t+=dt*speed;
  if(!playing)return;
  stepTime+=dt*speed;
  if(stepTime>=STEP_DURATION){
    if(stepIdx<STEPS.length-1){stepIdx++;syncStep();}
    else{playing=false;playBtn.textContent='▶ 播放';statusEl.textContent='动画完成';}
  }
}

function loop(ts){
  if(!lastT)lastT=ts;
  const dt=(ts-lastT)/1000;lastT=ts;
  update(dt);draw();
  requestAnimationFrame(loop);
}

const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn');
const speedEl=document.getElementById('speed');
playBtn.onclick=()=>{playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';};
resetBtn.onclick=()=>{stepIdx=0;playing=false;syncStep();draw();playBtn.textContent='▶ 播放';};
stepFwdBtn.onclick=()=>{if(stepIdx<STEPS.length-1){stepIdx++;syncStep();draw();}};
stepBackBtn.onclick=()=>{if(stepIdx>0){stepIdx--;syncStep();draw();}};
speedEl.oninput=()=>{speed=parseFloat(speedEl.value);};

function buildStepbar(){
  const bar=document.getElementById('stepbar');
  bar.innerHTML='';
  STEPS.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='step'+(i===stepIdx?' active':'');
    el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>10?s.name.slice(0,9)+'…':s.name)+'</div>';
    el.onclick=()=>{stepIdx=i;syncStep();draw();};
    bar.appendChild(el);
  });
}

buildStepbar();syncStep();requestAnimationFrame(loop);
</script>
