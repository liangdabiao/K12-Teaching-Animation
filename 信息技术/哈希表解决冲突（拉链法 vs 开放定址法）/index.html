<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>哈希表 · 冲突解决 · 拉链法 / 开放定址法</title>
<style>
:root{
  --bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;
  --accent:#0ea5e9;--accent2:#74b9ff;--line:#243a5e;
  --good:#34d399;--warn:#fbbf24;--bad:#f87171;--chain:#34d399;--linear:#38bdf8;--quad:#a78bfa;--double:#fb923c;
}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
.back{color:var(--accent2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap;background:rgba(116,185,255,.06)}
.back:hover{background:rgba(116,185,255,.14)}
.title{font-size:15px;font-weight:600}
.subtitle{font-size:12px;color:var(--muted)}
.cards{display:flex;gap:10px;padding:10px 16px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(14,165,233,.06),transparent)}
.card{flex:1;min-width:150px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.card.s2::before{background:var(--chain)}
.card.s3::before{background:var(--linear)}
.card.s4::before{background:var(--warn)}
.card h4{margin:0 0 4px;font-size:13px;color:var(--ink)}
.card .v{font-size:11px;color:var(--muted);line-height:1.5}
.card .num{position:absolute;right:8px;top:6px;font-size:22px;font-weight:700;color:rgba(255,255,255,.07)}
main{flex:1;display:flex;min-height:0}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}
.panel{width:340px;flex:none;padding:14px;overflow:auto;border-left:1px solid var(--line);background:var(--panel);font-size:13px;line-height:1.7}
.panel h2{font-size:14px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--accent);color:#fff;font-size:11px;font-weight:600}
.body{color:var(--muted);margin:0 0 10px}
.body strong{color:var(--ink)}
.body code{background:rgba(14,165,233,.2);color:#bae6fd;padding:1px 5px;border-radius:4px;font-family:Consolas,Monaco,monospace;font-size:12px}
.points{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin-top:8px;border-left:3px solid var(--accent2)}
.points h4{margin:0 0 6px;font-size:13px;color:var(--ink)}
.points ul{margin:0;padding-left:18px;color:var(--muted)}
.points li{margin-bottom:3px}
.points li strong{color:var(--accent)}
.code{background:#0d1117;border:1px solid var(--line);border-radius:6px;padding:8px 10px;margin-top:8px;font-family:Consolas,Monaco,monospace;font-size:11px;line-height:1.6;color:#c9d1d9;white-space:pre-wrap}
.code .kw{color:#ff7b72}.code .ty{color:#79c0ff}.code .cm{color:#8b949e}.code .fn{color:#d2a8ff}
.stepbar{display:flex;gap:6px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);overflow-x:auto}
.step{flex:1;min-width:100px;padding:8px 10px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}
.step:hover{background:#1e345a;border-color:var(--accent2)}
.step.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:600;border-color:transparent}
.controls{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}
button:hover{background:#1e345a}
button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
button.primary:hover{background:#0bb5e8}
.controls label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
input[type=range],input[type=number]{accent-color:var(--accent);background:var(--card);color:var(--ink);border:1px solid var(--line);padding:4px 6px;border-radius:4px;width:60px}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}
</style>
</head>
<body>
<header class="topbar">
  <a class="back" href="../index.html">← 返回信息技术目录</a>
  <span class="title">哈希表 · 冲突解决</span>
  <span class="subtitle">h(key) = key % m</span>
</header>
<div class="cards">
  <div class="card"><div class="num">1</div><h4>哈希函数</h4><div class="v">将 key 映射到桶<br>理想：均匀分布</div></div>
  <div class="card s2"><div class="num">2</div><h4>拉链法</h4><div class="v">同桶挂链表<br>实现简单 · 最常用</div></div>
  <div class="card s3"><div class="num">3</div><h4>开放定址</h4><div class="v">找下一个空位<br>线性 / 二次 / 双重</div></div>
  <div class="card s4"><div class="num">α</div><h4>装填因子</h4><div class="v">α = n/m<br>建议 α &lt; 0.75</div></div>
</div>
<main>
  <div class="stage"><canvas id="cv"></canvas></div>
  <aside class="panel">
    <h2><span class="badge" id="stepBadge">基础</span><span id="stepTitle">哈希冲突</span></h2>
    <p class="body" id="stepBody"></p>
    <div class="points" id="stepPoints"></div>
    <div class="code" id="stepCode"></div>
  </aside>
</main>
<div class="stepbar" id="stepbar"></div>
<div class="controls">
  <button id="playBtn" class="primary">▶ 自动演示</button>
  <button id="resetBtn">↺ 重置</button>
  <button id="stepBackBtn">◀ 上一步</button>
  <button id="stepFwdBtn">下一步 ▶</button>
  <button id="insertBtn">+ 插入</button>
  <label>值 <input id="valInput" type="number" value="14" min="0" max="99"></label>
  <label>速度 <input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <span id="status" class="status">输入值并插入，观察冲突处理</span>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(560,Math.min(1100,r.width-12));cv.height=Math.max(420,Math.min(560,r.height-12));}
window.addEventListener('resize',()=>{fit();draw();});fit();

// ====== 哈希表状态 ======
const M=11; // 表长
let mode='chain'; // chain / linear / quadratic / double
let buckets=Array.from({length:M},()=>({chain:[],open:null})); // 兼容两种
let ops=[]; // 动画操作序列
let opIdx=0,opProgress=0;
let currentMsg='';

// 哈希函数
function h(key){return key%M;}
function h2(key){return 1+key%7;} // 双重散列辅助函数

// ====== 模式 ======
function resetTable(){
  buckets=Array.from({length:M},()=>({chain:[],open:null}));
  ops=[];opIdx=0;opProgress=0;currentMsg='';
}

// 插入算法演示
function insertKey(key){
  const home=h(key);
  ops=[];
  if(mode==='chain'){
    ops.push({type:'hash',key,home,msg:`h(${key}) = ${key} mod ${M} = ${home}`});
    // 是否冲突
    if(buckets[home].chain.length>0){
      ops.push({type:'collision',bucket:home,msg:`桶 ${home} 已有元素 → 冲突！拉链法：追加到链表末尾`});
    } else {
      ops.push({type:'nocollision',bucket:home,msg:`桶 ${home} 为空，直接插入`});
    }
    buckets[home].chain.push(key);
    ops.push({type:'done',bucket:home,msg:`✓ ${key} 已挂入桶 ${home} 的链表`});
  } else {
    // 开放定址法
    let i=0;let idx=home;
    ops.push({type:'hash',key,home,msg:`h(${key}) = ${key} mod ${M} = ${home}`});
    while(buckets[idx].open!==null&&i<M){
      ops.push({type:'probe',key,bucket:idx,probe:i,msg:`位置 ${idx} 已占用（探查 ${i}），尝试下一个...`});
      // 计算下一个
      if(mode==='linear'){idx=(home+i+1)%M;}
      else if(mode==='quadratic'){idx=(home+(i+1)*(i+1))%M;}
      else if(mode==='double'){idx=(home+i*h2(key))%M;}
      i++;
    }
    buckets[idx].open=key;
    ops.push({type:'done',bucket:idx,msg:`✓ ${key} 探查 ${i} 次后插入位置 ${idx}`});
  }
  opIdx=0;opProgress=0;
  statusEl.textContent=`插入 ${key}，共 ${ops.length} 步`;
}

// ====== 绘制 ======
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawText(t,x,y,c,fs,align,baseline){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=align||'center';ctx.textBaseline=baseline||'middle';ctx.fillText(t,x,y);}

function drawHashTable(){
  const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  const titleMap={chain:'拉链法 Chaining',linear:'开放定址 · 线性探测 Linear Probing',quadratic:'开放定址 · 二次探测 Quadratic',double:'开放定址 · 双重散列 Double Hashing'};
  drawText(titleMap[mode],W/2,28,'#74b9ff',16);
  drawText(`表长 m=${M} · 哈希函数 h(key) = key mod ${M}`,W/2,50,'#5a6a8a',11);
  // 当前操作
  const curOp=ops[opIdx];
  // 桶布局
  const colCount=mode==='chain'?M:M;
  const colW=Math.min(70,(W-80)/M);
  const startX=(W-colW*M)/2;
  const bucketY=120;
  // 绘制每个桶
  for(let i=0;i<M;i++){
    const x=startX+i*colW;
    let bg='#1e3a5f',hi=false;
    if(curOp&&(curOp.bucket===i||curOp.home===i))hi=true;
    if(hi){bg='#fbbf24';ctx.shadowColor='#fbbf24';ctx.shadowBlur=14;}
    ctx.fillStyle=bg;ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;
    roundRect(x+2,bucketY,colW-4,40,6);ctx.fill();ctx.stroke();
    ctx.shadowBlur=0;
    drawText(i,x+colW/2,bucketY+10,hi?'#06281c':'#74b9ff',11);
    drawText('桶'+i,x+colW/2,bucketY+28,hi?'#06281c':'#5a6a8a',9);
    // 内容
    if(mode==='chain'){
      // 链表
      const items=buckets[i].chain;
      items.forEach((v,j)=>{
        const cy=bucketY+55+j*26;
        let itemHi=curOp&&curOp.type==='done'&&curOp.bucket===i&&j===items.length-1;
        ctx.fillStyle=itemHi?'#34d399':'rgba(52,211,153,.7)';
        ctx.strokeStyle='#34d399';ctx.lineWidth=1.5;
        roundRect(x+8,cy,colW-16,22,4);ctx.fill();ctx.stroke();
        drawText(v,x+colW/2,cy+11,itemHi?'#06281c':'#fff',11);
        // 链表箭头
        if(j<items.length-1){
          ctx.strokeStyle='#34d399';ctx.lineWidth=1.5;
          ctx.beginPath();ctx.moveTo(x+colW/2,cy+22);ctx.lineTo(x+colW/2,cy+26);ctx.stroke();
        }
      });
    } else {
      // 开放定址
      const v=buckets[i].open;
      if(v!==null){
        let itemHi=curOp&&curOp.bucket===i&&curOp.type==='done';
        ctx.fillStyle=itemHi?'#34d399':'rgba(56,189,248,.6)';
        ctx.strokeStyle='#38bdf8';ctx.lineWidth=1.5;
        roundRect(x+8,bucketY+50,colW-16,26,4);ctx.fill();ctx.stroke();
        drawText(v,x+colW/2,bucketY+63,itemHi?'#06281c':'#fff',12);
      } else if(curOp&&curOp.bucket===i&&curOp.type==='probe'){
        // 探查中位置
        ctx.fillStyle='rgba(248,113,113,.15)';
        ctx.strokeStyle='#f87171';ctx.lineWidth=1.5;
        ctx.setLineDash([3,2]);
        roundRect(x+8,bucketY+50,colW-16,26,4);ctx.fill();ctx.stroke();
        ctx.setLineDash([]);
        drawText('占用',x+colW/2,bucketY+63,'#f87171',10);
      }
    }
  }
  // 操作提示
  if(curOp){
    const colorMap={hash:'#74b9ff',collision:'#f87171',nocollision:'#34d399',probe:'#fbbf24',done:'#34d399'};
    drawText(curOp.msg,W/2,H-50,colorMap[curOp.type]||'#9ab0d0',12);
    // 进度
    drawText('步骤 '+(opIdx+1)+' / '+ops.length,W/2,H-28,'#5a6a8a',11);
  }
  // 装填因子
  const n=mode==='chain'?buckets.reduce((s,b)=>s+b.chain.length,0):buckets.filter(b=>b.open!==null).length;
  const alpha=(n/M).toFixed(2);
  drawText(`装填因子 α = ${n}/${M} = ${alpha}`,W/2,H-15,'#fbbf24',11);
}

// ====== 步骤 ======
const STEPS=[
  {tag:'基础',mode:'chain',name:'哈希表与冲突',body:'<strong>哈希表</strong>用<strong>哈希函数</strong>把 key 直接映射到数组下标，平均 O(1) 查找。但不同 key 可能映射到同一桶，产生<strong>冲突</strong>。',points:{title:'核心问题',items:['<strong>哈希函数</strong>：h(key) → 桶编号','<strong>冲突</strong>：不同 key 哈希到同一桶','<strong>目标</strong>：尽量均匀分布，减少冲突','<strong>必然存在</strong>：抽屉原理，必有冲突']},code:'<span class="cm">// 简单哈希函数</span>\n<span class="ty">int</span> <span class="fn">hash</span>(<span class="ty">int</span> key) {\n  <span class="kw">return</span> key % M;  <span class="cm">// M 通常选质数</span>\n}'},
  {tag:'拉链法',mode:'chain',name:'拉链法 Chaining',body:'<strong>拉链法</strong>：每个桶挂一个<strong>链表</strong>，哈希到同桶的所有 key 都加入链表。Java HashMap、C++ unordered_map 即此实现。',points:{title:'特点',items:['<strong>实现简单</strong>：每个桶 = 链表头','<strong>无上限</strong>：链表可无限延长','<strong>装填因子</strong>：可大于 1','<strong>查找</strong>：O(1+α)，α = n/m','<strong>优化</strong>：链表过长时转红黑树（Java8+）']},code:'<span class="kw">struct</span> <span class="ty">Bucket</span> {\n  Node* head;  <span class="cm">// 链表头</span>\n};\n<span class="kw">void</span> <span class="fn">insert</span>(<span class="ty">int</span> key) {\n  <span class="ty">int</span> h = hash(key);\n  bucket[h].push_front(key);\n}'},
  {tag:'拉链法',mode:'chain',name:'拉链法演示',body:'点击 <strong>+ 插入</strong> 按钮。当不同 key 映射到同一桶，新元素会挂到链表<strong>头部</strong>（或尾部）。',points:{title:'观察要点',items:['<strong>黄色</strong>：目标桶被高亮','<strong>红色提示</strong>：发生冲突','<strong>绿色节点</strong>：插入完成','<strong>链表长度</strong>：越长查找越慢']}},
  {tag:'开放定址',mode:'linear',name:'线性探测',body:'<strong>线性探测</strong>：冲突时按 <code>h+1, h+2, h+3, ...</code> 顺序找下一个空位。最简单但有"聚集"问题。',points:{title:'优缺点',items:['<strong>公式</strong>：hₖ = (h+i) mod m','<strong>优点</strong>：实现简单，缓存友好','<strong>缺点</strong>：一次聚集（primary clustering）','<strong>退化为 O(n)</strong>：连续段过长']},code:'<span class="cm">// 线性探测</span>\n<span class="ty">int</span> i = 0;\n<span class="kw">while</span> (table[(h+i) % m] != <span class="kw">null</span>)\n  i++;\ntable[(h+i) % m] = key;'},
  {tag:'开放定址',mode:'quadratic',name:'二次探测',body:'<strong>二次探测</strong>：按 <code>h+1², h+2², h+3², ...</code> 跳跃式找空位，缓解线性聚集。',points:{title:'优缺点',items:['<strong>公式</strong>：hₖ = (h+i²) mod m','<strong>优点</strong>：避免一次聚集','<strong>缺点</strong>：仍有二次聚集','<strong>注意</strong>：m 选质数才能探查到一半桶']},code:'<span class="cm">// 二次探测</span>\n<span class="ty">int</span> i = 0;\n<span class="kw">while</span> (table[(h+i*i) % m] != <span class="kw">null</span>)\n  i++;\ntable[(h+i*i) % m] = key;'},
  {tag:'开放定址',mode:'double',name:'双重散列',body:'<strong>双重散列</strong>：用第二个哈希函数计算步长：<code>(h₁ + i·h₂) mod m</code>。彻底避免聚集。',points:{title:'优缺点',items:['<strong>公式</strong>：hₖ = (h₁ + i·h₂) mod m','<strong>优点</strong>：避免所有聚集','<strong>要求</strong>：h₂ 与 m 互质','<strong>常用</strong>：h₂(key) = 1 + key%(m-1)']},code:'<span class="cm">// 双重散列</span>\n<span class="ty">int</span> h1 = key % m;\n<span class="ty">int</span> h2 = 1 + key % (m-1);\n<span class="ty">int</span> i = 0;\n<span class="kw">while</span> (table[(h1+i*h2) % m] != <span class="kw">null</span>)\n  i++;\ntable[(h1+i*h2) % m] = key;'},
  {tag:'对比',mode:'chain',name:'方法对比',body:'<strong>拉链法</strong>最常用（实现简单、删除方便、无上限）；<strong>开放定址</strong>缓存友好但怕满（α 应 < 0.75），删除需"墓碑标记"。',points:{title:'综合对比',items:['<strong>拉链法</strong>：α 可 >1，删除简单','<strong>开放定址</strong>：α < 0.75，删除复杂','<strong>常见选择</strong>：Java HashMap 用拉链','<strong>Python dict</strong>：开放定址（伪随机）','<strong>Linux inode</strong>：双散列']}},
];
let stepIdx=0;

function loadStep(){
  const s=STEPS[stepIdx];
  mode=s.mode;
  document.getElementById('stepBadge').textContent=s.tag;
  document.getElementById('stepTitle').textContent=s.name;
  document.getElementById('stepBody').innerHTML=s.body;
  document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?.title||'')+'</h4><ul>'+((s.points?.items||[]).map(x=>'<li>'+x+'</li>').join(''))+'</ul>';
  document.getElementById('stepCode').innerHTML=s.code||'';
  document.querySelectorAll('.step').forEach((el,i)=>el.classList.toggle('active',i===stepIdx));
  statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name+'（当前模式：'+({chain:'拉链法',linear:'线性探测',quadratic:'二次探测',double:'双重散列'}[mode])+'）';
  // 初始化演示数据
  resetTable();
  // 预填一些数据
  if(mode==='chain'){
    [12,23,34,8,19,5,16].forEach(k=>buckets[h(k)].chain.push(k));
  } else {
    [12,23,34,8,19,5,16].forEach(k=>{
      let i=0;let idx=h(k);
      while(buckets[idx].open!==null&&i<M){
        if(mode==='linear')idx=(h(k)+i+1)%M;
        else if(mode==='quadratic')idx=(h(k)+(i+1)*(i+1))%M;
        else if(mode==='double')idx=(h(k)+i*(1+k%7))%M;
        i++;
      }
      buckets[idx].open=k;
    });
  }
}
function buildStepbar(){
  const bar=document.getElementById('stepbar');
  bar.innerHTML='';
  STEPS.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='step'+(i===stepIdx?' active':'');
    el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>8?s.name.slice(0,7)+'…':s.name)+'</div>';
    el.onclick=()=>{stepIdx=i;loadStep();};
    bar.appendChild(el);
  });
}

// ====== 动画循环 ======
let playing=false,lastT=0,speed=1;
function update(dt){
  if(opIdx<ops.length){
    opProgress+=dt*speed;
    if(opProgress>=0.7){
      opProgress=0;
      opIdx++;
      if(opIdx>=ops.length){
        if(playing){
          setTimeout(()=>{
            if(opIdx>=ops.length){
              const v=Math.floor(Math.random()*40);
              insertKey(v);
            }
          },800);
        }
      }
    }
  }
}
function loop(ts){
  if(!lastT)lastT=ts;
  const dt=(ts-lastT)/1000;lastT=ts;
  update(dt);drawHashTable();
  requestAnimationFrame(loop);
}

// ====== 控件 ======
const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn');
const speedEl=document.getElementById('speed');
const insertBtn=document.getElementById('insertBtn');
const valInput=document.getElementById('valInput');

playBtn.onclick=()=>{
  playing=!playing;
  playBtn.textContent=playing?'⏸ 暂停':'▶ 自动演示';
  if(playing&&opIdx>=ops.length){
    insertKey(Math.floor(Math.random()*40));
  }
};
resetBtn.onclick=()=>{loadStep();};
stepFwdBtn.onclick=()=>{stepIdx=(stepIdx+1)%STEPS.length;loadStep();};
stepBackBtn.onclick=()=>{stepIdx=(stepIdx-1+STEPS.length)%STEPS.length;loadStep();};
speedEl.oninput=()=>{speed=parseFloat(speedEl.value);};
insertBtn.onclick=()=>{
  const v=parseInt(valInput.value)||Math.floor(Math.random()*40);
  insertKey(v);
};

buildStepbar();
loadStep();
requestAnimationFrame(loop);
</script>
</body>
</html>
