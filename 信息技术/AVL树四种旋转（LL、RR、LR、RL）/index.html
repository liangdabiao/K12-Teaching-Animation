}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}

.back:hover{background:rgba(116,185,255,.14)}

.card{flex:1;min-width:150px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;position:relative;overflow:hidden}

.code .kw{color:#ff7b72}.code .ty{color:#79c0ff}.code .cm{color:#8b949e}.code .fn{color:#d2a8ff}

</head>
<body>
<header class="topbar">
  <a class="back" href="../index.html">← 返回信息技术目录</a>
  <span class="title">AVL 树 · 四种旋转</span>
  <span class="subtitle">平衡因子 BF = 左高 - 右高 · |BF| ≤ 1</span>
</header>
<div class="cards">
  <div class="card"><div class="num">LL</div><h4>LL 型</h4><div class="v">左子的左子树过高<br>右旋一次</div></div>
  <div class="card s2"><div class="num">RR</div><h4>RR 型</h4><div class="v">右子的右子树过高<br>左旋一次</div></div>
  <div class="card s3"><div class="num">LR</div><h4>LR 型</h4><div class="v">左子的右子树过高<br>先左旋再右旋</div></div>
  <div class="card s4"><div class="num">RL</div><h4>RL 型</h4><div class="v">右子的左子树过高<br>先右旋再左旋</div></div>
</div>
<main>
  <div class="stage"><canvas id="cv"></canvas></div>
  <aside class="panel">
    <h2><span class="badge" id="stepBadge">基础</span><span id="stepTitle">AVL 自平衡</span></h2>
    <p class="body" id="stepBody"></p>
    <div class="points" id="stepPoints"></div>
    <div class="code" id="stepCode"></div>
  </aside>
</main>
<div class="stepbar" id="stepbar"></div>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button>
  <button id="resetBtn">↺ 重置</button>
  <button id="stepBackBtn">◀ 上一步</button>
  <button id="stepFwdBtn">下一步 ▶</button>
  <label>速度 <input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <span id="status" class="status">观察旋转前后树形变化</span>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(560,Math.min(1100,r.width-12));cv.height=Math.max(420,Math.min(560,r.height-12));}
window.addEventListener('resize',()=>{fit();draw();});fit();

// AVL 树节点类
class AVLNode{
  constructor(val){this.val=val;this.left=null;this.right=null;this.height=1;}
}
function height(n){return n?n.height:0;}
function bf(n){return n?height(n.left)-height(n.right):0;}
function updateHeight(n){if(n)n.height=1+Math.max(height(n.left),height(n.right));}
// 旋转操作（不改变值，只改变结构）
function rotateRight(y){
  const x=y.left;const T2=x.right;
  x.right=y;y.left=T2;
  updateHeight(y);updateHeight(x);
  return x;
}
function rotateLeft(x){
  const y=x.right;const T2=y.left;
  y.left=x;x.right=T2;
  updateHeight(x);updateHeight(y);
  return y;
}

// 构建特定案例的树
function buildLLTree(){ // 失衡节点 30, 左子 20, 左左 10
  const n=new AVLNode(30);
  n.left=new AVLNode(20);
  n.left.left=new AVLNode(10);
  n.left.right=new AVLNode(25);
  n.right=new AVLNode(40);
  return n;
}
function buildRRTree(){
  const n=new AVLNode(10);
  n.right=new AVLNode(20);
  n.right.right=new AVLNode(30);
  n.right.left=new AVLNode(15);
  n.left=new AVLNode(5);
  return n;
}
function buildLRTree(){
  const n=new AVLNode(30);
  n.left=new AVLNode(10);
  n.left.right=new AVLNode(20);
  n.right=new AVLNode(40);
  n.left.left=new AVLNode(5);
  return n;
}
function buildRLTree(){
  const n=new AVLNode(10);
  n.right=new AVLNode(30);
  n.right.left=new AVLNode(20);
  n.left=new AVLNode(5);
  n.right.right=new AVLNode(40);
  return n;
}

// ====== 步骤定义 ======
const STEPS=[
  {tag:'基础',name:'AVL 自平衡',body:'<strong>AVL 树</strong>是<strong>自平衡二叉搜索树</strong>：任意节点左右子树高度差（<strong>平衡因子 BF</strong>）的绝对值 <strong>≤ 1</strong>。',points:{title:'核心性质',items:['<strong>BF = height(left) - height(right)</strong>','<strong>合法</strong>：BF ∈ {-1, 0, 1}','<strong>失衡</strong>：|BF| ≥ 2，需旋转','<strong>优势</strong>：查找/插入/删除 O(log n)']},code:'<span class="kw">class</span> <span class="ty">AVLNode</span> {\n  <span class="ty">int</span> val, height;\n  AVLNode *left, *right;\n};\n<span class="ty">int</span> <span class="fn">bf</span>(Node* n) {\n  <span class="kw">return</span> height(n->left)\n       - height(n->right);\n}'},

  {tag:'LL 型',name:'LL 型失衡 → 右旋',body:'<strong>LL 型</strong>：失衡节点 A 的<strong>左子 L 的左子树</strong>插入新节点导致 A 高度差 = 2。处理：<strong>对 A 右旋一次</strong>。',points:{title:'右旋步骤',items:['<strong>失衡点</strong>：A，左子 L','<strong>①</strong> L 升为根','<strong>②</strong> A 变为 L 的右子','<strong>③</strong> L 的原右子挂到 A 的左子','<strong>结果</strong>：树高度恢复']},code:'<span class="cm">// LL → 右旋</span>\nNode* <span class="fn">rotateRight</span>(Node* y) {\n  Node* x = y->left;\n  y->left = x->right;\n  x->right = y;\n  <span class="fn">updateHeight</span>(y);\n  <span class="fn">updateHeight</span>(x);\n  <span class="kw">return</span> x;\n}'},

  {tag:'RR 型',name:'RR 型失衡 → 左旋',body:'<strong>RR 型</strong>：失衡节点 A 的<strong>右子 R 的右子树</strong>插入新节点导致失衡。处理：<strong>对 A 左旋一次</strong>。是 LL 的镜像。',points:{title:'左旋步骤',items:['<strong>失衡点</strong>：A，右子 R','<strong>①</strong> R 升为根','<strong>②</strong> A 变为 R 的左子','<strong>③</strong> R 的原左子挂到 A 的右子','<strong>对称</strong>：与 LL 完全镜像']},code:'<span class="cm">// RR → 左旋</span>\nNode* <span class="fn">rotateLeft</span>(Node* x) {\n  Node* y = x->right;\n  x->right = y->left;\n  y->left = x;\n  <span class="fn">updateHeight</span>(x);\n  <span class="fn">updateHeight</span>(y);\n  <span class="kw">return</span> y;\n}'},

  {tag:'LR 型',name:'LR 型 → 左旋+右旋',body:'<strong>LR 型</strong>：失衡节点 A 的<strong>左子 L 的右子树</strong>插入新节点。需<strong>双旋</strong>：先对 L <strong>左旋</strong>（变成 LL），再对 A <strong>右旋</strong>。',points:{title:'LR 双旋步骤',items:['<strong>失衡点</strong>：A，左子 L，L 的右子 N','<strong>①</strong> 对 L 左旋 → 转为 LL 型','<strong>②</strong> 对 A 右旋 → 恢复平衡','<strong>关键</strong>：N 成为新根','<strong>记忆</strong>：先处理字母顺序靠前的方向']},code:'<span class="cm">// LR 型</span>\n<span class="cm">// ① 先对 L 左旋 → 变 LL</span>\nnode->left = <span class="fn">rotateLeft</span>(node->left);\n<span class="cm">// ② 再对 node 右旋</span>\n<span class="kw">return</span> <span class="fn">rotateRight</span>(node);'},

  {tag:'RL 型',name:'RL 型 → 右旋+左旋',body:'<strong>RL 型</strong>：失衡节点 A 的<strong>右子 R 的左子树</strong>插入新节点。需<strong>双旋</strong>：先对 R <strong>右旋</strong>（变成 RR），再对 A <strong>左旋</strong>。LR 的镜像。',points:{title:'RL 双旋步骤',items:['<strong>失衡点</strong>：A，右子 R，R 的左子 N','<strong>①</strong> 对 R 右旋 → 转为 RR 型','<strong>②</strong> 对 A 左旋 → 恢复平衡','<strong>关键</strong>：N 成为新根','<strong>对称</strong>：LR 的镜像']},code:'<span class="cm">// RL 型</span>\n<span class="cm">// ① 先对 R 右旋 → 变 RR</span>\nnode->right = <span class="fn">rotateRight</span>(node->right);\n<span class="cm">// ② 再对 node 左旋</span>\n<span class="kw">return</span> <span class="fn">rotateLeft</span>(node);'},

  {tag:'总结',name:'判别与记忆口诀',body:'<strong>判断旋转类型</strong>：找到最低失衡节点 A，看导致失衡的<strong>新节点</strong>在 A 的哪个孙子位置：左左=LL，右右=RR，左右=LR，右左=RL。',points:{title:'记忆口诀',items:['<strong>LL → 右旋</strong>（一次）','<strong>RR → 左旋</strong>（一次）','<strong>LR → 左旋+右旋</strong>（两次）','<strong>RL → 右旋+左旋</strong>（两次）','<strong>原则</strong>：单旋对方向，双旋先旋子','<strong>性能</strong>：每次插入最多 1 次旋转（单或双）']},code:'<span class="cm">// 插入后回溯调整</span>\n<span class="kw">if</span> (bf(n) > 1 && bf(n->left) >= 0)\n  <span class="kw">return</span> <span class="fn">rotateRight</span>(n);  <span class="cm">// LL</span>\n<span class="kw">if</span> (bf(n) < -1 && bf(n->right) <= 0)\n  <span class="kw">return</span> <span class="fn">rotateLeft</span>(n);   <span class="cm">// RR</span>\n<span class="kw">if</span> (bf(n) > 1 && bf(n->left) < 0) {\n  n->left = <span class="fn">rotateLeft</span>(n->left); <span class="cm">// LR</span>\n  <span class="kw">return</span> <span class="fn">rotateRight</span>(n);\n}\n<span class="kw">if</span> (bf(n) < -1 && bf(n->right) > 0) {\n  n->right = <span class="fn">rotateRight</span>(n->right);<span class="cm">// RL</span>\n  <span class="kw">return</span> <span class="fn">rotateLeft</span>(n);\n}'},
];

let stepIdx=0;
let phaseIdx=0; // 0=before, 1=intro(中间), 2=after
const phaseLabels=['旋转前 · 失衡','（中间过渡）','旋转后 · 平衡'];

function getTrees(){
  const builders={1:buildLLTree,2:buildRRTree,3:buildLRTree,4:buildRLTree};
  return builders[stepIdx]?builders[stepIdx]():null;
}

function applyRotation(){
  // 根据当前步骤返回旋转后的根
  if(stepIdx===1)return rotateRight(buildLLTree()); // LL → 右旋
  if(stepIdx===2)return rotateLeft(buildRRTree()); // RR → 左旋
  if(stepIdx===3){ // LR → 左旋+右旋
    const n=buildLRTree();
    n.left=rotateLeft(n.left);
    return rotateRight(n);
  }
  if(stepIdx===4){ // RL → 右旋+左旋
    const n=buildRLTree();
    n.right=rotateRight(n.right);
    return rotateLeft(n);
  }
  return null;
}
function getMidTree(){
  if(stepIdx===3){const n=buildLRTree();n.left=rotateLeft(n.left);return n;}
  if(stepIdx===4){const n=buildRLTree();n.right=rotateRight(n.right);return n;}
  return null;
}

// ====== 绘制 ======
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawText(t,x,y,c,fs,align,baseline){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=align||'center';ctx.textBaseline=baseline||'middle';ctx.fillText(t,x,y);}

// 计算节点位置（递归）
function layoutTree(root){
  const positions=new Map();
  let idx=0;
  function inorder(node,depth){
    if(!node)return;
    inorder(node.left,depth+1);
    positions.set(node,{col:idx++,depth});
    inorder(node.right,depth+1);
  }
  inorder(root,0);
  return positions;
}

function drawTreeNode(node,x,y,levelW,colSpacing,imbalanced,bfInfo,highlightColor){
  if(!node)return;
  // 计算左右子位置
  const positions=layoutTree(node);
  // 简化：手动布局
  function place(node,depth,posX,posY,spread){
    if(!node)return;
    // 节点圆
    let nodeBf=bf(node);
    let isImb=Math.abs(nodeBf)>=2;
    let color='#1e3a5f';
    let stroke='#10b981';
    if(isImb){color='#7f1d1d';stroke='#f87171';}
    else if(highlightColor&&bfInfo&&bfInfo===node.val){color=highlightColor;stroke=highlightColor;}
    ctx.save();
    if(isImb){ctx.shadowColor='#f87171';ctx.shadowBlur=14;}
    ctx.fillStyle=color;ctx.strokeStyle=stroke;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(posX,posY,20,0,7);ctx.fill();ctx.stroke();
    ctx.shadowBlur=0;
    drawText(node.val,posX,posY,isImb?'#fecaca':'#a7f3d0',13);
    // BF 标注
    drawText('BF='+nodeBf,posX,posY+32,isImb?'#f87171':'#5a6a8a',10);
    ctx.restore();
    // 子节点
    const childSpread=spread*0.55;
    const childY=posY+levelW;
    if(node.left){
      ctx.strokeStyle='#243a5e';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(posX-6,posY+15);ctx.lineTo(posX-spread+6,childY-15);ctx.stroke();
      place(node.left,depth+1,posX-spread,childY,childSpread);
    }
    if(node.right){
      ctx.strokeStyle='#243a5e';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(posX+6,posY+15);ctx.lineTo(posX+spread-6,childY-15);ctx.stroke();
      place(node.right,depth+1,posX+spread,childY,childSpread);
    }
  }
  // 计算合适 spread
  const initialSpread=Math.min(140,(cv.width-100)/4);
  place(node,0,x,y,initialSpread*0.6);
}

function drawAVL(){
  const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  const titleMap={0:'AVL 自平衡树',1:'LL 型 → 右旋',2:'RR 型 → 左旋',3:'LR 型 → 左旋 + 右旋',4:'RL 型 → 右旋 + 左旋',5:'判别与口诀'};
  drawText(titleMap[stepIdx],W/2,28,'#10b981',16);
  if(stepIdx>=1&&stepIdx<=4){
    let tree=null,label='';
    if(phaseIdx===0){tree=getTrees();label='① 失衡前';}
    else if(phaseIdx===1&&(stepIdx===3||stepIdx===4)){tree=getMidTree();label=stepIdx===3?'② 先左旋（变 LL）':'② 先右旋（变 RR）';}
    else {tree=applyRotation();label=(stepIdx===3||stepIdx===4)?'③ 再'+(stepIdx===3?'右旋（恢复）':'左旋（恢复）'):'② 旋转后';}
    drawText(label,W/2,60,'#74b9ff',13);
    if(tree){
      drawTreeNode(tree,W/2,120,80);
    }
    // 旋转方向箭头
    if(stepIdx===1)drawText('⟳ 右旋',W-100,H/2,'#fbbf24',14);
    if(stepIdx===2)drawText('⟲ 左旋',W-100,H/2,'#fbbf24',14);
    // 操作提示
    const ops={1:'最低失衡节点为根（BF=2），右旋使其左子升为根',2:'最低失衡节点为根（BF=-2），左旋使其右子升为根',3:'LR 型双旋：先调整方向使其变 LL，再右旋',4:'RL 型双旋：先调整方向使其变 RR，再左旋'};
    drawText(ops[stepIdx],W/2,H-30,'#9ab0d0',12);
  } else if(stepIdx===0){
    drawText('AVL 树保证任意节点的 |BF| ≤ 1',W/2,90,'#9ab0d0',13);
    // 简单画一棵平衡树
    const root=new AVLNode(20);
    root.left=new AVLNode(10);
    root.right=new AVLNode(30);
    root.left.left=new AVLNode(5);
    root.left.right=new AVLNode(15);
    root.right.right=new AVLNode(35);
    drawTreeNode(root,W/2,140,75);
    drawText('每节点 BF ∈ {-1,0,1} → 平衡',W/2,H-30,'#34d399',12);
  } else if(stepIdx===5){
    drawText('判断旋转类型的口诀',W/2,80,'#10b981',15);
    const rules=[
      {x:80,y:140,c:'#34d399',t:'LL',d:'左子的左子树过高 → 右旋 1 次'},
      {x:380,y:140,c:'#74b9ff',t:'RR',d:'右子的右子树过高 → 左旋 1 次'},
      {x:80,y:280,c:'#a78bfa',t:'LR',d:'左子的右子树过高 → 左旋+右旋'},
      {x:380,y:280,c:'#fbbf24',t:'RL',d:'右子的左子树过高 → 右旋+左旋'},
    ];
    rules.forEach(r=>{
      ctx.fillStyle='rgba(255,255,255,.04)';ctx.strokeStyle=r.c;ctx.lineWidth=2;
      roundRect(r.x,r.y,W-460,100,10);ctx.fill();ctx.stroke();
      drawText(r.t,r.x+60,r.y+50,r.c,28);
      drawText(r.d,r.x+200,r.y+50,'#cbd5e1',12,'left');
    });
  }
}

// ====== 动画循环 ======
let playing=false,lastT=0,speed=1,phaseTime=0;
const PHASE_DURATION=2.0;

function update(dt){
  if(!playing)return;
  if(stepIdx<1||stepIdx>4)return;
  phaseTime+=dt*speed;
  if(phaseTime>=PHASE_DURATION){
    phaseTime=0;
    phaseIdx++;
    const maxPhase=(stepIdx===3||stepIdx===4)?2:1;
    if(phaseIdx>maxPhase){
      phaseIdx=0;
      if(stepIdx<STEPS.length-1){stepIdx++;loadStep();}
      else{playing=false;playBtn.textContent='▶ 播放';}
    }
  }
}

function loop(ts){
  if(!lastT)lastT=ts;
  const dt=(ts-lastT)/1000;lastT=ts;
  update(dt);drawAVL();
  requestAnimationFrame(loop);
}

function loadStep(){
  const s=STEPS[stepIdx];
  document.getElementById('stepBadge').textContent=s.tag;
  document.getElementById('stepTitle').textContent=s.name;
  document.getElementById('stepBody').innerHTML=s.body;
  document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?.title||'')+'</h4><ul>'+((s.points?.items||[]).map(x=>'<li>'+x+'</li>').join(''))+'</ul>';
  document.getElementById('stepCode').innerHTML=s.code||'';
  document.querySelectorAll('.step').forEach((el,i)=>el.classList.toggle('active',i===stepIdx));
  statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;
  phaseIdx=0;phaseTime=0;
}

function buildStepbar(){
  const bar=document.getElementById('stepbar');
  bar.innerHTML='';
  STEPS.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='step'+(i===stepIdx?' active':'');
    el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>10?s.name.slice(0,9)+'…':s.name)+'</div>';
    el.onclick=()=>{stepIdx=i;loadStep();};
    bar.appendChild(el);
  });
}

// ====== 控件 ======
const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn');
const speedEl=document.getElementById('speed');
playBtn.onclick=()=>{playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';};
resetBtn.onclick=()=>{phaseIdx=0;phaseTime=0;playing=false;playBtn.textContent='▶ 播放';drawAVL();};
stepFwdBtn.onclick=()=>{if(stepIdx<STEPS.length-1){stepIdx++;loadStep();}};
stepBackBtn.onclick=()=>{if(stepIdx>0){stepIdx--;loadStep();}};
speedEl.oninput=()=>{speed=parseFloat(speedEl.value);};

buildStepbar();
loadStep();
requestAnimationFrame(loop);
</script>
