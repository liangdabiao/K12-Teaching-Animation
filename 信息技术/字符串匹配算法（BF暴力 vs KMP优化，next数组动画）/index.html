<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<style>
:root{
  --bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;
  --accent:#ec4899;--accent2:#74b9ff;--line:#243a5e;
  --good:#34d399;--warn:#fbbf24;--bad:#f87171;--info:#38bdf8;--purple:#a78bfa;
}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
.back{color:var(--accent2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap;background:rgba(116,185,255,.06)}
.back:hover{background:rgba(116,185,255,.14)}
.title{font-size:15px;font-weight:600}
.subtitle{font-size:12px;color:var(--muted)}
.cards{display:flex;gap:10px;padding:10px 16px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(236,72,153,.06),transparent)}
.card{flex:1;min-width:150px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.card.s2::before{background:var(--good)}
.card.s3::before{background:var(--purple)}
.card.s4::before{background:var(--warn)}
.card h4{margin:0 0 4px;font-size:13px;color:var(--ink)}
.card .v{font-size:11px;color:var(--muted);line-height:1.5}
.card .num{position:absolute;right:8px;top:6px;font-size:22px;font-weight:700;color:rgba(255,255,255,.07)}
main{flex:1;display:flex;min-height:0}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}
.panel{width:340px;flex:none;padding:14px;overflow:auto;border-left:1px solid var(--line);background:var(--panel);font-size:13px;line-height:1.7}
.panel h2{font-size:14px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--accent);color:#fff;font-size:11px;font-weight:600}
.body{color:var(--muted);margin:0 0 10px}
.body strong{color:var(--ink)}
.body code{background:rgba(236,72,153,.2);color:#fbcfe8;padding:1px 5px;border-radius:4px;font-family:Consolas,Monaco,monospace;font-size:12px}
.points{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin-top:8px;border-left:3px solid var(--accent2)}
.points h4{margin:0 0 6px;font-size:13px;color:var(--ink)}
.points ul{margin:0;padding-left:18px;color:var(--muted)}
.points li{margin-bottom:3px}
.points li strong{color:var(--accent)}
.code{background:#0d1117;border:1px solid var(--line);border-radius:6px;padding:8px 10px;margin-top:8px;font-family:Consolas,Monaco,monospace;font-size:11px;line-height:1.6;color:#c9d1d9;white-space:pre-wrap}
.code .kw{color:#ff7b72}.code .ty{color:#79c0ff}.code .cm{color:#8b949e}.code .fn{color:#d2a8ff}
.stepbar{display:flex;gap:6px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);overflow-x:auto}
.step{flex:1;min-width:100px;padding:8px 10px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}
.step:hover{background:#1e345a;border-color:var(--accent2)}
.step.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:600;border-color:transparent}
.controls{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}
button:hover{background:#1e345a}
button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
button.primary:hover{background:#f5658c}
.controls label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
input[type=range]{accent-color:var(--accent)}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}
</style>
</head>
<body>
<header class="topbar">
  <a class="back" href="../index.html">← 返回信息技术目录</a>
  <span class="title">字符串匹配 · BF vs KMP</span>
  <span class="subtitle">主串 T 中查找模式串 P 的位置</span>
</header>
<div class="cards">
  <div class="card"><div class="num">BF</div><h4>暴力匹配</h4><div class="v">逐字符比较<br>失配主串回退</div></div>
  <div class="card s2"><div class="num">O</div><h4>BF 复杂度</h4><div class="v">最坏 O(n×m)<br>大量重复比较</div></div>
  <div class="card s3"><div class="num">K</div><h4>KMP 优化</h4><div class="v">next 数组<br>主串不回退</div></div>
  <div class="card s4"><div class="num">+</div><h4>KMP 复杂度</h4><div class="v">构造 O(m)<br>匹配 O(n)</div></div>
</div>
<main>
  <div class="stage"><canvas id="cv"></canvas></div>
  <aside class="panel">
    <h2><span class="badge" id="stepBadge">BF</span><span id="stepTitle">暴力匹配</span></h2>
    <p class="body" id="stepBody"></p>
    <div class="points" id="stepPoints"></div>
    <div class="code" id="stepCode"></div>
  </aside>
</main>
<div class="stepbar" id="stepbar"></div>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button>
  <button id="resetBtn">↺ 重置</button>
  <button id="stepBackBtn">◀ 上一步</button>
  <button id="stepFwdBtn">下一步 ▶</button>
  <label>速度 <input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <span id="status" class="status">观察主串与模式串的逐步匹配</span>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(560,Math.min(1100,r.width-12));cv.height=Math.max(420,Math.min(560,r.height-12));}
window.addEventListener('resize',()=>{fit();draw();});fit();

// ====== 字符串 ======
const T='ABCABCDABABCABABDE'; // 主串
const P='ABABCABAB'; // 模式串

// 计算 KMP next 数组
function buildNext(p){
  const n=p.length,next=new Array(n).fill(0);
  let k=0;
  for(let q=1;q<n;q++){
    while(k>0&&p[k]!==p[q])k=next[k-1];
    if(p[k]===p[q])k++;
    next[q]=k;
  }
  return next;
}
const NEXT=buildNext(P);

// ====== 状态 ======
let mode='bf';
let i=0,j=0,comparisons=0,found=-1;
let lastFailJ=-1; // 上次失配的 j 位置
let lastFailI=-1;
let bfStepLog=[]; // 操作日志

function resetMatch(){
  i=0;j=0;comparisons=0;found=-1;lastFailJ=-1;lastFailI=-1;
  bfStepLog=[];
}
function stepBF(){
  if(found>=0||i-P.length+j>T.length)return;
  if(j===P.length){found=i-j;bfStepLog.push(`✓ 匹配成功！位置 ${found}`);return;}
  comparisons++;
  if(T[i]===P[j]){
    bfStepLog.push(`T[${i}]='${T[i]}' == P[${j}]='${P[j]}'，匹配，i++ j++`);
    i++;j++;
  } else {
    bfStepLog.push(`T[${i}]='${T[i]}' ≠ P[${j}]='${P[j]}'，失配！主串回退到 ${i-j+1}，j=0`);
    lastFailJ=j;lastFailI=i;
    i=i-j+1;j=0;
  }
}
function stepKMP(){
  if(found>=0||i>T.length)return;
  if(j===P.length){found=i-j;bfStepLog.push(`✓ 匹配成功！位置 ${found}`);return;}
  if(T[i]===P[j]){
    bfStepLog.push(`T[${i}]='${T[i]}' == P[${j}]='${P[j]}'，匹配，i++ j++`);
    i++;j++;
  } else {
    if(j>0){
      const oldJ=j;
      j=NEXT[j-1];
      bfStepLog.push(`T[${i}]='${T[i]}' ≠ P[${oldJ}]='${P[oldJ]}'，失配！j=next[${oldJ-1}]=${j}，主串不回退`);
    } else {
      bfStepLog.push(`T[${i}]='${T[i]}' ≠ P[${j}]='${P[j]}'，j=0 直接 i++`);
      i++;
    }
    lastFailJ=j;lastFailI=i;
  }
}

// ====== 绘制 ======
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawText(t,x,y,c,fs,align,baseline){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=align||'center';ctx.textBaseline=baseline||'middle';ctx.fillText(t,x,y);}

function drawCharCell(ch,x,y,w,h,bg,stroke,txtColor,isCurrent,isMatched,isFailed){
  ctx.save();
  if(isCurrent){ctx.shadowColor=isFailed?'#f87171':'#fbbf24';ctx.shadowBlur=14;}
  ctx.fillStyle=bg;ctx.strokeStyle=stroke;ctx.lineWidth=2;
  roundRect(x,y,w,h,4);ctx.fill();ctx.stroke();
  ctx.shadowBlur=0;
  drawText(ch,x+w/2,y+h/2,txtColor,16);
  ctx.restore();
}

function drawMatchScene(){
  const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  const titleMap={bf:'BF 暴力匹配（主串会回退）',kmp:'KMP 匹配（主串不回退，靠 next 跳转）',next:'next 数组构造'};
  drawText(titleMap[mode],W/2,28,'#ec4899',16);
  const cellW=Math.min(40,(W-80)/Math.max(T.length,P.length));
  const cellH=36;
  const ox=(W-T.length*cellW)/2;
  const ty=90,py=170;
  // 主串
  drawText('主串 T（长度 '+T.length+'）',ox-30,ty-18,'#74b9ff',12,'right');
  for(let k=0;k<T.length;k++){
    const x=ox+k*cellW;
    let bg='rgba(255,255,255,.05)',stroke='#243a5e',txt='#cbd5e1';
    let isCur=false,isMatched=false,isFailed=false;
    if(found>=0&&k>=found&&k<found+P.length){bg='rgba(52,211,153,.25)';stroke='#34d399';txt='#34d399';}
    else if(k===i&&j<P.length&&k<P.length+i){isCur=(T[k]===P[k-i+0]||T[k]!==P[k-i+0]);isMatched=k<i;isFailed=k===i&&lastFailI===i;}
    if(k<i&&k>=i-j){bg='rgba(52,211,153,.15)';stroke='#34d399';txt='#34d399';} // 已匹配部分
    if(k===i&&j<P.length){isCur=true;if(lastFailI===i&&T[k]!==P[j]){isFailed=true;bg='rgba(248,113,113,.2)';stroke='#f87171';}else{bg='rgba(251,191,36,.25)';stroke='#fbbf24';}}
    drawCharCell(T[k],x,ty,cellW-2,cellH,bg,stroke,txt,isCur,isMatched,isFailed);
    // 下标
    drawText(k,x+cellW/2,ty-12,'#5a6a8a',9);
  }
  // 模式串
  drawText('模式串 P（长度 '+P.length+'）',ox-30,py-18,'#ec4899',12,'right');
  // 模式串位置：左对齐到当前匹配起点
  const pStart=i-j;
  for(let k=0;k<P.length;k++){
    const x=ox+(pStart+k)*cellW;
    if(x<ox-cellW)continue;
    let bg='rgba(236,72,153,.1)',stroke='#ec4899',txt='#fbcfe8';
    if(k<j){bg='rgba(52,211,153,.3)';stroke='#34d399';txt='#34d399';}
    else if(k===j){bg='rgba(251,191,36,.3)';stroke='#fbbf24';txt='#fbbf24';}
    if(found>=0&&k<P.length){bg='rgba(52,211,153,.4)';stroke='#34d399';txt='#34d399';}
    drawCharCell(P[k],x,py,cellW-2,cellH,bg,stroke,txt,k===j,false,k===j&&lastFailJ===j);
    drawText(k,x+cellW/2,py-12,'#5a6a8a',9);
  }
  // 当前比较标记
  if(j<P.length&&found<0){
    drawText('↓ 当前比较',ox+(pStart+j)*cellW+cellW/2,py+cellH+14,'#fbbf24',11);
    drawText('↓',ox+i*cellW+cellW/2,ty+cellH+14,'#fbbf24',11);
  }
  // next 数组（KMP）
  if(mode==='kmp'){
    const ny=240;
    drawText('next 数组：next[j] = P[0..j] 的最长相等前后缀长度',W/2,ny-18,'#a78bfa',12);
    for(let k=0;k<P.length;k++){
      const x=ox+k*cellW;
      let bg='rgba(167,139,250,.15)',stroke='#a78bfa',txt='#c4b5fd';
      if(k===j-1&&lastFailJ>=0){bg='rgba(251,191,36,.3)';stroke='#fbbf24';txt='#fbbf24';}
      drawCharCell(NEXT[k],x,ny,cellW-2,cellH,bg,stroke,txt);
      drawText('P['+k+']='+P[k],x+cellW/2,ny+cellH+12,'#5a6a8a',9);
    }
  }
  // 状态
  drawText('i='+i+'  j='+j+'  比较次数='+comparisons,40,H-70,'#74b9ff',13,'left');
  if(found>=0){
    drawText('✓ 匹配成功！位置 '+found,W/2,H-90,'#34d399',15);
  }
  // 最近操作日志
  if(bfStepLog.length>0){
    const last=bfStepLog[bfStepLog.length-1];
    drawText(last,W/2,H-40,'#fbbf24',12);
  }
}

function drawNextBuild(){
  const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  drawText('KMP next 数组构造',W/2,28,'#ec4899',16);
  drawText('策略：用双指针 k（前缀末位）和 q（当前位）递推',W/2,52,'#5a6a8a',11);
  const cellW=Math.min(70,(W-100)/P.length);
  const cellH=46;
  const ox=(W-P.length*cellW)/2;
  // P
  const rows=[
    {label:'位置 j',vals:P.split('').map((_,i)=>i),bg:'rgba(116,185,255,.15)',stroke:'#74b9ff',txt:'#74b9ff'},
    {label:'P[j]',vals:P.split(''),bg:'rgba(236,72,153,.15)',stroke:'#ec4899',txt:'#fbcfe8'},
    {label:'next[j]',vals:NEXT,bg:'rgba(167,139,250,.15)',stroke:'#a78bfa',txt:'#c4b5fd'},
  ];
  rows.forEach((r,ri)=>{
    const y=100+ri*70;
    drawText(r.label,ox-30,y+cellH/2,'#cbd5e1',12,'right');
    r.vals.forEach((v,ci)=>{
      const x=ox+ci*cellW;
      ctx.fillStyle=r.bg;ctx.strokeStyle=r.stroke;ctx.lineWidth=2;
      roundRect(x,y,cellW-4,cellH,6);ctx.fill();ctx.stroke();
      drawText(v,x+cellW/2,y+cellH/2,r.txt,16);
    });
  });
  // 解释
  const explain=[
    'P[0] = A → next[0] = 0（约定）',
    'P[1] = B ≠ A → next[1] = 0',
    'P[2] = A = P[0] → next[2] = 1（前缀 A = 后缀 A）',
    'P[3] = B = P[1] → next[3] = 2（AB = AB）',
    'P[4] = C ≠ P[2] → 回溯 k → next[4] = 0',
    'P[5] = A = P[0] → next[5] = 1',
    'P[6] = B = P[1] → next[6] = 2',
    'P[7] = A = P[2] → next[7] = 3',
    'P[8] = B = P[3] → next[8] = 4（最长 ABAB = ABAB）',
  ];
  drawText('next 数组意义（部分位置）',W/2,290,'#a78bfa',12);
  explain.slice(0,5).forEach((s,i)=>{
    drawText(s,W/2,320+i*22,'#cbd5e1',11);
  });
  drawText('完整：next = ['+NEXT.join(', ')+']',W/2,440,'#34d399',13);
}

// ====== 步骤 ======
const STEPS=[
  {tag:'BF',mode:'bf',name:'BF 暴力匹配',body:'<strong>BF（Brute Force）</strong>：从主串每个位置开始，逐字符与模式串比较。<strong>失配</strong>时主串<strong>回退到起点+1</strong>，模式串归零，重新比较。',points:{title:'BF 步骤',items:['<strong>外层</strong>：主串起点 i 从 0 遍历','<strong>内层</strong>：j 从 0 比较 P[j] 与 T[i+j]','<strong>失配</strong>：i++，j=0','<strong>匹配</strong>：j 走完 P 即找到']},code:'<span class="kw">int</span> <span class="fn">bf</span>(<span class="ty">char</span>* T, <span class="ty">char</span>* P) {\n  <span class="kw">int</span> n=strlen(T), m=strlen(P);\n  <span class="kw">for</span>(<span class="ty">int</span> i=0;i<=n-m;i++){\n    <span class="ty">int</span> j=0;\n    <span class="kw">while</span>(j<m && T[i+j]==P[j]) j++;\n    <span class="kw">if</span>(j==m) <span class="kw">return</span> i;\n  }\n  <span class="kw">return</span> -1;\n}'},

  {tag:'BF',mode:'bf',name:'BF 的低效',body:'<strong>最坏情况</strong>：T = "AAAAA...AB"，P = "AAB"。每次比较到最后一字符才发现失配，<strong>O(n×m)</strong>，主串多次回退。',points:{title:'低效原因',items:['<strong>主串回退</strong>：每次失配位置归零','<strong>已比较信息丢弃</strong>：重复对比过的字符','<strong>极端情况</strong>：O(n×m) 大量重复','<strong>解决</strong>：KMP 利用 next 数组']},code:'<span class="cm">// 最坏例子</span>\nT = "AAAAAAAAAAB"  <span class="cm">// 主串</span>\nP = "AAB"          <span class="cm">// 模式</span>\n<span class="cm">// i=0~8 每次都比到最后才发现≠</span>\n<span class="cm">// 共比较 ~3×9 = 27 次</span>'},

  {tag:'KMP',mode:'kmp',name:'KMP 核心思想',body:'<strong>KMP（Knuth-Morris-Pratt）</strong>：失配时<strong>主串 i 不回退</strong>，模式串<strong>跳到 next[j-1]</strong> 继续比较。利用已匹配部分的最长"相等前后缀"避免重复比较。',points:{title:'三大核心',items:['<strong>① next 数组</strong>：预处理模式串 O(m)','<strong>② 失配跳转</strong>：j = next[j-1]','<strong>③ 主串不回退</strong>：i 始终向前','<strong>总复杂度</strong>：O(n+m)']},code:'<span class="cm">// KMP 匹配核心</span>\n<span class="kw">int</span> i=0,j=0;\n<span class="kw">while</span>(i<n){\n  <span class="kw">if</span>(T[i]==P[j]){i++;j++;\n    <span class="kw">if</span>(j==m)<span class="kw">return</span> i-m;\n  }\n  <span class="kw">else if</span>(j>0) j=next[j-1];\n  <span class="kw">else</span> i++;\n}'},

  {tag:'KMP',mode:'next',name:'next 数组',body:'<strong>next[j]</strong> = 模式串 P[0..j] 的<strong>最长相等前后缀</strong>长度（前后缀不能是整个串）。',points:{title:'举例 P="ABABCABAB"',items:['next[0]=0  （A 无前后缀）','next[1]=0  （AB：前缀A ≠ 后缀B）','next[2]=1  （ABA：前缀A = 后缀A）','next[3]=2  （ABAB：AB = AB）','next[4]=0  （ABABC：无相等）','next[5..8]：见动画']},code:'<span class="cm">// 构造 next 数组 O(m)</span>\n<span class="ty">void</span> <span class="fn">buildNext</span>(<span class="ty">char</span>* P) {\n  next[0]=0; <span class="ty">int</span> k=0;\n  <span class="kw">for</span>(<span class="ty">int</span> q=1;q<m;q++){\n    <span class="kw">while</span>(k>0 && P[k]!=P[q])\n      k=next[k-1];\n    <span class="kw">if</span>(P[k]==P[q]) k++;\n    next[q]=k;\n  }\n}'},

  {tag:'KMP',mode:'kmp',name:'KMP 演示',body:'观察：<strong>主串 i 永远不回退</strong>！失配时模式串向右滑动 next[j-1] 位。比较次数 ≈ n+m。',points:{title:'对比 BF',items:['<strong>BF 比较次数</strong>：~ n×m','<strong>KMP 比较次数</strong>：~ 2(n+m)','<strong>主串指针</strong>：始终只前进','<strong>模式串指针</strong>：j 通过 next 跳转','<strong>结果相同</strong>：都找到正确位置']}},

  {tag:'对比',mode:'bf',name:'总结',body:'<strong>BF</strong> 简单但低效；<strong>KMP</strong> 利用 next 数组实现 O(n+m)。还有 <strong>Boyer-Moore</strong>（跳跃更远）、<strong>Sunday</strong>（实战快）、<strong>Rabin-Karp</strong>（哈希）。',points:{title:'主流字符串匹配算法',items:['<strong>BF</strong>：O(nm) 教学用','<strong>KMP</strong>：O(n+m) 经典','<strong>Boyer-Moore</strong>：实践中最快','<strong>Sunday</strong>：编程题常用','<strong>Rabin-Karp</strong>：哈希思路，多模式匹配','<strong>AC 自动机</strong>：多模式匹配利器']}},
];

let stepIdx=0;
let playing=false,lastT=0,speed=1,autoStepTime=0;

function loadStep(){
  const s=STEPS[stepIdx];
  mode=s.mode;
  document.getElementById('stepBadge').textContent=s.tag;
  document.getElementById('stepTitle').textContent=s.name;
  document.getElementById('stepBody').innerHTML=s.body;
  document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?.title||'')+'</h4><ul>'+((s.points?.items||[]).map(x=>'<li>'+x+'</li>').join(''))+'</ul>';
  document.getElementById('stepCode').innerHTML=s.code||'';
  document.querySelectorAll('.step').forEach((el,i)=>el.classList.toggle('active',i===stepIdx));
  statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;
  resetMatch();
}

function draw(){
  if(mode==='next')drawNextBuild();
  else drawMatchScene();
}

function update(dt){
  if(!playing)return;
  const s=STEPS[stepIdx];
  if(s.mode==='next')return;
  if(s.tag==='对比')return;
  autoStepTime+=dt*speed;
  if(autoStepTime>=0.7){
    autoStepTime=0;
    if(mode==='bf'){stepBF();if(found>=0)playing=false,playBtn.textContent='▶ 播放';}
    else if(mode==='kmp'){stepKMP();if(found>=0)playing=false,playBtn.textContent='▶ 播放';}
  }
}

function loop(ts){
  if(!lastT)lastT=ts;
  const dt=(ts-lastT)/1000;lastT=ts;
  update(dt);draw();
  requestAnimationFrame(loop);
}

// ====== 控件 ======
const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn');
const speedEl=document.getElementById('speed');
playBtn.onclick=()=>{playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';autoStepTime=0;};
resetBtn.onclick=()=>{loadStep();};
stepFwdBtn.onclick=()=>{
  const s=STEPS[stepIdx];
  if(s.mode==='bf')stepBF();
  else if(s.mode==='kmp')stepKMP();
  else {if(stepIdx<STEPS.length-1){stepIdx++;loadStep();}}
};
stepBackBtn.onclick=()=>{if(stepIdx>0){stepIdx--;loadStep();}};
speedEl.oninput=()=>{speed=parseFloat(speedEl.value);};

function buildStepbar(){
  const bar=document.getElementById('stepbar');
  bar.innerHTML='';
  STEPS.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='step'+(i===stepIdx?' active':'');
    el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>8?s.name.slice(0,7)+'…':s.name)+'</div>';
    el.onclick=()=>{stepIdx=i;loadStep();};
    bar.appendChild(el);
  });
}

buildStepbar();
loadStep();
requestAnimationFrame(loop);
</script>
