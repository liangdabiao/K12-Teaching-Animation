<style>
:root{
  --bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;
  --accent:#3b82f6;--accent2:#74b9ff;--line:#243a5e;
  --good:#34d399;--warn:#fbbf24;--bad:#f87171;--info:#38bdf8;
}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
.back{color:var(--accent2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap;background:rgba(116,185,255,.06)}
.back:hover{background:rgba(116,185,255,.14)}
.title{font-size:15px;font-weight:600}
.subtitle{font-size:12px;color:var(--muted)}
.cards{display:flex;gap:10px;padding:10px 16px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(59,130,246,.06),transparent)}
.card{flex:1;min-width:160px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.card.s2::before{background:var(--good)}
.card.s3::before{background:var(--bad)}
.card.s4::before{background:var(--warn)}
.card h4{margin:0 0 4px;font-size:13px;color:var(--ink)}
.card .v{font-size:11px;color:var(--muted);line-height:1.5}
.card .num{position:absolute;right:8px;top:6px;font-size:24px;font-weight:700;color:rgba(255,255,255,.07)}
main{flex:1;display:flex;min-height:0}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}
.panel{width:340px;flex:none;padding:14px;overflow:auto;border-left:1px solid var(--line);background:var(--panel);font-size:13px;line-height:1.7}
.panel h2{font-size:14px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--accent);color:#fff;font-size:11px;font-weight:600}
.body{color:var(--muted);margin:0 0 10px}
.body strong{color:var(--ink)}
.body code{background:rgba(59,130,246,.2);color:#bfdbfe;padding:1px 5px;border-radius:4px;font-family:Consolas,Monaco,monospace;font-size:12px}
.points{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin-top:8px;border-left:3px solid var(--accent2)}
.points h4{margin:0 0 6px;font-size:13px;color:var(--ink)}
.points ul{margin:0;padding-left:18px;color:var(--muted)}
.points li{margin-bottom:3px}
.points li strong{color:var(--accent)}
.code{background:#0d1117;border:1px solid var(--line);border-radius:6px;padding:8px 10px;margin-top:8px;font-family:Consolas,Monaco,monospace;font-size:11px;line-height:1.6;color:#c9d1d9;white-space:pre-wrap}
.code .kw{color:#ff7b72}.code .ty{color:#79c0ff}.code .cm{color:#8b949e}
.stepbar{display:flex;gap:6px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);overflow-x:auto}
.step{flex:1;min-width:100px;padding:8px 10px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}
.step:hover{background:#1e345a;border-color:var(--accent2)}
.step.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:600;border-color:transparent}
.controls{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}
button:hover{background:#1e345a}
button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
button.primary:hover{background:#4b91f8}
.controls label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
input[type=range],input[type=number]{accent-color:var(--accent);background:var(--card);color:var(--ink);border:1px solid var(--line);padding:4px 6px;border-radius:4px;width:60px}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}
</style>
</head>
<body>
<header class="topbar">
  <a class="back" href="../index.html">← 返回信息技术目录</a>
  <span class="title">堆 · 完全二叉树 / 上浮 / 下沉</span>
  <span class="subtitle">父 i → 左 2i+1 · 右 2i+2</span>
</header>
<div class="cards">
  <div class="card"><div class="num">1</div><h4>完全二叉树</h4><div class="v">数组连续存储<br>用下标计算父子关系</div></div>
  <div class="card s2"><div class="num">2</div><h4>大顶堆性质</h4><div class="v">父 ≥ 左右子节点<br>根 = 最大值</div></div>
  <div class="card s3"><div class="num">3</div><h4>删除堆顶</h4><div class="v">尾节点替补根<br>下沉恢复堆序</div></div>
  <div class="card s4"><div class="num">4</div><h4>性能</h4><div class="v">插入/删除 O(log n)<br>取最大 O(1)</div></div>
</div>
<main>
  <div class="stage"><canvas id="cv"></canvas></div>
  <aside class="panel">
    <h2><span class="badge" id="stepBadge">基础</span><span id="stepTitle">堆的概念</span></h2>
    <p class="body" id="stepBody"></p>
    <div class="points" id="stepPoints"></div>
    <div class="code" id="stepCode"></div>
  </aside>
</main>
<div class="stepbar" id="stepbar"></div>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button>
  <button id="resetBtn">↺ 重置</button>
  <button id="stepBackBtn">◀ 上一步</button>
  <button id="stepFwdBtn">下一步 ▶</button>
  <button id="insertBtn">+ 插入</button>
  <button id="delBtn">− 删除堆顶</button>
  <label>值 <input id="valInput" type="number" value="55" min="1" max="99"></label>
  <label>速度 <input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <span id="status" class="status">用插入/删除按钮操作，观察上浮下沉</span>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(560,Math.min(1100,r.width-12));cv.height=Math.max(420,Math.min(560,r.height-12));}
window.addEventListener('resize',()=>{fit();draw();});fit();

// ====== 状态 ======
let heap=[90,80,70,60,50,40,30,20,10];
let animSteps=[]; // [{i, toI, type:'swap'|'highlight'|'compare', phase}]
let animIdx=0,animProgress=0;
let highlightedNodes=new Set();
let swappedNodes=new Set();
let lastOp='';

function parent(i){return (i-1)>>1;}
function left(i){return 2*i+1;}
function right(i){return 2*i+2;}

// 上浮过程：生成操作序列
function planSiftUp(startIdx){
  const ops=[];let i=startIdx;
  while(i>0){
    const p=parent(i);
    ops.push({type:'compare',a:i,b:p,msg:`比较 heap[${i}]=${heap[i]} 与 父 heap[${p}]=${heap[p]}`});
    if(heap[i]>heap[p]){
      [heap[i],heap[p]]=[heap[p],heap[i]];
      ops.push({type:'swap',a:i,b:p,msg:`${heap[p]} > ${heap[i]}（父子反转），交换 → 上浮到位置 ${p}`});
      i=p;
    } else {
      ops.push({type:'done',a:i,msg:`已满足堆序（父 ≥ 子），上浮结束`});
      break;
    }
    if(i===0){ops.push({type:'done',a:0,msg:'到达根节点，上浮结束'});}
  }
  return ops;
}

function planSiftDown(startIdx){
  const ops=[];let i=startIdx;const n=heap.length;
  while(true){
    const l=left(i),r=right(i);let m=i;
    if(l<n){
      if(r<n){
        ops.push({type:'compare',a:l,b:r,msg:`比较左右子：left[${l}]=${heap[l]} vs right[${r}]=${heap[r]}`});
      }
      // 选较大的子
      if(heap[l]>=heap[r]||r>=n)m=l;else m=r;
      ops.push({type:'compare',a:i,b:m,msg:`比较 heap[${i}]=${heap[i]} 与较大子 heap[${m}]=${heap[m]}`});
      if(heap[m]>heap[i]){
        [heap[i],heap[m]]=[heap[m],heap[i]];
        ops.push({type:'swap',a:i,b:m,msg:`子 ${heap[i]} > 父 ${heap[m]}，交换 → 下沉到位置 ${m}`});
        i=m;
      } else {
        ops.push({type:'done',a:i,msg:'已满足堆序（父 ≥ 子），下沉结束'});
        break;
      }
    } else {
      ops.push({type:'done',a:i,msg:'无子节点，下沉结束'});
      break;
    }
    if(i>=n-1||i>n)break;
  }
  return ops;
}

// ====== 操作 ======
function insertVal(val){
  heap.push(val);
  const newIdx=heap.length-1;
  const ops=planSiftUp(newIdx);
  animSteps=[{type:'add',a:newIdx,msg:`新节点 ${val} 插入末尾（位置 ${newIdx}）`},...ops];
  animIdx=0;animProgress=0;
  lastOp='insert';
  statusEl.textContent=`插入 ${val}：开始上浮调整（共 ${ops.length} 步）`;
}

function deleteMax(){
  if(heap.length===0)return;
  const max=heap[0];
  const last=heap.pop();
  if(heap.length>0){
    heap[0]=last;
    const ops=planSiftDown(0);
    animSteps=[{type:'replace',a:0,oldVal:max,newVal:last,msg:`删除堆顶 ${max}，末尾 ${last} 移到根`},...ops];
  } else {
    animSteps=[{type:'done',a:0,msg:`删除唯一节点 ${max}`}];
  }
  animIdx=0;animProgress=0;
  lastOp='delete';
  statusEl.textContent=`删除堆顶 ${max}：开始下沉调整`;
}

// ====== 绘制 ======
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawText(t,x,y,c,fs,align,baseline){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=align||'center';ctx.textBaseline=baseline||'middle';ctx.fillText(t,x,y);}

function getNodePos(i,W,H){
  const n=heap.length;
  if(n===0)return null;
  const lv=Math.floor(Math.log2(i+1));
  const maxLv=Math.floor(Math.log2(n));
  const posInLv=i-((1<<lv)-1);
  const cntInLv=1<<lv;
  const ySpace=Math.max(60,(H-100)/(maxLv+1||1));
  const y=70+lv*ySpace;
  // 每层间距
  const nodeSpacing=Math.min(110,Math.max(70,(W-80)/cntInLv));
  const totalW=(cntInLv-1)*nodeSpacing;
  const startX=(W-totalW)/2;
  const x=startX+posInLv*nodeSpacing;
  return {x,y};
}

function drawHeap(){
  const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  drawText('大顶堆 Max-Heap：父 ≥ 子',W/2,28,'#74b9ff',16);
  if(heap.length===0){
    drawText('堆为空',W/2,H/2,'#5a6a8a',13);
    return;
  }
  const currentOp=animSteps[animIdx];
  // 先画所有连线
  for(let i=1;i<heap.length;i++){
    const p=parent(i);
    const pp=getNodePos(p,W,H),cp=getNodePos(i,W,H);
    if(!pp||!cp)continue;
    ctx.strokeStyle='#243a5e';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(pp.x,pp.y+24);ctx.lineTo(cp.x,cp.y-24);ctx.stroke();
  }
  // 高亮当前操作涉及的边
  if(currentOp&&(currentOp.type==='compare'||currentOp.type==='swap')&&currentOp.b!==undefined){
    const pp=getNodePos(currentOp.a,W,H),cp=getNodePos(currentOp.b,W,H);
    if(pp&&cp){
      ctx.strokeStyle=currentOp.type==='swap'?'#34d399':'#fbbf24';
      ctx.lineWidth=4;
      ctx.beginPath();ctx.moveTo(pp.x,pp.y+24);ctx.lineTo(cp.x,cp.y-24);ctx.stroke();
    }
  }
  // 画节点
  for(let i=0;i<heap.length;i++){
    const pos=getNodePos(i,W,H);
    if(!pos)continue;
    let isHi=false,isSwap=false,opacity=1;
    if(currentOp){
      if(currentOp.a===i||currentOp.b===i){
        if(currentOp.type==='compare')isHi=true;
        if(currentOp.type==='swap')isSwap=true;
      }
    }
    // 完全二叉树位置标记（数组下标）
    drawText('['+i+']',pos.x,pos.y-38,'#5a6a8a',10);
    // 节点圆
    ctx.save();
    if(isSwap){ctx.shadowColor='#34d399';ctx.shadowBlur=18;}
    else if(isHi){ctx.shadowColor='#fbbf24';ctx.shadowBlur=14;}
    const r=24;
    let fill=isSwap?'#34d399':(isHi?'#fbbf24':'#1e3a5f');
    if(currentOp&&currentOp.type==='add'&&currentOp.a===i)fill='#34d399';
    ctx.fillStyle=fill;
    ctx.strokeStyle=isSwap?'#34d399':(isHi?'#fbbf24':'#3b82f6');
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(pos.x,pos.y,r,0,7);ctx.fill();ctx.stroke();
    ctx.shadowBlur=0;
    ctx.restore();
    drawText(heap[i],pos.x,pos.y,isSwap?'#06281c':'#fbbf24',14);
  }
  // 操作提示
  if(currentOp){
    const colorMap={compare:'#fbbf24',swap:'#34d399',done:'#74b9ff',add:'#34d399',replace:'#f87171'};
    drawText(currentOp.msg,W/2,H-30,colorMap[currentOp.type]||'#9ab0d0',12);
  }
  // 数组视图
  drawArrayView();
}

function drawArrayView(){
  const W=cv.width,H=cv.height;
  const arrY=H-65;
  if(heap.length===0)return;
  const cellW=Math.min(50,(W-40)/heap.length);
  const startX=(W-heap.length*cellW)/2;
  drawText('数组存储（完全二叉树性质）：',startX,arrY-16,'#5a6a8a',10,'left');
  heap.forEach((v,i)=>{
    const x=startX+i*cellW;
    let bg='#1e3a5f';
    const currentOp=animSteps[animIdx];
    if(currentOp&&(currentOp.a===i||currentOp.b===i)){
      bg=currentOp.type==='swap'?'#34d399':(currentOp.type==='compare'?'#fbbf24':'#3b82f6');
    }
    ctx.fillStyle=bg;ctx.strokeStyle='#3b82f6';ctx.lineWidth=1;
    roundRect(x+1,arrY,cellW-2,22,3);ctx.fill();ctx.stroke();
    drawText(v,x+cellW/2,arrY+11,bg==='#1e3a5f'?'#fbbf24':'#06281c',11);
  });
}

// ====== 步骤定义 ======
const STEPS=[
  {tag:'基础',name:'堆的定义',body:'<strong>堆（Heap）</strong>是一种特殊的<strong>完全二叉树</strong>。<strong>大顶堆</strong>满足：每个节点的值 <strong>≥</strong> 其左右子节点的值。根节点 = 全堆最大值。',points:{title:'核心性质',items:['<strong>完全二叉树</strong>：除最后一层外都满，最后一层从左到右排','<strong>大顶堆</strong>：父 ≥ 子（根最大）','<strong>小顶堆</strong>：父 ≤ 子（根最小）','<strong>存储</strong>：数组紧凑存储，无指针']},code:'<span class="cm">// 数组下标关系</span>\n<span class="ty">int</span> parent(i) = (i-1) / 2;\n<span class="ty">int</span> left(i)   = 2*i + 1;\n<span class="ty">int</span> right(i)  = 2*i + 2;'},
  {tag:'基础',name:'完全二叉树性质',body:'<strong>完全二叉树</strong>用数组存储紧凑高效：节点 i 的父在 <code>(i-1)/2</code>，左子在 <code>2i+1</code>，右子在 <code>2i+2</code>。无需指针。',points:{title:'为什么数组存储可行',items:['<strong>层序遍历</strong>：节点按层填入数组','<strong>O(1) 找父子</strong>：纯下标运算','<strong>无碎片</strong>：内存紧凑','<strong>应用</strong>：优先队列、堆排']}},
  {tag:'插入',name:'上浮 Sift Up',body:'<strong>插入新元素</strong>放在数组末尾（保持完全二叉树），然后不断与父节点比较：若大于父则交换，直到满足堆序。',points:{title:'上浮步骤',items:['<strong>①</strong> 新元素放末尾 heap[n]','<strong>②</strong> 与父 heap[(i-1)/2] 比较','<strong>③</strong> 若 > 父，交换，i = (i-1)/2','<strong>④</strong> 重复直到根或父 ≥ 子','<strong>时间</strong>：O(log n)']},code:'<span class="kw">void</span> <span class="ty">siftUp</span>(<span class="ty">int</span> i) {\n  <span class="kw">while</span> (i > 0) {\n    <span class="ty">int</span> p = (i-1) / 2;\n    <span class="kw">if</span> (heap[i] > heap[p]) {\n      swap(heap[i], heap[p]);\n      i = p;\n    } <span class="kw">else</span> <span class="kw">break</span>;\n  }\n}'},
  {tag:'插入',name:'插入演示',body:'点击 <strong>+ 插入</strong> 按钮，输入一个值。观察新节点先放到末尾，再<strong>上浮</strong>到合适位置。',points:{title:'观察要点',items:['<strong>黄色</strong>：正在比较的节点','<strong>绿色</strong>：发生交换','<strong>提示</strong>：每次比较父子，逆序则交换','<strong>终止</strong>：根或父 ≥ 子时停止']}},
  {tag:'删除',name:'下沉 Sift Down',body:'<strong>删除堆顶</strong>：取走根（最大值）后，将<strong>末尾元素</strong>移到根位置，然后不断与较大的子比较，若小于则交换下沉。',points:{title:'下沉步骤',items:['<strong>①</strong> 保存堆顶 max = heap[0]','<strong>②</strong> heap[0] = heap[n-1]，删除末尾','<strong>③</strong> 与较大子比较','<strong>④</strong> 若 < 子，交换下沉','<strong>时间</strong>：O(log n)']},code:'<span class="kw">void</span> <span class="ty">siftDown</span>(<span class="ty">int</span> i) {\n  <span class="kw">while</span> (<span class="ty">true</span>) {\n    <span class="ty">int</span> L=2i+1, R=2i+2, m=i;\n    <span class="kw">if</span> (L<n && heap[L]>heap[m]) m=L;\n    <span class="kw">if</span> (R<n && heap[R]>heap[m]) m=R;\n    <span class="kw">if</span> (m!=i) {swap(heap[i],heap[m]); i=m;}\n    <span class="kw">else</span> <span class="kw">break</span>;\n  }\n}'},
  {tag:'删除',name:'删除演示',body:'点击 <strong>− 删除堆顶</strong> 按钮。观察末尾元素如何替代根，然后通过<strong>下沉</strong>恢复堆序。',points:{title:'观察要点',items:['<strong>红色提示</strong>：根被替换','<strong>黄色</strong>：正在比较父与较大子','<strong>绿色</strong>：发生交换','<strong>终止</strong>：无子或父 ≥ 子']}},
  {tag:'应用',name:'堆的应用',body:'<strong>堆</strong>是<strong>优先队列（Priority Queue）</strong>的底层结构。还用于堆排序、Top-K、合并 K 个有序链表、Dijkstra 最短路径等。',points:{title:'经典应用',items:['<strong>优先队列</strong>：C++ priority_queue / Java PriorityQueue','<strong>堆排序</strong>：建堆 + 反复删顶 O(n log n)','<strong>Top-K 问题</strong>：小顶堆维护前 K 大','<strong>Dijkstra</strong>：最小堆优化到 O((V+E)logV)','<strong>合并 K 链表</strong>：堆维护 K 个指针']}},
];
let stepIdx=0;

// ====== 动画循环 ======
let playing=false,lastT=0,speed=1;
function update(dt){
  if(animIdx<animSteps.length){
    animProgress+=dt*speed;
    if(animProgress>=0.8){
      animProgress=0;
      animIdx++;
      if(animIdx>=animSteps.length){
        if(playing){
          // 自动触发下一个操作
          setTimeout(()=>{
            if(animIdx>=animSteps.length){
              // 50% 概率插/删
              if(Math.random()<0.5&&heap.length>1)deleteMax();
              else{const v=Math.floor(Math.random()*90)+10;insertVal(v);}
            }
          },1000);
        }
      }
    }
  }
}
function loop(ts){
  if(!lastT)lastT=ts;
  const dt=(ts-lastT)/1000;lastT=ts;
  update(dt);drawHeap();
  requestAnimationFrame(loop);
}

// ====== 控件 ======
const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn');
const speedEl=document.getElementById('speed');
const insertBtn=document.getElementById('insertBtn'),delBtn=document.getElementById('delBtn');
const valInput=document.getElementById('valInput');

playBtn.onclick=()=>{
  playing=!playing;
  playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';
  if(playing&&animIdx>=animSteps.length){
    // 启动新操作
    if(heap.length>1&&Math.random()<0.4)deleteMax();
    else{const v=Math.floor(Math.random()*90)+10;insertVal(v);}
  }
};
resetBtn.onclick=()=>{heap=[90,80,70,60,50,40,30,20,10];animSteps=[];animIdx=0;statusEl.textContent='堆已重置';};
stepFwdBtn.onclick=()=>{stepIdx=(stepIdx+1)%STEPS.length;loadStep();};
stepBackBtn.onclick=()=>{stepIdx=(stepIdx-1+STEPS.length)%STEPS.length;loadStep();};
speedEl.oninput=()=>{speed=parseFloat(speedEl.value);};
insertBtn.onclick=()=>{
  const v=parseInt(valInput.value)||Math.floor(Math.random()*90)+10;
  insertVal(v);
};
delBtn.onclick=()=>{if(heap.length>0)deleteMax();};

function loadStep(){
  const s=STEPS[stepIdx];
  document.getElementById('stepBadge').textContent=s.tag;
  document.getElementById('stepTitle').textContent=s.name;
  document.getElementById('stepBody').innerHTML=s.body;
  document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?.title||'')+'</h4><ul>'+((s.points?.items||[]).map(x=>'<li>'+x+'</li>').join(''))+'</ul>';
  document.getElementById('stepCode').innerHTML=s.code||'';
  document.querySelectorAll('.step').forEach((el,i)=>el.classList.toggle('active',i===stepIdx));
  statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;
}
function buildStepbar(){
  const bar=document.getElementById('stepbar');
  bar.innerHTML='';
  STEPS.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='step'+(i===stepIdx?' active':'');
    el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>8?s.name.slice(0,7)+'…':s.name)+'</div>';
    el.onclick=()=>{stepIdx=i;loadStep();};
    bar.appendChild(el);
  });
}

buildStepbar();
loadStep();
requestAnimationFrame(loop);
</script>
</body>
</html>
