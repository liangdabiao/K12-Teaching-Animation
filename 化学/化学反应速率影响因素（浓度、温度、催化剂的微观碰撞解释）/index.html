<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>化学反应速率 · 浓度 · 温度 · 催化剂 · 碰撞理论</title>
<style>
:root{--bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;--accent:#10b981;--accent2:#f59e0b;--line:#243a5e;--good:#34d399;--warn:#fbbf24;--bad:#f87171;}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
.back{color:var(--accent2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap;background:rgba(245,158,11,.06)}
.back:hover{background:rgba(245,158,11,.14)}
.title{font-size:15px;font-weight:600}.subtitle{font-size:12px;color:var(--muted)}
.cards{display:flex;gap:10px;padding:10px 16px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(16,185,129,.06),transparent)}
.card{flex:1;min-width:160px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.card.s2::before{background:var(--accent2)}.card.s3::before{background:var(--good)}.card.s4::before{background:var(--bad)}
.card h4{margin:0 0 4px;font-size:13px}.card .v{font-size:11px;color:var(--muted);line-height:1.5}
.card .num{position:absolute;right:8px;top:6px;font-size:24px;font-weight:700;color:rgba(255,255,255,.07)}
main{flex:1;display:flex;min-height:0}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}
.panel{width:340px;flex:none;padding:14px;overflow:auto;border-left:1px solid var(--line);background:var(--panel);font-size:13px;line-height:1.7}
.panel h2{font-size:14px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--accent);color:#1a1a1a;font-size:11px;font-weight:600}
.body{color:var(--muted);margin:0 0 10px}.body strong{color:var(--ink)}
.body code{background:rgba(16,185,129,.2);color:#a7f3d0;padding:1px 5px;border-radius:4px;font-family:Consolas,Monaco,monospace;font-size:12px}
.points{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin-top:8px;border-left:3px solid var(--accent2)}
.points h4{margin:0 0 6px;font-size:13px}.points ul{margin:0;padding-left:18px;color:var(--muted)}
.points li{margin-bottom:3px}.points li strong{color:var(--accent)}
.stepbar{display:flex;gap:6px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);overflow-x:auto}
.step{flex:1;min-width:100px;padding:8px 10px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}
.step:hover{background:#1e345a;border-color:var(--accent2)}
.step.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1a1a;font-weight:600;border-color:transparent}
.controls{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}
button:hover{background:#1e345a}button.primary{background:var(--accent);border-color:var(--accent);color:#1a1a1a;font-weight:600}
.controls label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
input[type=range]{accent-color:var(--accent)}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}
</style>
</head>
<body>
<header class="topbar"><a class="back" href="../index.html">← 返回化学目录</a><span class="title">化学反应速率</span><span class="subtitle">浓度 · 温度 · 催化剂 · 碰撞理论</span></header>
<div class="cards">
  <div class="card"><div class="num">1</div><h4>碰撞理论</h4><div class="v">分子必须碰撞<br>且能量足够、取向合适</div></div>
  <div class="card s2"><div class="num">2</div><h4>活化能 Ea</h4><div class="v">发生反应的最低能量门槛<br>越高反应越慢</div></div>
  <div class="card s3"><div class="num">3</div><h4>阿伦尼乌斯</h4><div class="v">k = A·e^(-Ea/RT)<br>温度升高速率激增</div></div>
  <div class="card s4"><div class="num">4</div><h4>催化剂</h4><div class="v">降低活化能<br>提供低能反应路径</div></div>
</div>
<main>
  <div class="stage"><canvas id="cv"></canvas></div>
  <aside class="panel"><h2><span class="badge" id="stepBadge">基础</span><span id="stepTitle">化学反应速率</span></h2><p class="body" id="stepBody"></p><div class="points" id="stepPoints"></div></aside>
</main>
<div class="stepbar" id="stepbar"></div>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button><button id="resetBtn">↺ 重置</button>
  <button id="stepBackBtn">◀ 上一步</button><button id="stepFwdBtn">下一步 ▶</button>
  <label>速度 <input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <span id="status" class="status">点击播放或选择步骤</span>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(520,Math.min(1100,r.width-12));cv.height=Math.max(400,Math.min(600,r.height-12));}
window.addEventListener('resize',()=>{fit();draw();});fit();
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawText(t,x,y,c,fs,a,b){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=a||'center';ctx.textBaseline=b||'middle';ctx.fillText(t,x,y);}

const STEPS=[
  {tag:'基础',name:'反应速率定义',body:'<strong>化学反应速率</strong>用<strong>单位时间内反应物浓度减少</strong>或<strong>生成物浓度增加</strong>来表示。公式 <code>v = Δc / Δt</code>，单位 mol/(L·s)。',points:{title:'核心要点',items:['<strong>定义</strong>：v = Δc / Δt','<strong>单位</strong>：mol/(L·s) 或 mol/(L·min)','<strong>本质</strong>：宏观速率由微观碰撞决定','<strong>影响因素</strong>：浓度、温度、催化剂、表面积']}},
  {tag:'基础',name:'碰撞理论',body:'<strong>碰撞理论</strong>：反应物分子必须<strong>相互碰撞</strong>才可能发生反应。但<strong>并非所有碰撞</strong>都有效，只有<strong>能量足够且取向正确</strong>的碰撞才能引发化学反应。',points:{title:'两个必要条件',items:['<strong>能量条件</strong>：动能 ≥ 活化能 Ea','<strong>取向条件</strong>：碰撞角度合适','<strong>有效碰撞</strong>：两条件同时满足','<strong>无效碰撞</strong>：弹开，不发生反应']}},
  {tag:'微观',name:'有效与无效碰撞',body:'画面中两分子<strong>相向运动</strong>：若<strong>相对动能</strong>低于活化能阈值，碰撞后<strong>弹开</strong>（无效）；若动能足够，分子<strong>重组</strong>为产物（有效，绿色高亮）。',points:{title:'碰撞三状态',items:['<strong>低能碰撞</strong>：E &lt; Ea，弹开','<strong>临界碰撞</strong>：E ≈ Ea，可反应可不反应','<strong>高能碰撞</strong>：E &gt; Ea，有效反应','<strong>取向不对</strong>：即便高能也无效']}},
  {tag:'微观',name:'活化能 Ea',body:'<strong>活化能</strong>是<strong>发生反应所需跨越的能量门槛</strong>。反应物必须先吸收能量爬过<strong>能垒</strong>，才能转化为产物。活化能越高，反应越慢。',points:{title:'能垒图解',items:['<strong>反应物</strong>：起始能量水平','<strong>能垒顶</strong>：活化络合物（过渡态）','<strong>活化能 Ea</strong>：反应物到顶峰的差','<strong>放热反应</strong>：产物能量低于反应物']}},
  {tag:'浓度',name:'浓度对速率的影响',body:'<strong>增大反应物浓度</strong>，单位体积内<strong>分子数增多</strong>，<strong>碰撞频率升高</strong>，有效碰撞次数增加，反应速率<strong>加快</strong>。对基元反应 v = k·c(A)^a·c(B)^b。',points:{title:'浓度规律',items:['<strong>浓度↑</strong>：分子密集，碰撞频繁','<strong>有效碰撞↑</strong>：速率成正比增加','<strong>气体分压</strong>：相当于气体浓度','<strong>纯液体/固体</strong>：浓度视为常数']}},
  {tag:'浓度',name:'浓度对比演示',body:'左右两个容器分子数不同：<strong>高浓度</strong>容器碰撞次数明显更多，黄色闪光表示有效碰撞发生反应。统计单位时间反应数，<strong>浓度翻倍，速率约翻倍</strong>。',points:{title:'浓度对比',items:['<strong>左侧</strong>：稀溶液，碰撞少','<strong>右侧</strong>：浓溶液，碰撞多','<strong>速率比</strong>：约等于浓度比','<strong>实际</strong>：受反应级数影响']}},
  {tag:'温度',name:'温度对速率的影响',body:'<strong>升高温度</strong>，分子<strong>平均动能增大</strong>，运动加快；更重要的是<strong>能量超过 Ea 的分子比例激增</strong>（玻尔兹曼分布右移）。一般<strong>温度每升高 10 K，速率约增大 2~3 倍</strong>。',points:{title:'温度规律',items:['<strong>温度↑</strong>：平均动能↑','<strong>高能分子比例↑</strong>：指数级增加','<strong>经验规则</strong>：每升 10 K，v 约 2~3 倍','<strong>注意</strong>：影响远大于浓度']}},
  {tag:'温度',name:'阿伦尼乌斯公式',body:'<strong>阿伦尼乌斯公式</strong>：<code>k = A·e^(-Ea/RT)</code>。其中 k 是速率常数，A 是指前因子，Ea 是活化能，R 是气体常数，T 是热力学温度。温度升高，e^(-Ea/RT) 增大，k 急剧增大。',points:{title:'公式细节',items:['<strong>k</strong>：速率常数','<strong>A</strong>：指前因子（碰撞频率相关）','<strong>e^(-Ea/RT)</strong>：能量达标分子分数','<strong>T↑</strong>：指数项↑，k 激增']}},
  {tag:'温度',name:'速率倍数演示',body:'以 298 K 为基准，计算温度升至 308 K、318 K、328 K、338 K 时 k 的<strong>相对倍数</strong>。可见<strong>温度越高，每升 10 K 的倍数越大</strong>，呈现明显的非线性加速。',points:{title:'温度倍数',items:['<strong>308 K</strong>：约 2~3 倍','<strong>318 K</strong>：约 4~9 倍','<strong>328 K</strong>：约 8~27 倍','<strong>结论</strong>：高温下升温更敏感']}},
  {tag:'催化剂',name:'催化剂原理',body:'<strong>催化剂</strong>：通过<strong>改变反应路径</strong>，<strong>降低活化能</strong>，使更多分子能跨越能垒，从而<strong>大幅加快反应</strong>。催化剂<strong>反应前后质量和化学性质不变</strong>，不改变平衡。',points:{title:'催化机理',items:['<strong>降低 Ea</strong>：开辟低能路径','<strong>不改变 ΔH</strong>：反应热不变','<strong>同等加快正逆反应</strong>：平衡不动','<strong>高效</strong>：少量即可催化大量反应']}},
  {tag:'催化剂',name:'催化剂能垒对比',body:'画面同时绘制<strong>原路径</strong>（高活化能，红色）与<strong>催化路径</strong>（低活化能，绿色）两条能垒曲线。催化路径峰值明显降低，单位时间内<strong>更多分子</strong>可达顶峰。',points:{title:'能垒对比',items:['<strong>原路径 Ea</strong>：高（红色曲线）','<strong>催化路径 Ea</strong>：低（绿色曲线）','<strong>ΔH 不变</strong>：起点终点相同','<strong>速率比</strong>：可达数千~数百万倍']}},
  {tag:'总结',name:'核心速记',body:'化学反应速率由<strong>有效碰撞频率</strong>决定。<strong>浓度</strong>增加碰撞次数，<strong>温度</strong>增加高能分子比例（影响最大），<strong>催化剂</strong>降低活化能开辟新路。三者协同可大幅提升速率。',points:{title:'三句话总结',items:['<strong>浓度</strong>：v ∝ c（碰撞次数）','<strong>温度</strong>：k = A·e^(-Ea/RT)（指数级）','<strong>催化剂</strong>：降低 Ea，开辟低能路径','<strong>本质</strong>：增加有效碰撞频率']}},
];

let stepIdx=0,playing=false,lastT=0,speed=1,stepTime=0,t=0;
const STEP_DURATION=3.2;

// 粒子状态（碰撞场景）
const particles=[];
function initParticles(count,energyLevel){
  particles.length=0;
  for(let i=0;i<count;i++){
    particles.push({
      x:80+Math.random()*(cv.width-160),
      y:80+Math.random()*(cv.height-200),
      vx:(Math.random()-0.5)*2*(0.5+energyLevel),
      vy:(Math.random()-0.5)*2*(0.5+energyLevel),
      e:0.3+Math.random()*energyLevel,
      r:7,
      flash:0
    });
  }
}
const EA_THRESHOLD=1.0;

// ===== 场景：有效与无效碰撞 =====
function drawCollisionScene(time){
  const W=cv.width,H=cv.height;
  drawText('分子碰撞 · 有效碰撞 vs 无效碰撞',W/2,30,'#10b981',16);
  if(particles.length===0)initParticles(14,1.0);
  const dt=Math.min(0.05,1/60)*speed;
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<p.r+20){p.x=p.r+20;p.vx*=-1;}
    if(p.x>W-p.r-20){p.x=W-p.r-20;p.vx*=-1;}
    if(p.y<p.r+60){p.y=p.r+60;p.vy*=-1;}
    if(p.y>H-p.r-40){p.y=H-p.r-40;p.vy*=-1;}
    if(p.flash>0)p.flash-=0.04;
  });
  // 碰撞检测
  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      const a=particles[i],b=particles[j];
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy);
      if(d<a.r+b.r+2 && d>0){
        const relE=(Math.hypot(a.vx-b.vx,a.vy-b.vy)+a.e+b.e)/4;
        const ang=Math.atan2(dy,dx);
        a.vx=-Math.cos(ang)*1.5;a.vy=-Math.sin(ang)*1.5;
        b.vx=Math.cos(ang)*1.5;b.vy=Math.sin(ang)*1.5;
        if(relE>=EA_THRESHOLD){a.flash=1;b.flash=1;}
      }
    }
  }
  drawText('活化能阈值 Ea = '+EA_THRESHOLD.toFixed(1),W/2,55,'#f59e0b',12);
  particles.forEach(p=>{
    const effective=p.flash>0;
    ctx.fillStyle=effective?'rgba(52,211,153,'+p.flash+')':'rgba(16,185,129,0.55)';
    ctx.strokeStyle=effective?'#34d399':'#10b981';
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();ctx.stroke();
    if(effective){
      ctx.strokeStyle='rgba(251,191,36,'+p.flash+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r+6*(1.5-p.flash),0,7);ctx.stroke();
    }
  });
  drawText('黄色闪光 = 有效碰撞（能量≥Ea，发生反应）',W/2,H-50,'#fbbf24',12);
  drawText('绿色实心 = 分子运动，碰撞可能有效或无效',W/2,H-28,'#10b981',11);
}

// ===== 场景：活化能山 =====
function drawActivationHill(time){
  const W=cv.width,H=cv.height;
  drawText('活化能与反应路径',W/2,30,'#10b981',16);
  const cx=W/2,cy=H/2+30;
  ctx.strokeStyle='#3a4a6a';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(60,H-60);ctx.lineTo(W-60,H-60);ctx.stroke();
  ctx.beginPath();ctx.moveTo(60,80);ctx.lineTo(60,H-60);ctx.stroke();
  drawText('反应进程',W/2,H-30,'#9ab0d0',12);
  drawText('能量',40,cy,'#9ab0d0',12);
  const startX=120,endX=W-120,baseY=H-90;
  const reactY=baseY,prodY=baseY-30,peakY=baseY-180;
  ctx.strokeStyle='#10b981';ctx.lineWidth=3;
  ctx.shadowColor='#10b981';ctx.shadowBlur=10;
  ctx.beginPath();
  ctx.moveTo(startX,reactY);
  ctx.quadraticCurveTo((startX+cx)/2,reactY,cx,peakY);
  ctx.quadraticCurveTo((cx+endX)/2,prodY,endX,prodY);
  ctx.stroke();
  ctx.shadowBlur=0;
  ctx.strokeStyle='#f59e0b';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(startX,reactY);ctx.lineTo(cx,reactY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,peakY);ctx.lineTo(cx,reactY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(endX,prodY);ctx.lineTo(endX,reactY);ctx.stroke();
  ctx.setLineDash([]);
  drawText('Ea（活化能）',cx+90,(reactY+peakY)/2,'#f59e0b',13);
  drawText('ΔH',endX,(reactY+prodY)/2-15,'#34d399',13);
  drawText('ΔH<0 放热',endX-30,prodY-25,'#34d399',12);
  drawText('反应物',startX,reactY+20,'#67e8f9',13);
  drawText('产物',endX,prodY+20,'#a7f3d0',13);
  drawText('过渡态',cx,peakY-18,'#fbbf24',12);
  // 沿曲线运动的小球
  const tt=(time*0.3)%1;
  let bx,by;
  if(tt<0.5){
    const u=tt/0.5;
    bx=startX+(cx-startX)*u;
    by=reactY+(peakY-reactY)*Math.sin(u*Math.PI/2);
  }else{
    const u=(tt-0.5)/0.5;
    bx=cx+(endX-cx)*u;
    by=peakY+(prodY-peakY)*Math.sin(u*Math.PI/2);
  }
  ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=15;
  ctx.beginPath();ctx.arc(bx,by,7,0,7);ctx.fill();
  ctx.shadowBlur=0;
}

// ===== 场景：浓度对比 =====
function drawConcentrationScene(time){
  const W=cv.width,H=cv.height;
  drawText('浓度对反应速率的影响',W/2,30,'#10b981',16);
  const half=W/2;
  ['低浓度','高浓度'].forEach((lab,i)=>{
    const x0=60+i*half,y0=80,w=half-90,h=H-180;
    ctx.fillStyle='rgba(16,185,129,0.05)';ctx.strokeStyle='#10b981';ctx.lineWidth=2;
    roundRect(x0,y0,w,h,8);ctx.fill();ctx.stroke();
    drawText(lab,x0+w/2,y0+20,'#10b981',14);
  });
  const leftCount=8,rightCount=20;
  for(let i=0;i<leftCount;i++){
    const seed=i*37;
    const x=80+((seed*13+time*30)%(half-120));
    const y=120+((seed*29)%(H-240));
    ctx.fillStyle='rgba(16,185,129,0.6)';ctx.strokeStyle='#10b981';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(x,y,6,0,7);ctx.fill();ctx.stroke();
  }
  for(let i=0;i<rightCount;i++){
    const seed=i*53;
    const baseX=half+60;
    const x=baseX+10+((seed*17+time*40)%(half-130));
    const y=120+((seed*41)%(H-240));
    ctx.fillStyle='rgba(16,185,129,0.7)';ctx.strokeStyle='#10b981';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(x,y,6,0,7);ctx.fill();ctx.stroke();
  }
  const flashL=Math.sin(time*2)>0.85;
  const flashR=Math.sin(time*5)>0.3;
  if(flashL){
    const fx=120+((time*60)%(half-160)),fy=200;
    ctx.fillStyle='rgba(251,191,36,0.7)';
    ctx.beginPath();ctx.arc(fx,fy,20,0,7);ctx.fill();
  }
  for(let k=0;k<3;k++){
    if(Math.sin(time*4+k)>0){
      const fx=half+80+((time*70+k*60)%(half-130)),fy=180+k*60;
      ctx.fillStyle='rgba(251,191,36,0.7)';
      ctx.beginPath();ctx.arc(fx,fy,20,0,7);ctx.fill();
    }
  }
  drawText('有效碰撞/秒：约 '+leftCount,W/4,90,'#fbbf24',13);
  drawText('有效碰撞/秒：约 '+(rightCount*3),half+W/4,90,'#fbbf24',13);
  drawText('浓度↑ → 碰撞频率↑ → 有效碰撞↑ → 速率↑',W/2,H-50,'#34d399',13);
  drawText('基元反应：v = k·c(A)^a·c(B)^b',W/2,H-28,'#9ab0d0',12);
}

// ===== 场景：温度对比（玻尔兹曼分布） =====
function drawTemperatureScene(time){
  const W=cv.width,H=cv.height;
  drawText('温度对反应速率的影响 · 能量分布',W/2,30,'#10b981',16);
  ctx.strokeStyle='#3a4a6a';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(70,H-70);ctx.lineTo(W-50,H-70);ctx.stroke();
  ctx.beginPath();ctx.moveTo(70,H-70);ctx.lineTo(70,80);ctx.stroke();
  drawText('分子动能 E',W/2,H-30,'#9ab0d0',12);
  drawText('分子分数',40,H/2,'#9ab0d0',12);
  const eaX=W-180;
  ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(eaX,80);ctx.lineTo(eaX,H-70);ctx.stroke();
  ctx.setLineDash([]);
  drawText('Ea',eaX,70,'#f59e0b',13);
  function boltzmann(center,width,scale){
    ctx.beginPath();
    for(let x=70;x<W-50;x+=3){
      const e=(x-70)/300;
      const v=Math.exp(-Math.pow((e-center)/width,2))*scale;
      const y=H-70-v*200;
      if(x===70)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
  ctx.strokeStyle='#67e8f9';ctx.lineWidth=3;ctx.shadowColor='#67e8f9';ctx.shadowBlur=8;
  boltzmann(0.8,0.35,0.9);
  ctx.shadowBlur=0;
  drawText('低温 T1',150,H/2,'#67e8f9',13);
  ctx.strokeStyle='#f87171';ctx.lineWidth=3;ctx.shadowColor='#f87171';ctx.shadowBlur=8;
  boltzmann(1.4,0.6,0.7);
  ctx.shadowBlur=0;
  drawText('高温 T2',280,H/2-60,'#f87171',13);
  ctx.fillStyle='rgba(248,113,113,0.25)';
  ctx.beginPath();
  ctx.moveTo(eaX,H-70);
  for(let x=eaX;x<W-50;x+=3){
    const e=(x-70)/300;
    const v=Math.exp(-Math.pow((e-1.4)/0.6,2))*0.7;
    ctx.lineTo(x,H-70-v*200);
  }
  ctx.lineTo(W-50,H-70);ctx.closePath();ctx.fill();
  drawText('高能分子区（可反应）',eaX+80,130,'#fbbf24',12);
  drawText('温度↑ → 高能分子比例↑ → 速率指数级增加',W/2,H-50,'#34d399',13);
  drawText('经验：每升高 10 K，速率约增大 2~3 倍',W/2,H-28,'#9ab0d0',12);
}

// ===== 场景：催化剂低能路径 =====
function drawCatalystScene(time){
  const W=cv.width,H=cv.height;
  drawText('催化剂降低活化能 · 开辟低能路径',W/2,30,'#10b981',16);
  const startX=120,endX=W-120,baseY=H-100;
  const reactY=baseY,prodY=baseY-40;
  const peakHi=baseY-200;
  ctx.strokeStyle='#f87171';ctx.lineWidth=3;ctx.shadowColor='#f87171';ctx.shadowBlur=10;
  ctx.beginPath();
  ctx.moveTo(startX,reactY);
  ctx.quadraticCurveTo(W/2-30,peakHi+30,W/2,peakHi);
  ctx.quadraticCurveTo(W/2+30,peakHi+30,endX,prodY);
  ctx.stroke();
  ctx.shadowBlur=0;
  drawText('原路径（Ea 高）',W/2-30,peakHi-20,'#f87171',13);
  const peakLo=baseY-110;
  ctx.strokeStyle='#10b981';ctx.lineWidth=3;ctx.shadowColor='#10b981';ctx.shadowBlur=10;
  ctx.beginPath();
  ctx.moveTo(startX,reactY);
  ctx.bezierCurveTo(W/2-80,baseY-60,W/2-40,peakLo,W/2,peakLo);
  ctx.bezierCurveTo(W/2+40,peakLo,W/2+80,baseY-60,endX,prodY);
  ctx.stroke();
  ctx.shadowBlur=0;
  drawText('催化路径（Ea 低）',W/2+60,peakLo-20,'#10b981',13);
  ctx.strokeStyle='#f87171';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(W/2-100,reactY);ctx.lineTo(W/2-100,peakHi);ctx.stroke();
  ctx.setLineDash([]);
  drawText('Ea1',W/2-120,(reactY+peakHi)/2,'#f87171',12);
  ctx.strokeStyle='#10b981';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(W/2+100,reactY);ctx.lineTo(W/2+100,peakLo);ctx.stroke();
  ctx.setLineDash([]);
  drawText('Ea2',W/2+120,(reactY+peakLo)/2,'#10b981',12);
  drawText('反应物',startX,reactY+22,'#67e8f9',13);
  drawText('产物',endX,prodY+22,'#a7f3d0',13);
  drawText('ΔH 不变（起点终点相同）',W/2,H-50,'#fbbf24',13);
  drawText('催化剂：反应前后质量和化学性质不变',W/2,H-28,'#9ab0d0',12);
}

// ===== 场景：阿伦尼乌斯公式 + 速率倍数 =====
function drawArrheniusScene(time){
  const W=cv.width,H=cv.height;
  drawText('阿伦尼乌斯公式 · k = A·e^(-Ea/RT)',W/2,30,'#10b981',16);
  ctx.font='bold 20px serif';ctx.fillStyle='#fff';ctx.textAlign='center';
  ctx.fillText('k = A · e^(-Ea / RT)',W/2,70);
  const lines=[
    {t:'k',d:'速率常数',c:'#10b981'},
    {t:'A',d:'指前因子（碰撞频率）',c:'#f59e0b'},
    {t:'Ea',d:'活化能 (J/mol)',c:'#f87171'},
    {t:'R',d:'气体常数 8.314',c:'#67e8f9'},
    {t:'T',d:'热力学温度 (K)',c:'#34d399'}
  ];
  lines.forEach((s,i)=>{
    const y=110+i*32;
    ctx.fillStyle=s.c+'22';ctx.strokeStyle=s.c;ctx.lineWidth=1.5;
    roundRect(120,y,W-240,26,6);ctx.fill();ctx.stroke();
    drawText(s.t,160,y+13,s.c,14,'left');
    drawText(s.d,300,y+13,'#fff',13,'left');
  });
  const Ea=50000,R=8.314,A=1e10;
  const baseT=298;
  const k298=A*Math.exp(-Ea/(R*baseT));
  const temps=[308,318,328,338];
  drawText('以 298 K 为基准的 k 倍数（Ea=50 kJ/mol）',W/2,290,'#fbbf24',13);
  temps.forEach((T,i)=>{
    const k=A*Math.exp(-Ea/(R*T));
    const ratio=k/k298;
    const y=320+i*32;
    const barW=Math.min(W-260,ratio*8);
    ctx.fillStyle='#10b98122';ctx.strokeStyle='#10b981';ctx.lineWidth=1;
    roundRect(120,y,W-240,26,6);ctx.fill();ctx.stroke();
    ctx.fillStyle='#10b981';
    roundRect(122,y+2,barW,22,5);ctx.fill();
    drawText(T+' K',140,y+13,'#9ab0d0',12,'left');
    drawText('× '+ratio.toFixed(1),W-140,y+13,'#34d399',13,'left');
  });
}

// ===== 场景：总结 =====
function drawSummaryScene(){
  const W=cv.width,H=cv.height;
  drawText('化学反应速率核心总结',W/2,40,'#10b981',18);
  const items=[
    {t:'碰撞理论',d:'有效碰撞 = 能量足 + 取向对',c:'#10b981'},
    {t:'浓度影响',d:'v ∝ c，碰撞频率增加',c:'#06b6d4'},
    {t:'温度影响',d:'k=A·e^(-Ea/RT)，指数级',c:'#f87171'},
    {t:'催化剂',d:'降低 Ea，开辟低能路径',c:'#34d399'},
    {t:'活化能',d:'反应的能量门槛',c:'#f59e0b'},
    {t:'本质',d:'增加有效碰撞频率',c:'#a78bfa'}
  ];
  items.forEach((m,i)=>{
    const col=i%3,row=Math.floor(i/3);
    const x=80+col*(W-160)/3;
    const y=100+row*180;
    ctx.fillStyle=m.c+'22';ctx.strokeStyle=m.c;ctx.lineWidth=2;
    roundRect(x+10,y,(W-160)/3-20,140,10);ctx.fill();ctx.stroke();
    drawText(m.t,x+(W-160)/6,y+50,m.c,15);
    drawText(m.d,x+(W-160)/6,y+90,'#fff',12);
  });
}

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  if(stepIdx===0||stepIdx===1)drawCollisionScene(t);
  else if(stepIdx===2)drawCollisionScene(t);
  else if(stepIdx===3)drawActivationHill(t);
  else if(stepIdx===4)drawConcentrationScene(t);
  else if(stepIdx===5)drawConcentrationScene(t);
  else if(stepIdx===6)drawTemperatureScene(t);
  else if(stepIdx===7||stepIdx===8)drawArrheniusScene(t);
  else if(stepIdx===9||stepIdx===10)drawCatalystScene(t);
  else if(stepIdx===11)drawSummaryScene();
}

function syncStep(){
  const s=STEPS[stepIdx];
  document.getElementById('stepBadge').textContent=s.tag;
  document.getElementById('stepTitle').textContent=s.name;
  document.getElementById('stepBody').innerHTML=s.body;
  document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?.title||'')+'</h4><ul>'+((s.points?.items||[]).map(x=>'<li>'+x+'</li>').join(''))+'</ul>';
  document.querySelectorAll('.step').forEach((el,i)=>el.classList.toggle('active',i===stepIdx));
  statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;
  stepTime=0;
  if(stepIdx===0||stepIdx===1||stepIdx===2)initParticles(14,1.0);
}

function update(dt){
  t+=dt*speed;
  if(!playing)return;
  stepTime+=dt*speed;
  if(stepTime>=STEP_DURATION){
    if(stepIdx<STEPS.length-1){stepIdx++;syncStep();}
    else{playing=false;playBtn.textContent='▶ 播放';statusEl.textContent='动画完成';}
  }
}

function loop(ts){
  if(!lastT)lastT=ts;
  const dt=(ts-lastT)/1000;lastT=ts;
  update(dt);draw();
  requestAnimationFrame(loop);
}

const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn');
const speedEl=document.getElementById('speed');
playBtn.onclick=()=>{playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';};
resetBtn.onclick=()=>{stepIdx=0;playing=false;syncStep();draw();playBtn.textContent='▶ 播放';};
stepFwdBtn.onclick=()=>{if(stepIdx<STEPS.length-1){stepIdx++;syncStep();draw();}};
stepBackBtn.onclick=()=>{if(stepIdx>0){stepIdx--;syncStep();draw();}};
speedEl.oninput=()=>{speed=parseFloat(speedEl.value);};

function buildStepbar(){
  const bar=document.getElementById('stepbar');
  bar.innerHTML='';
  STEPS.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='step'+(i===stepIdx?' active':'');
    el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>10?s.name.slice(0,9)+'…':s.name)+'</div>';
    el.onclick=()=>{stepIdx=i;syncStep();draw();};
    bar.appendChild(el);
  });
}

buildStepbar();syncStep();requestAnimationFrame(loop);
</script>
