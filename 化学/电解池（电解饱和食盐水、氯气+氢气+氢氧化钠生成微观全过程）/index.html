<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>电解池 · 电解饱和食盐水 · 氯碱工业</title>
<style>
:root{--bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;--accent:#06b6d4;--accent2:#fbbf24;--line:#243a5e;--good:#34d399;--warn:#fbbf24;--bad:#f87171;}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
.back{color:var(--accent);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap;background:rgba(6,182,212,.06)}
.back:hover{background:rgba(6,182,212,.14)}
.title{font-size:15px;font-weight:600}.subtitle{font-size:12px;color:var(--muted)}
.cards{display:flex;gap:10px;padding:10px 16px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(6,182,212,.06),transparent)}
.card{flex:1;min-width:160px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.card.s2::before{background:var(--accent2)}.card.s3::before{background:var(--good)}.card.s4::before{background:var(--bad)}
.card h4{margin:0 0 4px;font-size:13px}.card .v{font-size:11px;color:var(--muted);line-height:1.5}
.card .num{position:absolute;right:8px;top:6px;font-size:24px;font-weight:700;color:rgba(255,255,255,.07)}
main{flex:1;display:flex;min-height:0}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}
.panel{width:340px;flex:none;padding:14px;overflow:auto;border-left:1px solid var(--line);background:var(--panel);font-size:13px;line-height:1.7}
.panel h2{font-size:14px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--accent);color:#1a1a1a;font-size:11px;font-weight:600}
.body{color:var(--muted);margin:0 0 10px}.body strong{color:var(--ink)}
.body code{background:rgba(6,182,212,.2);color:#a5f3fc;padding:1px 5px;border-radius:4px;font-family:Consolas,Monaco,monospace;font-size:12px}
.points{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin-top:8px;border-left:3px solid var(--accent2)}
.points h4{margin:0 0 6px;font-size:13px}.points ul{margin:0;padding-left:18px;color:var(--muted)}
.points li{margin-bottom:3px}.points li strong{color:var(--accent)}
.stepbar{display:flex;gap:6px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);overflow-x:auto}
.step{flex:1;min-width:100px;padding:8px 10px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}
.step:hover{background:#1e345a;border-color:var(--accent)}
.step.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1a1a;font-weight:600;border-color:transparent}
.controls{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}
button:hover{background:#1e345a}button.primary{background:var(--accent);border-color:var(--accent);color:#1a1a1a;font-weight:600}
.controls label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
input[type=range]{accent-color:var(--accent)}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}
</style>
</head>
<body>
<header class="topbar"><a class="back" href="../index.html">← 返回化学目录</a><span class="title">电解池</span><span class="subtitle">电解饱和食盐水 · 氯碱工业 · Cl₂ + H₂ + NaOH</span></header>
<div class="cards">
  <div class="card"><div class="num">1</div><h4>电解原理</h4><div class="v">通电使氧化还原反应<br>在两极分别进行</div></div>
  <div class="card s2"><div class="num">2</div><h4>阳极反应</h4><div class="v">2Cl⁻ - 2e⁻ → Cl₂↑<br>氯离子失电子氧化</div></div>
  <div class="card s3"><div class="num">3</div><h4>阴极反应</h4><div class="v">2H⁺ + 2e⁻ → H₂↑<br>氢离子得电子还原</div></div>
  <div class="card s4"><div class="num">4</div><h4>总反应</h4><div class="v">2NaCl+2H₂O→2NaOH<br>+H₂↑+Cl₂↑</div></div>
</div>
<main>
  <div class="stage"><canvas id="cv"></canvas></div>
  <aside class="panel"><h2><span class="badge" id="stepBadge">基础</span><span id="stepTitle">电解池</span></h2><p class="body" id="stepBody"></p><div class="points" id="stepPoints"></div></aside>
</main>
<div class="stepbar" id="stepbar"></div>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button><button id="resetBtn">↺ 重置</button>
  <button id="stepBackBtn">◀ 上一步</button><button id="stepFwdBtn">下一步 ▶</button>
  <label>速度 <input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <span id="status" class="status">点击播放或选择步骤</span>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(520,Math.min(1100,r.width-12));cv.height=Math.max(400,Math.min(600,r.height-12));}
window.addEventListener('resize',()=>{fit();draw();});fit();
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawText(t,x,y,c,fs,a,b){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=a||'center';ctx.textBaseline=b||'middle';ctx.fillText(t,x,y);}

const STEPS=[
  {tag:'基础',name:'电解池定义',body:'<strong>电解池</strong>是<strong>电能转化为化学能</strong>的装置。通电使<strong>不能自发</strong>的氧化还原反应在两极发生。<strong>阳极</strong>接电源正极（发生氧化），<strong>阴极</strong>接电源负极（发生还原）。',points:{title:'核心要点',items:['<strong>阳极</strong>：接正极，阴离子迁入，失电子','<strong>阴极</strong>：接负极，阳离子迁入，得电子','<strong>能量</strong>：电能 → 化学能','<strong>条件</strong>：直流电源、电解质溶液']}},
  {tag:'基础',name:'饱和食盐水',body:'<strong>饱和食盐水</strong>含 <code>Na⁺、Cl⁻、H⁺、OH⁻</code> 四种离子。通电前离子<strong>自由移动</strong>，通电后<strong>定向迁移</strong>：阳离子向阴极、阴离子向阳极。',points:{title:'溶液成分',items:['<strong>Na⁺、Cl⁻</strong>：来自 NaCl（大量）','<strong>H⁺、OH⁻</strong>：来自水的电离（少量）','<strong>通电前</strong>：自由移动','<strong>通电后</strong>：定向迁移']}},
  {tag:'放电顺序',name:'阳极放电顺序',body:'<strong>阳极</strong>上阴离子<strong>失电子</strong>（放电）。惰性电极下阴离子放电顺序：<code>Cl⁻ > OH⁻ > 含氧酸根</code>。故 Cl⁻ 先于 OH⁻ 放电产生 Cl₂。',points:{title:'阴离子放电序',items:['<strong>S²⁻ > I⁻ > Br⁻ > Cl⁻ > OH⁻</strong>','<strong>Cl⁻</strong>：失电子生成 Cl₂','<strong>OH⁻</strong>：被 Cl⁻ 抢先放电','<strong>SO₄²⁻/NO₃⁻</strong>：含氧酸根难放电']}},
  {tag:'放电顺序',name:'阴极放电顺序',body:'<strong>阴极</strong>上阳离子<strong>得电子</strong>（放电）。放电顺序：<code>Ag⁺ > Hg²⁺ > Fe³⁺ > Cu²⁺ > H⁺ > Pb²⁺ > Zn²⁺ > Na⁺</strong>。H⁺ 先于 Na⁺ 放电产生 H₂。',points:{title:'阳离子放电序',items:['<strong>Ag > Hg > Fe > Cu > H</strong>：在前先放电','<strong>H⁺</strong>：得电子生成 H₂','<strong>Na⁺/K⁺</strong>：在水溶液中不放电','<strong>结论</strong>：H⁺ 抢先于 Na⁺']}},
  {tag:'电极',name:'阳极反应',body:'<strong>阳极</strong>（接正极）：Cl⁻ 失电子氧化。<code>2Cl⁻ - 2e⁻ → Cl₂↑</code>。产生的 <strong>Cl₂</strong> 是<strong>黄绿色</strong>有刺激性气味的气体。',points:{title:'阳极反应',items:['<strong>电极反应</strong>：2Cl⁻ - 2e⁻ → Cl₂↑','<strong>类型</strong>：氧化反应（失电子）','<strong>产物</strong>：黄绿色 Cl₂ 气体','<strong>检验</strong>：使湿润淀粉 KI 试纸变蓝']}},
  {tag:'电极',name:'阴极反应',body:'<strong>阴极</strong>（接负极）：H⁺ 得电子还原。<code>2H⁺ + 2e⁻ → H₂↑</code>（或写作 <code>2H₂O + 2e⁻ → H₂↑ + 2OH⁻</code>）。产生的 <strong>H₂</strong> 是<strong>无色</strong>可燃气体。',points:{title:'阴极反应',items:['<strong>电极反应</strong>：2H⁺ + 2e⁻ → H₂↑','<strong>类型</strong>：还原反应（得电子）','<strong>产物</strong>：无色 H₂ 气体','<strong>检验</strong>：点燃产生淡蓝色火焰']}},
  {tag:'离子迁移',name:'离子迁移方向',body:'通电后离子<strong>定向迁移</strong>：<strong>阳离子</strong>（Na⁺、H⁺）向<strong>阴极</strong>移动；<strong>阴离子</strong>（Cl⁻、OH⁻）向<strong>阳极</strong>移动。形成闭合回路。',points:{title:'迁移规律',items:['<strong>阳离子</strong>：→ 阴极（Na⁺、H⁺）','<strong>阴离子</strong>：→ 阳极（Cl⁻、OH⁻）','<strong>电源</strong>：迫使离子定向移动','<strong>回路</strong>：电子外电路，离子内电路']}},
  {tag:'产物',name:'NaOH 形成',body:'阴极区 H⁺ 不断被消耗，水电离平衡右移，<strong>OH⁻ 浓度增大</strong>，与迁移来的 Na⁺ 形成 <strong>NaOH</strong>。阴极区滴加<strong>酚酞</strong>变红，滴加<strong>紫色石蕊</strong>变蓝。',points:{title:'NaOH 形成',items:['<strong>H⁺ 消耗</strong>：水电离平衡右移','<strong>OH⁻ 积累</strong>：阴极区变碱性','<strong>Na⁺ 迁入</strong>：形成 NaOH','<strong>检验</strong>：酚酞变红、石蕊变蓝']}},
  {tag:'总反应',name:'总反应方程式',body:'<strong>总反应</strong>：<code>2NaCl + 2H₂O →(通电) 2NaOH + H₂↑ + Cl₂↑</code>。这是<strong>氯碱工业</strong>的核心反应，工业上用<strong>离子交换膜</strong>电解槽防止 Cl₂ 与 NaOH 反应。',points:{title:'总反应要点',items:['<strong>反应物</strong>：2NaCl + 2H₂O','<strong>条件</strong>：通电','<strong>产物</strong>：2NaOH + H₂↑ + Cl₂↑','<strong>离子膜</strong>：隔离两极防副反应']}},
  {tag:'总结',name:'核心速记',body:'电解饱和食盐水是<strong>电能驱动</strong>的氧化还原：阳极 Cl⁻ 失电子生 Cl₂，阴极 H⁺ 得电子生 H₂，阴极区积累 OH⁻ 与 Na⁺ 生 NaOH。是<strong>氯碱工业</strong>基础。',points:{title:'三句话总结',items:['<strong>阳极</strong>：2Cl⁻ - 2e⁻ → Cl₂↑','<strong>阴极</strong>：2H⁺ + 2e⁻ → H₂↑','<strong>溶液</strong>：NaOH（阴极区）','<strong>应用</strong>：氯碱工业制碱制氯']}},
];

let stepIdx=0,playing=false,lastT=0,speed=1,stepTime=0,t=0;
const STEP_DURATION=3.4;
const bubbles=[];

// ===== 场景：电解池装置 =====
function drawCellScene(time){
  const W=cv.width,H=cv.height;
  drawText('电解池装置 · 饱和食盐水',W/2,30,'#06b6d4',16);
  const cx=W/2,topY=H*0.22,botY=H*0.78;
  // 电源
  ctx.fillStyle='#1e345a';ctx.strokeStyle='#06b6d4';ctx.lineWidth=2;
  roundRect(cx-60,topY-50,120,32,6);ctx.fill();ctx.stroke();
  drawText('直流电源',cx,topY-34,'#06b6d4',12);
  // 导线
  ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(cx-40,topY-18);ctx.lineTo(cx-40,topY-50);ctx.lineTo(cx-160,topY-50);ctx.lineTo(cx-160,topY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+40,topY-18);ctx.lineTo(cx+40,topY-50);ctx.lineTo(cx+160,topY-50);ctx.lineTo(cx+160,topY);ctx.stroke();
  drawText('+',cx-160,topY-60,'#f87171',14);
  drawText('−',cx+160,topY-60,'#34d399',14);
  // 电解槽
  ctx.strokeStyle='#7f93b5';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(cx-180,topY);ctx.lineTo(cx-180,botY);ctx.lineTo(cx+180,botY);ctx.lineTo(cx+180,topY);ctx.stroke();
  // 溶液
  ctx.fillStyle='rgba(6,182,212,0.18)';
  ctx.fillRect(cx-178,topY+2,356,botY-topY-2);
  drawText('饱和食盐水 NaCl(aq)',cx,botY+22,'#9ab0d0',12);
  // 电极
  ctx.fillStyle='#f87171';
  ctx.fillRect(cx-160-6,topY+10,12,botY-topY-20);
  drawText('阳极',cx-160,topY,'#f87171',13);
  drawText('(+)',cx-160,topY+16,'#f87171',11);
  ctx.fillStyle='#34d399';
  ctx.fillRect(cx+160-6,topY+10,12,botY-topY-20);
  drawText('阴极',cx+160,topY,'#34d399',13);
  drawText('(−)',cx+160,topY+16,'#34d399',11);
  // 离子分布（漂浮闪烁）
  const ions=[['Na⁺',cx-100,topY+50,'#06b6d4'],['Cl⁻',cx+100,topY+50,'#fbbf24'],['H⁺',cx-80,topY+120,'#67e8f9'],['OH⁻',cx+80,topY+120,'#a5f3fc'],['Na⁺',cx-60,topY+200,'#06b6d4'],['Cl⁻',cx+60,topY+200,'#fbbf24']];
  ions.forEach((io,i)=>{
    const dx=Math.sin(time*1.5+i)*8,dy=Math.cos(time+i)*5;
    drawText(io[0],io[1]+dx,io[2]+dy,io[3],13);
  });
}

// ===== 场景：阳极 Cl⁻ 失电子 =====
function drawAnodeScene(time){
  const W=cv.width,H=cv.height;
  drawText('阳极反应 · 2Cl⁻ - 2e⁻ → Cl₂↑',W/2,30,'#fbbf24',16);
  const cx=W/2,cy=H/2+20;
  // 阳极
  ctx.fillStyle='#f87171';
  ctx.fillRect(cx-120-6,cy-100,12,200);
  drawText('阳极(+)',cx-120,cy-120,'#f87171',13);
  // Cl⁻ 向阳极移动
  for(let i=0;i<4;i++){
    const phase=(time*0.6+i*0.25)%1;
    const x=cx+120-phase*240;
    const y=cy-60+i*40+Math.sin(time*2+i)*8;
    drawText('Cl⁻',x,y,'#fbbf24',14);
  }
  // 电子流向电源
  ctx.strokeStyle='#67e8f9';ctx.lineWidth=2;
  ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(cx-120,cy-100);ctx.lineTo(cx-120,cy-160);ctx.stroke();
  ctx.setLineDash([]);
  drawText('e⁻ →',cx-100,cy-150,'#67e8f9',12,'left');
  // Cl₂ 生成（黄绿色气泡）
  ctx.font='15px sans-serif';
  for(let i=0;i<3;i++){
    const phase=(time+i*0.4)%1.5;
    const x=cx-100+i*30+Math.sin(time*3+i)*6;
    const y=cy-100-phase*120;
    if(phase<1.2){
      ctx.fillStyle='rgba(167,243,93,'+(1-phase*0.6)+')';
      ctx.beginPath();ctx.arc(x,y,6+phase*4,0,7);ctx.fill();
    }
  }
  drawText('Cl₂↑ (黄绿色)',cx,cy-180,'#a7f3d0',13);
  // 反应式
  ctx.font='bold 16px sans-serif';ctx.fillStyle='#fff';
  ctx.fillText('2Cl⁻ − 2e⁻ → Cl₂↑',cx,H-70);
  drawText('氧化反应 · 失电子',cx,H-45,'#34d399',12);
}

// ===== 场景：阴极 H⁺ 得电子 =====
function drawCathodeScene(time){
  const W=cv.width,H=cv.height;
  drawText('阴极反应 · 2H⁺ + 2e⁻ → H₂↑',W/2,30,'#06b6d4',16);
  const cx=W/2,cy=H/2+20;
  // 阴极
  ctx.fillStyle='#34d399';
  ctx.fillRect(cx+120-6,cy-100,12,200);
  drawText('阴极(−)',cx+120,cy-120,'#34d399',13);
  // H⁺ 向阴极移动
  for(let i=0;i<4;i++){
    const phase=(time*0.6+i*0.25)%1;
    const x=cx-120+phase*240;
    const y=cy-60+i*40+Math.sin(time*2+i)*8;
    drawText('H⁺',x,y,'#67e8f9',14);
  }
  // 电子从电源流入
  ctx.strokeStyle='#67e8f9';ctx.lineWidth=2;
  ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(cx+120,cy-100);ctx.lineTo(cx+120,cy-160);ctx.stroke();
  ctx.setLineDash([]);
  drawText('← e⁻',cx+100,cy-150,'#67e8f9',12,'right');
  // H₂ 生成（无色气泡）
  ctx.font='15px sans-serif';
  for(let i=0;i<3;i++){
    const phase=(time+i*0.4)%1.5;
    const x=cx+100+i*30+Math.sin(time*3+i)*6;
    const y=cy-100-phase*120;
    if(phase<1.2){
      ctx.strokeStyle='rgba(125,211,252,'+(1-phase*0.5)+')';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(x,y,5+phase*4,0,7);ctx.stroke();
    }
  }
  drawText('H₂↑ (无色)',cx,cy-180,'#7dd3fc',13);
  // 反应式
  ctx.font='bold 16px sans-serif';ctx.fillStyle='#fff';
  ctx.fillText('2H⁺ + 2e⁻ → H₂↑',cx,H-70);
  drawText('还原反应 · 得电子',cx,H-45,'#34d399',12);
}

// ===== 场景：Cl₂ 气泡上升（黄绿色）=====
function drawChlorineScene(time){
  const W=cv.width,H=cv.height;
  drawText('Cl₂ 气泡上升 · 黄绿色刺激气体',W/2,30,'#a7f3d0',16);
  const cx=W/2,cy=H/2;
  // 收集管
  ctx.strokeStyle='#7f93b5';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(cx-30,H-60);ctx.lineTo(cx-30,cy-80);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+30,H-60);ctx.lineTo(cx+30,cy-80);ctx.stroke();
  // Cl₂ 气柱（黄绿色）
  ctx.fillStyle='rgba(167,243,93,0.25)';
  ctx.fillRect(cx-28,cy-80,56,H-60-cy+80);
  // 气泡
  for(let i=0;i<10;i++){
    const phase=(time*0.5+i*0.18)%1;
    const x=cx+Math.sin(time*2+i)*12;
    const y=H-60-phase*(H-140);
    const r=4+phase*8;
    ctx.fillStyle='rgba(167,243,93,'+(0.8-phase*0.4)+')';
    ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fill();
  }
  drawText('Cl₂',cx,cy-100,'#a7f3d0',16);
  // 性质
  drawText('黄绿色 · 刺激性气味 · 有毒 · 较活泼非金属',cx,H-30,'#9ab0d0',12);
  drawText('检验：使湿润淀粉 KI 试纸变蓝',cx,H-50,'#34d399',12);
}

// ===== 场景：H₂ 气泡上升（无色）=====
function drawHydrogenScene(time){
  const W=cv.width,H=cv.height;
  drawText('H₂ 气泡上升 · 无色可燃气体',W/2,30,'#7dd3fc',16);
  const cx=W/2,cy=H/2;
  // 收集管
  ctx.strokeStyle='#7f93b5';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(cx-30,H-60);ctx.lineTo(cx-30,cy-80);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+30,H-60);ctx.lineTo(cx+30,cy-80);ctx.stroke();
  // H₂ 气柱（透明，用边框示意）
  ctx.fillStyle='rgba(125,211,252,0.1)';
  ctx.fillRect(cx-28,cy-80,56,H-60-cy+80);
  // 气泡（空心表示无色）
  for(let i=0;i<10;i++){
    const phase=(time*0.5+i*0.18)%1;
    const x=cx+Math.sin(time*2+i)*12;
    const y=H-60-phase*(H-140);
    const r=4+phase*8;
    ctx.strokeStyle='rgba(125,211,252,'+(0.9-phase*0.4)+')';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.stroke();
  }
  drawText('H₂',cx,cy-100,'#7dd3fc',16);
  // 性质
  drawText('无色无味 · 难溶于水 · 密度最小 · 可燃',cx,H-30,'#9ab0d0',12);
  drawText('检验：点燃产生淡蓝色火焰，产物只有水',cx,H-50,'#34d399',12);
}

// ===== 场景：NaOH 形成（红色石蕊）=====
function drawNaOHScene(time){
  const W=cv.width,H=cv.height;
  drawText('NaOH 形成 · 阴极区变碱',W/2,30,'#f87171',16);
  const cx=W/2,topY=H*0.22,botY=H*0.78;
  // 电解槽
  ctx.strokeStyle='#7f93b5';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(cx-180,topY);ctx.lineTo(cx-180,botY);ctx.lineTo(cx+180,botY);ctx.lineTo(cx+180,topY);ctx.stroke();
  // 阴极区变红（酚酞/石蕊）
  const pulse=0.3+0.15*Math.sin(time*2);
  ctx.fillStyle='rgba(248,113,113,'+pulse+')';
  ctx.fillRect(cx+0,topY+2,178,botY-topY-2);
  // 阳极区（中性浅蓝）
  ctx.fillStyle='rgba(6,182,212,0.18)';
  ctx.fillRect(cx-178,topY+2,178,botY-topY-2);
  drawText('阳极区',cx-90,topY+20,'#9ab0d0',12);
  drawText('阴极区(碱性)',cx+90,topY+20,'#f87171',12);
  // OH⁻ 积累
  for(let i=0;i<5;i++){
    const x=cx+30+Math.sin(time+i)*20+i*8;
    const y=topY+60+i*30;
    drawText('OH⁻',x,y,'#f87171',12);
  }
  for(let i=0;i<3;i++){
    const x=cx+60+Math.cos(time*1.2+i)*15;
    const y=topY+50+i*40;
    drawText('Na⁺',x,y,'#06b6d4',12);
  }
  drawText('OH⁻ 积累 + Na⁺ → NaOH',cx,botY+30,'#fbbf24',13);
  // 指示剂
  drawText('酚酞：阴极区变红  ·  紫色石蕊：变蓝',cx,H-35,'#34d399',12);
}

// ===== 场景：离子迁移 =====
function drawMigrationScene(time){
  const W=cv.width,H=cv.height;
  drawText('离子迁移 · 阳离子→阴极 · 阴离子→阳极',W/2,30,'#06b6d4',16);
  const cx=W/2,cy=H/2+10;
  // 电极
  ctx.fillStyle='#f87171';ctx.fillRect(cx-160-6,cy-80,12,160);
  drawText('阳极(+)',cx-160,cy-100,'#f87171',13);
  ctx.fillStyle='#34d399';ctx.fillRect(cx+160-6,cy-80,12,160);
  drawText('阴极(−)',cx+160,cy-100,'#34d399',13);
  // 阳离子向左移动（Na⁺、H⁺）— 等等：阳离子向阴极（右侧）
  // 重写：阳离子向右移动（向阴极），阴离子向左移动（向阳极）
  const cations=['Na⁺','H⁺','Na⁺','H⁺'];
  cations.forEach((c,i)=>{
    const phase=(time*0.4+i*0.2)%1;
    const x=cx-140+phase*280;
    const y=cy-60+i*30;
    drawText(c,x,y,'#06b6d4',13);
    ctx.strokeStyle='rgba(6,182,212,0.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x-15,y);ctx.lineTo(x-25,y);ctx.stroke();
  });
  const anions=['Cl⁻','OH⁻','Cl⁻','OH⁻'];
  anions.forEach((c,i)=>{
    const phase=(time*0.4+i*0.2)%1;
    const x=cx+140-phase*280;
    const y=cy+10+i*30;
    drawText(c,x,y,'#fbbf24',13);
    ctx.strokeStyle='rgba(251,191,36,0.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x+15,y);ctx.lineTo(x+25,y);ctx.stroke();
  });
  drawText('阳离子 → 阴极',cx+80,cy-90,'#06b6d4',12,'left');
  drawText('阴离子 → 阳极',cx-80,cy+90,'#fbbf24',12,'right');
}

// ===== 场景：总反应方程式 =====
function drawOverallScene(){
  const W=cv.width,H=cv.height;
  drawText('总反应方程式 · 氯碱工业核心',W/2,40,'#fbbf24',18);
  // 反应框
  ctx.fillStyle='rgba(6,182,212,0.08)';ctx.strokeStyle='#06b6d4';ctx.lineWidth=2;
  roundRect(60,90,W-120,100,10);ctx.fill();ctx.stroke();
  ctx.font='bold 20px serif';ctx.fillStyle='#e8eef8';ctx.textAlign='center';
  ctx.fillText('2NaCl + 2H₂O  →  2NaOH + H₂↑ + Cl₂↑',W/2,130);
  ctx.font='13px sans-serif';ctx.fillStyle='#fbbf24';
  ctx.fillText('条件：通电（直流电源）',W/2,165);
  // 两极反应
  ctx.fillStyle='rgba(248,113,113,0.1)';ctx.strokeStyle='#f87171';ctx.lineWidth=1.5;
  roundRect(80,220,(W-160)/2-10,80,8);ctx.fill();ctx.stroke();
  drawText('阳极（氧化）',(80+(W-160)/2/2),240,'#f87171',14);
  ctx.font='14px serif';ctx.fillStyle='#fff';
  ctx.fillText('2Cl⁻ − 2e⁻ → Cl₂↑',(80+(W-160)/2/2),275);
  ctx.fillStyle='rgba(52,211,153,0.1)';ctx.strokeStyle='#34d399';ctx.lineWidth=1.5;
  roundRect(W/2+10,220,(W-160)/2-10,80,8);ctx.fill();ctx.stroke();
  drawText('阴极（还原）',(W/2+10+(W-160)/2/2),240,'#34d399',14);
  ctx.font='14px serif';ctx.fillStyle='#fff';
  ctx.fillText('2H⁺ + 2e⁻ → H₂↑',(W/2+10+(W-160)/2/2),275);
  // 应用
  const apps=[
    {t:'制烧碱',d:'NaOH 化工原料',c:'#06b6d4'},
    {t:'制氯气',d:'Cl₂ 消毒/合成',c:'#fbbf24'},
    {t:'制氢气',d:'H₂ 清洁能源',c:'#34d399'},
  ];
  apps.forEach((a,i)=>{
    const x=80+i*(W-160)/3;
    ctx.fillStyle=a.c+'22';ctx.strokeStyle=a.c;ctx.lineWidth=2;
    roundRect(x+10,H-110,(W-160)/3-20,70,8);ctx.fill();ctx.stroke();
    drawText(a.t,x+(W-160)/6,H-85,a.c,14);
    drawText(a.d,x+(W-160)/6,H-55,'#fff',11);
  });
}

// ===== 场景：总结 =====
function drawSummaryScene(){
  const W=cv.width,H=cv.height;
  drawText('电解饱和食盐水 · 核心总结',W/2,40,'#fbbf24',18);
  const items=[
    {t:'阳极反应',d:'2Cl⁻ − 2e⁻ → Cl₂↑',c:'#fbbf24'},
    {t:'阴极反应',d:'2H⁺ + 2e⁻ → H₂↑',c:'#06b6d4'},
    {t:'溶液产物',d:'NaOH（阴极区积累）',c:'#f87171'},
    {t:'放电顺序',d:'阳极 Cl⁻ > OH⁻',c:'#34d399'},
    {t:'放电顺序',d:'阴极 H⁺ > Na⁺',c:'#a78bfa'},
    {t:'工业应用',d:'氯碱工业制三碱氯',c:'#fb923c'},
  ];
  items.forEach((m,i)=>{
    const col=i%3,row=Math.floor(i/3);
    const x=80+col*(W-160)/3;
    const y=100+row*180;
    ctx.fillStyle=m.c+'22';ctx.strokeStyle=m.c;ctx.lineWidth=2;
    roundRect(x+10,y,(W-160)/3-20,140,10);ctx.fill();ctx.stroke();
    drawText(m.t,x+(W-160)/6,y+50,m.c,15);
    drawText(m.d,x+(W-160)/6,y+95,'#fff',12);
  });
}

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  if(stepIdx===0)drawCellScene(t);
  else if(stepIdx===1)drawCellScene(t);
  else if(stepIdx===2)drawAnodeScene(t);
  else if(stepIdx===3)drawCathodeScene(t);
  else if(stepIdx===4)drawAnodeScene(t);
  else if(stepIdx===5)drawCathodeScene(t);
  else if(stepIdx===6)drawMigrationScene(t);
  else if(stepIdx===7)drawNaOHScene(t);
  else if(stepIdx===8)drawOverallScene();
  else if(stepIdx===9)drawSummaryScene();
}

function syncStep(){
  const s=STEPS[stepIdx];
  document.getElementById('stepBadge').textContent=s.tag;
  document.getElementById('stepTitle').textContent=s.name;
  document.getElementById('stepBody').innerHTML=s.body;
  document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?.title||'')+'</h4><ul>'+((s.points?.items||[]).map(x=>'<li>'+x+'</li>').join(''))+'</ul>';
  document.querySelectorAll('.step').forEach((el,i)=>el.classList.toggle('active',i===stepIdx));
  statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;
  stepTime=0;
}

function update(dt){
  t+=dt*speed;
  if(!playing)return;
  stepTime+=dt*speed;
  if(stepTime>=STEP_DURATION){
    if(stepIdx<STEPS.length-1){stepIdx++;syncStep();}
    else{playing=false;playBtn.textContent='▶ 播放';statusEl.textContent='动画完成';}
  }
}

function loop(ts){
  if(!lastT)lastT=ts;
  const dt=(ts-lastT)/1000;lastT=ts;
  update(dt);draw();
  requestAnimationFrame(loop);
}

const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn');
const speedEl=document.getElementById('speed');
playBtn.onclick=()=>{playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';};
resetBtn.onclick=()=>{stepIdx=0;playing=false;syncStep();draw();playBtn.textContent='▶ 播放';};
stepFwdBtn.onclick=()=>{if(stepIdx<STEPS.length-1){stepIdx++;syncStep();draw();}};
stepBackBtn.onclick=()=>{if(stepIdx>0){stepIdx--;syncStep();draw();}};
speedEl.oninput=()=>{speed=parseFloat(speedEl.value);};

function buildStepbar(){
  const bar=document.getElementById('stepbar');
  bar.innerHTML='';
  STEPS.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='step'+(i===stepIdx?' active':'');
    el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>10?s.name.slice(0,9)+'…':s.name)+'</div>';
    el.onclick=()=>{stepIdx=i;syncStep();draw();};
    bar.appendChild(el);
  });
}

buildStepbar();syncStep();requestAnimationFrame(loop);
</script>
</body>
