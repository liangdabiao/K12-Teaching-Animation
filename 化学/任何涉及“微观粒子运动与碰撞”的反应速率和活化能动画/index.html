<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>反应速率与活化能（微观碰撞）</title>
<style>
:root{--bg:#0f1420;--panel:#171e2e;--ink:#e8edf6;--muted:#9fb0c8;--accent:#3b82f6;--line:#26324a;--good:#34d399;--warn:#f59e0b;--bad:#f87171;}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:14px;padding:12px 18px;background:var(--panel);border-bottom:1px solid var(--line)}
.back{color:var(--accent);text-decoration:none;font-size:14px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap}
.back:hover{background:#1f2a40}
.title{font-size:16px;font-weight:600}
main{flex:1;display:flex;min-height:0}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;min-width:0}
canvas{background:#0b0f18;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%}
.panel{width:330px;flex:none;padding:16px;overflow:auto;border-left:1px solid var(--line);background:var(--panel)}
.panel h2{font-size:15px;margin:0 0 10px}.panel p{font-size:13px;line-height:1.75;color:var(--muted);margin:0 0 12px}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}.legend span{font-size:12px;display:flex;align-items:center;gap:6px;color:var(--muted)}
.dot{width:12px;height:12px;border-radius:50%;display:inline-block}
.controls{display:flex;align-items:center;gap:10px;padding:12px 18px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:#22304a;border:1px solid var(--line);padding:8px 14px;border-radius:8px;cursor:pointer}
button:hover{background:#2c3c5a}button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.controls label{font-size:13px;color:var(--muted)}input[type=range]{accent-color:var(--accent)}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:860px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line)}}
</style>
</head>
<body>
<header class="topbar">
  <a class="back" href="../index.html">← 返回学科目录</a>
  <span class="title">反应速率与活化能（微观碰撞）</span>
</header>
<main>
  <div class="stage"><canvas id="cv"></canvas></div>
  <aside class="panel">
    <h2>原理说明</h2>
    <p>化学反应发生的前提是分子<b>有效碰撞</b>：能量须超过<b>活化能 Ea</b> 且取向合适。升高温度使分子运动加快、能量升高，有效碰撞频率增加，反应速率增大。动画演示温度对碰撞频率的影响。</p>
    <div class="legend"><span class='dot' style='background:#7dd3fc'></span>反应物分子&nbsp;<span class='dot' style='background:#f87171'></span>有效碰撞&nbsp;<span class='dot' style='background:#f59e0b'></span>活化区</div>
  </aside>
</main>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button>
  <button id="resetBtn">↺ 重置</button>
  <button id="stepBackBtn">◀ 上一步</button>
  <button id="stepFwdBtn">下一步 ▶</button>
  <label>速度 <input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <span id="status" class="status"></span>
</div>
<script>
const cv=document.getElementById('cv');const ctx=cv.getContext('2d');
const statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(360,Math.min(980,r.width-8));cv.height=Math.max(360,Math.min(560,r.height-8));}
window.addEventListener('resize',()=>{fit();draw();});fit();

const R={t:0,N:26,T:0.4,bar:0};
function sceneInit(){sceneReset();R.mols=[];for(let i=0;i<R.N;i++)R.mols.push({x:Math.random(),y:Math.random(),vx:(Math.random()*2-1),vy:(Math.random()*2-1),hit:0});}
function sceneReset(){R.t=0;R.T=0.4;R.bar=0;if(!R.mols)R.mols=[];}
function sceneUpdate(dt){
  const sp=0.2+R.T*1.6;
  let hits=0;
  R.mols.forEach(m=>{
    m.x+=m.vx*sp*dt;m.y+=m.vy*sp*dt;
    if(m.x<0||m.x>1)m.vx*=-1;if(m.y<0||m.y>1)m.vy*=-1;
    m.x=(m.x+1)%1;m.y=(m.y+1)%1;
    // collision with a target marker
    const dx=m.x-0.5,dy=m.y-0.5;
    if(dx*dx+dy*dy<0.02){hits++;m.hit=1;}else m.hit*=0.9;
  });
  R.bar=Math.min(1,R.bar+ (hits/ (R.N) - R.bar)*dt*4 + (R.T-0.4)*dt*0.5);
}
function sceneDraw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  // container
  ctx.strokeStyle='#7f93b5';ctx.lineWidth=3;ctx.strokeRect(40,40,cv.width-80,cv.height-80);
  // target
  ctx.fillStyle='rgba(245,158,11,0.25)';ctx.beginPath();ctx.arc(40+(cv.width-80)*0.5,40+(cv.height-80)*0.5,18,0,7);ctx.fill();
  R.mols.forEach(m=>{
    const x=40+(cv.width-80)*m.x,y=40+(cv.height-80)*m.y;
    ctx.fillStyle=m.hit>0.3?'#f87171':'#7dd3fc';ctx.beginPath();ctx.arc(x,y,6,0,7);ctx.fill();
  });
  // temperature control
  ctx.fillStyle='#cdd7ea';ctx.font='13px sans-serif';ctx.textAlign='left';
  ctx.fillText('温度 T='+R.T.toFixed(2)+' ｜ 升高温度→分子运动加快、有效碰撞增多',40,cv.height-14);
  statusEl.textContent='有效碰撞率(相对) '+(R.bar*100).toFixed(0)+'% ｜ 活化能 Ea 以下碰撞无效';
}
function sceneStep(d){R.T=Math.max(0.2,Math.min(1.4,R.T+d*0.2));}

let playing=false,lastT=0,speed=1,t=0;
const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn');
const speedEl=document.getElementById('speed');
function loop(ts){if(!lastT)lastT=ts;const dt=(ts-lastT)/1000;lastT=ts;if(playing){t+=dt*speed;if(window.sceneUpdate)sceneUpdate(dt*speed);}draw();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
playBtn.onclick=()=>{playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';};
resetBtn.onclick=()=>{if(window.sceneReset)sceneReset();t=0;playing=false;playBtn.textContent='▶ 播放';draw();};
stepFwdBtn.onclick=()=>{if(window.sceneStep)sceneStep(1);draw();};
stepBackBtn.onclick=()=>{if(window.sceneStep)sceneStep(-1);draw();};
speedEl.oninput=()=>{speed=parseFloat(speedEl.value);};
function draw(){if(window.sceneDraw)sceneDraw();}
if(window.sceneInit)sceneInit();
draw();
</script>
</body>
</html>
