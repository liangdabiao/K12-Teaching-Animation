<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>化学键 · 离子键 · 共价键 · 金属键</title>
<style>
:root{--bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;--accent:#10b981;--accent2:#f59e0b;--line:#243a5e;--good:#34d399;--warn:#fbbf24;--bad:#f87171;}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
.back{color:var(--accent2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap;background:rgba(245,158,11,.06)}
.back:hover{background:rgba(245,158,11,.14)}
.title{font-size:15px;font-weight:600}.subtitle{font-size:12px;color:var(--muted)}
.cards{display:flex;gap:10px;padding:10px 16px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(16,185,129,.06),transparent)}
.card{flex:1;min-width:160px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.card.s2::before{background:var(--accent2)}.card.s3::before{background:var(--good)}.card.s4::before{background:var(--bad)}
.card h4{margin:0 0 4px;font-size:13px}.card .v{font-size:11px;color:var(--muted);line-height:1.5}
.card .num{position:absolute;right:8px;top:6px;font-size:24px;font-weight:700;color:rgba(255,255,255,.07)}
main{flex:1;display:flex;min-height:0}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}
.panel{width:340px;flex:none;padding:14px;overflow:auto;border-left:1px solid var(--line);background:var(--panel);font-size:13px;line-height:1.7}
.panel h2{font-size:14px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--accent);color:#1a1a1a;font-size:11px;font-weight:600}
.body{color:var(--muted);margin:0 0 10px}.body strong{color:var(--ink)}
.body code{background:rgba(16,185,129,.2);color:#a7f3d0;padding:1px 5px;border-radius:4px;font-family:Consolas,Monaco,monospace;font-size:12px}
.points{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin-top:8px;border-left:3px solid var(--accent2)}
.points h4{margin:0 0 6px;font-size:13px}.points ul{margin:0;padding-left:18px;color:var(--muted)}
.points li{margin-bottom:3px}.points li strong{color:var(--accent)}
.stepbar{display:flex;gap:6px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);overflow-x:auto}
.step{flex:1;min-width:100px;padding:8px 10px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}
.step:hover{background:#1e345a;border-color:var(--accent2)}
.step.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1a1a;font-weight:600;border-color:transparent}
.controls{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}
button:hover{background:#1e345a}button.primary{background:var(--accent);border-color:var(--accent);color:#1a1a1a;font-weight:600}
.controls label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
input[type=range]{accent-color:var(--accent)}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}
</style>
</head>
<body>
<header class="topbar"><a class="back" href="../index.html">← 返回化学目录</a><span class="title">化学键</span><span class="subtitle">离子键 · 共价键 · 金属键 · 形成与微观本质</span></header>
<div class="cards">
  <div class="card"><div class="num">1</div><h4>化学键</h4><div class="v">相邻原子间强烈相互作用<br>分三类：离子、共价、金属</div></div>
  <div class="card s2"><div class="num">2</div><h4>离子键</h4><div class="v">阴阳离子间静电作用<br>活泼金属+活泼非金属</div></div>
  <div class="card s3"><div class="num">3</div><h4>共价键</h4><div class="v">原子间共用电子对<br>非金属+非金属</div></div>
  <div class="card s4"><div class="num">4</div><h4>金属键</h4><div class="v">金属阳离子与自由电子<br>电子海模型</div></div>
</div>
<main>
  <div class="stage"><canvas id="cv"></canvas></div>
  <aside class="panel"><h2><span class="badge" id="stepBadge">基础</span><span id="stepTitle">化学键</span></h2><p class="body" id="stepBody"></p><div class="points" id="stepPoints"></div></aside>
</main>
<div class="stepbar" id="stepbar"></div>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button><button id="resetBtn">↺ 重置</button>
  <button id="stepBackBtn">◀ 上一步</button><button id="stepFwdBtn">下一步 ▶</button>
  <label>速度 <input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <span id="status" class="status">点击播放或选择步骤</span>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(520,Math.min(1100,r.width-12));cv.height=Math.max(400,Math.min(600,r.height-12));}
window.addEventListener('resize',()=>{fit();draw();});fit();
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawText(t,x,y,c,fs,a,b){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=a||'center';ctx.textBaseline=b||'middle';ctx.fillText(t,x,y);}
function drawOrbit(cx,cy,r,color){ctx.strokeStyle=color;ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx,cy,r,0,7);ctx.stroke();}
function drawAtom(x,y,label,color,radius){
  ctx.fillStyle=color;ctx.shadowColor=color;ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(x,y,radius,0,7);ctx.fill();ctx.shadowBlur=0;
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1;ctx.beginPath();ctx.arc(x,y,radius,0,7);ctx.stroke();
  ctx.fillStyle=(color==='#ffffff'||color==='#fff')?'#1a1a1a':'#fff';
  ctx.font='bold '+(radius*0.8)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(label,x,y);
}

const STEPS=[
  {tag:'基础',name:'化学键定义',body:'<strong>化学键</strong>是<strong>相邻的原子或离子之间强烈的相互作用</strong>。化学键使原子结合成分子或晶体，是物质结构的基石。化学键主要有三种类型：<strong>离子键</strong>、<strong>共价键</strong>和<strong>金属键</strong>。',points:{title:'三类化学键',items:['<strong>离子键</strong>：阴阳离子间静电作用','<strong>共价键</strong>：原子间共用电子对','<strong>金属键</strong>：金属阳离子与自由电子','<strong>本质</strong>：电子的得失、共用或离域']}},
  {tag:'离子键',name:'NaCl 形成过程',body:'<strong>氯化钠</strong>的形成：Na 原子<strong>失去 1 个电子</strong>成为 Na⁺，Cl 原子<strong>得到 1 个电子</strong>成为 Cl⁻，二者靠<strong>静电作用</strong>结合成 NaCl。',points:{title:'电子转移三步',items:['<strong>Na → Na⁺ + e⁻</strong>：失 1 电子','<strong>Cl + e⁻ → Cl⁻</strong>：得 1 电子','<strong>Na⁺ + Cl⁻ → NaCl</strong>：静电吸引','<strong>活泼金属+活泼非金属</strong>：形成离子键']}},
  {tag:'离子键',name:'离子化合物',body:'由<strong>离子键</strong>构成的化合物叫<strong>离子化合物</strong>。包括大多数盐、强碱、活泼金属氧化物，如 NaCl、KOH、CaO。常温下多以<strong>离子晶体</strong>形式存在，熔沸点较高。',points:{title:'常见离子化合物',items:['<strong>盐类</strong>：NaCl、Na₂CO₃、CuSO₄','<strong>强碱</strong>：NaOH、KOH、Ca(OH)₂','<strong>活泼金属氧化物</strong>：Na₂O、CaO','<strong>特征</strong>：熔沸点高，水溶液导电']}},
  {tag:'共价键',name:'共价键 H₂ 与 Cl₂',body:'<strong>共价键</strong>是原子间通过<strong>共用电子对</strong>形成的化学键。两个 H 原子各出 1 个电子，形成 1 对共用电子，构成 H₂ 分子。同样 Cl₂ 也是 1 对共用电子对。',points:{title:'共价键本质',items:['<strong>共用电子对</strong>：双方都不失电子','<strong>H₂</strong>：H—H 单键，1 对共用电子','<strong>Cl₂</strong>：Cl—Cl 单键，1 对共用电子','<strong>非金属+非金属</strong>：典型共价键']}},
  {tag:'共价键',name:'H₂O 与 CO₂ 结构',body:'<strong>水分子</strong>是极性分子，O 吸电子能力强，共用电子对偏向 O，呈 V 形结构。<strong>CO₂</strong>是直线型非极性分子，两个 C=O 键对称，极性抵消。',points:{title:'分子构型',items:['<strong>H₂O</strong>：V 形，键角约 104.5°','<strong>CO₂</strong>：直线型，O=C=O','<strong>电子对偏向</strong>：吸电子强的一端','<strong>极性</strong>：H₂O 极性，CO₂ 非极性']}},
  {tag:'共价键',name:'极性与非极性键',body:'<strong>同种元素</strong>原子间形成的共价键为<strong>非极性共价键</strong>（如 H—H、Cl—Cl）；<strong>不同种元素</strong>原子间形成<strong>极性共价键</strong>（如 H—Cl、H—O），共用电子对偏向吸电子能力强的原子。',points:{title:'判断方法',items:['<strong>同种原子</strong>：非极性共价键','<strong>不同原子</strong>：极性共价键','<strong>电负性差越大</strong>：极性越强','<strong>极性分子</strong>：整体电荷分布不均']}},
  {tag:'金属键',name:'金属键 电子海',body:'<strong>金属键</strong>是<strong>金属阳离子与自由电子</strong>之间的强烈相互作用。金属原子脱落的外层电子在整块金属中<strong>自由移动</strong>，形成"电子海"，把阳离子"粘"在一起。',points:{title:'电子海模型',items:['<strong>金属阳离子</strong>：规则的晶格排列','<strong>自由电子</strong>：在整个晶体中流动','<strong>导电导热</strong>：自由电子定向移动','<strong>延展性</strong>：阳离子层可滑动']}},
  {tag:'键参数',name:'键能 键长 键角',body:'<strong>键能</strong>：拆开 1 mol 键所需能量（kJ/mol），越大越牢固。<strong>键长</strong>：成键两原子核间平均距离（pm）。<strong>键角</strong>：分子中键与键的夹角，决定分子空间构型。',points:{title:'三大参数',items:['<strong>键能</strong>：越大化学键越稳定','<strong>键长</strong>：越短通常键越牢','<strong>键角</strong>：决定分子立体构型','<strong>H-H 键能</strong>：436 kJ/mol']}},
  {tag:'应用',name:'8 电子稳定结构',body:'原子通过<strong>得失或共用电子</strong>，使最外层达到 <strong>8 电子稳定结构</strong>（He 为 2 电子），即稀有气体结构。这是化学键形成的<strong>根本驱动力</strong>。',points:{title:'稳定结构规律',items:['<strong>8 电子结构</strong>：ns²np⁶（稀有气体）','<strong>Na</strong>：失 1 电子后变为 8 电子','<strong>Cl</strong>：得 1 电子后变为 8 电子','<strong>驱动力</strong>：能量最低最稳定']}},
  {tag:'应用',name:'电子式表示',body:'用<strong>电子式</strong>表示化学键形成过程：在元素符号周围用小黑点（或×）表示最外层电子。NaCl 形成可写作 Na× + ·Cl̈: → Na⁺[×Cl̈:]⁻。',points:{title:'电子式书写',items:['<strong>阳离子</strong>：直接写离子符号','<strong>阴离子</strong>：加方括号与电荷','<strong>共用电子对</strong>：中间位置','<strong>H₂</strong>：H×H（共用 1 对）']}},
  {tag:'总结',name:'核心速记',body:'化学键是<strong>相邻原子或离子间的强烈相互作用</strong>，分<strong>离子键</strong>（静电作用）、<strong>共价键</strong>（共用电子对）、<strong>金属键</strong>（电子海）三类，根本驱动力是达到<strong>稳定结构</strong>。',points:{title:'三句话总结',items:['<strong>离子键</strong>：阴阳离子静电作用','<strong>共价键</strong>：原子间共用电子对','<strong>金属键</strong>：阳离子+自由电子海','<strong>本质</strong>：达到稳定电子结构']}},
];

let stepIdx=0,playing=false,lastT=0,speed=1,stepTime=0,t=0;
const STEP_DURATION=3.2;

// ===== 场景：化学键三类概览 =====
function drawOverviewScene(time){
  const W=cv.width,H=cv.height;
  drawText('化学键三大类型 · 形成本质',W/2,30,'#10b981',16);
  const lx=W*0.2,mx=W*0.5,rx=W*0.8,cy=H/2+10;
  drawText('离子键',lx,cy-100,'#f87171',14);
  drawText('共价键',mx,cy-100,'#34d399',14);
  drawText('金属键',rx,cy-100,'#fbbf24',14);
  // 左：Na+ Cl- 静电吸引
  drawAtom(lx-50,cy,'Na','#a78bfa',26);
  drawAtom(lx+50,cy,'Cl','#34d399',26);
  drawText('+',lx-50,cy+40,'#f87171',16);
  drawText('-',lx+50,cy+40,'#67e8f9',16);
  ctx.strokeStyle='#f87171';ctx.lineWidth=2;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(lx-25,cy);ctx.lineTo(lx+25,cy);ctx.stroke();ctx.setLineDash([]);
  drawText('静电吸引',lx,cy+60,'#f87171',11);
  // 中：H-H 共用电子对
  const shake=Math.sin(time*3)*3;
  drawAtom(mx-30,cy,'H','#ffffff',22);
  drawAtom(mx+30,cy,'H','#ffffff',22);
  ctx.fillStyle='#fbbf24';
  ctx.beginPath();ctx.arc(mx,cy+shake,4,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(mx,cy+shake-8,4,0,7);ctx.fill();
  drawText('共用电子对',mx,cy+60,'#34d399',11);
  // 右：金属阳离子 + 自由电子海
  drawAtom(rx-30,cy-20,'Fe','#fbbf24',20);
  drawAtom(rx+30,cy-20,'Fe','#fbbf24',20);
  drawAtom(rx,cy+30,'Fe','#fbbf24',20);
  ctx.fillStyle='#06b6d4';
  for(let i=0;i<6;i++){
    const a=time*2+i;const dx=Math.cos(a)*35;const dy=Math.sin(a)*30;
    ctx.beginPath();ctx.arc(rx+dx,cy+5+dy,2.5,0,7);ctx.fill();
  }
  drawText('电子海',rx,cy+60,'#06b6d4',11);
  drawText('相邻原子/离子间强烈的相互作用',W/2,H-50,'#9ab0d0',13);
  drawText('本质：电子的得失、共用或离域',W/2,H-28,'#10b981',12);
}

// ===== 场景：NaCl 形成电子转移 =====
function drawNaClScene(time){
  const W=cv.width,H=cv.height;
  drawText('NaCl 形成 · 电子转移动画',W/2,30,'#10b981',16);
  const cx=W/2,cy=H/2+20;
  const naX=cx-140,clX=cx+140;
  const prog=Math.min(1,Math.max(0,(Math.sin(time*1.2)+1)/2));
  // Na 原子（紫）
  drawOrbit(naX,cy,30,'rgba(167,139,250,0.4)');
  drawAtom(naX,cy,'Na','#a78bfa',22);
  const eAng=time*2;
  ctx.fillStyle='#fde68a';
  for(let i=0;i<8;i++){
    const a=eAng+i*Math.PI/4;
    ctx.beginPath();ctx.arc(naX+Math.cos(a)*30,cy+Math.sin(a)*30,2.5,0,7);ctx.fill();
  }
  // Cl 原子（绿）
  drawOrbit(clX,cy,32,'rgba(52,211,153,0.4)');
  drawAtom(clX,cy,'Cl','#34d399',22);
  ctx.fillStyle='#fde68a';
  for(let i=0;i<7;i++){
    const a=-eAng+i*2*Math.PI/7;
    ctx.beginPath();ctx.arc(clX+Math.cos(a)*32,cy+Math.sin(a)*32,2.5,0,7);ctx.fill();
  }
  // 转移中的电子
  const tx=naX+(clX-naX)*prog;
  ctx.fillStyle='#fbbf24';ctx.shadowColor='#fbbf24';ctx.shadowBlur=15;
  ctx.beginPath();ctx.arc(tx,cy,5,0,7);ctx.fill();ctx.shadowBlur=0;
  ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(naX+30,cy);ctx.lineTo(clX-30,cy);ctx.stroke();
  drawText('Na',naX,cy-50,'#a78bfa',13);
  drawText('Cl',clX,cy-50,'#34d399',13);
  if(prog<0.5){drawText('Na 失去 1 个电子 → Na⁺',cx,cy+70,'#a78bfa',13);}
  else{drawText('Cl 得到 1 个电子 → Cl⁻',cx,cy+70,'#34d399',13);}
  drawText('最终：Na⁺ + Cl⁻ → NaCl（静电吸引）',W/2,H-50,'#10b981',13);
  drawText('活泼金属（Na）+ 活泼非金属（Cl）= 离子键',W/2,H-28,'#9ab0d0',12);
}

// ===== 场景：离子化合物晶格 =====
function drawLatticeScene(time){
  const W=cv.width,H=cv.height;
  drawText('离子化合物 · NaCl 晶体结构',W/2,30,'#10b981',16);
  const cx=W/2,cy=H/2+20;
  const size=42;
  for(let r=0;r<4;r++)for(let c=0;c<5;c++){
    const x=cx-2*size+c*size+ (r%2)*size/2;
    const y=cy-1.5*size+r*size;
    const isNa=(r+c)%2===0;
    drawAtom(x,y,isNa?'Na⁺':'Cl⁻',isNa?'#a78bfa':'#34d399',15);
  }
  drawText('Na⁺（紫）与 Cl⁻（绿）规则排列',cx,cy+1.8*size+10,'#9ab0d0',12);
  drawText('熔沸点高 · 水溶液中电离出自由离子',W/2,H-40,'#34d399',12);
}

// ===== 场景：H₂ 共用电子对 =====
function drawH2Scene(time){
  const W=cv.width,H=cv.height;
  drawText('共价键 · H₂ 共用电子对',W/2,30,'#10b981',16);
  const cx=W/2,cy=H/2;
  const dist=70-Math.sin(time)*8;
  drawAtom(cx-dist/2,cy,'H','#ffffff',24);
  drawAtom(cx+dist/2,cy,'H','#ffffff',24);
  ctx.fillStyle='#fbbf24';
  ctx.beginPath();ctx.arc(cx-dist/2+12,cy,3,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(cx+dist/2-12,cy,3,0,7);ctx.fill();
  const shake=Math.sin(time*4)*4;
  ctx.fillStyle='#10b981';ctx.shadowColor='#10b981';ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(cx,cy+shake,5,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy-shake-6,5,0,7);ctx.fill();
  ctx.shadowBlur=0;
  drawText('共用电子对（2个电子）',cx,cy+50,'#10b981',13);
  drawText('H × H → H:H （或 H—H）',cx,cy+80,'#34d399',13);
  drawText('双方都不失电子，靠共用电子对结合',W/2,H-45,'#9ab0d0',12);
  drawText('键能 436 kJ/mol · 键长 74 pm',W/2,H-25,'#fbbf24',12);
}

// ===== 场景：H₂O 极性分子 =====
function drawH2OScene(time){
  const W=cv.width,H=cv.height;
  drawText('极性分子 · H₂O（电子对偏向 O）',W/2,30,'#10b981',16);
  const cx=W/2,cy=H/2+10;
  const angle=104.5*Math.PI/180;
  const L=70;
  const h1x=cx-Math.sin(angle/2)*L;
  const h1y=cy+Math.cos(angle/2)*L;
  const h2x=cx+Math.sin(angle/2)*L;
  const h2y=cy+Math.cos(angle/2)*L;
  ctx.strokeStyle='#9ab0d0';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(h1x,h1y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(h2x,h2y);ctx.stroke();
  drawAtom(cx,cy,'O','#f87171',26);
  drawAtom(h1x,h1y,'H','#ffffff',18);
  drawAtom(h2x,h2y,'H','#ffffff',18);
  const offset=Math.sin(time*2)*5+12;
  ctx.fillStyle='#fbbf24';
  ctx.beginPath();ctx.arc(cx+(h1x-cx)*0.35-offset*0.5,cy+(h1y-cy)*0.35,4,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(cx+(h2x-cx)*0.35+offset*0.5,cy+(h2y-cy)*0.35,4,0,7);ctx.fill();
  drawText('δ-',cx,cy-35,'#67e8f9',13);
  drawText('δ+',h1x-15,h1y+18,'#f87171',12);
  drawText('δ+',h2x+15,h2y+18,'#f87171',12);
  drawText('键角 104.5°',cx,cy+90,'#34d399',13);
  drawText('V 形结构 · 极性分子（电子对偏向 O）',W/2,H-45,'#9ab0d0',12);
  drawText('O 吸电子能力强 → 共用电子对偏向 O',W/2,H-25,'#10b981',12);
}

// ===== 场景：CO₂ 直线型 =====
function drawCO2Scene(time){
  const W=cv.width,H=cv.height;
  drawText('非极性分子 · CO₂ 直线型',W/2,30,'#10b981',16);
  const cx=W/2,cy=H/2+10;
  drawAtom(cx-110,cy,'O','#f87171',24);
  drawAtom(cx,cy,'C','#1a1a1a',26);
  drawAtom(cx+110,cy,'O','#f87171',24);
  ctx.strokeStyle='#9ab0d0';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(cx-90,cy-5);ctx.lineTo(cx-20,cy-5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-90,cy+5);ctx.lineTo(cx-20,cy+5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+20,cy-5);ctx.lineTo(cx+90,cy-5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+20,cy+5);ctx.lineTo(cx+90,cy+5);ctx.stroke();
  ctx.fillStyle='#fbbf24';
  const off=Math.sin(time*2)*4;
  ctx.beginPath();ctx.arc(cx-50,cy-10+off,3.5,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(cx-50,cy+10-off,3.5,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(cx+50,cy-10-off,3.5,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(cx+50,cy+10+off,3.5,0,7);ctx.fill();
  drawText('两个 C=O 键极性相反，相互抵消',cx,cy-60,'#34d399',12);
  drawText('键角 180° · 直线型 · 非极性分子',W/2,H-45,'#9ab0d0',12);
  drawText('电子对对称分布 → 整体无极性',W/2,H-25,'#10b981',12);
}

// ===== 场景：金属自由电子海 =====
function drawMetalScene(time){
  const W=cv.width,H=cv.height;
  drawText('金属键 · 自由电子海模型',W/2,30,'#10b981',16);
  const cx=W/2,cy=H/2+10;
  const cols=5,rows=4,gap=55;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const x=cx-(cols-1)*gap/2+c*gap;
    const y=cy-(rows-1)*gap/2+r*gap;
    drawAtom(x,y,'Fe²⁺','#fbbf24',14);
  }
  ctx.fillStyle='#06b6d4';
  for(let i=0;i<14;i++){
    const seed=i*1.3;
    const bx=cx+Math.sin(time*1.2+seed)*(W/2-80);
    const by=cy+Math.cos(time*0.9+seed*1.5)*100;
    ctx.shadowColor='#06b6d4';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(bx,by,3,0,7);ctx.fill();
  }
  ctx.shadowBlur=0;
  ctx.strokeStyle='#06b6d4';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(cx-W/2+100,cy+130);ctx.lineTo(cx+W/2-100,cy+130);ctx.stroke();
  ctx.fillStyle='#06b6d4';
  ctx.beginPath();ctx.moveTo(cx+W/2-100,cy+130);ctx.lineTo(cx+W/2-110,cy+124);ctx.lineTo(cx+W/2-110,cy+136);ctx.fill();
  drawText('自由电子定向移动 → 导电',cx,cy+150,'#06b6d4',12);
  drawText('金属阳离子（橙）+ 自由电子（青）= 金属键',W/2,H-45,'#9ab0d0',12);
  drawText('延展性：阳离子层可滑动，电子海仍粘合',W/2,H-25,'#10b981',12);
}

// ===== 场景：键能柱状图 =====
function drawBondEnergyScene(time){
  const W=cv.width,H=cv.height;
  drawText('键参数 · 化学键键能对比',W/2,30,'#10b981',16);
  const data=[
    {name:'H-H',val:436,color:'#34d399'},
    {name:'Cl-Cl',val:243,color:'#67e8f9'},
    {name:'O=O',val:498,color:'#f87171'},
    {name:'N≡N',val:946,color:'#a78bfa'},
    {name:'C-C',val:347,color:'#fbbf24'},
    {name:'C=C',val:614,color:'#f59e0b'},
    {name:'H-O',val:463,color:'#06b6d4'},
  ];
  const maxV=1000,cw=(W-160)/data.length,baseY=H-100;
  ctx.strokeStyle='#3a4a6a';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(80,60);ctx.lineTo(80,baseY);ctx.lineTo(W-80,baseY);ctx.stroke();
  drawText('键能 (kJ/mol)',60,55,'#9ab0d0',11);
  drawText('键型',W-80,baseY+30,'#9ab0d0',11);
  for(let v=0;v<=1000;v+=250){
    const y=baseY-v*(baseY-80)/maxV;
    drawText(v,70,y,'#5a6a8a',10);
    ctx.strokeStyle='#243a5e';ctx.beginPath();ctx.moveTo(80,y);ctx.lineTo(W-80,y);ctx.stroke();
  }
  data.forEach((d,i)=>{
    const x=90+i*cw;
    const curV=Math.min(d.val,d.val*Math.min(1,Math.max(0,time*0.6-i*0.1)));
    const bh=curV*(baseY-80)/maxV;
    ctx.fillStyle=d.color+'cc';ctx.strokeStyle=d.color;ctx.lineWidth=1.5;
    roundRect(x+10,baseY-bh,cw-20,Math.max(2,bh),4);ctx.fill();ctx.stroke();
    drawText(d.name,x+cw/2,baseY+15,'#fff',12);
    if(curV>50)drawText(d.val,x+cw/2,baseY-bh-12,d.color,11);
  });
  drawText('键能越大 → 化学键越牢固 → 分子越稳定',W/2,H-45,'#34d399',13);
  drawText('N≡N 键能 946 kJ/mol 最大，故 N₂ 化学性质稳定',W/2,H-25,'#10b981',12);
}

// ===== 场景：8 电子稳定结构 =====
function drawStableScene(time){
  const W=cv.width,H=cv.height;
  drawText('8 电子稳定结构 · 化学键的根本驱动力',W/2,30,'#10b981',16);
  const cx=W/2,cy=H/2+10;
  const na1x=cx-180,na2x=cx,nx=cx+180;
  drawText('反应前 Na',na1x,cy-70,'#a78bfa',13);
  drawAtom(na1x,cy,'Na','#a78bfa',22);
  drawOrbit(na1x,cy,38,'rgba(167,139,250,0.4)');
  ctx.fillStyle='#fde68a';
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4+time;
    ctx.beginPath();ctx.arc(na1x+Math.cos(a)*38,cy+Math.sin(a)*38,2.5,0,7);ctx.fill();
  }
  ctx.fillStyle='#fbbf24';
  ctx.beginPath();ctx.arc(na1x+30,cy-38,3.5,0,7);ctx.fill();
  drawText('失1e⁻',na1x,cy+55,'#fbbf24',11);
  drawText('反应后 Na⁺（稳定）',na2x,cy-70,'#34d399',13);
  drawAtom(na2x,cy,'Na⁺','#a78bfa',22);
  drawOrbit(na2x,cy,38,'rgba(52,211,153,0.4)');
  ctx.fillStyle='#fde68a';
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4+time;
    ctx.beginPath();ctx.arc(na2x+Math.cos(a)*38,cy+Math.sin(a)*38,2.5,0,7);ctx.fill();
  }
  drawText('8电子稳定',na2x,cy+55,'#34d399',11);
  ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(na1x+50,cy);ctx.lineTo(na2x-50,cy);ctx.stroke();
  drawText('→',na2x-50,cy,'#fbbf24',16);
  drawText('稀有气体结构',nx,cy-70,'#06b6d4',13);
  drawAtom(nx,cy,'Ne','#06b6d4',22);
  drawOrbit(nx,cy,38,'rgba(6,182,212,0.4)');
  ctx.fillStyle='#fde68a';
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4-time;
    ctx.beginPath();ctx.arc(nx+Math.cos(a)*38,cy+Math.sin(a)*38,2.5,0,7);ctx.fill();
  }
  drawText('天生稳定',nx,cy+55,'#06b6d4',11);
  drawText('原子得失或共用电子，达到稀有气体的稳定结构',W/2,H-50,'#9ab0d0',13);
  drawText('He（2e⁻）/ Ne、Ar（8e⁻）为最稳定结构',W/2,H-28,'#10b981',12);
}

// ===== 场景：电子式 =====
function drawElectronFormulaScene(time){
  const W=cv.width,H=cv.height;
  drawText('电子式表示化学键形成',W/2,30,'#10b981',16);
  const cx=W/2,cy=H/2;
  drawText('NaCl 形成：',cx,cy-100,'#a78bfa',15);
  ctx.fillStyle='#fbbf24';
  ctx.font='bold 20px Consolas,monospace';
  ctx.fillText('Na ×  +  · Cl̈ :   →   Na⁺ [ × Cl̈ : ]⁻',cx,cy-60);
  drawText('H₂ 形成：',cx,cy+10,'#34d399',15);
  ctx.fillStyle='#fbbf24';
  ctx.fillText('H ·  +  · H   →   H × H  （或 H—H）',cx,cy+50);
  drawText('· / × 表示最外层电子；共用电子对写在两原子之间',W/2,cy+110,'#9ab0d0',12);
  drawText('阳离子直接写，阴离子加方括号并标电荷',W/2,cy+135,'#10b981',12);
  if(Math.sin(time*4)>0){
    drawText('↑',cx-15,cy-55,'#10b981',14);
    drawText('共用电子对',cx-15,cy-75,'#10b981',11);
  }
}

// ===== 场景：总结 =====
function drawSummaryScene(){
  const W=cv.width,H=cv.height;
  drawText('化学键核心总结',W/2,40,'#10b981',18);
  const items=[
    {t:'离子键',d:'阴阳离子静电作用',c:'#a78bfa'},
    {t:'共价键',d:'原子间共用电子对',c:'#34d399'},
    {t:'金属键',d:'阳离子+自由电子海',c:'#fbbf24'},
    {t:'驱动力',d:'达到稳定电子结构',c:'#10b981'},
    {t:'键参数',d:'键能/键长/键角',c:'#06b6d4'},
    {t:'极性判断',d:'同种非极，异种极性',c:'#f87171'},
  ];
  items.forEach((m,i)=>{
    const col=i%3,row=Math.floor(i/3);
    const x=80+col*(W-160)/3;
    const y=100+row*180;
    ctx.fillStyle=m.c+'22';ctx.strokeStyle=m.c;ctx.lineWidth=2;
    roundRect(x+10,y,(W-160)/3-20,140,10);ctx.fill();ctx.stroke();
    drawText(m.t,x+(W-160)/6,y+50,m.c,15);
    drawText(m.d,x+(W-160)/6,y+90,'#fff',12);
  });
}

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  if(stepIdx===0)drawOverviewScene(t);
  else if(stepIdx===1)drawNaClScene(t);
  else if(stepIdx===2)drawLatticeScene(t);
  else if(stepIdx===3)drawH2Scene(t);
  else if(stepIdx===4)drawH2OScene(t);
  else if(stepIdx===5)drawCO2Scene(t);
  else if(stepIdx===6)drawMetalScene(t);
  else if(stepIdx===7)drawBondEnergyScene(t);
  else if(stepIdx===8)drawStableScene(t);
  else if(stepIdx===9)drawElectronFormulaScene(t);
  else if(stepIdx===10)drawSummaryScene();
}

function syncStep(){
  const s=STEPS[stepIdx];
  document.getElementById('stepBadge').textContent=s.tag;
  document.getElementById('stepTitle').textContent=s.name;
  document.getElementById('stepBody').innerHTML=s.body;
  document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?.title||'')+'</h4><ul>'+((s.points?.items||[]).map(x=>'<li>'+x+'</li>').join(''))+'</ul>';
  document.querySelectorAll('.step').forEach((el,i)=>el.classList.toggle('active',i===stepIdx));
  statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;
  stepTime=0;
}

function update(dt){
  t+=dt*speed;
  if(!playing)return;
  stepTime+=dt*speed;
  if(stepTime>=STEP_DURATION){
    if(stepIdx<STEPS.length-1){stepIdx++;syncStep();}
    else{playing=false;playBtn.textContent='▶ 播放';statusEl.textContent='动画完成';}
  }
}

function loop(ts){
  if(!lastT)lastT=ts;
  const dt=(ts-lastT)/1000;lastT=ts;
  update(dt);draw();
  requestAnimationFrame(loop);
}

const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn');
const speedEl=document.getElementById('speed');
playBtn.onclick=()=>{playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';};
resetBtn.onclick=()=>{stepIdx=0;playing=false;syncStep();draw();playBtn.textContent='▶ 播放';};
stepFwdBtn.onclick=()=>{if(stepIdx<STEPS.length-1){stepIdx++;syncStep();draw();}};
stepBackBtn.onclick=()=>{if(stepIdx>0){stepIdx--;syncStep();draw();}};
speedEl.oninput=()=>{speed=parseFloat(speedEl.value);};

function buildStepbar(){
  const bar=document.getElementById('stepbar');
  bar.innerHTML='';
  STEPS.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='step'+(i===stepIdx?' active':'');
    el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>10?s.name.slice(0,9)+'…':s.name)+'</div>';
    el.onclick=()=>{stepIdx=i;syncStep();draw();};
    bar.appendChild(el);
  });
}

buildStepbar();syncStep();requestAnimationFrame(loop);
</script>
</body>
