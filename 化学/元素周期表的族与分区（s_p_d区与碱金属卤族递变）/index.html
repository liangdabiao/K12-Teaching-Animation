main{flex:1;display:flex;min-height:0}

canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}

.step{flex:1;min-width:100px;padding:8px 10px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}

const STEPS=[
 {tag:'结构',name:'周期表结构',body:'<strong>元素周期表</strong>是元素按<strong>原子序数递增</strong>排列的表格。<strong>7 个周期</strong>（横行）× <strong>18 个族</strong>（纵列）。族分为：<strong>7 主族</strong>（IA-VIIA）、<strong>7 副族</strong>（IB-VIIB）、<strong>第 VIII 族</strong>（3 列）、<strong>零族</strong>（稀有气体）。',points:{title:'结构核心',items:['<strong>周期</strong>：横行，共 7 个','<strong>族</strong>：纵列，共 18 个','<strong>主族</strong>：IA-VIIA，族序数后加 A','<strong>副族</strong>：IB-VIIB，族序数后加 B']}},

// 绘制周期表网格
function drawTable(highlightZone,highlightCol,highlightRow,legend,showName){
 const W=cv.width,H=cv.height;
 const cols=18,rows=7;
 const marginX=Math.max(50,W*0.04),marginY=70;
 const cellW=(W-marginX*2)/cols,cellH=(H-marginY-30)/rows;
 ELEMENTS.forEach(e=>{
  const x=marginX+(e.g-1)*cellW,y=marginY+(e.p-1)*cellH;
  let bg=ZONE_COLOR[e.zone],alpha=0.3;
  if(highlightZone){
   if(e.zone===highlightZone){alpha=0.9;}else{alpha=0.1;}
  }
  if(highlightCol!==undefined){
   alpha=(e.g===highlightCol)?0.9:0.12;
   bg=(e.g===highlightCol)?'#fbbf24':ZONE_COLOR[e.zone];
  }
  if(highlightRow!==undefined){
   alpha=(e.p===highlightRow)?0.9:0.12;
   bg=(e.p===highlightRow)?'#06b6d4':ZONE_COLOR[e.zone];
  }
  ctx.fillStyle=hexA(bg,alpha);
  ctx.strokeStyle=hexA(bg,0.85);ctx.lineWidth=1;
  roundRect(x+1,y+1,cellW-2,cellH-2,3);ctx.fill();ctx.stroke();
  // 元素符号
  drawText(e.sym,x+cellW/2,y+cellH/2-6,'#fff',Math.min(13,cellW*0.34));
  // 原子序数
  drawText(e.n,x+cellW/2-((cellW-8)/2)+3,y+cellH/2-(cellH/2-7),'#cbd5e1',8,'left');
  // 中文名（可选，仅在单元格较大时）
  if(showName&&cellW>42){
   drawText(e.name,x+cellW/2,y+cellH/2+10,'#e2e8f0',8);
  }
 });
 // 族序号（顶部）
 for(let g=1;g<=18;g++){
  const isMain=[1,2,13,14,15,16,17,18].includes(g);
  drawText(g,marginX+(g-0.5)*cellW,marginY-12,isMain?'#fbbf24':'#9ab0d0',10);
 }
 // 周期序号（左侧）
 for(let p=1;p<=7;p++){
  drawText(p,marginX-16,marginY+(p-0.5)*cellH,'#9ab0d0',11);
 }
 // 主族/副族标签
 drawText('族 →',marginX-30,marginY-15,'#9ab0d0',9,'right');
 drawText('周↓',marginX-30,marginY+10,'#9ab0d0',9,'right');
 if(legend){
  const items=legend.items,ly=H-22;
  items.forEach((it,i)=>{
   const lx=marginX+i*(W-marginX*2)/items.length;
   ctx.fillStyle=it.c;roundRect(lx,ly-8,14,14,3);ctx.fill();
   drawText(it.t,lx+50,ly,'#cbd5e1',11,'left');
  });
 }
}
function hexA(c,a){const m=c.replace('#','');const r=parseInt(m.slice(0,2),16),g=parseInt(m.slice(2,4),16),b=parseInt(m.slice(4,6),16);return 'rgba('+r+','+g+','+b+','+a+')';}

function drawFBlock(baseY,cellW,cellH,marginX){
 LANTHANIDES.forEach((e,i)=>{

 });
 ACTINIDES.forEach((e,i)=>{

 });

// 场景5：碱金属性质柱状图
function drawAlkaliScene(time){
 const W=cv.width,H=cv.height;
 drawText('碱金属族 IA · Li → Na → K → Rb → Cs',W/2,28,'#f87171',16);
 drawText('原子半径增大 · 熔点降低 · 与水反应越来越剧烈',W/2,48,'#9ab0d0',12);
 const startX=120,endX=W-60,topY=100,botY=H-90;
 const baseY=botY-40;
 const cycle=(time*0.6)%ALKALI.length;
 const activeIdx=Math.floor(cycle);
 const n=ALKALI.length,bw=(endX-startX)/n/2.8;
 // 标题
 drawText('半径',startX-50,topY+30,'#f87171',11,'left');
 drawText('熔点',startX+bw*1.5-50,topY+30,'#06b6d4',11,'left');
 // 坐标轴
 ctx.strokeStyle='#3a4a6a';ctx.lineWidth=1;
 ctx.beginPath();ctx.moveTo(80,topY);ctx.lineTo(80,baseY);ctx.lineTo(W-40,baseY);ctx.stroke();
 drawText('pm',60,topY-10,'#f87171',9,'right');
 drawText('°C',60,baseY-5,'#06b6d4',9,'right');
 drawText('270',60,topY+15,'#9ab0d0',9,'right');
 drawText('0',60,baseY,'#9ab0d0',9,'right');
 ALKALI.forEach((m,i)=>{
  const x=startX+i*((endX-startX)/n);
  const isAct=i===activeIdx;
  // 半径柱
  const rh=(m.r/270)*(baseY-topY-50);
  ctx.fillStyle=isAct?'#f87171':'rgba(248,113,113,0.55)';
  ctx.strokeStyle='#f87171';ctx.lineWidth=1;
  roundRect(x,topY+50-rh+200,bw,rh,3);
  // 修正：从下往上画
  const ry0=baseY-rh;
  roundRect(x,ry0,bw,rh,3);ctx.fill();ctx.stroke();
  drawText(m.sym,x+bw/2,ry0-14,'#fff',12);
  drawText(m.r,x+bw/2,baseY+12,'#f87171',10);
  // 熔点柱
  const mh=(m.mp/200)*(baseY-topY-50);
  ctx.fillStyle=isAct?'#06b6d4':'rgba(6,182,212,0.55)';
  ctx.strokeStyle='#06b6d4';
  roundRect(x+bw*1.5,baseY-mh,bw,mh,3);ctx.fill();ctx.stroke();
  drawText(m.mp+'°',x+bw*2,baseY+12,'#06b6d4',10);
  // 反应性描述
  if(isAct){
   drawText('当前：'+m.name+' · '+m.reac,W/2,topY+20,'#fbbf24',12);
   // 高亮标记
   ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;
   roundRect(x-3,baseY-rh-20,bw*2.5+6,rh+30,4);ctx.stroke();
  }
 });
 drawText('结论：原子半径↑ · 熔点↓ · 与水反应剧烈程度↑',W/2,H-50,'#34d399',13);
 drawText('Cs 是最活泼金属 · 保存在煤油中（防氧化）',W/2,H-28,'#9ab0d0',11);
}

// 场景6：卤族性质颜色对比
function drawHaloScene(time){
 const W=cv.width,H=cv.height;
 drawText('卤族元素 VIIA · F → Cl → Br → I → At',W/2,28,'#34d399',16);
 drawText('颜色加深 · 状态气→液→固 · 与氢化合越来越难',W/2,48,'#9ab0d0',12);
 const n=HALOGEN.length;
 const boxW=(W-160)/n,boxY=90,boxH=140;
 const cycle=(time*0.6)%n;
 const activeIdx=Math.floor(cycle);
 const states=['气体','气体','液体','固体','固体(放射性)'];
 HALOGEN.forEach((m,i)=>{
  const x=80+i*boxW;
  const isAct=i===activeIdx;
  // 颜色样本
  ctx.fillStyle=m.color;ctx.strokeStyle=isAct?'#fbbf24':'#fff';ctx.lineWidth=isAct?3:1;
  if(isAct){ctx.shadowColor='#fbbf24';ctx.shadowBlur=15;}
  roundRect(x+12,boxY,boxW-24,boxH,8);ctx.fill();ctx.stroke();
  ctx.shadowBlur=0;
  // 符号
  const txtC=isDark(m.color)?'#fff':'#1a1a1a';
  drawText(m.sym,x+boxW/2,boxY+boxH/2-15,txtC,24);
  drawText(m.name,x+boxW/2,boxY+boxH/2+12,txtC,12);
  drawText(states[i],x+boxW/2,boxY+boxH/2+32,txtC,10);
  // 反应性
  drawText('与H₂化合',x+boxW/2,boxY+boxH+22,'#9ab0d0',11);
  drawText(m.react,x+boxW/2,boxY+boxH+42,isAct?'#fbbf24':'#cbd5e1',10);
  // 序号
  drawText((i+1),x+18,boxY+10,'#9ab0d0',9,'left');
 });
 // 递变箭头
 ctx.strokeStyle='#34d399';ctx.lineWidth=2;
 ctx.beginPath();ctx.moveTo(100,boxY-15);ctx.lineTo(W-100,boxY-15);ctx.stroke();
 ctx.fillStyle='#34d399';
 ctx.beginPath();ctx.moveTo(W-100,boxY-15);ctx.lineTo(W-110,boxY-20);ctx.lineTo(W-110,boxY-10);ctx.fill();
 drawText('颜色加深 · 非金属性减弱',W/2,boxY-30,'#34d399',12);
 drawText('HX 稳定性：HF > HCl > HBr > HI',W/2,H-45,'#06b6d4',12);
 drawText('F₂ 是最活泼非金属 · 与所有元素反应',W/2,H-25,'#9ab0d0',11);
}
function isDark(hex){const m=hex.replace('#','');const r=parseInt(m.slice(0,2),16),g=parseInt(m.slice(2,4),16),b=parseInt(m.slice(4,6),16);return(r*0.299+g*0.587+b*0.114)<128;}

function drawSummaryScene(){

function draw(){
 ctx.clearRect(0,0,cv.width,cv.height);
 if(stepIdx===0)drawStructScene();
 else if(stepIdx===1)drawZoneScene(t);
 else if(stepIdx===2)drawRowScene();
 else if(stepIdx===3)drawColScene();
 else if(stepIdx===4)drawAlkaliScene(t);
 else if(stepIdx===5)drawHaloScene(t);
 else if(stepIdx===6)drawInferScene();
 else if(stepIdx===7)drawSummaryScene();
}

function syncStep(){
 const s=STEPS[stepIdx];
 document.getElementById('stepBadge').textContent=s.tag;
 document.getElementById('stepTitle').textContent=s.name;
 document.getElementById('stepBody').innerHTML=s.body;
 document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?.title||'')+'</h4><ul>'+((s.points?.items||[]).map(x=>'<li>'+x+'</li>').join(''))+'</ul>';
 document.querySelectorAll('.step').forEach((el,i)=>el.classList.toggle('active',i===stepIdx));
 statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;
 stepTime=0;
}

function update(dt){
 t+=dt*speed;
 if(!playing)return;
 stepTime+=dt*speed;
 if(stepTime>=STEP_DURATION){
  if(stepIdx<STEPS.length-1){stepIdx++;syncStep();}
  else{playing=false;playBtn.textContent='▶ 播放';statusEl.textContent='动画完成';}
 }
}

function loop(ts){
 if(!lastT)lastT=ts;
 const dt=(ts-lastT)/1000;lastT=ts;
 update(dt);draw();
 requestAnimationFrame(loop);
}

const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn');
const speedEl=document.getElementById('speed');
playBtn.onclick=()=>{playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';};
resetBtn.onclick=()=>{stepIdx=0;playing=false;syncStep();draw();playBtn.textContent='▶ 播放';};
stepFwdBtn.onclick=()=>{if(stepIdx<STEPS.length-1){stepIdx++;syncStep();draw();}};
stepBackBtn.onclick=()=>{if(stepIdx>0){stepIdx--;syncStep();draw();}};
speedEl.oninput=()=>{speed=parseFloat(speedEl.value);};

function buildStepbar(){
 const bar=document.getElementById('stepbar');
 bar.innerHTML='';
 STEPS.forEach((s,i)=>{
  const el=document.createElement('div');
  el.className='step'+(i===stepIdx?' active':'');
  el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>10?s.name.slice(0,9)+'…':s.name)+'</div>';
  el.onclick=()=>{stepIdx=i;syncStep();draw();};
  bar.appendChild(el);
 });
}

buildStepbar();syncStep();requestAnimationFrame(loop);
</script>
