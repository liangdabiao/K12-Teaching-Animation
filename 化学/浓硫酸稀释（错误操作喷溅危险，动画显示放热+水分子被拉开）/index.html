<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>浓硫酸稀释</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI','Microsoft YaHei',sans-serif; }
body { background:linear-gradient(135deg,#1a0a15 0%,#0a0a1a 100%); color:#e0e0e0; min-height:100vh; padding:20px; display:flex; flex-direction:column; align-items:center; }
.topbar { width:100%; max-width:1200px; display:flex; align-items:center; gap:15px; margin-bottom:20px; padding:15px 20px; background:rgba(255,255,255,0.05); border-radius:12px; border:1px solid rgba(255,255,255,0.1); }
.topbar .back { color:#e84393; text-decoration:none; font-weight:600; white-space:nowrap; }
.topbar .back:hover { text-decoration:underline; }
.topbar .title { color:#fff; font-size:1.5rem; font-weight:bold; }
main { display:flex; flex-wrap:wrap; gap:20px; max-width:1200px; width:100%; }
.stage { flex:1; min-width:500px; background:rgba(0,0,0,0.3); border-radius:15px; padding:15px; border:1px solid rgba(255,255,255,0.1); }
.stage canvas { width:100%; display:block; border-radius:10px; background:rgba(0,0,0,0.5); }
.panel { width:320px; background:rgba(255,255,255,0.05); border-radius:15px; padding:20px; border:1px solid rgba(255,255,255,0.1); }
.panel h2 { color:#e84393; margin-bottom:15px; font-size:1.3rem; border-bottom:2px solid rgba(255,255,255,0.1); padding-bottom:8px; }
.panel p { line-height:1.7; font-size:0.95rem; color:#ccc; }
.legend { margin-top:15px; display:flex; flex-wrap:wrap; gap:10px; }
.legend .li { display:flex; align-items:center; gap:5px; font-size:0.85rem; color:#aaa; }
.controls { max-width:1200px; width:100%; display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-top:20px; padding:15px 20px; background:rgba(255,255,255,0.05); border-radius:12px; }
.controls button { padding:10px 18px; border:none; border-radius:8px; cursor:pointer; font-weight:600; transition:all 0.2s; background:rgba(255,255,255,0.1); color:#e0e0e0; }
.controls button:hover { background:rgba(255,255,255,0.2); transform:translateY(-1px); }
.controls button.primary { background:#e84393; color:white; }
.controls button.primary:hover { filter:brightness(1.2); }
.controls label { color:#aaa; display:flex; align-items:center; gap:8px; }
.controls input[type="range"] { width:100px; }
.controls .status { color:#fd79a8; font-weight:600; margin-left:auto; }
@media(max-width:900px) { main{flex-direction:column;} .stage,.panel{width:100%;min-width:unset;} }
</style>
</head>
<body>
<header class="topbar">
  <a class="back" href="../index.html">← 返回学科目录</a>
  <span class="title">浓硫酸稀释</span>
</header>
<main>
  <div class="stage"><canvas id="cv"></canvas></div>
  <aside class="panel">
    <h2>原理说明</h2>
    <p>浓硫酸稀释时释放大量热量。必须将浓硫酸沿容器壁缓慢注入水中并不断搅拌，绝不能将水倒入浓硫酸中——否则水浮在酸面上剧烈沸腾喷溅，极其危险。</p>
    <div class="legend"><span class="li"><b style="color:#e84393">●</b> H₂SO₄分子</span><span class="li"><b style="color:#0984e3">●</b> H₂O分子</span><span class="li"><b style="color:#fdcb6e">⚡</b> 放热</span></div>
  </aside>
</main>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button>
  <button id="resetBtn">↺ 重置</button>
  <button id="stepBackBtn">◀ 上一步</button>
  <button id="stepFwdBtn">下一步 ▶</button>
  <label>速度 <input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <span id="status" class="status"></span>
</div>
<script>
const cv=document.getElementById('cv');const ctx=cv.getContext('2d');
const statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(360,Math.min(980,r.width-8));cv.height=Math.max(360,Math.min(560,r.height-8));}
window.addEventListener('resize',()=>{fit();draw();});fit();
const A={t:0,heat:0,mols:[]};for(let i=0;i<20;i++)A.mols.push({x:Math.random(),y:0.7,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2});
function sceneInit(){sceneReset();}
function sceneReset(){{t:0,heat:0,mols:[]};for(let i=0;i<20;i++)A.mols.push({x:Math.random(),y:0.7,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2});}
function sceneUpdate(dt){A.t+=dt;A.heat=Math.min(1,A.t*0.2);A.mols.forEach(p=>{p.x+=p.vx*dt*(1+A.heat*3)*0.3;p.y+=p.vy*dt*(1+A.heat*3)*0.3;if(p.x<0||p.x>1)p.vx*=-1;if(p.y<0.3||p.y>1)p.vy*=-1;p.x=Math.max(0,Math.min(1,p.x));p.y=Math.max(0.3,Math.min(1,p.y));});}
function sceneDraw(){
ctx.clearRect(0,0,cv.width,cv.height);const W=cv.width,H=cv.height;
ctx.fillStyle='#fff';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText('浓硫酸稀释：大量放热，必须酸入水！',W/2,25);
ctx.fillStyle='rgba(9,132,227,0.2)';ctx.fillRect(W*0.2,H*0.3,W*0.6,H*0.6);ctx.strokeStyle='#0984e3';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(W*0.2,H*0.3);ctx.lineTo(W*0.8,H*0.3);ctx.stroke();
ctx.fillStyle='#0984e3';ctx.font='11px sans-serif';ctx.fillText('水',W*0.15,H*0.3-5);
const glow=ctx.createRadialGradient(W/2,H*0.5,10,W/2,H*0.5,100);glow.addColorStop(0,`rgba(225,69,83,${A.heat*0.3})`);glow.addColorStop(1,'rgba(225,69,83,0)');ctx.fillStyle=glow;ctx.fillRect(W*0.2,H*0.3,W*0.6,H*0.6);
A.mols.forEach(p=>{ctx.fillStyle='#74b9ff';ctx.beginPath();ctx.arc(W*0.2+p.x*W*0.6,H*0.3+p.y*H*0.6,3,0,Math.PI*2);ctx.fill();});
if(A.heat>0.3){ctx.fillStyle='#e17055';ctx.font='16px sans-serif';ctx.fillText('⚠ 放热!',W/2,H*0.25);}
ctx.fillStyle='#fdcb6e';ctx.font='bold 13px sans-serif';ctx.fillText('✓ 正确：酸沿壁注入水+搅拌  ✗ 错误：水倒入酸→喷溅!',W/2,H-30);
ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='12px sans-serif';ctx.fillText('浓硫酸溶于水释放大量热，水浮在酸面上剧烈沸腾喷溅',W/2,H-10);
statusEl.textContent="浓硫酸稀释：大量放热，必须酸入水、沿壁慢倒、不断搅拌";
}

let playing=false,lastT=0,speed=1,t=0;
const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn');
const speedEl=document.getElementById('speed');
function loop(ts){if(!lastT)lastT=ts;const dt=(ts-lastT)/1000;lastT=ts;if(playing){t+=dt*speed;if(window.sceneUpdate)sceneUpdate(dt*speed);}draw();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
playBtn.onclick=()=>{playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';};
resetBtn.onclick=()=>{if(window.sceneReset)sceneReset();t=0;playing=false;playBtn.textContent='▶ 播放';draw();};
stepFwdBtn.onclick=()=>{if(window.sceneStep)sceneStep(1);draw();};
stepBackBtn.onclick=()=>{if(window.sceneStep)sceneStep(-1);draw();};
speedEl.oninput=()=>{speed=parseFloat(speedEl.value);};
function draw(){if(window.sceneDraw)sceneDraw();}
if(window.sceneInit)sceneInit();
draw();

</script>
</body>
</html>
