<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>现代生物进化理论</title>
<style>
:root{--bg:#0a1628;--panel:#111d33;--ink:#e8edf6;--muted:#8b9dc3;--accent:#00b894;--line:#1e3050;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:14px;padding:12px 18px;background:var(--panel);border-bottom:1px solid var(--line)}
.back{color:var(--accent);text-decoration:none;font-size:14px;padding:6px 12px;border:1px solid var(--line);border-radius:8px}
main{flex:1;display:flex;min-height:0}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:16px}
canvas{background:#0b0f18;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%}
.panel{width:340px;flex:none;padding:16px;overflow:auto;border-left:1px solid var(--line);background:var(--panel)}
.panel h2{font-size:15px;margin:0 0 10px}.panel p{font-size:13px;line-height:1.75;color:var(--muted);margin:0 0 12px}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}.legend span{font-size:12px;display:flex;align-items:center;gap:6px;color:var(--muted)}
.controls{display:flex;align-items:center;gap:10px;padding:12px 18px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:#22304a;border:1px solid var(--line);padding:8px 14px;border-radius:8px;cursor:pointer}
button:hover{background:#2c3c5a}button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.controls label{font-size:13px;color:var(--muted)}input[type=range]{accent-color:var(--accent)}
.status{font-size:12px;color:var(--muted);margin-left:auto}
.key-points{margin-top:15px;padding:12px;background:rgba(255,255,255,0.05);border-radius:8px;font-size:13px;line-height:1.7}
.key-points h3{margin:0 0 8px;font-size:14px;color:var(--accent)}
.key-points ul{margin:0;padding-left:18px}
@media(max-width:860px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line)}}
</style></head>
<body>
<header class="topbar">
  <a class="back" href="../index.html">← 返回生物目录</a>
  <span class="title">现代生物进化理论</span>
</header>
<main>
  <div class="stage"><canvas id="cv"></canvas></div>
  <aside class="panel">
    <h2>原理说明</h2>
    <p>现代生物进化理论（综合进化论）核心：种群是进化的基本单位；突变和基因重组提供进化的原材料；自然选择决定进化方向；隔离导致物种形成。生物进化的实质是种群基因频率的改变。</p>
    <div class="legend"><span><b style="color:#00b894">●</b> 有利变异个体</span><span><b style="color:#d63031">●</b> 不利变异个体</span><span><b style="color:#fdcb6e">●</b> 中性个体</span></div>
    <div class="key-points"><h3>核心概念</h3><ul>
      <li><b>种群基因库</b>：一个种群中全部个体所含有的全部基因</li>
      <li><b>基因频率</b>：某基因占全部等位基因的比率</li>
      <li><b>哈迪-温伯格平衡</b>：p²+2pq+q²=1（理想种群基因频率不变）</li>
      <li><b>物种形成三环节</b>：突变重组→自然选择→隔离</li>
      <li>地理隔离→各自进化→生殖隔离→新物种</li>
      <li>自然选择使有利基因频率定向增大</li>
    </ul></div>
  </aside>
</main>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button>
  <button id="resetBtn">↺ 重置</button>
  <button id="selectBtn">自然选择</button>
  <button id="freqBtn">基因频率</button>
  <button id="specBtn">物种形成</button>
  <label>选择压 <input id="pressure" type="range" min="0.1" max="1" step="0.05" value="0.5"></label>
  <span id="status" class="status"></span>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(500,Math.min(900,r.width-8));cv.height=Math.max(360,Math.min(520,r.height-8));}
window.addEventListener('resize',()=>{fit();draw();});fit();

let mode='select',t=0,gen=0,playing=false,lastT=0,pressure=0.5;
let pop=[];

function initPop(n=60){
  pop=[];
  for(let i=0;i<n;i++){
    const type=Math.random()<0.1?'good':Math.random()<0.3?'bad':'neutral';
    pop.push({
      x:Math.random()*cv.width,y:Math.random()*cv.height,
      vx:(Math.random()-0.5)*40,vy:(Math.random()-0.5)*40,
      type,r:6+Math.random()*4,alive:true
    });
  }
  gen=0;
}
initPop();

function drawSelection(){
  const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#e8edf6';ctx.font='bold 15px sans-serif';ctx.textAlign='center';
  ctx.fillText(`自然选择模拟 (第${gen}代)`,W/2,25);
  
  // 更新粒子
  pop.forEach(p=>{
    if(!p.alive)return;
    p.x+=p.vx*0.016;p.y+=p.vy*0.016;
    if(p.x<10||p.x>W-10)p.vx*=-1;
    if(p.y<40||p.y>H-10)p.vy*=-1;
  });
  
  // 选择淘汰
  if(playing&&Math.random()<pressure*0.05){
    const badOnes=pop.filter(p=>p.alive&&p.type==='bad');
    if(badOnes.length>0){
      const victim=badOnes[Math.floor(Math.random()*badOnes.length)];
      victim.alive=false;
    }
  }
  
  // 绘制
  const alive=pop.filter(p=>p.alive);
  alive.forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    const color=p.type==='good'?'#00b894':p.type==='bad'?'#d63031':'#fdcb6e';
    ctx.fillStyle=color+'66';ctx.fill();
    ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
  });
  
  const good=alive.filter(p=>p.type==='good').length;
  const bad=alive.filter(p=>p.type==='bad').length;
  const neutral=alive.filter(p=>p.type==='neutral').length;
  
  ctx.fillStyle='#9fb0c8';ctx.font='12px sans-serif';ctx.textAlign='left';
  ctx.fillText(`存活: ${alive.length} | 有利: ${good} 不利: ${bad} 中性: ${neutral}`,15,H-12);
  ctx.fillStyle='#d63031';ctx.textAlign='right';
  ctx.fillText(`不利个体被淘汰 ↑`,W-15,H-12);
  
  statusEl.textContent=`第${gen}代 | 存活${alive.length}/${pop.length}`;
}

function drawFreq(){
  const W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#e8edf6';ctx.font='bold 15px sans-serif';ctx.textAlign='center';
  ctx.fillText('基因频率变化（自然选择使有利基因频率增大）',W/2,25);
  
  // 模拟基因频率变化
  const gens=Math.min(50,Math.floor(t*5));
  const p0=0.5; // 初始A频率
  const s=pressure; // 选择系数
  
  // 画坐标轴
  const ox=80,oy=H-60,gw=W-120,gh=H-130;
  ctx.strokeStyle='#1e3050';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+gw,oy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox,oy-gh);ctx.stroke();
  
  ctx.fillStyle='#8b9dc3';ctx.font='11px sans-serif';ctx.textAlign='center';
  ctx.fillText('世代数',ox+gw/2,oy+25);
  ctx.textAlign='right';ctx.fillText('基因频率',ox-10,oy-gh/2);
  
  // 画曲线
  ctx.beginPath();ctx.strokeStyle='#00b894';ctx.lineWidth=2;
  for(let g=0;g<=gens;g++){
    const freq=p0*(1+s*g/50)/(1+s*p0*g/50); // 简化模型
    const x=ox+g*gw/50;
    const y=oy-freq*gh;
    if(g===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.stroke();
  
  // 不利基因
  ctx.beginPath();ctx.strokeStyle='#d63031';ctx.lineWidth=2;
  for(let g=0;g<=gens;g++){
    const freq=1-p0*(1+s*g/50)/(1+s*p0*g/50);
    const x=ox+g*gw/50;
    const y=oy-freq*gh;
    if(g===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.stroke();
  
  // 图例
  ctx.fillStyle='#00b894';ctx.font='12px sans-serif';ctx.textAlign='left';
  ctx.fillText('— 有利基因A频率',ox+10,oy-gh+20);
  ctx.fillStyle='#d63031';
  ctx.fillText('— 不利基因a频率',ox+10,oy-gh+38);
  
  // 当前值
  if(gens>0){
    const curFreq=p0*(1+s*gens/50)/(1+s*p0*gens/50);
    ctx.fillStyle='#fdcb6e';ctx.font='13px sans-serif';ctx.textAlign='center';
    ctx.fillText(`第${gens}代: A=${(curFreq*100).toFixed(1)}% a=${((1-curFreq)*100).toFixed(1)}%`,W/2,50);
  }
  
  statusEl.textContent=`世代: ${gens}/50`;
}

function drawSpeciation(){
  const W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#e8edf6';ctx.font='bold 15px sans-serif';ctx.textAlign='center';
  ctx.fillText('物种形成过程（地理隔离→生殖隔离）',W/2,25);
  
  const p=Math.min(1,t*0.15);
  
  // 原始种群
  const cx=W/2,cy=H*0.35;
  if(p<0.3){
    ctx.beginPath();ctx.arc(cx,cy,50,0,Math.PI*2);
    ctx.fillStyle='rgba(253,203,110,0.2)';ctx.fill();
    ctx.strokeStyle='#fdcb6e';ctx.lineWidth=2;ctx.stroke();
    for(let i=0;i<12;i++){
      const a=i*Math.PI*2/12+t;
      ctx.beginPath();ctx.arc(cx+35*Math.cos(a),cy+35*Math.sin(a),5,0,Math.PI*2);
      ctx.fillStyle='#fdcb6e';ctx.fill();
    }
    ctx.fillStyle='#fff';ctx.font='12px sans-serif';ctx.textAlign='center';
    ctx.fillText('原始种群',cx,cy+70);
  }
  // 地理隔离
  else if(p<0.6){
    const gap=40+(p-0.3)*200;
    // 左种群
    ctx.beginPath();ctx.arc(cx-gap,cy,35,0,Math.PI*2);
    ctx.fillStyle='rgba(0,184,148,0.2)';ctx.fill();
    ctx.strokeStyle='#00b894';ctx.lineWidth=2;ctx.stroke();
    for(let i=0;i<6;i++){
      const a=i*Math.PI*2/6+t;
      ctx.beginPath();ctx.arc(cx-gap+22*Math.cos(a),cy+22*Math.sin(a),4,0,Math.PI*2);
      ctx.fillStyle='#00b894';ctx.fill();
    }
    // 右种群
    ctx.beginPath();ctx.arc(cx+gap,cy,35,0,Math.PI*2);
    ctx.fillStyle='rgba(9,132,227,0.2)';ctx.fill();
    ctx.strokeStyle='#0984e3';ctx.lineWidth=2;ctx.stroke();
    for(let i=0;i<6;i++){
      const a=i*Math.PI*2/6+t*1.3;
      ctx.beginPath();ctx.arc(cx+gap+22*Math.cos(a),cy+22*Math.sin(a),4,0,Math.PI*2);
      ctx.fillStyle='#0984e3';ctx.fill();
    }
    // 隔离线
    ctx.strokeStyle='#d63031';ctx.lineWidth=2;ctx.setLineDash([5,5]);
    ctx.beginPath();ctx.moveTo(cx,cy-60);ctx.lineTo(cx,cy+60);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#fff';ctx.font='12px sans-serif';
    ctx.fillText('地理隔离（山脉/河流）',cx,cy+70);
    ctx.fillText('各自独立进化',cx,cy+88);
  }
  // 生殖隔离
  else{
    const gap=120;
    // 种群A
    ctx.beginPath();ctx.arc(cx-gap,cy,35,0,Math.PI*2);
    ctx.fillStyle='rgba(0,184,148,0.3)';ctx.fill();
    ctx.strokeStyle='#00b894';ctx.lineWidth=2;ctx.stroke();
    for(let i=0;i<6;i++){
      const a=i*Math.PI*2/6+t;
      ctx.beginPath();ctx.arc(cx-gap+22*Math.cos(a),cy+22*Math.sin(a),4,0,Math.PI*2);
      ctx.fillStyle='#00b894';ctx.fill();
    }
    ctx.fillStyle='#00b894';ctx.font='bold 12px sans-serif';ctx.textAlign='center';
    ctx.fillText('物种A',cx-gap,cy+55);
    
    // 种群B
    ctx.beginPath();ctx.arc(cx+gap,cy,35,0,Math.PI*2);
    ctx.fillStyle='rgba(9,132,227,0.3)';ctx.fill();
    ctx.strokeStyle='#0984e3';ctx.lineWidth=2;ctx.stroke();
    for(let i=0;i<6;i++){
      const a=i*Math.PI*2/6+t*1.3;
      ctx.beginPath();ctx.arc(cx+gap+22*Math.cos(a),cy+22*Math.sin(a),4,0,Math.PI*2);
      ctx.fillStyle='#0984e3';ctx.fill();
    }
    ctx.fillStyle='#0984e3';ctx.font='bold 12px sans-serif';
    ctx.fillText('物种B',cx+gap,cy+55);
    
    // X标记(不能交配)
    ctx.fillStyle='#d63031';ctx.font='bold 24px sans-serif';
    ctx.fillText('✗',cx,cy);
    ctx.fillStyle='#d63031';ctx.font='13px sans-serif';
    ctx.fillText('生殖隔离：不能自由交配或后代不育',cx,cy+80);
    ctx.fillStyle='#fdcb6e';ctx.font='12px sans-serif';
    ctx.fillText('例：马+驴→骡（不育）',cx,cy+100);
  }
  
  statusEl.textContent=`进化阶段: ${p<0.3?'原始种群':p<0.6?'地理隔离':'生殖隔离→新物种'}`;
}

function draw(){
  if(mode==='select')drawSelection();
  else if(mode==='freq')drawFreq();
  else drawSpeciation();
}

let animId;
function loop(ts){
  const dt=Math.min(0.05,(ts-lastT)/1000);lastT=ts;t+=dt;
  if(mode==='select'&&playing){
    gen+=dt*0.5;
    if(gen>Math.floor(gen)+dt*0.5)gen=Math.floor(gen)+1;
  }
  draw();
  if(playing)animId=requestAnimationFrame(loop);
}
document.getElementById('playBtn').onclick=function(){
  playing=!playing;this.textContent=playing?'⏸ 暂停':'▶ 播放';
  if(playing){
    if(mode==='select')initPop();
    lastT=performance.now();loop(lastT);
  }else cancelAnimationFrame(animId);
};
document.getElementById('resetBtn').onclick=function(){t=0;gen=0;initPop();draw();};
document.getElementById('selectBtn').onclick=function(){mode='select';initPop();draw();};
document.getElementById('freqBtn').onclick=function(){mode='freq';t=0;draw();};
document.getElementById('specBtn').onclick=function(){mode='spec';t=0;draw();};
document.getElementById('pressure').oninput=function(){pressure=+this.value;};
draw();
</script></body></html>
