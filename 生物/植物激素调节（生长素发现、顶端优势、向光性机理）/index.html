<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>植物激素调节（生长素发现、顶端优势、向光性机理）</title>
<style>
:root{--bg:#0a1628;--panel:#111d33;--ink:#e8edf6;--muted:#8b9dc3;--accent:#00b894;--line:#1e3050;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:14px;padding:12px 18px;background:var(--panel);border-bottom:1px solid var(--line)}
.back{color:var(--accent);text-decoration:none;font-size:14px;padding:6px 12px;border:1px solid var(--line);border-radius:8px}
main{flex:1;display:flex;min-height:0}.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:16px}
canvas{background:#0b0f18;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%}
.panel{width:330px;flex:none;padding:16px;overflow:auto;border-left:1px solid var(--line);background:var(--panel)}
.panel h2{font-size:15px;margin:0 0 10px}.panel p{font-size:13px;line-height:1.75;color:var(--muted);margin:0 0 12px}
.controls{display:flex;align-items:center;gap:10px;padding:12px 18px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:#22304a;border:1px solid var(--line);padding:8px 14px;border-radius:8px;cursor:pointer}
button:hover{background:#2c3c5a}button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.controls label{font-size:13px;color:var(--muted)}input[type=range]{accent-color:var(--accent)}
.status{font-size:12px;color:var(--muted);margin-left:auto}
.key-points{margin-top:15px;padding:12px;background:rgba(255,255,255,0.05);border-radius:8px;font-size:13px;line-height:1.7}
.key-points h3{margin:0 0 8px;font-size:14px;color:var(--accent)}.key-points ul{margin:0;padding-left:18px}
@media(max-width:860px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line)}}
</style></head>
<body>
<header class="topbar"><a class="back" href="../index.html">← 返回生物目录</a><span class="title">植物激素调节（生长素发现、顶端优势、向光性机理）</span></header>
<main><div class="stage"><canvas id="cv"></canvas></div>
<aside class="panel"><h2>原理说明</h2>
<p>生长素(IAA)：在胚芽鞘尖端产生，向下极性运输。单侧光→生长素背光侧分布多→背光侧生长快→向光弯曲。顶端优势：顶芽产生生长素向下运输→抑制侧芽生长。</p>
<div class="key-points"><h3>五大类植物激素</h3><ul>
<li><b>生长素(IAA)</b>：促进细胞伸长→向光性/顶端优势</li>
<li><b>赤霉素(GA)</b>：促进细胞伸长→植株增高/种子萌发</li>
<li><b>细胞分裂素</b>：促进细胞分裂→延缓衰老</li>
<li><b>脱落酸(ABA)</b>：抑制细胞分裂→促进叶/果实脱落</li>
<li><b>乙烯</b>：促进果实成熟→唯一气体激素</li>
<li>生长素两重性：低浓度促进、高浓度抑制</li>
</ul></div></aside></main>
<div class="controls"><button id="playBtn" class="primary">▶ 播放</button><button id="resetBtn">↺ 重置</button><span id="status" class="status"></span></div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(400,Math.min(900,r.width-8));cv.height=Math.max(320,Math.min(500,r.height-8));}
window.addEventListener('resize',()=>{fit();draw();});fit();
let t=0,playing=false,lastT=0;

let mode='photo';
function drawPhoto(){
  const W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#e8edf6';ctx.font='bold 15px sans-serif';ctx.textAlign='center';
  ctx.fillText('植物向光性（生长素背光侧分布多）',W/2,22);
  const p=Math.min(1,t*0.2);
  ctx.fillStyle='#fdcb6e';ctx.beginPath();ctx.arc(W*0.15,H*0.2,20,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fdcb6e';ctx.font='12px sans-serif';ctx.fillText('单侧光',W*0.15,H*0.2+35);
  for(let i=0;i<5;i++){ctx.strokeStyle='rgba(253,203,110,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(W*0.15+20,H*0.2);ctx.lineTo(W*0.45,H*0.3+i*20);ctx.stroke();}
  const baseX=W*0.5,baseY=H*0.85,bendAngle=p*0.3;
  ctx.strokeStyle='#00b894';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(baseX,baseY);
  const tipX=baseX-Math.sin(bendAngle)*150,tipY=baseY-Math.cos(bendAngle)*150;
  ctx.quadraticCurveTo(baseX-10,baseY-75,tipX,tipY);ctx.stroke();
  ctx.beginPath();ctx.arc(tipX,tipY,6,0,Math.PI*2);ctx.fillStyle='#00b894';ctx.fill();
  if(p>0.3){ctx.fillStyle='#e84393';ctx.font='11px sans-serif';ctx.fillText('→IAA多(背光侧)',tipX+40,tipY+20);}
  ctx.fillStyle='#9fb0c8';ctx.font='11px sans-serif';ctx.fillText('背光侧生长素多→生长快→向光弯曲',W/2,H-12);
}
function drawApical(){
  const W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#e8edf6';ctx.font='bold 15px sans-serif';ctx.textAlign='center';
  ctx.fillText('顶端优势',W/2,22);
  const p=Math.min(1,t*0.3);
  const sx=W*0.35,sy=H*0.85;
  ctx.strokeStyle='#00b894';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx,sy-200*p);ctx.stroke();
  if(p>0.3){ctx.beginPath();ctx.arc(sx,sy-200*p,8,0,Math.PI*2);ctx.fillStyle='#fdcb6e';ctx.fill();ctx.fillStyle='#fff';ctx.font='10px sans-serif';ctx.fillText('顶芽',sx+20,sy-200*p+4);}
  if(p>0.7){const rx=W*0.65,ry=H*0.85;ctx.strokeStyle='#00b894';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx,ry-120);ctx.stroke();ctx.strokeStyle='#00b894';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(rx,ry-80);ctx.lineTo(rx+30,ry-100);ctx.stroke();ctx.fillStyle='#00b894';ctx.font='10px sans-serif';ctx.fillText('去顶→侧芽生长',rx+10,ry-110);}
}
function draw(){if(mode==='photo')drawPhoto();else drawApical();statusEl.textContent=mode==='photo'?'向光性':'顶端优势';}
cv.parentElement.parentElement.parentElement.querySelector('.controls').insertAdjacentHTML('beforeend','<button id="photoBtn">向光性</button><button id="apicalBtn">顶端优势</button>');
document.getElementById('photoBtn').onclick=function(){mode='photo';t=0;draw();};
document.getElementById('apicalBtn').onclick=function(){mode='apical';t=0;draw();};

let animId;
function loop(ts){const dt=Math.min(0.05,(ts-lastT)/1000);lastT=ts;t+=dt;draw();if(playing)animId=requestAnimationFrame(loop);}
document.getElementById('playBtn').onclick=function(){playing=!playing;this.textContent=playing?'⏸ 暂停':'▶ 播放';if(playing){lastT=performance.now();loop(lastT);}else cancelAnimationFrame(animId);};
document.getElementById('resetBtn').onclick=function(){t=0;draw();};
draw();
</script></body></html>
