<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>酶的特性与影响因素（高效性、专一性、温度pH影响）</title>
<style>
:root{--bg:#0a1628;--panel:#111d33;--ink:#e8edf6;--muted:#8b9dc3;--accent:#00b894;--line:#1e3050;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:14px;padding:12px 18px;background:var(--panel);border-bottom:1px solid var(--line)}
.back{color:var(--accent);text-decoration:none;font-size:14px;padding:6px 12px;border:1px solid var(--line);border-radius:8px}
main{flex:1;display:flex;min-height:0}.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:16px}
canvas{background:#0b0f18;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%}
.panel{width:330px;flex:none;padding:16px;overflow:auto;border-left:1px solid var(--line);background:var(--panel)}
.panel h2{font-size:15px;margin:0 0 10px}.panel p{font-size:13px;line-height:1.75;color:var(--muted);margin:0 0 12px}
.controls{display:flex;align-items:center;gap:10px;padding:12px 18px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:#22304a;border:1px solid var(--line);padding:8px 14px;border-radius:8px;cursor:pointer}
button:hover{background:#2c3c5a}button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.controls label{font-size:13px;color:var(--muted)}input[type=range]{accent-color:var(--accent)}
.status{font-size:12px;color:var(--muted);margin-left:auto}
.key-points{margin-top:15px;padding:12px;background:rgba(255,255,255,0.05);border-radius:8px;font-size:13px;line-height:1.7}
.key-points h3{margin:0 0 8px;font-size:14px;color:var(--accent)}.key-points ul{margin:0;padding-left:18px}
@media(max-width:860px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line)}}
</style></head>
<body>
<header class="topbar"><a class="back" href="../index.html">← 返回生物目录</a><span class="title">酶的特性与影响因素（高效性、专一性、温度pH影响）</span></header>
<main><div class="stage"><canvas id="cv"></canvas></div>
<aside class="panel"><h2>原理说明</h2>
<p>酶是活细胞产生的具有催化作用的有机物（绝大多数是蛋白质，少数是RNA）。特性：高效性（催化效率是无机催化剂的10⁷-10¹³倍）、专一性（一种酶只催化一种或一类底物）、作用条件温和（受温度和pH影响）。</p>
<div class="key-points"><h3>影响因素</h3><ul>
<li><b>温度</b>：最适温度时活性最高；过高→变性失活；低温→活性降低但不失活</li>
<li><b>pH</b>：最适pH时活性最高；过酸过碱→变性失活</li>
<li><b>底物浓度</b>：低浓度时正比；高浓度时酶饱和→速率不再增大</li>
<li><b>酶浓度</b>：底物充足时与酶浓度成正比</li>
</ul></div></aside></main>
<div class="controls"><button id="playBtn" class="primary">▶ 播放</button><button id="resetBtn">↺ 重置</button><span id="status" class="status"></span></div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(400,Math.min(900,r.width-8));cv.height=Math.max(320,Math.min(500,r.height-8));}
window.addEventListener('resize',()=>{fit();draw();});fit();
let t=0,playing=false,lastT=0;

let mode='temp';
function drawTemp(){
  const W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#e8edf6';ctx.font='bold 15px sans-serif';ctx.textAlign='center';
  ctx.fillText('温度对酶活性的影响',W/2,25);
  const ox=80,oy=H-60,gw=W-120,gh=H-120;
  ctx.strokeStyle='#1e3050';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+gw,oy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox,oy-gh);ctx.stroke();
  const progress=Math.min(1,t*0.3);
  ctx.beginPath();ctx.strokeStyle='#00b894';ctx.lineWidth=2;
  for(let i=0;i<=gw*progress;i++){const temp=i/gw*80;let activity;if(temp<37)activity=Math.pow(temp/37,2);else if(temp<50)activity=Math.pow(1-(temp-37)/13,2);else activity=0;const x=ox+i,y=oy-activity*gh;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
  ctx.stroke();
  ctx.fillStyle='#fdcb6e';ctx.font='12px sans-serif';ctx.fillText('最适温度(37°C)',ox+37/80*gw,oy-gh-10);
  ctx.fillStyle='#8b9dc3';ctx.textAlign='center';ctx.fillText('温度(°C)',ox+gw/2,oy+25);
}
function drawPH(){
  const W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#e8edf6';ctx.font='bold 15px sans-serif';ctx.textAlign='center';
  ctx.fillText('pH对酶活性的影响',W/2,25);
  const ox=80,oy=H-60,gw=W-120,gh=H-120;
  ctx.strokeStyle='#1e3050';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+gw,oy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox,oy-gh);ctx.stroke();
  const progress=Math.min(1,t*0.3);
  ctx.beginPath();ctx.strokeStyle='#e84393';ctx.lineWidth=2;
  for(let i=0;i<=gw*progress;i++){const ph=i/gw*14;let activity=Math.exp(-Math.pow(ph-7,2)/4);const x=ox+i,y=oy-activity*gh;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
  ctx.stroke();
  ctx.fillStyle='#fdcb6e';ctx.font='12px sans-serif';ctx.fillText('最适pH(7)',ox+7/14*gw,oy-gh-10);
  ctx.fillStyle='#8b9dc3';ctx.textAlign='center';ctx.fillText('pH',ox+gw/2,oy+25);
}
function drawSub(){
  const W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#e8edf6';ctx.font='bold 15px sans-serif';ctx.textAlign='center';
  ctx.fillText('底物浓度对反应速率的影响',W/2,25);
  const ox=80,oy=H-60,gw=W-120,gh=H-120;
  ctx.strokeStyle='#1e3050';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+gw,oy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox,oy-gh);ctx.stroke();
  const progress=Math.min(1,t*0.3);
  ctx.beginPath();ctx.strokeStyle='#0984e3';ctx.lineWidth=2;
  for(let i=0;i<=gw*progress;i++){const s=i/gw*5;const v=s/(1+s);const x=ox+i,y=oy-v*gh;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
  ctx.stroke();
  ctx.fillStyle='#fdcb6e';ctx.font='12px sans-serif';ctx.fillText('Vmax(酶饱和)',ox+gw+5,oy-gh+10);
  ctx.fillStyle='#8b9dc3';ctx.textAlign='center';ctx.fillText('底物浓度',ox+gw/2,oy+25);
}
function draw(){if(mode==='temp')drawTemp();else if(mode==='ph')drawPH();else drawSub();statusEl.textContent='模式: '+(mode==='temp'?'温度':mode==='ph'?'pH':'底物浓度');}
cv.parentElement.parentElement.parentElement.querySelector('.controls').insertAdjacentHTML('beforeend','<button id="tempBtn">温度</button><button id="phBtn">pH</button><button id="subBtn">底物浓度</button>');
document.getElementById('tempBtn').onclick=function(){mode='temp';t=0;draw();};
document.getElementById('phBtn').onclick=function(){mode='ph';t=0;draw();};
document.getElementById('subBtn').onclick=function(){mode='sub';t=0;draw();};

let animId;
function loop(ts){const dt=Math.min(0.05,(ts-lastT)/1000);lastT=ts;t+=dt;draw();if(playing)animId=requestAnimationFrame(loop);}
document.getElementById('playBtn').onclick=function(){playing=!playing;this.textContent=playing?'⏸ 暂停':'▶ 播放';if(playing){lastT=performance.now();loop(lastT);}else cancelAnimationFrame(animId);};
document.getElementById('resetBtn').onclick=function(){t=0;draw();};
draw();
</script></body></html>
