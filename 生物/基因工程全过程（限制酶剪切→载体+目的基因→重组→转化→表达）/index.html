<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>基因工程全过程</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI','Microsoft YaHei',sans-serif; }
body { background:linear-gradient(135deg,#0a1a10 0%,#0a0a1a 100%); color:#e0e0e0; min-height:100vh; padding:20px; display:flex; flex-direction:column; align-items:center; }
.topbar { width:100%; max-width:1200px; display:flex; align-items:center; gap:15px; margin-bottom:20px; padding:15px 20px; background:rgba(255,255,255,0.05); border-radius:12px; border:1px solid rgba(255,255,255,0.1); }
.topbar .back { color:#00b894; text-decoration:none; font-weight:600; white-space:nowrap; }
.topbar .back:hover { text-decoration:underline; }
.topbar .title { color:#fff; font-size:1.5rem; font-weight:bold; }
main { display:flex; flex-wrap:wrap; gap:20px; max-width:1200px; width:100%; }
.stage { flex:1; min-width:500px; background:rgba(0,0,0,0.3); border-radius:15px; padding:15px; border:1px solid rgba(255,255,255,0.1); }
.stage canvas { width:100%; display:block; border-radius:10px; background:rgba(0,0,0,0.5); }
.panel { width:320px; background:rgba(255,255,255,0.05); border-radius:15px; padding:20px; border:1px solid rgba(255,255,255,0.1); }
.panel h2 { color:#00b894; margin-bottom:15px; font-size:1.3rem; border-bottom:2px solid rgba(255,255,255,0.1); padding-bottom:8px; }
.panel p { line-height:1.7; font-size:0.95rem; color:#ccc; }
.legend { margin-top:15px; display:flex; flex-wrap:wrap; gap:10px; }
.legend .li { display:flex; align-items:center; gap:5px; font-size:0.85rem; color:#aaa; }
.controls { max-width:1200px; width:100%; display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-top:20px; padding:15px 20px; background:rgba(255,255,255,0.05); border-radius:12px; }
.controls button { padding:10px 18px; border:none; border-radius:8px; cursor:pointer; font-weight:600; transition:all 0.2s; background:rgba(255,255,255,0.1); color:#e0e0e0; }
.controls button:hover { background:rgba(255,255,255,0.2); transform:translateY(-1px); }
.controls button.primary { background:#00b894; color:white; }
.controls button.primary:hover { filter:brightness(1.2); }
.controls label { color:#aaa; display:flex; align-items:center; gap:8px; }
.controls input[type="range"] { width:100px; }
.controls .status { color:#55efc4; font-weight:600; margin-left:auto; }
@media(max-width:900px) { main{flex-direction:column;} .stage,.panel{width:100%;min-width:unset;} }
</style>
</head>
<body>
<header class="topbar">
  <a class="back" href="../index.html">← 返回学科目录</a>
  <span class="title">基因工程全过程</span>
</header>
<main>
  <div class="stage"><canvas id="cv"></canvas></div>
  <aside class="panel">
    <h2>原理说明</h2>
    <p>基因工程五步：①用限制酶剪切目的基因和载体DNA；②用DNA连接酶将目的基因插入载体构建重组DNA；③将重组DNA导入受体细胞（转化）；④筛选含目的基因的受体细胞并培养表达；⑤获得转基因产物。</p>
    <div class="legend"><span class="li"><b style="color:#00b894">═</b> 目的基因</span><span class="li"><b style="color:#0984e3">○</b> 载体</span><span class="li"><b style="color:#e17055">✂</b> 限制酶</span><span class="li"><b style="color:#fdcb6e">●</b> 受体细胞</span></div>
  </aside>
</main>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button>
  <button id="resetBtn">↺ 重置</button>
  <button id="stepBackBtn">◀ 上一步</button>
  <button id="stepFwdBtn">下一步 ▶</button>
  <label>速度 <input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <span id="status" class="status"></span>
</div>
<script>
const cv=document.getElementById('cv');const ctx=cv.getContext('2d');
const statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(360,Math.min(980,r.width-8));cv.height=Math.max(360,Math.min(560,r.height-8));}
window.addEventListener('resize',()=>{fit();draw();});fit();

// 动画状态
const S={t:0,step:0,progress:0,particles:[],enzymeAngle:0};
const STEPS=['① 限制酶剪切目的基因与载体','② DNA连接酶构建重组DNA','③ 重组DNA导入受体细胞','④ 筛选阳性克隆并表达','⑤ 获得转基因产物'];

function sceneInit(){sceneReset();}
function sceneReset(){S.t=0;S.step=0;S.progress=0;S.particles=[];S.enzymeAngle=0;}
function sceneStep(d){S.step=Math.max(0,Math.min(4,S.step+d));S.progress=0;}
function sceneUpdate(dt){
  S.t+=dt;S.progress=Math.min(1,S.progress+dt*0.3);
  S.enzymeAngle+=dt*2;
  // 粒子效果
  if(S.step>=2&&Math.random()<0.1){
    S.particles.push({x:cv.width/2+Math.random()*60-30,y:cv.height/2+Math.random()*60-30,vx:(Math.random()-0.5)*20,vy:(Math.random()-0.5)*20,life:1,color:['#00b894','#0984e3','#fdcb6e'][Math.floor(Math.random()*3)]});
  }
  S.particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt*0.5;});
  S.particles=S.particles.filter(p=>p.life>0);
}

// 绘制DNA双链
function drawDNA(x,y,w,phase,cutProgress){
  ctx.save();
  const amp=12,seg=8;
  // 上链
  ctx.strokeStyle='#00b894';ctx.lineWidth=3;ctx.beginPath();
  for(let i=0;i<=w;i+=2){
    const yy=y+Math.sin(i*0.08+phase)*amp;
    if(i===0)ctx.moveTo(x+i,yy);else ctx.lineTo(x+i,yy);
  }
  ctx.stroke();
  // 下链
  ctx.strokeStyle='#0984e3';ctx.beginPath();
  for(let i=0;i<=w;i+=2){
    const yy=y-Math.sin(i*0.08+phase)*amp;
    if(i===0)ctx.moveTo(x+i,yy);else ctx.lineTo(x+i,yy);
  }
  ctx.stroke();
  // 碱基对连线
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;
  for(let i=0;i<w;i+=seg){
    const y1=y+Math.sin(i*0.08+phase)*amp;
    const y2=y-Math.sin(i*0.08+phase)*amp;
    ctx.beginPath();ctx.moveTo(x+i,y1);ctx.lineTo(x+i,y2);ctx.stroke();
  }
  // 切割标记
  if(cutProgress>0){
    const cx2=x+w/2;
    ctx.strokeStyle='#e17055';ctx.lineWidth=2;
    ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(cx2,y-amp-10);ctx.lineTo(cx2,y+amp+10);ctx.stroke();
    ctx.setLineDash([]);
    // 剪刀
    if(cutProgress<1){
      const sa=Math.sin(S.enzymeAngle)*0.3;
      ctx.save();ctx.translate(cx2,y-amp-15);ctx.rotate(sa);
      ctx.fillStyle='#e17055';ctx.font='16px sans-serif';ctx.fillText('✂',0,0);
      ctx.restore();
    }
  }
  ctx.restore();
}

// 绘制质粒载体
function drawPlasmid(cx,cy,r,open){
  ctx.save();
  ctx.strokeStyle='#0984e3';ctx.lineWidth=4;
  ctx.beginPath();
  if(open>0){
    const gap=0.3*open;
    ctx.arc(cx,cy,r,-Math.PI/2+gap,-Math.PI/2-gap+Math.PI*2);
  }else{
    ctx.arc(cx,cy,r,0,Math.PI*2);
  }
  ctx.stroke();
  // 标记基因
  ctx.fillStyle='#fdcb6e';ctx.font='10px sans-serif';ctx.textAlign='center';
  ctx.fillText('Ampʳ',cx+r+15,cy);
  ctx.fillText('LacZ',cx-r-15,cy);
  ctx.restore();
}

// 绘制细胞
function drawCell(cx,cy,r,hasGene,expressing){
  ctx.save();
  // 细胞膜
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle='rgba(253,203,110,0.15)';ctx.fill();
  ctx.strokeStyle='#fdcb6e';ctx.lineWidth=2;ctx.stroke();
  // 细胞核
  ctx.beginPath();ctx.arc(cx,cy,r*0.4,0,Math.PI*2);
  ctx.fillStyle='rgba(253,203,110,0.3)';ctx.fill();
  ctx.strokeStyle='rgba(253,203,110,0.6)';ctx.lineWidth=1;ctx.stroke();
  // 外源基因
  if(hasGene){
    ctx.fillStyle='#00b894';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
    ctx.fillText('目的基因',cx,cy+4);
  }
  // 表达产物(蛋白质)
  if(expressing){
    for(let i=0;i<5;i++){
      const a=i*Math.PI*2/5+S.t*0.5;
      const px=cx+Math.cos(a)*(r*0.7);
      const py=cy+Math.sin(a)*(r*0.7);
      ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);
      ctx.fillStyle='#e17055';ctx.fill();
    }
    ctx.fillStyle='#e17055';ctx.font='10px sans-serif';
    ctx.fillText('蛋白质表达中',cx,cy+r+15);
  }
  ctx.restore();
}

function sceneDraw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  const cx=cv.width/2,cy=cv.height/2;
  
  // 标题
  ctx.fillStyle='#fff';ctx.font='bold 16px sans-serif';ctx.textAlign='center';
  ctx.fillText(STEPS[S.step],cx,30);
  
  // 步骤指示器
  for(let i=0;i<5;i++){
    const sx=cx-120+i*60;
    ctx.beginPath();ctx.arc(sx,55,8,0,Math.PI*2);
    ctx.fillStyle=i<=S.step?'#00b894':'rgba(255,255,255,0.2)';ctx.fill();
    ctx.fillStyle=i<=S.step?'#fff':'#666';ctx.font='10px sans-serif';
    ctx.fillText(String(i+1),sx,59);
  }
  
  const p=S.progress;
  
  switch(S.step){
    case 0: { // 限制酶剪切
      // 目的基因DNA
      ctx.fillStyle='#aaa';ctx.font='12px sans-serif';ctx.textAlign='center';
      ctx.fillText('含目的基因的DNA',cx-150,100);
      drawDNA(cx-280,160,260,S.t,p);
      // 标记目的基因区域
      ctx.strokeStyle='#00b894';ctx.lineWidth=2;ctx.setLineDash([4,4]);
      ctx.strokeRect(cx-180,135,60,50);ctx.setLineDash([]);
      ctx.fillStyle='#00b894';ctx.font='11px sans-serif';ctx.fillText('目的基因',cx-150,200);
      
      // 载体质粒
      ctx.fillStyle='#aaa';ctx.fillText('载体质粒',cx+150,100);
      drawPlasmid(cx+150,170,45,p>0.5?Math.min(1,(p-0.5)*2):0);
      
      // 说明
      ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='12px sans-serif';
      ctx.fillText('限制酶识别特定序列并切割磷酸二酯键',cx,cy+100);
      break;
    }
    case 1: { // 连接酶构建重组DNA
      // 目的基因移入载体
      const moveX=p*120;
      drawDNA(cx-250+moveX,160,200,S.t,0);
      drawPlasmid(cx+150,170,45,1-p*0.5);
      // 连接酶
      if(p>0.3&&p<0.9){
        ctx.fillStyle='#fdcb6e';ctx.font='14px sans-serif';
        ctx.fillText('DNA连接酶',cx-50,140);
        ctx.strokeStyle='#fdcb6e';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(cx-50,145);ctx.lineTo(cx-50+moveX*0.5,160);ctx.stroke();
      }
      // 重组完成提示
      if(p>0.8){
        ctx.fillStyle='#00b894';ctx.font='bold 14px sans-serif';
        ctx.fillText('✓ 重组DNA构建完成',cx,cy+80);
      }
      ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='12px sans-serif';
      ctx.fillText('同种限制酶切割→暴露相同黏性末端→碱基互补配对→连接酶封口',cx,cy+110);
      break;
    }
    case 2: { // 导入受体细胞
      // 重组DNA
      const targetY=cy+20;
      drawPlasmid(cx-100,150,30,0.5);
      ctx.fillStyle='#00b894';ctx.font='10px sans-serif';ctx.textAlign='center';
      ctx.fillText('重组DNA',cx-100,190);
      
      // 箭头
      const arrowP=Math.min(1,p*1.5);
      ctx.strokeStyle='#fdcb6e';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(cx-60,170);
      ctx.quadraticCurveTo(cx,targetY-30,cx+60,targetY);
      ctx.stroke();
      // 移动的小质粒
      const mx=cx-60+(cx+60-cx+60)*arrowP;
      const my=170+(targetY-170)*arrowP;
      if(arrowP<1){
        ctx.beginPath();ctx.arc(mx,my,8,0,Math.PI*2);
        ctx.fillStyle='#0984e3';ctx.fill();
      }
      
      // 受体细胞
      drawCell(cx+80,targetY,50,arrowP>0.8,false);
      ctx.fillStyle='#aaa';ctx.font='12px sans-serif';
      ctx.fillText('受体细胞',cx+80,targetY+65);
      
      ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='12px sans-serif';
      ctx.fillText('常用方法：Ca²⁺处理法、电穿孔法、显微注射法',cx,cy+120);
      break;
    }
    case 3: { // 筛选阳性克隆
      // 多个细胞
      const cells=[
        {x:cx-120,y:cy-20,has:true,grow:p},
        {x:cx-40,y:cy+30,has:false,grow:p},
        {x:cx+40,y:cy-10,has:true,grow:p},
        {x:cx+120,y:cy+20,has:false,grow:p},
        {x:cx-80,y:cy+60,has:false,grow:p},
        {x:cx+80,y:cy+50,has:true,grow:p},
      ];
      cells.forEach((c,i)=>{
        const r=20+c.grow*10;
        if(c.has){
          drawCell(c.x,c.y,r,true,p>0.7);
          // 荧光标记
          if(p>0.5){
            ctx.strokeStyle='#00b894';ctx.lineWidth=2;
            ctx.beginPath();ctx.arc(c.x,c.y,r+5,0,Math.PI*2);ctx.stroke();
          }
        }else{
          // 阴性细胞(暗淡)
          ctx.beginPath();ctx.arc(c.x,c.y,r,0,Math.PI*2);
          ctx.fillStyle='rgba(100,100,100,0.2)';ctx.fill();
          ctx.strokeStyle='rgba(100,100,100,0.4)';ctx.lineWidth=1;ctx.stroke();
          // 淘汰标记
          if(p>0.6){
            ctx.strokeStyle='#e17055';ctx.lineWidth=2;
            ctx.beginPath();ctx.moveTo(c.x-10,c.y-10);ctx.lineTo(c.x+10,c.y+10);ctx.stroke();
            ctx.beginPath();ctx.moveTo(c.x+10,c.y-10);ctx.lineTo(c.x-10,c.y+10);ctx.stroke();
          }
        }
      });
      // 筛选说明
      ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='12px sans-serif';ctx.textAlign='center';
      ctx.fillText('利用标记基因(如抗性基因)筛选含重组DNA的细胞',cx,cy+110);
      if(p>0.8){
        ctx.fillStyle='#00b894';ctx.font='bold 13px sans-serif';
        ctx.fillText('✓ 筛选出阳性克隆',cx,cy+130);
      }
      break;
    }
    case 4: { // 获得转基因产物
      // 大量表达的细胞
      drawCell(cx-80,cy,40,true,true);
      drawCell(cx+80,cy,40,true,true);
      // 产物收集
      if(p>0.5){
        const collectP=(p-0.5)*2;
        // 蛋白质分子汇聚
        for(let i=0;i<8;i++){
          const a=i*Math.PI*2/8+S.t;
          const dist=60*(1-collectP*0.5);
          const px=cx+Math.cos(a)*dist;
          const py=cy-80+Math.sin(a)*dist*0.3;
          ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);
          ctx.fillStyle=`rgba(225,69,83,${0.5+collectP*0.5})`;ctx.fill();
        }
        // 产物容器
        ctx.strokeStyle='#e17055';ctx.lineWidth=2;
        ctx.beginPath();
        ctx.moveTo(cx-30,cy-100);ctx.lineTo(cx-25,cy-70);ctx.lineTo(cx+25,cy-70);ctx.lineTo(cx+30,cy-100);
        ctx.stroke();
        ctx.fillStyle='#e17055';ctx.font='12px sans-serif';ctx.textAlign='center';
        ctx.fillText('转基因产物',cx,cy-110);
      }
      ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='12px sans-serif';
      ctx.fillText('培养转基因细胞→收集表达产物→检测验证',cx,cy+100);
      if(p>0.9){
        ctx.fillStyle='#00b894';ctx.font='bold 14px sans-serif';
        ctx.fillText('✓ 基因工程完成！',cx,cy+125);
      }
      break;
    }
  }
  
  // 粒子效果
  S.particles.forEach(p2=>{
    ctx.beginPath();ctx.arc(p2.x,p2.y,3,0,Math.PI*2);
    ctx.fillStyle=p2.color;ctx.globalAlpha=p2.life;ctx.fill();ctx.globalAlpha=1;
  });
  
  // 状态栏
  statusEl.textContent='基因工程：获取目的基因→构建载体→导入受体→筛选表达→获得产物';
}

let playing=false,lastT=0,speed=1,t=0;
const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn');
const speedEl=document.getElementById('speed');
function loop(ts){if(!lastT)lastT=ts;const dt=(ts-lastT)/1000;lastT=ts;if(playing){t+=dt*speed;if(window.sceneUpdate)sceneUpdate(dt*speed);}draw();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
playBtn.onclick=()=>{playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';};
resetBtn.onclick=()=>{if(window.sceneReset)sceneReset();t=0;playing=false;playBtn.textContent='▶ 播放';draw();};
stepFwdBtn.onclick=()=>{if(window.sceneStep)sceneStep(1);draw();};
stepBackBtn.onclick=()=>{if(window.sceneStep)sceneStep(-1);draw();};
speedEl.oninput=()=>{speed=parseFloat(speedEl.value);};
function draw(){if(window.sceneDraw)sceneDraw();}
if(window.sceneInit)sceneInit();
draw();
</script>
</body>
</html>

  <aside class="panel">
    <h2>原理说明</h2>
    <p>基因工程五步：①用限制酶剪切目的基因和载体DNA；②用DNA连接酶将目的基因插入载体构建重组DNA；③将重组DNA导入受体细胞（转化）；④筛选含目的基因的受体细胞并培养表达；⑤获得转基因产物。</p>
    <div class="legend"><span class="li"><b style="color:#00b894">═</b> 目的基因</span><span class="li"><b style="color:#0984e3">○</b> 载体</span><span class="li"><b style="color:#e17055">✂</b> 限制酶</span><span class="li"><b style="color:#fdcb6e">●</b> 受体细胞</span></div>
  </aside>
</main>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button>
  <button id="resetBtn">↺ 重置</button>
  <button id="stepBackBtn">◀ 上一步</button>
  <button id="stepFwdBtn">下一步 ▶</button>
  <label>速度 <input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <span id="status" class="status"></span>
</div>
<script>
const cv=document.getElementById('cv');const ctx=cv.getContext('2d');
const statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(360,Math.min(980,r.width-8));cv.height=Math.max(360,Math.min(560,r.height-8));}
window.addEventListener('resize',()=>{fit();draw();});fit();

const G={t:0,step:0};
function sceneInit(){sceneReset();}
function sceneReset(){G.t=0;G.step=0;}
function sceneUpdate(dt){G.t+=dt;}
function sceneStep(d){G.step=Math.max(0,Math.min(4,G.step+d));}
function dna(x,y,col){ctx.strokeStyle=col;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+40,y);ctx.lineTo(x+40,y-30);ctx.lineTo(x+80,y-30);ctx.stroke();}
function sceneDraw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  const cx=cv.width/2;
  ctx.fillStyle='#cdd7ea';ctx.font='14px sans-serif';ctx.textAlign='center';
  const names=['① 限制酶剪切目的基因与载体','② 载体与目的基因连接','③ 重组DNA导入受体','④ 筛选并表达','⑤ 获得转基因产物'];
  ctx.fillText(names[G.step],cx,46);
  const stages=[
    ()=>{dna(cx-200,200,'#34d399');dna(cx+40,260,'#7dd3fc');ctx.fillStyle='#fbbf24';ctx.fillText('限制酶切割',cx-120,160);},
    ()=>{dna(cx-120,200,'#a78bfa');ctx.fillText('DNA连接酶',cx-120,160);},
    ()=>{ctx.strokeStyle='#7f93b5';ctx.beginPath();ctx.arc(cx,260,50,0,7);ctx.stroke();ctx.fillStyle='#a78bfa';ctx.fillText('受体细胞',cx,260);},
    ()=>{ctx.fillStyle='#34d399';ctx.beginPath();ctx.arc(cx,260,30,0,7);ctx.fill();ctx.fillText('表达',cx,260);},
    ()=>{ctx.fillStyle='#34d399';ctx.fillRect(cx-60,240,120,40);ctx.fillStyle='#06281c';ctx.fillText('产物',cx,265);}
  ];
  for(let s=0;s<=G.step;s++)stages[s]();
  statusEl.textContent='基因工程：获取目的基因→构建载体→导入受体→筛选表达';
}

let playing=false,lastT=0,speed=1,t=0;
const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn');
const speedEl=document.getElementById('speed');
function loop(ts){if(!lastT)lastT=ts;const dt=(ts-lastT)/1000;lastT=ts;if(playing){t+=dt*speed;if(window.sceneUpdate)sceneUpdate(dt*speed);}draw();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
playBtn.onclick=()=>{playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';};
resetBtn.onclick=()=>{if(window.sceneReset)sceneReset();t=0;playing=false;playBtn.textContent='▶ 播放';draw();};
stepFwdBtn.onclick=()=>{if(window.sceneStep)sceneStep(1);draw();};
stepBackBtn.onclick=()=>{if(window.sceneStep)sceneStep(-1);draw();};
speedEl.oninput=()=>{speed=parseFloat(speedEl.value);};
function draw(){if(window.sceneDraw)sceneDraw();}
if(window.sceneInit)sceneInit();
draw();
</script>
</body>
</html>
