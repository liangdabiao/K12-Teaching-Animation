<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>椭圆 · 定义 · 标准方程 · 几何性质 · 离心率</title>
<style>
:root{--bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;--accent:#fbbf24;--accent2:#06b6d4;--line:#243a5e;--good:#34d399;--warn:#fbbf24;--bad:#f87171;}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
.back{color:var(--accent2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap;background:rgba(6,182,212,.06)}
.back:hover{background:rgba(6,182,212,.14)}
.title{font-size:15px;font-weight:600}.subtitle{font-size:12px;color:var(--muted)}
.cards{display:flex;gap:10px;padding:10px 16px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(251,191,36,.06),transparent)}
.card{flex:1;min-width:160px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.card.s2::before{background:var(--accent2)}.card.s3::before{background:var(--good)}.card.s4::before{background:var(--bad)}
.card h4{margin:0 0 4px;font-size:13px}.card .v{font-size:11px;color:var(--muted);line-height:1.5}
.card .num{position:absolute;right:8px;top:6px;font-size:24px;font-weight:700;color:rgba(255,255,255,.07)}
main{flex:1;display:flex;min-height:0}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}
.panel{width:340px;flex:none;padding:14px;overflow:auto;border-left:1px solid var(--line);background:var(--panel);font-size:13px;line-height:1.7}
.panel h2{font-size:14px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--accent);color:#1a1a1a;font-size:11px;font-weight:600}
.body{color:var(--muted);margin:0 0 10px}.body strong{color:var(--ink)}
.body code{background:rgba(251,191,36,.2);color:#fde68a;padding:1px 5px;border-radius:4px;font-family:Consolas,Monaco,monospace;font-size:12px}
.points{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin-top:8px;border-left:3px solid var(--accent2)}
.points h4{margin:0 0 6px;font-size:13px}.points ul{margin:0;padding-left:18px;color:var(--muted)}
.points li{margin-bottom:3px}.points li strong{color:var(--accent)}
.stepbar{display:flex;gap:6px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);overflow-x:auto}
.step{flex:1;min-width:100px;padding:8px 10px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}
.step:hover{background:#1e345a;border-color:var(--accent2)}
.step.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1a1a;font-weight:600;border-color:transparent}
.controls{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}
button:hover{background:#1e345a}button.primary{background:var(--accent);border-color:var(--accent);color:#1a1a1a;font-weight:600}
.controls label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
input[type=range]{accent-color:var(--accent)}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}
</style>
</head>
<body>
<header class="topbar"><a class="back" href="../index.html">← 返回数学目录</a><span class="title">椭圆</span><span class="subtitle">定义 · 标准方程 · 几何性质 · 离心率</span></header>
<div class="cards">
  <div class="card"><div class="num">1</div><h4>椭圆定义</h4><div class="v">|PF₁|+|PF₂|=2a<br>2a &gt; |F₁F₂|</div></div>
  <div class="card s2"><div class="num">2</div><h4>标准方程</h4><div class="v">x²/a² + y²/b² = 1<br>y²/a² + x²/b² = 1</div></div>
  <div class="card s3"><div class="num">3</div><h4>几何性质</h4><div class="v">范围·对称性·顶点<br>长轴2a·短轴2b·焦距2c</div></div>
  <div class="card s4"><div class="num">4</div><h4>离心率</h4><div class="v">e = c/a<br>0 &lt; e &lt; 1</div></div>
</div>
<main>
  <div class="stage"><canvas id="cv"></canvas></div>
  <aside class="panel"><h2><span class="badge" id="stepBadge">定义</span><span id="stepTitle">椭圆定义</span></h2><p class="body" id="stepBody"></p><div class="points" id="stepPoints"></div></aside>
</main>
<div class="stepbar" id="stepbar"></div>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button><button id="resetBtn">↺ 重置</button>
  <button id="stepBackBtn">◀ 上一步</button><button id="stepFwdBtn">下一步 ▶</button>
  <label>速度 <input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <label>离心率 e <input id="ecc" type="range" min="0.05" max="0.95" step="0.01" value="0.66"></label>
  <span id="status" class="status">点击播放或选择步骤</span>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(520,Math.min(1100,r.width-12));cv.height=Math.max(400,Math.min(600,r.height-12));}
window.addEventListener('resize',()=>{fit();draw();});fit();
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawText(t,x,y,c,fs,a,b){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=a||'center';ctx.textBaseline=b||'middle';ctx.fillText(t,x,y);}

const STEPS=[
  {tag:'定义',name:'定义与推导',body:'<strong>椭圆定义</strong>：平面内到两定点 F₁、F₂ 的距离之和等于常数 2a（<strong>2a &gt; |F₁F₂|</strong>）的点的轨迹。两定点叫<strong>焦点</strong>，|F₁F₂| = 2c 叫<strong>焦距</strong>。',points:{title:'推导 |PF₁|+|PF₂|=2a',items:['<strong>设</strong>：F₁(-c,0), F₂(c,0), P(x,y)','<strong>距离和</strong>：√((x+c)²+y²) + √((x-c)²+y²) = 2a','<strong>平方展开</strong>：消根号整理','<strong>令</strong> b² = a² - c² (a&gt;b&gt;0)']}},
  {tag:'方程',name:'标准方程(x轴)',body:'<strong>焦点在 x 轴</strong>的椭圆标准方程：<code>x²/a² + y²/b² = 1</code>（a &gt; b &gt; 0），焦点 F₁(-c,0)、F₂(c,0)，<strong>c² = a² - b²</strong>。a 为长半轴，b 为短半轴。',points:{title:'x 轴型关键量',items:['<strong>方程</strong>：x²/a² + y²/b² = 1','<strong>焦点</strong>：F₁(-c,0)、F₂(c,0)','<strong>关系</strong>：c² = a² − b²','<strong>条件</strong>：a &gt; b &gt; 0']}},
  {tag:'方程',name:'标准方程(y轴)',body:'<strong>焦点在 y 轴</strong>的椭圆标准方程：<code>y²/a² + x²/b² = 1</code>（a &gt; b &gt; 0），焦点 F₁(0,-c)、F₂(0,c)，<strong>c² = a² - b²</strong>。判断焦点位置看<strong>分母大小</strong>：大分母所在轴即为焦点所在轴。',points:{title:'y 轴型关键量',items:['<strong>方程</strong>：y²/a² + x²/b² = 1','<strong>焦点</strong>：F₁(0,−c)、F₂(0,c)','<strong>关系</strong>：c² = a² − b²','<strong>口诀</strong>：大分母定焦点轴']}},
  {tag:'性质',name:'几何性质·范围对称',body:'以 <code>x²/a² + y²/b² = 1</code> 为例。<strong>范围</strong>：|x| ≤ a，|y| ≤ b，椭圆位于矩形区域内。<strong>对称性</strong>：同时关于 x 轴、y 轴、原点对称，所以椭圆有两条对称轴和一个对称中心。',points:{title:'范围与对称',items:['<strong>范围</strong>：|x| ≤ a 且 |y| ≤ b','<strong>x 轴对称</strong>：(x,y)→(x,−y)','<strong>y 轴对称</strong>：(x,y)→(−x,y)','<strong>中心对称</strong>：(x,y)→(−x,−y)']}},
  {tag:'性质',name:'顶点与长短轴',body:'<strong>四个顶点</strong>：(±a, 0)、(0, ±b)。<strong>长轴</strong> A₁A₂ 长度 = 2a（长半轴 a）；<strong>短轴</strong> B₁B₂ 长度 = 2b（短半轴 b）；<strong>焦距</strong> |F₁F₂| = 2c。满足 <strong>a² = b² + c²</strong>。',points:{title:'长短轴记忆',items:['<strong>长轴长</strong> = 2a','<strong>短轴长</strong> = 2b','<strong>焦距</strong> = 2c','<strong>勾股关系</strong>：a² = b² + c²']}},
  {tag:'离心率',name:'离心率 e=c/a',body:'<strong>离心率</strong> <code>e = c/a</code>。因为 0 &lt; c &lt; a，所以 <strong>0 &lt; e &lt; 1</strong>。e 描述椭圆<strong>扁圆程度</strong>：e 越接近 0（c 越小、两焦点越近），椭圆<strong>越接近圆</strong>；e 越接近 1（c 越接近 a），椭圆<strong>越扁</strong>。',points:{title:'e 的几何意义',items:['<strong>公式</strong>：e = c/a','<strong>范围</strong>：0 &lt; e &lt; 1','<strong>e→0</strong>：椭圆趋近圆','<strong>e→1</strong>：椭圆越扁']}},
  {tag:'焦半径',name:'焦半径公式',body:'设 P(x,y) 在椭圆 <code>x²/a² + y²/b² = 1</code> 上，焦点 F₁(-c,0)、F₂(c,0)，则<strong>焦半径</strong>：<code>|PF₁| = a + ex</code>、<code>|PF₂| = a − ex</code>。两式相加 = 2a，符合定义。',points:{title:'焦半径速记',items:['<strong>|PF₁|</strong> = a + ex（左焦点）','<strong>|PF₂|</strong> = a − ex（右焦点）','<strong>验证</strong>：|PF₁|+|PF₂| = 2a','<strong>用途</strong>：求点到焦点距离']}},
  {tag:'总结',name:'核心速记',body:'椭圆是<strong>距离和为定值</strong>的点的轨迹，标准方程分<strong>x 轴型</strong>和<strong>y 轴型</strong>，由大分母位置决定。a、b、c 满足 <strong>a²=b²+c²</strong>，离心率 <strong>e=c/a</strong> 决定扁圆程度。',points:{title:'七句话总结',items:['<strong>定义</strong>：|PF₁|+|PF₂|=2a','<strong>条件</strong>：2a > 2c','<strong>x 轴型</strong>：x²/a²+y²/b²=1','<strong>y 轴型</strong>：y²/a²+x²/b²=1','<strong>关系</strong>：a²=b²+c²','<strong>离心率</strong>：e=c/a，0<e<1','<strong>焦半径</strong>：a±ex']}},
];

let stepIdx=0,playing=false,lastT=0,speed=1,stepTime=0,t=0;
const STEP_DURATION=3.2;

// 全局椭圆参数（受离心率滑块控制）
function getEllipseParams(){
  const e=parseFloat(document.getElementById('ecc').value);
  const a=1.0;          // 归一化长半轴
  const c=a*e;          // 焦距半值
  const b=Math.sqrt(Math.max(0.0001,a*a-c*c));
  return {a,b,c,e};
}

// 坐标系工具：把数学坐标转屏幕坐标
function toScreen(mx,my,cx,cy,scale){return [cx+mx*scale,cy-my*scale];}
function drawAxes(cx,cy,scale,xmax,ymax){
  ctx.strokeStyle='#3a4a6a';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(20,cy);ctx.lineTo(cv.width-20,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,30);ctx.lineTo(cx,cv.height-30);ctx.stroke();
  drawText('x',cv.width-18,cy+14,'#9ab0d0',12);drawText('y',cx+14,28,'#9ab0d0',12);
  ctx.fillStyle='#5a6a8a';ctx.font='10px sans-serif';ctx.textAlign='center';
  for(let i=-Math.floor(xmax);i<=Math.floor(xmax);i++){if(i===0)continue;const sx=cx+i*scale;ctx.strokeStyle='#1e2a44';ctx.beginPath();ctx.moveTo(sx,cy-4);ctx.lineTo(sx,cy+4);ctx.stroke();ctx.fillText(i,sx,cy+16);}
  ctx.textAlign='right';
  for(let i=-Math.floor(ymax);i<=Math.floor(ymax);i++){if(i===0)continue;const sy=cy-i*scale;ctx.strokeStyle='#1e2a44';ctx.beginPath();ctx.moveTo(cx-4,sy);ctx.lineTo(cx+4,sy);ctx.stroke();ctx.fillText(i,cx-8,sy);}
  ctx.textAlign='center';
}

// ===== 场景：定义与推导 =====
function drawDefinitionScene(time){
  const W=cv.width,H=cv.height;
  drawText('椭圆定义 · |PF₁| + |PF₂| = 2a',W/2,30,'#fbbf24',16);
  const cx=W/2,cy=H/2+10,scale=Math.min(W,H)*0.22;
  const {a,b,c,e}=getEllipseParams();
  drawAxes(cx,cy,scale,2,1.4);
  // 绘制椭圆轮廓
  ctx.strokeStyle='rgba(6,182,212,0.35)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
  ctx.beginPath();
  for(let th=0;th<=Math.PI*2+0.05;th+=0.05){
    const x=Math.cos(th)*a,y=Math.sin(th)*b;
    const [sx,sy]=toScreen(x,y,cx,cy,scale);
    if(th===0)ctx.moveTo(sx,sy);else ctx.lineTo(sx,sy);
  }
  ctx.stroke();ctx.setLineDash([]);
  // 焦点 F1, F2
  const [f1x,f1y]=toScreen(-c,0,cx,cy,scale);
  const [f2x,f2y]=toScreen(c,0,cx,cy,scale);
  ctx.fillStyle='#fbbf24';ctx.shadowColor='#fbbf24';ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(f1x,f1y,6,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(f2x,f2y,6,0,7);ctx.fill();
  ctx.shadowBlur=0;
  drawText('F₁',f1x,f1y+18,'#fbbf24',13);
  drawText('F₂',f2x,f2y+18,'#fbbf24',13);
  // 动点 P 沿椭圆运动
  const th=time*1.2;
  const px=Math.cos(th)*a,py=Math.sin(th)*b;
  const [psx,psy]=toScreen(px,py,cx,cy,scale);
  // 连线 PF1, PF2
  ctx.strokeStyle='#34d399';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(f1x,f1y);ctx.lineTo(psx,psy);ctx.stroke();
  ctx.strokeStyle='#f87171';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(f2x,f2y);ctx.lineTo(psx,psy);ctx.stroke();
  // 距离值
  const d1=Math.sqrt((px+c)*(px+c)+py*py);
  const d2=Math.sqrt((px-c)*(px-c)+py*py);
  drawText('|PF₁|='+d1.toFixed(2),(f1x+psx)/2,(f1y+psy)/2-12,'#34d399',11);
  drawText('|PF₂|='+d2.toFixed(2),(f2x+psx)/2,(f2y+psy)/2-12,'#f87171',11);
  // 动点 P
  ctx.fillStyle='#06b6d4';ctx.shadowColor='#06b6d4';ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(psx,psy,7,0,7);ctx.fill();
  ctx.shadowBlur=0;
  drawText('P',psx,psy-16,'#06b6d4',14);
  // 结论
  drawText('|PF₁| + |PF₂| = '+(d1+d2).toFixed(2)+'  ≈  2a = '+ (2*a).toFixed(2),W/2,H-55,'#e8eef8',13);
  drawText('条件：2a > |F₁F₂| = 2c  （当前 c='+c.toFixed(2)+'）',W/2,H-32,'#9ab0d0',12);
}

// ===== 场景：标准方程（x 轴） =====
function drawStdXScene(time){
  const W=cv.width,H=cv.height;
  drawText('标准方程 · 焦点在 x 轴',W/2,30,'#fbbf24',16);
  ctx.font='bold 20px serif';ctx.fillStyle='#fff';ctx.textAlign='center';
  ctx.fillText('x² / a²  +  y² / b²  =  1   (a > b > 0)',W/2,68);
  const cx=W/2,cy=H/2+20,scale=Math.min(W,H)*0.22;
  const {a,b,c,e}=getEllipseParams();
  drawAxes(cx,cy,scale,2,1.4);
  // 椭圆
  ctx.strokeStyle='#06b6d4';ctx.lineWidth=2.5;ctx.shadowColor='#06b6d4';ctx.shadowBlur=8;
  ctx.beginPath();
  for(let th=0;th<=Math.PI*2+0.05;th+=0.04){
    const x=Math.cos(th)*a,y=Math.sin(th)*b;
    const [sx,sy]=toScreen(x,y,cx,cy,scale);
    if(th===0)ctx.moveTo(sx,sy);else ctx.lineTo(sx,sy);
  }
  ctx.stroke();ctx.shadowBlur=0;
  // 焦点
  const [f1x,f1y]=toScreen(-c,0,cx,cy,scale);
  const [f2x,f2y]=toScreen(c,0,cx,cy,scale);
  ctx.fillStyle='#fbbf24';
  ctx.beginPath();ctx.arc(f1x,f1y,5,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(f2x,f2y,5,0,7);ctx.fill();
  drawText('F₁(-c,0)',f1x,f1y+18,'#fbbf24',11);
  drawText('F₂(c,0)',f2x,f2y+18,'#fbbf24',11);
  // 顶点
  ctx.fillStyle='#34d399';
  [[-a,0,'A₁(-a,0)'],[a,0,'A₂(a,0)'],[0,b,'B₂(0,b)'],[0,-b,'B₁(0,-b)']].forEach(p=>{
    const [x,y,lbl]=p;const [sx,sy]=toScreen(x,y,cx,cy,scale);
    ctx.beginPath();ctx.arc(sx,sy,5,0,7);ctx.fill();
    drawText(lbl,sx,sy+(y>=0?-16:18),'#34d399',11);
  });
  drawText('a='+a.toFixed(2)+'  b='+b.toFixed(2)+'  c='+c.toFixed(2)+'   c²=a²−b²='+(c*c).toFixed(3),W/2,H-30,'#9ab0d0',12);
}

// ===== 场景：标准方程（y 轴） =====
function drawStdYScene(time){
  const W=cv.width,H=cv.height;
  drawText('标准方程 · 焦点在 y 轴',W/2,30,'#fbbf24',16);
  ctx.font='bold 20px serif';ctx.fillStyle='#fff';ctx.textAlign='center';
  ctx.fillText('y² / a²  +  x² / b²  =  1   (a > b > 0)',W/2,68);
  const cx=W/2,cy=H/2+20,scale=Math.min(W,H)*0.22;
  const {a,b,c,e}=getEllipseParams();
  drawAxes(cx,cy,scale,2,1.4);
  // 焦点在 y 轴：长轴方向沿 y，方程 x²/b² + y²/a² = 1
  ctx.strokeStyle='#f87171';ctx.lineWidth=2.5;ctx.shadowColor='#f87171';ctx.shadowBlur=8;
  ctx.beginPath();
  for(let th=0;th<=Math.PI*2+0.05;th+=0.04){
    const x=Math.cos(th)*b,y=Math.sin(th)*a;
    const [sx,sy]=toScreen(x,y,cx,cy,scale);
    if(th===0)ctx.moveTo(sx,sy);else ctx.lineTo(sx,sy);
  }
  ctx.stroke();ctx.shadowBlur=0;
  // 焦点（y 轴）
  const [f1x,f1y]=toScreen(0,-c,cx,cy,scale);
  const [f2x,f2y]=toScreen(0,c,cx,cy,scale);
  ctx.fillStyle='#fbbf24';
  ctx.beginPath();ctx.arc(f1x,f1y,5,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(f2x,f2y,5,0,7);ctx.fill();
  drawText('F₁(0,-c)',f1x-30,f1y,'#fbbf24',11);
  drawText('F₂(0,c)',f2x+30,f2y,'#fbbf24',11);
  // 顶点
  ctx.fillStyle='#34d399';
  [[0,-a,'A₁(0,-a)'],[0,a,'A₂(0,a)'],[b,0,'B₂(b,0)'],[-b,0,'B₁(-b,0)']].forEach(p=>{
    const [x,y,lbl]=p;const [sx,sy]=toScreen(x,y,cx,cy,scale);
    ctx.beginPath();ctx.arc(sx,sy,5,0,7);ctx.fill();
    drawText(lbl,sx+(x>0?20:-20),sy,'#34d399',11);
  });
  drawText('判断：大分母所在轴 = 焦点所在轴',W/2,H-30,'#9ab0d0',12);
}

// ===== 场景：范围与对称 =====
function drawRangeScene(time){
  const W=cv.width,H=cv.height;
  drawText('几何性质 · 范围与对称性',W/2,30,'#fbbf24',16);
  const cx=W/2,cy=H/2+10,scale=Math.min(W,H)*0.22;
  const {a,b,c,e}=getEllipseParams();
  drawAxes(cx,cy,scale,2,1.4);
  // 矩形范围 |x|≤a, |y|≤b
  const [r1x,r1y]=toScreen(-a,b,cx,cy,scale);
  const rw=2*a*scale,rh=2*b*scale;
  ctx.fillStyle='rgba(251,191,36,0.08)';ctx.strokeStyle='#fbbf24';ctx.lineWidth=1;ctx.setLineDash([5,5]);
  ctx.fillRect(r1x,r1y,rw,rh);ctx.strokeRect(r1x,r1y,rw,rh);ctx.setLineDash([]);
  drawText('|x| ≤ a',cx,cy-rh/2-10,'#fbbf24',11);
  drawText('|y| ≤ b',cx-rw/2-30,cy,'#fbbf24',11);
  // 椭圆
  ctx.strokeStyle='#06b6d4';ctx.lineWidth=2.5;
  ctx.beginPath();
  for(let th=0;th<=Math.PI*2+0.05;th+=0.04){
    const x=Math.cos(th)*a,y=Math.sin(th)*b;
    const [sx,sy]=toScreen(x,y,cx,cy,scale);
    if(th===0)ctx.moveTo(sx,sy);else ctx.lineTo(sx,sy);
  }
  ctx.stroke();
  // 对称点：P 和 关于 x 轴、y 轴、原点的对称点
  const th=time*1.0;
  const px=Math.cos(th)*a*0.6,py=Math.sin(th)*b*0.6;
  const pts=[[px,py,'#06b6d4','P'],[px,-py,'#34d399','P_x'],[-px,py,'#a78bfa','P_y'],[-px,-py,'#f87171','P_o']];
  pts.forEach(p=>{
    const [x,y,col,lbl]=p;const [sx,sy]=toScreen(x,y,cx,cy,scale);
    ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(sx,sy,6,0,7);ctx.fill();ctx.shadowBlur=0;
    drawText(lbl,sx,sy-15,col,11);
  });
  // 对称轴高亮
  ctx.strokeStyle='rgba(52,211,153,0.5)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
  pts.forEach(p=>{const[x,y]=p;const[sx,sy]=toScreen(x,y,cx,cy,scale);ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(2*cx-sx,sy);ctx.stroke();ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx,2*cy-sy);ctx.stroke();});
  ctx.setLineDash([]);
  drawText('对称轴：x 轴、y 轴  ·  对称中心：原点',W/2,H-30,'#9ab0d0',12);
}

// ===== 场景：顶点与长短轴 =====
function drawVertexScene(time){
  const W=cv.width,H=cv.height;
  drawText('顶点 · 长短轴 · 焦距',W/2,30,'#fbbf24',16);
  const cx=W/2,cy=H/2+10,scale=Math.min(W,H)*0.25;
  const {a,b,c,e}=getEllipseParams();
  drawAxes(cx,cy,scale,2,1.4);
  // 椭圆
  ctx.strokeStyle='#06b6d4';ctx.lineWidth=2.5;
  ctx.beginPath();
  for(let th=0;th<=Math.PI*2+0.05;th+=0.04){
    const x=Math.cos(th)*a,y=Math.sin(th)*b;
    const [sx,sy]=toScreen(x,y,cx,cy,scale);
    if(th===0)ctx.moveTo(sx,sy);else ctx.lineTo(sx,sy);
  }
  ctx.stroke();
  // 长轴 A1A2 = 2a（脉冲）
  const pulse=0.5+0.5*Math.sin(time*3);
  const [a1x,a1y]=toScreen(-a,0,cx,cy,scale),[a2x,a2y]=toScreen(a,0,cx,cy,scale);
  ctx.strokeStyle='#fbbf24';ctx.lineWidth=3;ctx.shadowColor='#fbbf24';ctx.shadowBlur=8+pulse*8;
  ctx.beginPath();ctx.moveTo(a1x,a1y);ctx.lineTo(a2x,a2y);ctx.stroke();ctx.shadowBlur=0;
  drawText('长轴 2a',cx,a1y-16,'#fbbf24',13);
  // 短轴 B1B2 = 2b
  const [b1x,b1y]=toScreen(0,-b,cx,cy,scale),[b2x,b2y]=toScreen(0,b,cx,cy,scale);
  ctx.strokeStyle='#34d399';ctx.lineWidth=3;ctx.shadowColor='#34d399';ctx.shadowBlur=6;
  ctx.beginPath();ctx.moveTo(b1x,b1y);ctx.lineTo(b2x,b2y);ctx.stroke();ctx.shadowBlur=0;
  drawText('短轴 2b',b2x+40,b2y,'#34d399',13);
  // 焦距 F1F2 = 2c
  const [f1x,f1y]=toScreen(-c,0,cx,cy,scale),[f2x,f2y]=toScreen(c,0,cx,cy,scale);
  ctx.strokeStyle='#f87171';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(f1x,f1y);ctx.lineTo(f2x,f2y);ctx.stroke();
  drawText('焦距 2c',cx,f1y+18,'#f87171',12);
  // 顶点
  ctx.fillStyle='#e8eef8';
  [[-a,0,'A₁'],[a,0,'A₂'],[0,b,'B₂'],[0,-b,'B₁']].forEach(p=>{
    const [x,y,lbl]=p;const [sx,sy]=toScreen(x,y,cx,cy,scale);
    ctx.beginPath();ctx.arc(sx,sy,5,0,7);ctx.fill();
    drawText(lbl,sx,sy+(y>0?-14:14),'#e8eef8',11);
  });
  drawText('a² = b² + c²   →   '+a.toFixed(2)+'² = '+b.toFixed(2)+'² + '+c.toFixed(2)+'²',W/2,H-30,'#9ab0d0',12);
}

// ===== 场景：离心率 =====
function drawEccScene(time){
  const W=cv.width,H=cv.height;
  drawText('离心率 e = c/a  （拖动滑块实时变形）',W/2,30,'#fbbf24',16);
  const cx=W/2,cy=H/2+10,scale=Math.min(W,H)*0.25;
  const {a,b,c,e}=getEllipseParams();
  drawAxes(cx,cy,scale,2,1.4);
  // 当前椭圆
  ctx.strokeStyle='#06b6d4';ctx.lineWidth=3;ctx.shadowColor='#06b6d4';ctx.shadowBlur=10;
  ctx.beginPath();
  for(let th=0;th<=Math.PI*2+0.05;th+=0.04){
    const x=Math.cos(th)*a,y=Math.sin(th)*b;
    const [sx,sy]=toScreen(x,y,cx,cy,scale);
    if(th===0)ctx.moveTo(sx,sy);else ctx.lineTo(sx,sy);
  }
  ctx.stroke();ctx.shadowBlur=0;
  // 焦点
  const [f1x,f1y]=toScreen(-c,0,cx,cy,scale),[f2x,f2y]=toScreen(c,0,cx,cy,scale);
  ctx.fillStyle='#fbbf24';ctx.shadowColor='#fbbf24';ctx.shadowBlur=10;
  ctx.beginPath();ctx.arc(f1x,f1y,6,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(f2x,f2y,6,0,7);ctx.fill();ctx.shadowBlur=0;
  drawText('F₁',f1x,f1y+18,'#fbbf24',12);drawText('F₂',f2x,f2y+18,'#fbbf24',12);
  // 参考圆（e=0）
  ctx.strokeStyle='rgba(167,139,250,0.35)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.arc(cx,cy,a*scale,0,7);ctx.stroke();ctx.setLineDash([]);
  drawText('e=0 圆（参考）',cx,cy-a*scale-10,'#a78bfa',11);
  // 状态文字
  let desc='椭圆';
  if(e<0.3)desc='接近圆（e 小）';else if(e>0.8)desc='很扁（e 大）';else desc='中等扁度';
  ctx.font='bold 22px sans-serif';ctx.fillStyle='#34d399';ctx.textAlign='center';
  ctx.fillText('e = '+e.toFixed(3),W/2,H-58);
  drawText(desc,W/2,H-32,'#9ab0d0',13);
}

// ===== 场景：焦半径公式 =====
function drawFocalRadiusScene(time){
  const W=cv.width,H=cv.height;
  drawText('焦半径 · |PF₁| = a + ex , |PF₂| = a − ex',W/2,30,'#fbbf24',15);
  const cx=W/2,cy=H/2+15,scale=Math.min(W,H)*0.22;
  const {a,b,c,e}=getEllipseParams();
  drawAxes(cx,cy,scale,2,1.4);
  // 椭圆
  ctx.strokeStyle='rgba(6,182,212,0.5)';ctx.lineWidth=1.5;
  ctx.beginPath();
  for(let th=0;th<=Math.PI*2+0.05;th+=0.04){
    const x=Math.cos(th)*a,y=Math.sin(th)*b;
    const [sx,sy]=toScreen(x,y,cx,cy,scale);
    if(th===0)ctx.moveTo(sx,sy);else ctx.lineTo(sx,sy);
  }
  ctx.stroke();
  // 焦点
  const [f1x,f1y]=toScreen(-c,0,cx,cy,scale),[f2x,f2y]=toScreen(c,0,cx,cy,scale);
  ctx.fillStyle='#fbbf24';
  ctx.beginPath();ctx.arc(f1x,f1y,5,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(f2x,f2y,5,0,7);ctx.fill();
  drawText('F₁',f1x,f1y+16,'#fbbf24',11);drawText('F₂',f2x,f2y+16,'#fbbf24',11);
  // 动点 P
  const th=time*1.2;
  const px=Math.cos(th)*a,py=Math.sin(th)*b;
  const [psx,psy]=toScreen(px,py,cx,cy,scale);
  // 连线
  ctx.strokeStyle='#34d399';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(f1x,f1y);ctx.lineTo(psx,psy);ctx.stroke();
  ctx.strokeStyle='#f87171';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(f2x,f2y);ctx.lineTo(psx,psy);ctx.stroke();
  ctx.fillStyle='#06b6d4';ctx.shadowColor='#06b6d4';ctx.shadowBlur=10;
  ctx.beginPath();ctx.arc(psx,psy,7,0,7);ctx.fill();ctx.shadowBlur=0;
  drawText('P('+px.toFixed(2)+','+py.toFixed(2)+')',psx,psy-16,'#06b6d4',11);
  // 公式与实际值对比
  const pf1=a+e*px,pf2=a-e*px;
  const d1=Math.sqrt((px+c)*(px+c)+py*py),d2=Math.sqrt((px-c)*(px-c)+py*py);
  drawText('|PF₁| 公式 = a+ex = '+pf1.toFixed(3)+'   实测 = '+d1.toFixed(3),W/2,H-70,'#34d399',12);
  drawText('|PF₂| 公式 = a−ex = '+pf2.toFixed(3)+'   实测 = '+d2.toFixed(3),W/2,H-48,'#f87171',12);
  drawText('和 = '+ (pf1+pf2).toFixed(3) +'  = 2a',W/2,H-26,'#fbbf24',12);
}

// ===== 场景：核心总结 =====
function drawSummaryScene(){
  const W=cv.width,H=cv.height;
  drawText('椭圆核心总结',W/2,40,'#fbbf24',18);
  const items=[
    {t:'定义',d:'|PF₁|+|PF₂|=2a',c:'#fbbf24'},
    {t:'x 轴方程',d:'x²/a²+y²/b²=1',c:'#06b6d4'},
    {t:'y 轴方程',d:'y²/a²+x²/b²=1',c:'#67e8f9'},
    {t:'长短轴',d:'2a 长, 2b 短',c:'#34d399'},
    {t:'勾股关系',d:'a²=b²+c²',c:'#a78bfa'},
    {t:'离心率',d:'e=c/a ∈(0,1)',c:'#f87171'},
    {t:'焦半径',d:'|PF|=a±ex',c:'#fb923c'},
    {t:'扁圆判据',d:'e→0 圆,e→1 扁',c:'#ec4899'},
    {t:'对称性',d:'x,y 轴,原点',c:'#22d3ee'},
  ];
  items.forEach((m,i)=>{
    const col=i%3,row=Math.floor(i/3);
    const x=80+col*(W-160)/3;
    const y=95+row*120;
    ctx.fillStyle=m.c+'22';ctx.strokeStyle=m.c;ctx.lineWidth=2;
    roundRect(x+10,y,(W-160)/3-20,100,10);ctx.fill();ctx.stroke();
    drawText(m.t,x+(W-160)/6,y+38,m.c,14);
    drawText(m.d,x+(W-160)/6,y+68,'#fff',12);
  });
}

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  if(stepIdx===0)drawDefinitionScene(t);
  else if(stepIdx===1)drawStdXScene(t);
  else if(stepIdx===2)drawStdYScene(t);
  else if(stepIdx===3)drawRangeScene(t);
  else if(stepIdx===4)drawVertexScene(t);
  else if(stepIdx===5)drawEccScene(t);
  else if(stepIdx===6)drawFocalRadiusScene(t);
  else if(stepIdx===7)drawSummaryScene();
}

function syncStep(){
  const s=STEPS[stepIdx];
  document.getElementById('stepBadge').textContent=s.tag;
  document.getElementById('stepTitle').textContent=s.name;
  document.getElementById('stepBody').innerHTML=s.body;
  document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?.title||'')+'</h4><ul>'+((s.points?.items||[]).map(x=>'<li>'+x+'</li>').join(''))+'</ul>';
  document.querySelectorAll('.step').forEach((el,i)=>el.classList.toggle('active',i===stepIdx));
  statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;
  stepTime=0;
}

function update(dt){
  t+=dt*speed;
  if(!playing)return;
  stepTime+=dt*speed;
  if(stepTime>=STEP_DURATION){
    if(stepIdx<STEPS.length-1){stepIdx++;syncStep();}
    else{playing=false;playBtn.textContent='▶ 播放';statusEl.textContent='动画完成';}
  }
}

function loop(ts){
  if(!lastT)lastT=ts;
  const dt=(ts-lastT)/1000;lastT=ts;
  update(dt);draw();
  requestAnimationFrame(loop);
}

const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn');
const speedEl=document.getElementById('speed'),eccEl=document.getElementById('ecc');
playBtn.onclick=()=>{playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';};
resetBtn.onclick=()=>{stepIdx=0;playing=false;syncStep();draw();playBtn.textContent='▶ 播放';};
stepFwdBtn.onclick=()=>{if(stepIdx<STEPS.length-1){stepIdx++;syncStep();draw();}};
stepBackBtn.onclick=()=>{if(stepIdx>0){stepIdx--;syncStep();draw();}};
speedEl.oninput=()=>{speed=parseFloat(speedEl.value);};
eccEl.oninput=()=>{draw();};

function buildStepbar(){
  const bar=document.getElementById('stepbar');
  bar.innerHTML='';
  STEPS.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='step'+(i===stepIdx?' active':'');
    el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>10?s.name.slice(0,9)+'…':s.name)+'</div>';
    el.onclick=()=>{stepIdx=i;syncStep();draw();};
    bar.appendChild(el);
  });
}

buildStepbar();syncStep();requestAnimationFrame(loop);
// 椭圆教学动画：定义、标准方程、几何性质、离心率、焦半径公式 一步到位
</script>
</body>
