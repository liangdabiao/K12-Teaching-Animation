<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>二项式定理 · (a+b)ⁿ展开 · 通项公式 · 杨辉三角</title>
<style>
:root{--bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;--accent:#fbbf24;--accent2:#06b6d4;--line:#243a5e;--good:#34d399;--warn:#fbbf24;--bad:#f87171;}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
.back{color:var(--accent2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap;background:rgba(6,182,212,.06)}
.back:hover{background:rgba(6,182,212,.14)}
.title{font-size:15px;font-weight:600}.subtitle{font-size:12px;color:var(--muted)}
.cards{display:flex;gap:10px;padding:10px 16px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(251,191,36,.06),transparent)}
.card{flex:1;min-width:160px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.card.s2::before{background:var(--accent2)}.card.s3::before{background:var(--good)}.card.s4::before{background:var(--bad)}
.card h4{margin:0 0 4px;font-size:13px}.card .v{font-size:11px;color:var(--muted);line-height:1.5}
.card .num{position:absolute;right:8px;top:6px;font-size:24px;font-weight:700;color:rgba(255,255,255,.07)}
main{flex:1;display:flex;min-height:0}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}
.panel{width:340px;flex:none;padding:14px;overflow:auto;border-left:1px solid var(--line);background:var(--panel);font-size:13px;line-height:1.7}
.panel h2{font-size:14px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--accent);color:#1a1a1a;font-size:11px;font-weight:600}
.body{color:var(--muted);margin:0 0 10px}.body strong{color:var(--ink)}
.body code{background:rgba(251,191,36,.2);color:#fde68a;padding:1px 5px;border-radius:4px;font-family:Consolas,Monaco,monospace;font-size:12px}
.points{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin-top:8px;border-left:3px solid var(--accent2)}
.points h4{margin:0 0 6px;font-size:13px}.points ul{margin:0;padding-left:18px;color:var(--muted)}
.points li{margin-bottom:3px}.points li strong{color:var(--accent)}
.stepbar{display:flex;gap:6px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);overflow-x:auto}
.step{flex:1;min-width:100px;padding:8px 10px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}
.step:hover{background:#1e345a;border-color:var(--accent2)}
.step.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1a1a;font-weight:600;border-color:transparent}
.controls{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}
button:hover{background:#1e345a}button.primary{background:var(--accent);border-color:var(--accent);color:#1a1a1a;font-weight:600}
.controls label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
input[type=range]{accent-color:var(--accent)}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}
</style>
</head>
<body>
<header class="topbar"><a class="back" href="../index.html">← 返回数学目录</a><span class="title">二项式定理</span><span class="subtitle">(a+b)ⁿ展开 · 通项公式 · 杨辉三角</span></header>
<div class="cards">
  <div class="card"><div class="num">1</div><h4>二项式定理</h4><div class="v">(a+b)ⁿ = ΣC(n,k)aⁿ⁻ᵏbᵏ<br>展开共 n+1 项</div></div>
  <div class="card s2"><div class="num">2</div><h4>通项 Tₖ₊₁</h4><div class="v">Tₖ₊₁ = C(n,k)aⁿ⁻ᵏbᵏ<br>k = 0,1,2,...,n</div></div>
  <div class="card s3"><div class="num">3</div><h4>杨辉三角</h4><div class="v">第 n 行第 k 个 = C(n-1,k-1)<br>每个数=肩上两数之和</div></div>
  <div class="card s4"><div class="num">4</div><h4>系数性质</h4><div class="v">对称性 · 增减性 · 最大值<br>系数和 = 2ⁿ</div></div>
</div>
<main>
  <div class="stage"><canvas id="cv"></canvas></div>
  <aside class="panel"><h2><span class="badge" id="stepBadge">基础</span><span id="stepTitle">二项式定理</span></h2><p class="body" id="stepBody"></p><div class="points" id="stepPoints"></div></aside>
</main>
<div class="stepbar" id="stepbar"></div>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button><button id="resetBtn">↺ 重置</button>
  <button id="stepBackBtn">◀ 上一步</button><button id="stepFwdBtn">下一步 ▶</button>
  <label>速度 <input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <span id="status" class="status">点击播放或选择步骤</span>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(520,Math.min(1100,r.width-12));cv.height=Math.max(400,Math.min(600,r.height-12));}
window.addEventListener('resize',()=>{fit();draw();});fit();
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawText(t,x,y,c,fs,a,b){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=a||'center';ctx.textBaseline=b||'middle';ctx.fillText(t,x,y);}

// 组合数 C(n,k)
function C(n,k){if(k<0||k>n)return 0;if(k===0||k===n)return 1;k=Math.min(k,n-k);let r=1;for(let i=0;i<k;i++){r=r*(n-i)/(i+1);}return Math.round(r);}

const STEPS=[
  {tag:'基础',name:'定理公式',body:'<strong>二项式定理</strong>给出 (a+b)ⁿ 的展开公式：<code>(a+b)ⁿ = C(n,0)aⁿ + C(n,1)aⁿ⁻¹b + ... + C(n,n)bⁿ</code>。展开式共有 <strong>n+1 项</strong>，每项系数为<strong>二项式系数</strong> C(n,k)。',points:{title:'公式核心',items:['<strong>项数</strong>：共 n+1 项','<strong>第 k+1 项系数</strong>：C(n,k)','<strong>a 的指数</strong>：从 n 递减到 0','<strong>b 的指数</strong>：从 0 递增到 n']}},
  {tag:'基础',name:'通项公式',body:'<strong>通项公式</strong>：<code>Tₖ₊₁ = C(n,k)·aⁿ⁻ᵏ·bᵏ</code>，表示展开式的<strong>第 k+1 项</strong>（k = 0,1,...,n）。注意通项是 Tₖ₊₁ 而非 Tₖ，因为 k 从 0 开始而项数从 1 开始。',points:{title:'通项要点',items:['<strong>下标</strong>：Tₖ₊₁（第 k+1 项）','<strong>k 范围</strong>：0 ≤ k ≤ n','<strong>a 指数</strong>：n-k（与 k 反向）','<strong>区分</strong>：二项式系数 ≠ 项的系数']}},
  {tag:'核心',name:'杨辉三角',body:'<strong>杨辉三角</strong>：将各阶 (a+b)ⁿ 的二项式系数排列成三角形。每行首尾为 1，<strong>中间每个数等于肩上两数之和</strong>。第 n 行（n 从 0 计）第 k 个数即 C(n,k)。',points:{title:'杨辉三角规律',items:['<strong>第 n 行</strong>：对应 (a+b)ⁿ 系数','<strong>C(n,k) = C(n-1,k-1) + C(n-1,k)</strong>','<strong>每行首尾</strong>：恒为 1','<strong>第 n 行和</strong>：2ⁿ']}},
  {tag:'性质',name:'系数对称性',body:'二项式系数具有<strong>对称性</strong>：<code>C(n,k) = C(n,n-k)</code>。在杨辉三角中，每一行的系数<strong>关于中间对称</strong>。如 C(5,1)=C(5,4)=5，C(6,2)=C(6,4)=15。',points:{title:'对称性证明',items:['<strong>公式</strong>：C(n,k)=C(n,n-k)','<strong>直观</strong>：选 k 个 = 不选 n-k 个','<strong>图形</strong>：杨辉三角每行对称','<strong>应用</strong>：简化计算']}},
  {tag:'性质',name:'系数最大值',body:'二项式系数先<strong>递增后递减</strong>：当 k &lt; (n+1)/2 时递增，k &gt; (n+1)/2 时递减。<strong>n 为偶数</strong>时中间一项 C(n,n/2) 最大；<strong>n 为奇数</strong>时中间两项 C(n,(n-1)/2) 与 C(n,(n+1)/2) 相等且最大。',points:{title:'最大值规律',items:['<strong>n 偶数</strong>：C(n,n/2) 唯一最大','<strong>n 奇数</strong>：中间两项相等最大','<strong>增减分界</strong>：(n+1)/2','<strong>例</strong>：n=4 → C(4,2)=6 最大']}},
  {tag:'性质',name:'系数和公式',body:'二项式系数<strong>之和等于 2ⁿ</strong>：<code>C(n,0)+C(n,1)+...+C(n,n) = 2ⁿ</code>。在 (a+b)ⁿ 中令 a=b=1 即得。进一步，<strong>奇数项和 = 偶数项和 = 2ⁿ⁻¹</strong>（令 a=1,b=-1）。',points:{title:'系数和性质',items:['<strong>总和</strong>：ΣC(n,k) = 2ⁿ','<strong>奇数项和</strong>：C(n,1)+C(n,3)+... = 2ⁿ⁻¹','<strong>偶数项和</strong>：C(n,0)+C(n,2)+... = 2ⁿ⁻¹','<strong>推导</strong>：a=1,b=1 或 a=1,b=-1']}},
  {tag:'应用',name:'典型应用',body:'<strong>典型应用</strong>：① 求 (2x-1)⁶ 展开式中 x⁴ 的系数（用通项公式）；② 求 (1+x)¹⁰ 展开式中系数最大的项；③ <strong>整除性证明</strong>：7ⁿ-1 能被 6 整除；④ <strong>近似计算</strong>：1.01⁵ ≈ 1+5×0.01 = 1.05。',points:{title:'四类应用',items:['<strong>求指定项</strong>：用通项 Tₖ₊₁','<strong>求最大项</strong>：利用增减性','<strong>整除证明</strong>：展开后提取公因子','<strong>近似计算</strong>：取展开前几项']}},
  {tag:'总结',name:'核心速记',body:'二项式定理的核心是<strong>展开公式、通项公式、杨辉三角、系数性质</strong>四位一体。掌握通项 Tₖ₊₁=C(n,k)aⁿ⁻ᵏbᵏ 与杨辉三角规律，可解决绝大多数二项式问题。',points:{title:'三句话总结',items:['<strong>展开</strong>：(a+b)ⁿ 共 n+1 项','<strong>通项</strong>：Tₖ₊₁ = C(n,k)aⁿ⁻ᵏbᵏ','<strong>系数</strong>：杨辉三角第 n 行','<strong>性质</strong>：对称、增减、和为 2ⁿ']}},
];

let stepIdx=0,playing=false,lastT=0,speed=1,stepTime=0,t=0;
const STEP_DURATION=3.4;

// ===== 场景：定理公式 =====
function drawFormulaScene(time){
  const W=cv.width,H=cv.height;
  drawText('二项式定理 · (a+b)ⁿ 展开公式',W/2,30,'#fbbf24',16);
  const n=Math.min(7,3+Math.floor((time*0.4)%5)); // n 动态变化 3-7
  // 大公式
  ctx.font='bold 22px serif';ctx.fillStyle='#fff';ctx.textAlign='center';
  ctx.fillText('(a + b)' + supText(n) + '  =  Σ C(n,k) · a' + supTextC('n-k') + ' · b' + supTextC('k'),W/2,70);
  // 分项展开
  const cy=130, rowH=32;
  drawText('当 n = '+n+' 时的展开式：',120,cy,'#06b6d4',14,'left');
  let line='';
  for(let k=0;k<=n;k++){
    const coef=C(n,k);
    const apart=n-k;
    if(k>0)line+=' + ';
    if(coef>1)line+=coef;
    if(apart>0)line+='a'+supTextC(apart);
    if(k>0)line+='b'+supTextC(k);
  }
  // 太长换行显示
  ctx.font='bold 18px serif';ctx.fillStyle='#34d399';ctx.textAlign='left';
  wrapText('(a+b)'+supText(n)+' = '+line,80,cy+40,W-160,28);
  // 各项高亮
  for(let k=0;k<=n;k++){
    const x=80+k*(W-160)/(n+1)+30;
    const y=cy+150;
    const coef=C(n,k);
    const pulse=0.5+0.5*Math.sin(time*2+k);
    ctx.fillStyle='rgba(251,191,36,'+(0.2+0.3*pulse)+')';
    ctx.strokeStyle='#fbbf24';ctx.lineWidth=1.5;
    roundRect(x-25,y-15,50,30,6);ctx.fill();ctx.stroke();
    drawText('T'+subTextC(k+1),x,y-2,'#fbbf24',11);
    drawText(coef+'',x,y+10,'#fff',12);
  }
  drawText('共 '+(n+1)+' 项，二项式系数依次为：'+(function(){const a=[];for(let k=0;k<=n;k++)a.push(C(n,k));return a.join(', ');})(),W/2,H-50,'#9ab0d0',12);
}

// 上标字符（数字）
function supText(n){const m='⁰¹²³⁴⁵⁶⁷⁸⁹';return String(n).split('').map(d=>m[+d]).join('');}
function supTextC(n){return supText(n);}
function subTextC(n){const m='₀₁₂₃₄₅₆₇₈₉';return String(n).split('').map(d=>m[+d]).join('');}

function wrapText(text,x,y,maxW,lh){
  // 简单按字符近似测量，按比例切分
  const perChar=11;
  const maxChars=Math.floor(maxW/perChar);
  if(text.length<=maxChars){ctx.fillText(text,x,y);return;}
  // 切成多行（按符号）
  let parts=text.split(' + ');
  let line='',yy=y;
  parts.forEach((p,i)=>{
    const add=(i>0?' + ':'')+p;
    if((line+add).length>maxChars){ctx.fillText(line,x,yy);yy+=lh;line='';}
    line+=add;
  });
  if(line)ctx.fillText(line,x,yy);
}

// ===== 场景：通项公式 =====
function drawTermScene(time){
  const W=cv.width,H=cv.height;
  drawText('通项公式 · Tₖ₊₁ = C(n,k)·aⁿ⁻ᵏ·bᵏ',W/2,30,'#fbbf24',16);
  const n=8;
  const k=Math.floor((time*0.5)%(n+1));
  // 通项公式
  ctx.font='bold 24px serif';ctx.fillStyle='#06b6d4';ctx.textAlign='center';
  ctx.fillText('T' + subTextC('k+1') + ' = C(n,k) · a' + supTextC('n-k') + ' · b' + supTextC('k'),W/2,80);
  // 高亮第 k+1 项
  const cy=160;
  drawText('(a+b)'+supText(n)+' 的展开式（共 '+(n+1)+' 项）：',W/2,cy,'#9ab0d0',13);
  const totalW=W-160;
  const itemW=totalW/(n+1);
  for(let i=0;i<=n;i++){
    const x=80+i*itemW+itemW/2;
    const y=cy+50;
    const coef=C(n,i);
    const isK=(i===k);
    if(isK){
      ctx.fillStyle='rgba(251,191,36,0.35)';ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;
      ctx.shadowColor='#fbbf24';ctx.shadowBlur=15;
      roundRect(x-itemW/2+4,y-18,itemW-8,36,6);ctx.fill();ctx.stroke();
      ctx.shadowBlur=0;
      drawText(coef+'',x,y,'#fbbf24',15);
    }else{
      ctx.fillStyle='rgba(255,255,255,0.05)';ctx.strokeStyle='#243a5e';ctx.lineWidth=1;
      roundRect(x-itemW/2+4,y-18,itemW-8,36,6);ctx.fill();ctx.stroke();
      drawText(coef+'',x,y,'#9ab0d0',13);
    }
    drawText('T'+subTextC(i+1),x,y+24,'#5a6a8a',9);
  }
  // 详细展示当前项
  const coef=C(n,k);
  ctx.font='bold 18px serif';ctx.fillStyle='#fff';
  ctx.fillText('第 '+(k+1)+' 项 (k='+k+')：',W/2,cy+130);
  ctx.font='bold 20px serif';ctx.fillStyle='#34d399';
  ctx.fillText('T'+subTextC(k+1)+' = C('+n+','+k+') · a'+supTextC(n-k)+' · b'+supTextC(k)+' = '+coef+'·a'+supTextC(n-k)+'·b'+supTextC(k),W/2,cy+165);
  // 注意事项
  drawText('注意：二项式系数 C('+n+','+k+') = '+coef+'，与该项的"系数"未必相同',W/2,H-50,'#f87171',12);
  drawText('如 (2x-1)' + supText(6) + ' 中 x⁴ 的"系数"还需乘上 2、-1 的幂',W/2,H-30,'#9ab0d0',11);
}

// ===== 场景：杨辉三角 =====
function drawPascalScene(time){
  const W=cv.width,H=cv.height;
  drawText('杨辉三角 · 二项式系数的几何排列',W/2,30,'#fbbf24',16);
  const maxRows=8;
  const rows=Math.min(maxRows,3+Math.floor((time*0.5)%6)); // 动态 3-8 行
  // 高亮行
  const highlightRow=rows-1;
  const cx=W/2,topY=70;
  const rowH=Math.min(40,(H-140)/maxRows);
  const cellW=Math.min(70,W/(maxRows*2));
  // 画行
  for(let n=0;n<rows;n++){
    const y=topY+n*rowH;
    const startX=cx-n*cellW/2;
    for(let k=0;k<=n;k++){
      const x=startX+k*cellW;
      const val=C(n,k);
      const isHL=(n===highlightRow);
      const isMax=(n>0 && k>0 && k<n && val===maxOfRow(n));
      if(isHL){
        ctx.fillStyle='rgba(251,191,36,0.25)';ctx.strokeStyle='#fbbf24';ctx.lineWidth=1.5;
      }else{
        ctx.fillStyle='rgba(255,255,255,0.04)';ctx.strokeStyle='#243a5e';ctx.lineWidth=1;
      }
      roundRect(x-cellW/2+4,y-rowH/2+3,cellW-8,rowH-6,6);ctx.fill();ctx.stroke();
      const tc=isHL?(isMax?'#fde68a':'#fbbf24'):(isMax?'#34d399':'#e8eef8');
      drawText(val+'',x,y,tc,13);
    }
    // 行标
    drawText('n='+n,cx+n*cellW/2+30,topY+n*rowH,'#5a6a8a',11);
  }
  // 系数和
  const sum=Math.pow(2,highlightRow);
  drawText('第 '+highlightRow+' 行系数和 = '+sum+' = 2'+supText(highlightRow),W/2,H-70,'#34d399',13);
  drawText('每个数 = 肩上两数之和；C(n,k)=C(n-1,k-1)+C(n-1,k)',W/2,H-45,'#06b6d4',12);
  drawText('第 n 行（n 从 0 计）即 (a+b)ⁿ 的二项式系数',W/2,H-25,'#9ab0d0',11);
}

function maxOfRow(n){
  if(n===0)return 1;
  if(n%2===0)return C(n,n/2);
  return C(n,(n-1)/2);
}

// ===== 场景：系数对称性 =====
function drawSymmetryScene(time){
  const W=cv.width,H=cv.height;
  drawText('二项式系数的对称性 · C(n,k) = C(n,n-k)',W/2,30,'#fbbf24',16);
  const n=8;
  const phase=Math.sin(time*0.6);
  const k=Math.floor((phase+1)/2*(n+1))%(n+1);
  const kMirror=n-k;
  // 折线图：C(n,k) 关于 k
  const cx=80,cy=H/2+30,plotW=W-160,plotH=H-220;
  // 坐标轴
  ctx.strokeStyle='#3a4a6a';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+plotW,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-plotH);ctx.lineTo(cx,cy);ctx.stroke();
  drawText('C(8,k)',cx-40,cy-plotH/2,'#9ab0d0',12);
  drawText('k',cx+plotW+15,cy,'#9ab0d0',12);
  // k 刻度
  for(let i=0;i<=n;i++){
    const x=cx+i*plotW/n;
    drawText(i,x,cy+18,'#5a6a8a',11);
    ctx.strokeStyle='#243a5e';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,cy-3);ctx.lineTo(x,cy+3);ctx.stroke();
  }
  // 最大值
  const maxV=C(n,Math.floor(n/2));
  // 折线（柱状）
  for(let i=0;i<=n;i++){
    const x=cx+i*plotW/n;
    const v=C(n,i);
    const h=v/maxV*plotH;
    const isK=(i===k),isM=(i===kMirror);
    if(isK||isM){
      ctx.fillStyle='#fbbf24';ctx.strokeStyle='#fde68a';ctx.lineWidth=2;
      ctx.shadowColor='#fbbf24';ctx.shadowBlur=12;
    }else{
      ctx.fillStyle='#06b6d4aa';ctx.strokeStyle='transparent';
      ctx.shadowBlur=0;
    }
    roundRect(x-12,cy-h,24,h,3);ctx.fill();if(isK||isM)ctx.stroke();
    ctx.shadowBlur=0;
    drawText(v,x,cy-h-10,isK||isM?'#fbbf24':'#9ab0d0',11);
  }
  // 对称轴
  ctx.strokeStyle='rgba(52,211,153,0.5)';ctx.lineWidth=1;ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.moveTo(cx+n/2*plotW/n,cy-plotH);ctx.lineTo(cx+n/2*plotW/n,cy);ctx.stroke();
  ctx.setLineDash([]);
  drawText('对称轴 k = n/2',cx+n/2*plotW/n,cy-plotH-10,'#34d399',11);
  // 标注
  drawText('C('+n+','+k+') = '+C(n,k)+'  =  C('+n+','+kMirror+') = '+C(n,kMirror),W/2,H-50,'#34d399',14);
  drawText('对称轴两侧的系数完全相同，关于中间镜像对称',W/2,H-30,'#9ab0d0',12);
}

// ===== 场景：系数最大值 =====
function drawMaxScene(time){
  const W=cv.width,H=cv.height;
  drawText('二项式系数的增减性与最大值',W/2,30,'#fbbf24',16);
  // 偶数 n 和奇数 n 对比
  const n1=6,n2=7;
  const cy1=130,cy2=H/2+60;
  drawRowPeaks(n1,cy1,time);
  drawRowPeaks(n2,cy2,time);
  drawText('n = 6（偶数）：中间一项 C(6,3) = 20 唯一最大',W/2,cy1+90,'#34d399',12);
  drawText('n = 7（奇数）：中间两项 C(7,3) = C(7,4) = 35 相等且最大',W/2,cy2+90,'#fbbf24',12);
  drawText('规律：当 k < (n+1)/2 递增；k > (n+1)/2 递减',W/2,H-30,'#06b6d4',13);
}

function drawRowPeaks(n,cy,time){
  const W=cv.width;
  const plotW=W-200;
  const cx=100;
  const maxV=C(n,Math.floor(n/2));
  const barH=60;
  for(let i=0;i<=n;i++){
    const x=cx+i*plotW/n;
    const v=C(n,i);
    const h=v/maxV*barH;
    const isMax=(n%2===0 && i===n/2)||(n%2===1 && (i===(n-1)/2||i===(n+1)/2));
    if(isMax){
      const pulse=0.6+0.4*Math.sin(time*3);
      ctx.fillStyle='rgba(251,191,36,'+(0.5+0.3*pulse)+')';ctx.strokeStyle='#fde68a';ctx.lineWidth=2;
      ctx.shadowColor='#fbbf24';ctx.shadowBlur=15;
    }else{
      ctx.fillStyle='#06b6d4aa';ctx.strokeStyle='transparent';ctx.shadowBlur=0;
    }
    roundRect(x-15,cy-h,30,h,3);ctx.fill();if(isMax)ctx.stroke();
    ctx.shadowBlur=0;
    drawText(v,x,cy-h-8,isMax?'#fbbf24':'#9ab0d0',11);
    drawText('k='+i,x,cy+12,'#5a6a8a',10);
  }
}

// ===== 场景：系数和公式 =====
function drawSumScene(time){
  const W=cv.width,H=cv.height;
  drawText('二项式系数和 · ΣC(n,k) = 2ⁿ',W/2,30,'#fbbf24',16);
  const n=Math.min(8,3+Math.floor((time*0.4)%6));
  // 公式
  ctx.font='bold 20px serif';ctx.fillStyle='#06b6d4';ctx.textAlign='center';
  let lhs='C('+n+',0)';
  for(let k=1;k<=n;k++)lhs+=' + C('+n+','+k+')';
  // 不画超长 lhs
  drawText('C('+n+',0) + C('+n+',1) + ... + C('+n+','+n+') = 2'+supText(n)+' = '+Math.pow(2,n),W/2,75,'#34d399',18);
  // 柱状累加
  const cx=80,cy=H/2+40,plotW=W-160;
  let acc=0;
  const total=Math.pow(2,n);
  for(let k=0;k<=n;k++){
    const x=cx+k*plotW/n;
    const v=C(n,k);
    acc+=v;
    const h=v/total*180;
    // 累积线
    ctx.fillStyle='#fbbf2466';ctx.strokeStyle='#fbbf24';ctx.lineWidth=1.5;
    roundRect(x-15,cy-h,30,h,3);ctx.fill();ctx.stroke();
    drawText(v,x,cy-h-8,'#fbbf24',11);
    drawText('k='+k,x,cy+12,'#5a6a8a',10);
  }
  // 累积虚线
  ctx.strokeStyle='rgba(52,211,153,0.6)';ctx.lineWidth=1.5;ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(cx,cy-180);ctx.lineTo(cx+plotW,cy-180);ctx.stroke();
  ctx.setLineDash([]);
  drawText('累计 = '+Math.pow(2,n)+' (2'+supText(n)+')',cx+plotW+10,cy-180,'#34d399',12,'left');
  // 奇偶项和
  let oddSum=0,evenSum=0;
  for(let k=0;k<=n;k++){if(k%2===0)evenSum+=C(n,k);else oddSum+=C(n,k);}
  drawText('奇数项和 = '+oddSum+'   偶数项和 = '+evenSum+'   均等于 2'+supText(n-1)+' = '+Math.pow(2,n-1),W/2,H-55,'#fbbf24',13);
  drawText('推导：在 (a+b)ⁿ 中令 a=1,b=1 得总和；令 a=1,b=-1 得奇偶差',W/2,H-30,'#9ab0d0',11);
}

// ===== 场景：典型应用 =====
function drawAppScene(){
  const W=cv.width,H=cv.height;
  drawText('二项式定理典型应用',W/2,30,'#fbbf24',16);
  const cases=[
    {t:'① 求 x⁴ 的系数',d:'(2x-1)⁶ 中 x⁴ 项：T₅=C(6,4)(2x)²(-1)⁴=15·4·1=60',c:'#06b6d4'},
    {t:'② 求最大系数项',d:'(1+x)¹⁰ 中 C(10,5)=252 最大 → T₆=252x⁵',c:'#a78bfa'},
    {t:'③ 整除性证明',d:'7ⁿ=(6+1)ⁿ=6·M+1 → 7ⁿ-1 必被 6 整除',c:'#34d399'},
    {t:'④ 近似计算',d:'1.01⁵=(1+0.01)⁵≈1+5×0.01+10×0.0001≈1.051',c:'#fb923c'},
  ];
  cases.forEach((s,i)=>{
    const y=80+i*100;
    ctx.fillStyle=s.c+'22';ctx.strokeStyle=s.c;ctx.lineWidth=1.5;
    roundRect(80,y,W-160,82,10);ctx.fill();ctx.stroke();
    drawText(s.t,110,y+22,s.c,15,'left');
    // 正文用 serif（带上下标）
    ctx.font='14px serif';ctx.fillStyle='#fff';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(s.d,110,y+55);
    ctx.textAlign='center';ctx.textBaseline='middle';
  });
  drawText('核心方法：用通项 Tₖ₊₁=C(n,k)aⁿ⁻ᵏbᵏ 求指定项',W/2,H-35,'#fbbf24',13);
}

// ===== 场景：总结 =====
function drawSummaryScene(){
  const W=cv.width,H=cv.height;
  drawText('二项式定理核心总结',W/2,40,'#fbbf24',18);
  const items=[
    {t:'展开式',d:'(a+b)ⁿ 共 n+1 项',c:'#fbbf24'},
    {t:'通项公式',d:'Tₖ₊₁=C(n,k)aⁿ⁻ᵏbᵏ',c:'#06b6d4'},
    {t:'杨辉三角',d:'第 n 行即系数',c:'#a78bfa'},
    {t:'对称性',d:'C(n,k)=C(n,n-k)',c:'#34d399'},
    {t:'系数最大值',d:'中间项最大',c:'#fb923c'},
    {t:'系数和',d:'ΣC(n,k)=2ⁿ',c:'#ec4899'},
  ];
  items.forEach((m,i)=>{
    const col=i%3,row=Math.floor(i/3);
    const x=80+col*(W-160)/3;
    const y=100+row*180;
    ctx.fillStyle=m.c+'22';ctx.strokeStyle=m.c;ctx.lineWidth=2;
    roundRect(x+10,y,(W-160)/3-20,140,10);ctx.fill();ctx.stroke();
    drawText(m.t,x+(W-160)/6,y+50,m.c,15);
    drawText(m.d,x+(W-160)/6,y+90,'#fff',12);
  });
}

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  if(stepIdx===0)drawFormulaScene(t);
  else if(stepIdx===1)drawTermScene(t);
  else if(stepIdx===2)drawPascalScene(t);
  else if(stepIdx===3)drawSymmetryScene(t);
  else if(stepIdx===4)drawMaxScene(t);
  else if(stepIdx===5)drawSumScene(t);
  else if(stepIdx===6)drawAppScene();
  else if(stepIdx===7)drawSummaryScene();
}

function syncStep(){
  const s=STEPS[stepIdx];
  document.getElementById('stepBadge').textContent=s.tag;
  document.getElementById('stepTitle').textContent=s.name;
  document.getElementById('stepBody').innerHTML=s.body;
  document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?.title||'')+'</h4><ul>'+((s.points?.items||[]).map(x=>'<li>'+x+'</li>').join(''))+'</ul>';
  document.querySelectorAll('.step').forEach((el,i)=>el.classList.toggle('active',i===stepIdx));
  statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;
  stepTime=0;
}

function update(dt){
  t+=dt*speed;
  if(!playing)return;
  stepTime+=dt*speed;
  if(stepTime>=STEP_DURATION){
    if(stepIdx<STEPS.length-1){stepIdx++;syncStep();}
    else{playing=false;playBtn.textContent='▶ 播放';statusEl.textContent='动画完成';}
  }
}

function loop(ts){
  if(!lastT)lastT=ts;
  const dt=(ts-lastT)/1000;lastT=ts;
  update(dt);draw();
  requestAnimationFrame(loop);
}

const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn');
const speedEl=document.getElementById('speed');
playBtn.onclick=()=>{playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';};
resetBtn.onclick=()=>{stepIdx=0;playing=false;syncStep();draw();playBtn.textContent='▶ 播放';};
stepFwdBtn.onclick=()=>{if(stepIdx<STEPS.length-1){stepIdx++;syncStep();draw();}};
stepBackBtn.onclick=()=>{if(stepIdx>0){stepIdx--;syncStep();draw();}};
speedEl.oninput=()=>{speed=parseFloat(speedEl.value);};

function buildStepbar(){
  const bar=document.getElementById('stepbar');
  bar.innerHTML='';
  STEPS.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='step'+(i===stepIdx?' active':'');
    el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>10?s.name.slice(0,9)+'…':s.name)+'</div>';
    el.onclick=()=>{stepIdx=i;syncStep();draw();};
    bar.appendChild(el);
  });
}

buildStepbar();syncStep();requestAnimationFrame(loop);
</script>
