<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>不等式与解集 · 数轴表示</title>
<style>:root{--bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;--accent:#3b82f6;--accent2:#74b9ff;--line:#243a5e;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
.back{color:var(--accent2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap;background:rgba(116,185,255,.06)}.back:hover{background:rgba(116,185,255,.14)}
.title{font-size:15px;font-weight:600}.subtitle{font-size:12px;color:var(--muted)}
.cards{display:flex;gap:10px;padding:10px 16px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(59,130,246,.06),transparent)}
.card{flex:1;min-width:190px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 12px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}.card.s2::before{background:var(--good)}.card.s3::before{background:var(--bad)}.card.s4::before{background:var(--warn)}
.card h4{margin:0 0 4px;font-size:13px}.card .v{font-size:11.5px;color:var(--muted);line-height:1.6;font-family:Consolas,Monaco,monospace;white-space:pre-wrap}
.card .num{position:absolute;right:8px;top:6px;font-size:22px;font-weight:700;color:rgba(255,255,255,.07)}
main{flex:1;display:flex;min-height:0}.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}
.panel{width:340px;flex:none;padding:14px;overflow:auto;border-left:1px solid var(--line);background:var(--panel);font-size:13px;line-height:1.7}
.panel h2{font-size:14px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--accent);color:#fff;font-size:11px;font-weight:600}
.body{color:var(--muted);margin:0 0 10px}.body strong{color:var(--ink)}.body code{background:rgba(59,130,246,.2);color:#bfdbfe;padding:1px 5px;border-radius:4px;font-family:Consolas,Monaco,monospace;font-size:12px}
.points{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin-top:8px;border-left:3px solid var(--accent2)}.points h4{margin:0 0 6px;font-size:13px}.points ul{margin:0;padding-left:18px;color:var(--muted)}.points li{margin-bottom:3px}.points li strong{color:var(--accent)}
.code{background:#0d1117;border:1px solid var(--line);border-radius:6px;padding:8px 10px;margin-top:8px;font-family:Consolas,Monaco,monospace;font-size:11.5px;line-height:1.6;color:#c9d1d9;white-space:pre-wrap}
.stepbar{display:flex;gap:6px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);overflow-x:auto}
.step{flex:1;min-width:84px;padding:8px 6px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}.step:hover{background:#1e345a;border-color:var(--accent2)}.step.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:600;border-color:transparent}
.controls{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}button:hover{background:#1e345a}button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}button.primary:hover{background:#4b91f8}
.controls label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}input[type=range]{accent-color:var(--accent);width:80px}select{background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:4px 6px;font-size:12px}
.pval{color:var(--accent2);font-size:12px;font-family:Consolas,Monaco,monospace;min-width:46px;display:inline-block}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}
</style></head>
<body>
<header class="topbar"><a class="back" href="../index.html">← 返回数学目录</a><span class="title">不等式与解集 · 数轴表示</span><span class="subtitle">ax + b 与 0 比大小 · 拖动 a/b/不等号实时观察</span></header>
<div class="cards">
  <div class="card s2"><div class="num">1</div><h4>不等式（实时）</h4><div class="v" id="cardEq"></div></div>
  <div class="card s3"><div class="num">2</div><h4>临界点（实时）</h4><div class="v" id="cardPt"></div></div>
  <div class="card s4"><div class="num">3</div><h4>解集（实时）</h4><div class="v" id="cardSol"></div></div>
  <div class="card"><div class="num">4</div><h4>操作提示</h4><div class="v">拖动 a/b、切换不等号，看数轴解集变化；按 ▶ 自动演示</div></div>
</div>
<main><div class="stage"><canvas id="cv"></canvas></div>
<aside class="panel"><h2><span class="badge" id="stepBadge">引入</span><span id="stepTitle"></span></h2><p class="body" id="stepBody"></p><div class="points" id="stepPoints"></div><div class="code" id="stepCode"></div></aside>
</main>
<div class="stepbar" id="stepbar"></div>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button><button id="resetBtn">↺ 重置</button><button id="stepBackBtn">◀ 上一步</button><button id="stepFwdBtn">下一步 ▶</button>
  <label>a<input id="pa" type="range" min="-3" max="3" step="0.5" value="2"><span id="paV" class="pval"></span></label>
  <label>b<input id="pb" type="range" min="-6" max="6" step="0.5" value="-4"><span id="pbV" class="pval"></span></label>
  <label>不等号<select id="sym"><option value=">">&gt;</option><option value="≥">≥</option><option value="<">&lt;</option><option value="≤">≤</option></select></label>
  <label>速度<input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <span id="status" class="status">拖动 a/b 或切换不等号</span>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),statusEl=document.getElementById('status');
const paEl=document.getElementById('pa'),pbEl=document.getElementById('pb'),paV=document.getElementById('paV'),pbV=document.getElementById('pbV'),symEl=document.getElementById('sym');
const cardEq=document.getElementById('cardEq'),cardPt=document.getElementById('cardPt'),cardSol=document.getElementById('cardSol');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(560,Math.min(1100,r.width-12));cv.height=Math.max(420,Math.min(560,r.height-12));}
window.addEventListener('resize',()=>{fit();sceneDraw();});fit();
window.showTip=function(m){if(statusEl)statusEl.textContent=m;};
function drawText(t,x,y,c,fs,al,bl){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=al||'center';ctx.textBaseline=bl||'middle';ctx.fillText(t,x,y);}
function ease(t){t=t<0?0:t>1?1:t;return t*t*(3-2*t);}
let A=2,B=-4,sym='>',stepIdx=0,animT=0,playing=false,lastT=0,speed=1;
const STEP_DUR=1.4;
function fmt(x){return(Math.round(x*100)/100).toFixed(2);}
function sgn(n){return n>=0?'+':'−';}
function readParams(){A=parseFloat(paEl.value);B=parseFloat(pbEl.value);sym=symEl.value;if(Math.abs(A)<0.1){A=A>=0?0.5:-0.5;paEl.value=A;}
  paV.textContent='a='+fmt(A);pbV.textContent='b='+fmt(B);
  var x0=-B/A;var closed=sym==='≥'||sym==='≤';var wantPos=sym==='>'||sym==='≥';var dirRight=(A>0)===wantPos;
  cardEq.textContent=fmt(A)+'x '+sgn(B)+' '+fmt(Math.abs(B))+' '+sym+' 0';
  cardPt.textContent='令 '+fmt(A)+'x '+sgn(B)+' '+fmt(Math.abs(B))+' = 0\n→ x₀ = '+fmt(x0);
  cardSol.textContent=(dirRight?'x '+sym+' '+fmt(x0):'x '+sym+' '+fmt(x0))+'\n（'+(dirRight?'向右':'向左')+'的射线，'+(closed?'实心点':'空心点')+'）';
}
paEl.oninput=()=>{readParams();sceneDraw();};pbEl.oninput=()=>{readParams();sceneDraw();};symEl.onchange=()=>{readParams();sceneDraw();};
function numLine(p){var W=cv.width,H=cv.height,ox=W/2,oy=H/2+10,sc=Math.min(W/22,40);
  ctx.strokeStyle='#243a5e';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(30,oy);ctx.lineTo(W-30,oy);ctx.stroke();
  // 箭头
  ctx.fillStyle='#3a5a8a';ctx.beginPath();ctx.moveTo(W-22,oy);ctx.lineTo(W-32,oy-5);ctx.lineTo(W-32,oy+5);ctx.fill();
  drawText('x',W-16,oy+14,'#74b9ff',13);
  // 刻度
  ctx.strokeStyle='#3a5a8a';ctx.fillStyle='#9ab0d0';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
  for(var i=-9;i<=9;i++){var px=ox+i*sc;if(px<30||px>W-30)continue;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(px,oy-5);ctx.lineTo(px,oy+5);ctx.stroke();if(i!==0)ctx.fillText(i,px,oy+8);}
  drawText('0',ox,oy+8,'#9ab0d0',11);
  var x0=-B/A;var px0=ox+x0*sc;var closed=sym==='≥'||sym==='≤';var wantPos=sym==='>'||sym==='≥';var dirRight=(A>0)===wantPos;
  var pe=ease(Math.min(p,1));
  // 解集着色（射线）
  if(px0>30&&px0<W-30){
    var endX=dirRight?lerp(px0,W-26,pe):lerp(px0,34,pe);
    ctx.strokeStyle='rgba(52,211,153,.9)';ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(px0,oy);ctx.lineTo(endX,oy);ctx.stroke();
    // 箭头
    ctx.fillStyle='#34d399';ctx.beginPath();if(dirRight){ctx.moveTo(endX+8,oy);ctx.lineTo(endX-2,oy-5);ctx.lineTo(endX-2,oy+5);}else{ctx.moveTo(endX-8,oy);ctx.lineTo(endX+2,oy-5);ctx.lineTo(endX+2,oy+5);}ctx.fill();
  }
  // 临界点 空心/实心
  if(px0>20&&px0<W-20){
    if(closed){ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(px0,oy,7,0,7);ctx.fill();}else{ctx.fillStyle='#06101f';ctx.beginPath();ctx.arc(px0,oy,7,0,7);ctx.fill();ctx.strokeStyle='#fbbf24';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(px0,oy,7,0,7);ctx.stroke();}
    drawText('x₀='+fmt(x0),px0,oy-20,'#fbbf24',13);
  }
  drawText((dirRight?'x '+sym+' '+fmt(x0):'x '+sym+' '+fmt(x0)),W/2,oy+40,'#34d399',15);
}
function lerp(a,b,t){return a+(b-a)*t;}
function drawIntro(p){var W=cv.width,H=cv.height;numLine(0);var pe=ease(Math.min(p/0.6,1));ctx.globalAlpha=pe;drawText('一元一次不等式：用数轴表示解集',W/2,36,'#e8eef8',17);drawText('使不等式成立的 x 的全体，就是它的解集',W/2,H-16,'#9ab0d0',13);ctx.globalAlpha=1;}
function drawCrit(p){var W=cv.width,H=cv.height;numLine(0.2);var pe=ease(Math.min(p/0.7,1));ctx.globalAlpha=pe;drawText('第一步：求临界点  令 ax+b=0 → x₀ = −b/a',W/2,36,'#e8eef8',15);ctx.globalAlpha=1;}
function drawDir(p){var W=cv.width,H=cv.height;numLine(0.4);var pe=ease(Math.min(p/0.7,1));ctx.globalAlpha=pe;var msg=A>0?'a > 0：x 增大 → ax+b 增大；大于0在 x₀ 右侧':'a < 0：x 增大 → ax+b 减小；除以负数要变号';drawText(msg,W/2,36,'#fbbf24',14);ctx.globalAlpha=1;}
function drawShade(p){var W=cv.width,H=cv.height;numLine(p);var pe=ease(Math.min(p/0.8,1));ctx.globalAlpha=pe;drawText('在数轴上画出解集：射线 + 端点',W/2,36,'#e8eef8',15);drawText((sym==='>'||sym==='<')?'>/< 取不到端点 → 空心点':'≥/≤ 取到端点 → 实心点',W/2,H-16,'#9ab0d0',13);ctx.globalAlpha=1;}
function drawProp(p){var W=cv.width,H=cv.height;numLine(1);var pe=ease(Math.min(p/0.6,1));ctx.globalAlpha=pe;drawText('不等式性质：同加同乘不变号；乘/除负数要变号',W/2,36,'#fbbf24',15);drawText('移项变号；解集方向由 a 的符号与不等号共同决定',W/2,H-16,'#9ab0d0',13);ctx.globalAlpha=1;}
function sceneDraw(){var W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);var p=ease(Math.min(animT/STEP_DUR,1));if(stepIdx===0)drawIntro(p);else if(stepIdx===1)drawCrit(p);else if(stepIdx===2)drawDir(p);else if(stepIdx===3)drawShade(p);else if(stepIdx===4)drawProp(p);}
const STEPS=[
 {tag:"引入",name:"不等式与解集",body:"一元一次不等式如 <code>ax+b&gt;0</code>。使不等式成立的<strong>所有 x 的集合</strong>叫它的<strong>解集</strong>。解集常用<strong>数轴</strong>表示成一段或一条射线。",points:{title:"概念",items:["不等式 = 含未知数的大小关系","解集 = 使它成立的 x 全体","用数轴表示","射线或区间"]},code:"ax + b > 0\n解集 = { x | ... }"},
 {tag:"临界点",name:"求临界点",body:"先令 <code>ax+b=0</code> 求出<strong>临界点</strong> <code>x₀ = −b/a</code>。它是解集的「分界」，不等式在 x₀ 两侧符号相反。",points:{title:"边界",items:["令 ax+b=0","x₀ = −b/a","分界点","两侧符号相反"]},code:"ax+b=0\nx₀ = −b/a"},
 {tag:"方向",name:"判断解集方向",body:"<strong>a&gt;0</strong> 时，x 越大 ax+b 越大，所以 <code>ax+b&gt;0</code> 的解在 x₀<strong>右侧</strong>；<strong>a&lt;0</strong> 时反过来（相当于两边除以负数，要变号），解在 x₀<strong>左侧</strong>。不等号方向也要一起看。",points:{title:"方向",items:["a>0：右侧","a<0：左侧（变号）","看 a 符号","看不等号"]},code:"a>0, ax+b>0 → x>x₀\na<0, ax+b>0 → x<x₀"},
 {tag:"数轴",name:"数轴上表示",body:"解集是一条<strong>射线</strong>：从 x₀ 向解的方向延伸。端点是否能取到看不等号：<code>&gt; / &lt;</code> 用<strong>空心点</strong>（取不到），<code>≥ / ≤</code> 用<strong>实心点</strong>（取得到）。",points:{title:"画法",items:[">/< ：空心点","≥/≤ ：实心点","射线向解方向延伸","箭头表示无限"]},code:">  空心  ○─────\n≥  实心  ●─────"},
 {tag:"性质",name:"不等式性质",body:"不等式两边<strong>同加/同乘正数</strong>，不等号方向<strong>不变</strong>；<strong>乘/除以负数</strong>，不等号<strong>变号</strong>。移项也变号。这正是判断解集方向的根本。",points:{title:"性质",items:["同加：不变号","乘正数：不变号","乘负数：变号","移项变号"]},code:"a>b, c<0\n→ ac < bc  (变号)"}
];
function loadStep(){var s=STEPS[stepIdx];if(!s)return;animT=0;document.getElementById('stepBadge').textContent=s.tag;document.getElementById('stepTitle').textContent=s.name;document.getElementById('stepBody').innerHTML=s.body;document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?s.points.title:'')+'</h4><ul>'+((s.points?s.points.items:[]).map(function(x){return '<li>'+x+'</li>';}).join(''))+'</ul>';document.getElementById('stepCode').textContent=s.code||'';document.querySelectorAll('.step').forEach(function(el,i){el.classList.toggle('active',i===stepIdx);});statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;}
function buildStepbar(){var bar=document.getElementById('stepbar');bar.innerHTML='';STEPS.forEach(function(s,i){var el=document.createElement('div');el.className='step'+(i===stepIdx?' active':'');el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>6?s.name.slice(0,5)+'…':s.name)+'</div>';el.onclick=function(){stepIdx=i;loadStep();};bar.appendChild(el);});}
function sceneInit(){A=2;B=-4;sym='>';stepIdx=0;animT=0;playing=false;paEl.value=A;pbEl.value=B;symEl.value=sym;readParams();}
function sceneReset(){sceneInit();loadStep();statusEl.textContent='已重置';}
function sceneUpdate(dt){animT+=dt*speed;if(!playing&&animT>STEP_DUR)animT=STEP_DUR;if(playing&&animT>STEP_DUR+0.5){stepIdx=(stepIdx+1)%STEPS.length;loadStep();}}
const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn'),stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn'),speedEl=document.getElementById('speed');
playBtn.onclick=function(){playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';if(playing)animT=0;};
resetBtn.onclick=function(){sceneReset();};stepFwdBtn.onclick=function(){stepIdx=(stepIdx+1)%STEPS.length;loadStep();};stepBackBtn.onclick=function(){stepIdx=(stepIdx-1+STEPS.length)%STEPS.length;loadStep();};speedEl.oninput=function(){speed=parseFloat(speedEl.value);};
function loop(ts){if(!lastT)lastT=ts;var dt=(ts-lastT)/1000;lastT=ts;sceneUpdate(dt);sceneDraw();requestAnimationFrame(loop);}
sceneInit();buildStepbar();loadStep();requestAnimationFrame(loop);
</script></body></html>
