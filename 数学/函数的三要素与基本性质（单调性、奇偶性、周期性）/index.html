<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>函数三要素与基本性质 · 单调性 · 奇偶性 · 周期性</title>
<style>
:root{--bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;--accent:#fbbf24;--accent2:#06b6d4;--line:#243a5e;--good:#34d399;--warn:#fbbf24;--bad:#f87171;}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
.back{color:var(--accent2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap;background:rgba(6,182,212,.06)}
.back:hover{background:rgba(6,182,212,.14)}
.title{font-size:15px;font-weight:600}.subtitle{font-size:12px;color:var(--muted)}
.cards{display:flex;gap:10px;padding:10px 16px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(251,191,36,.06),transparent)}
.card{flex:1;min-width:160px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.card.s2::before{background:var(--accent2)}.card.s3::before{background:var(--good)}.card.s4::before{background:var(--bad)}
.card h4{margin:0 0 4px;font-size:13px}.card .v{font-size:11px;color:var(--muted);line-height:1.5}
.card .num{position:absolute;right:8px;top:6px;font-size:24px;font-weight:700;color:rgba(255,255,255,.07)}
main{flex:1;display:flex;min-height:0}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}
.panel{width:340px;flex:none;padding:14px;overflow:auto;border-left:1px solid var(--line);background:var(--panel);font-size:13px;line-height:1.7}
.panel h2{font-size:14px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--accent);color:#1a1a1a;font-size:11px;font-weight:600}
.body{color:var(--muted);margin:0 0 10px}.body strong{color:var(--ink)}
.body code{background:rgba(251,191,36,.2);color:#fde68a;padding:1px 5px;border-radius:4px;font-family:Consolas,Monaco,monospace;font-size:12px}
.points{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin-top:8px;border-left:3px solid var(--accent2)}
.points h4{margin:0 0 6px;font-size:13px}.points ul{margin:0;padding-left:18px;color:var(--muted)}
.points li{margin-bottom:3px}.points li strong{color:var(--accent)}
.stepbar{display:flex;gap:6px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);overflow-x:auto}
.step{flex:1;min-width:100px;padding:8px 10px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}
.step:hover{background:#1e345a;border-color:var(--accent2)}
.step.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1a1a;font-weight:600;border-color:transparent}
.controls{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}
button:hover{background:#1e345a}button.primary{background:var(--accent);border-color:var(--accent);color:#1a1a1a;font-weight:600}
.controls label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
input[type=range]{accent-color:var(--accent)}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}
</style>
</head>
<body>
<header class="topbar"><a class="back" href="../index.html">← 返回数学目录</a><span class="title">函数的三要素与基本性质</span><span class="subtitle">单调性 · 奇偶性 · 周期性 · 对称性</span></header>
<div class="cards">
  <div class="card"><div class="num">1</div><h4>函数三要素</h4><div class="v">定义域 · 值域 · 对应法则<br>构成一个完整函数</div></div>
  <div class="card s2"><div class="num">2</div><h4>单调性</h4><div class="v">x₁&lt;x₂ ⇒ f(x₁)&lt;f(x₂)<br>增函数 / 减函数</div></div>
  <div class="card s3"><div class="num">3</div><h4>奇偶性</h4><div class="v">奇：f(-x)=-f(x) 关于原点<br>偶：f(-x)=f(x) 关于 y 轴</div></div>
  <div class="card s4"><div class="num">4</div><h4>周期性</h4><div class="v">f(x+T)=f(x)<br>最小正周期 T</div></div>
</div>
<main>
  <div class="stage"><canvas id="cv"></canvas></div>
  <aside class="panel"><h2><span class="badge" id="stepBadge">基础</span><span id="stepTitle">函数三要素</span></h2><p class="body" id="stepBody"></p><div class="points" id="stepPoints"></div></aside>
</main>
<div class="stepbar" id="stepbar"></div>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button><button id="resetBtn">↺ 重置</button>
  <button id="stepBackBtn">◀ 上一步</button><button id="stepFwdBtn">下一步 ▶</button>
  <label>速度 <input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <span id="status" class="status">点击播放或选择步骤</span>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(520,Math.min(1100,r.width-12));cv.height=Math.max(400,Math.min(600,r.height-12));}
window.addEventListener('resize',()=>{fit();draw();});fit();
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawText(t,x,y,c,fs,a,b){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=a||'center';ctx.textBaseline=b||'middle';ctx.fillText(t,x,y);}

const STEPS=[
  {tag:'基础',name:'函数三要素',body:'一个函数由<strong>三要素</strong>构成：<strong>定义域</strong>（自变量 x 的取值范围）、<strong>对应法则</strong>（x → y 的映射规则 f）、<strong>值域</strong>（因变量 y 的所有取值）。记作 <code>y = f(x), x ∈ A</code>。',points:{title:'三要素解读',items:['<strong>定义域 A</strong>：x 可取的所有值','<strong>对应法则 f</strong>：x 到 y 的映射规则','<strong>值域 C</strong>：{f(x) | x ∈ A} ⊆ B','<strong>核心</strong>：定义域 + 对应法则决定函数']}},
  {tag:'基础',name:'同一函数判定',body:'两个函数<strong>相同</strong>当且仅当<strong>定义域相同</strong>且<strong>对应法则完全相同</strong>。值域由前两者决定，无需单独比较。',points:{title:'判定步骤',items:['<strong>第 1 步</strong>：比较定义域是否相同','<strong>第 2 步</strong>：化简后比较对应法则','<strong>y=x+1 与 y=(x²-1)/(x-1)</strong>：不同（定义域不同）','<strong>y=x² 与 y=t²</strong>：同一函数（字母不同无影响）']}},
  {tag:'单调性',name:'单调性定义',body:'设函数 f 定义域为 D，区间 I ⊆ D：若对任意 <strong>x₁ &lt; x₂</strong> 都有 <strong>f(x₁) &lt; f(x₂)</strong>，则 f 在 I 上<strong>单调递增</strong>；若 <strong>f(x₁) &gt; f(x₂)</strong>，则<strong>单调递减</strong>。区间 I 称为<strong>单调区间</strong>。',points:{title:'单调性要点',items:['<strong>增函数</strong>：x 增大 → f(x) 增大（图象上升）','<strong>减函数</strong>：x 增大 → f(x) 减小（图象下降）','<strong>单调区间</strong>：必须分别写，不能并集','<strong>定义</strong>：依赖 x₁、x₂ 任意两点']}},
  {tag:'单调性',name:'单调性图像演示',body:'图上取两点 <strong>(x₁, f(x₁))</strong> 与 <strong>(x₂, f(x₂))</strong>。当 x₁ &lt; x₂ 时，比较两个函数值的高低即可判断单调性：右侧点更高 = 增函数；右侧点更低 = 减函数。',points:{title:'图象判读',items:['<strong>上升段</strong>：从左到右图象上扬','<strong>下降段</strong>：从左到右图象下沉','<strong>x₁&lt;x₂</strong>：横坐标比较','<strong>f(x₁) vs f(x₂)</strong>：纵坐标比较']}},
  {tag:'奇偶性',name:'奇函数',body:'若 <strong>f(-x) = -f(x)</strong> 对定义域内所有 x 成立，则 f 为<strong>奇函数</strong>。其图象<strong>关于原点 (0,0) 对称</strong>：将图象绕原点旋转 180° 后与自身重合。',points:{title:'奇函数特征',items:['<strong>定义</strong>：f(-x) = -f(x)','<strong>图象</strong>：关于原点中心对称','<strong>定义域</strong>：必须关于原点对称','<strong>典型</strong>：y=x, y=x³, y=sin x, y=1/x']}},
  {tag:'奇偶性',name:'偶函数',body:'若 <strong>f(-x) = f(x)</strong> 对定义域内所有 x 成立，则 f 为<strong>偶函数</strong>。其图象<strong>关于 y 轴对称</strong>：将图象沿 y 轴对折后两侧重合。',points:{title:'偶函数特征',items:['<strong>定义</strong>：f(-x) = f(x)','<strong>图象</strong>：关于 y 轴轴对称','<strong>定义域</strong>：必须关于原点对称','<strong>典型</strong>：y=x², y=|x|, y=cos x']}},
  {tag:'周期性',name:'周期性与最小正周期',body:'若存在非零常数 <strong>T</strong>，使得 <strong>f(x+T) = f(x)</strong> 对定义域内所有 x 成立，则 f 为<strong>周期函数</strong>，T 为<strong>周期</strong>。所有周期中最小的正数叫<strong>最小正周期</strong>。',points:{title:'周期性要点',items:['<strong>定义</strong>：f(x+T) = f(x)','<strong>周期 T</strong>：非零常数','<strong>最小正周期</strong>：最常用','<strong>典型</strong>：sin/cos 周期 2π，tan 周期 π']}},
  {tag:'对称性',name:'对称中心与对称轴',body:'若 <strong>f(2a-x) = f(x)</strong>，则图象关于直线 <strong>x=a</strong> 对称；若 <strong>f(2a-x) + f(x) = 2b</strong>，则图象关于点 <strong>(a,b)</strong> 对称。奇偶性是 a=0 的特例。',points:{title:'对称公式',items:['<strong>轴对称 x=a</strong>：f(2a-x)=f(x)','<strong>中心对称 (a,b)</strong>：f(2a-x)+f(x)=2b','<strong>奇函数</strong>：a=0,b=0 的中心对称','<strong>偶函数</strong>：a=0 的轴对称']}},
  {tag:'综合',name:'综合应用与判定流程',body:'判定函数性质时：<strong>定义域优先</strong>（奇偶性要求定义域关于原点对称）→ 化简表达式 → 代入 f(-x) 判奇偶 → 代入 f(x+T) 判周期 → 取点比较判单调。',points:{title:'解题流程',items:['<strong>第 1 步</strong>：求定义域','<strong>第 2 步</strong>：判奇偶性（f(-x)）','<strong>第 3 步</strong>：判周期性（f(x+T)）','<strong>第 4 步</strong>：判单调性（取 x₁、x₂）']}},
];

let stepIdx=0,playing=false,lastT=0,speed=1,stepTime=0,t=0;
const STEP_DURATION=3.4;

// ===== 坐标系工具 =====
function drawAxes(cx,cy,scale){
  ctx.strokeStyle='#3a4a6a';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(cx-260,cy);ctx.lineTo(cx+260,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-200);ctx.lineTo(cx,cy+200);ctx.stroke();
  ctx.fillStyle='#9ab0d0';
  drawText('x',cx+255,cy+15,'#9ab0d0',13);
  drawText('y',cx-15,cy-195,'#9ab0d0',13);
  drawText('O',cx-10,cy+12,'#9ab0d0',12);
  for(let i=-4;i<=4;i++){if(i===0)continue;ctx.strokeStyle='#243a5e';ctx.beginPath();ctx.moveTo(cx+i*scale,cy-3);ctx.lineTo(cx+i*scale,cy+3);ctx.stroke();}
}

// ===== 场景 1：函数三要素 =====
function drawThreeElementsScene(time){
  const W=cv.width,H=cv.height;
  drawText('函数三要素 · 定义域 / 对应法则 / 值域',W/2,30,'#fbbf24',16);
  const cx=W/2,cy=H/2+10;
  // 三个圆圈表示三要素
  const ax=cx-150,bx=cx,ccx=cx+150;
  const pulse=Math.sin(time*2)*0.1+1;
  // 定义域
  ctx.fillStyle='rgba(251,191,36,0.15)';ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(ax,cy,55*pulse,0,7);ctx.fill();ctx.stroke();
  drawText('定义域',ax,cy-10,'#fbbf24',14);
  drawText('A = {x}',ax,cy+12,'#fde68a',11);
  // 对应法则
  ctx.fillStyle='rgba(6,182,212,0.15)';ctx.strokeStyle='#06b6d4';
  ctx.beginPath();ctx.arc(bx,cy,55*pulse,0,7);ctx.fill();ctx.stroke();
  drawText('对应法则',bx,cy-10,'#06b6d4',14);
  drawText('f : x → y',bx,cy+12,'#67e8f9',11);
  // 值域
  ctx.fillStyle='rgba(52,211,153,0.15)';ctx.strokeStyle='#34d399';
  ctx.beginPath();ctx.arc(ccx,cy,55*pulse,0,7);ctx.fill();ctx.stroke();
  drawText('值域',ccx,cy-10,'#34d399',14);
  drawText('C = {y}',ccx,cy+12,'#86efac',11);
  // 箭头连接
  ctx.strokeStyle='#e8eef8';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(ax+55,cy);ctx.lineTo(bx-55,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(bx+55,cy);ctx.lineTo(ccx-55,cy);ctx.stroke();
  // 箭头头
  ctx.fillStyle='#e8eef8';
  ctx.beginPath();ctx.moveTo(bx-55,cy);ctx.lineTo(bx-62,cy-5);ctx.lineTo(bx-62,cy+5);ctx.fill();
  ctx.beginPath();ctx.moveTo(ccx-55,cy);ctx.lineTo(ccx-62,cy-5);ctx.lineTo(ccx-62,cy+5);ctx.fill();
  // 示例
  ctx.fillStyle='rgba(255,255,255,0.03)';ctx.strokeStyle='#a78bfa';ctx.lineWidth=1;
  roundRect(cx-180,cy+90,360,70,8);ctx.fill();ctx.stroke();
  drawText('例：f(x) = x² , x ∈ [-2, 2]',cx,cy+110,'#fff',13);
  drawText('定义域 [-2,2] · 对应法则 平方 · 值域 [0,4]',cx,cy+135,'#9ab0d0',11);
}

// ===== 场景 2：同一函数判定 =====
function drawSameFunctionScene(time){
  const W=cv.width,H=cv.height;
  drawText('同一函数判定 · 定义域 + 对应法则',W/2,30,'#fbbf24',16);
  const cy=H/2;
  // 左：y=x+1 (x∈R)  右：y=(x²-1)/(x-1) (x≠1)
  ctx.fillStyle='rgba(248,113,113,0.08)';ctx.strokeStyle='#f87171';ctx.lineWidth=1.5;
  roundRect(60,70,W/2-80,180,8);ctx.fill();ctx.stroke();
  drawText('f(x) = x + 1',60+W/4,100,'#fff',16);
  drawText('定义域：x ∈ R',60+W/4,130,'#9ab0d0',12);
  drawText('对应法则：x 加 1',60+W/4,155,'#9ab0d0',12);
  drawText('化简：x + 1',60+W/4,180,'#34d399',13);
  drawText('值域：R',60+W/4,215,'#9ab0d0',12);
  ctx.fillStyle='rgba(52,211,153,0.08)';ctx.strokeStyle='#34d399';
  roundRect(W/2+20,70,W/2-80,180,8);ctx.fill();ctx.stroke();
  drawText('g(x) = (x²-1)/(x-1)',W/2+W/4-20,100,'#fff',16);
  drawText('定义域：x ∈ R 且 x ≠ 1',W/2+W/4-20,130,'#f87171',12);
  drawText('对应法则：平方差化简',W/2+W/4-20,155,'#9ab0d0',12);
  drawText('化简：x + 1 (x≠1)',W/2+W/4-20,180,'#34d399',13);
  drawText('值域：R 且 y ≠ 2',W/2+W/4-20,215,'#f87171',12);
  // 结论
  const blink=Math.sin(time*3)>0;
  drawText(blink?'结论：定义域不同 → 不是同一函数':'结论：f(x)=x+1 与 g(x) 化简虽相同但定义域不同',W/2,cy+120,blink?'#f87171':'#fbbf24',14);
  drawText('判定口诀：先比定义域，再比对应法则',W/2,cy+150,'#34d399',13);
}

// ===== 场景 3：单调性定义 =====
function drawMonotonicDefScene(time){
  const W=cv.width,H=cv.height;
  drawText('单调性定义 · 增函数 vs 减函数',W/2,30,'#fbbf24',16);
  const cx=W/2,cy=H/2+20;
  drawAxes(cx,cy,30);
  // y = x （增函数）左半，y=-x （减函数）右半示意
  // 实际画 y=x² 部分增部分减更直观
  // 这里画分段：左侧减，右侧增
  ctx.strokeStyle='#06b6d4';ctx.lineWidth=3;ctx.shadowColor='#06b6d4';ctx.shadowBlur=8;
  ctx.beginPath();
  for(let x=-4;x<=4;x+=0.05){
    const y=x*x*0.5;
    const px=cx+x*30,py=cy-y*30;
    if(x===-4)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  }
  ctx.stroke();ctx.shadowBlur=0;
  drawText('f(x) = x²/2',cx+120,cy-130,'#06b6d4',13);
  // 标注区间
  drawText('减函数区间 (-∞, 0]',cx-130,cy+60,'#f87171',12);
  drawText('增函数区间 [0, +∞)',cx+130,cy-100,'#34d399',12);
  // 动态两点 x1<x2，比较 f(x1) f(x2)
  const swing=Math.sin(time)*2;
  const x1=-3+swing,x2=3+swing*0.3;
  if(x1<x2){
    const y1=x1*x1*0.5,y2=x2*x2*0.5;
    // x1 点
    ctx.fillStyle='#fbbf24';
    ctx.beginPath();ctx.arc(cx+x1*30,cy-y1*30,7,0,7);ctx.fill();
    drawText('(x₁, f(x₁))',cx+x1*30,cy-y1*30-18,'#fbbf24',11);
    // x2 点
    ctx.fillStyle='#34d399';
    ctx.beginPath();ctx.arc(cx+x2*30,cy-y2*30,7,0,7);ctx.fill();
    drawText('(x₂, f(x₂))',cx+x2*30,cy-y2*30-18,'#34d399',11);
    // 连线
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(cx+x1*30,cy-y1*30);ctx.lineTo(cx+x2*30,cy-y2*30);ctx.stroke();
    ctx.setLineDash([]);
  }
  drawText('取 x₁ < x₂，比较 f(x₁) 与 f(x₂)',W/2,H-45,'#9ab0d0',12);
}

// ===== 场景 4：单调性图像演示 =====
function drawMonotonicImageScene(time){
  const W=cv.width,H=cv.height;
  drawText('单调性图像 · 两点比较法',W/2,30,'#fbbf24',16);
  const cx=W/2,cy=H/2+20;
  drawAxes(cx,cy,30);
  // 画一个复杂函数 y = sin(x)+0.3x 的部分
  ctx.strokeStyle='#06b6d4';ctx.lineWidth=2.5;ctx.shadowColor='#06b6d4';ctx.shadowBlur=6;
  ctx.beginPath();
  for(let x=-4;x<=4;x+=0.05){
    const y=Math.sin(x*1.2)+0.4*x+1;
    const px=cx+x*30,py=cy-y*30;
    if(x===-4)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  }
  ctx.stroke();ctx.shadowBlur=0;
  // 动态高亮 x1 x2
  const x1=-2+Math.sin(time*0.7)*1.5;
  const x2=2+Math.sin(time*0.7+1)*1.5;
  const y1=Math.sin(x1*1.2)+0.4*x1+1;
  const y2=Math.sin(x2*1.2)+0.4*x2+1;
  // 高亮线
  ctx.strokeStyle='rgba(251,191,36,0.5)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(cx+x1*30,cy);ctx.lineTo(cx+x1*30,cy-y1*30);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-y1*30);ctx.lineTo(cx+x1*30,cy-y1*30);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+x2*30,cy);ctx.lineTo(cx+x2*30,cy-y2*30);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-y2*30);ctx.lineTo(cx+x2*30,cy-y2*30);ctx.stroke();
  ctx.setLineDash([]);
  // 两点
  ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(cx+x1*30,cy-y1*30,7,0,7);ctx.fill();
  ctx.fillStyle='#34d399';ctx.beginPath();ctx.arc(cx+x2*30,cy-y2*30,7,0,7);ctx.fill();
  drawText('x₁',cx+x1*30,cy+18,'#fbbf24',13);
  drawText('x₂',cx+x2*30,cy+18,'#34d399',13);
  drawText('f(x₁)',cx-30,cy-y1*30,'#fbbf24',11);
  drawText('f(x₂)',cx-30,cy-y2*30,'#34d399',11);
  // 比较
  const inc=x1<x2&&y1<y2;
  const dec=x1<x2&&y1>y2;
  let tag='比较中...';
  if(inc)tag='f(x₁) < f(x₂) → 单调递增';
  else if(dec)tag='f(x₁) > f(x₂) → 单调递减';
  drawText(tag,W/2,H-45,'#fde68a',13);
}

// ===== 场景 5：奇函数 =====
function drawOddFunctionScene(time){
  const W=cv.width,H=cv.height;
  drawText('奇函数 · 关于原点对称 · f(-x) = -f(x)',W/2,30,'#fbbf24',16);
  const cx=W/2,cy=H/2+20;
  drawAxes(cx,cy,30);
  // 画 y=x³/8
  ctx.strokeStyle='#06b6d4';ctx.lineWidth=3;ctx.shadowColor='#06b6d4';ctx.shadowBlur=8;
  ctx.beginPath();
  for(let x=-4;x<=4;x+=0.05){
    const y=x*x*x/40;
    const px=cx+x*30,py=cy-y*30;
    if(x===-4)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  }
  ctx.stroke();ctx.shadowBlur=0;
  drawText('f(x) = x³',cx+120,cy-130,'#06b6d4',13);
  // 对称动画：一个点 (x, f(x)) 旋转 180° 到 (-x, -f(x))
  const x=2+Math.sin(time)*0.5;
  const y=x*x*x/40;
  const px=cx+x*30,py=cy-y*30;
  const mx=cx-x*30,my=cy+y*30;
  // 旋转轨迹（半圆）
  ctx.strokeStyle='rgba(251,191,36,0.3)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();
  for(let a=0;a<=Math.PI;a+=0.05){
    const ang=a;
    const rx=(px-cx)*Math.cos(ang)-(py-cy)*Math.sin(ang)+cx;
    const ry=(px-cx)*Math.sin(ang)+(py-cy)*Math.cos(ang)+cy;
    if(a===0)ctx.moveTo(rx,ry);else ctx.lineTo(rx,ry);
  }
  ctx.stroke();ctx.setLineDash([]);
  // 两点
  ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(px,py,8,0,7);ctx.fill();
  drawText('(x, f(x))',px,py-18,'#fbbf24',11);
  ctx.fillStyle='#f87171';ctx.beginPath();ctx.arc(mx,my,8,0,7);ctx.fill();
  drawText('(-x, -f(x))',mx,my+18,'#f87171',11);
  // 旋转中的点
  const ang=time*1.5%Math.PI;
  const rpx=(px-cx)*Math.cos(ang)-(py-cy)*Math.sin(ang)+cx;
  const rpy=(px-cx)*Math.sin(ang)+(py-cy)*Math.cos(ang)+cy;
  ctx.fillStyle='#34d399';ctx.beginPath();ctx.arc(rpx,rpy,6,0,7);ctx.fill();
  // 公式
  drawText('f(-x) = (-x)³ = -x³ = -f(x) ✓',W/2,H-45,'#34d399',13);
  drawText('图象关于原点 (0,0) 中心对称',W/2,H-25,'#9ab0d0',12);
}

// ===== 场景 6：偶函数 =====
function drawEvenFunctionScene(time){
  const W=cv.width,H=cv.height;
  drawText('偶函数 · 关于 y 轴对称 · f(-x) = f(x)',W/2,30,'#fbbf24',16);
  const cx=W/2,cy=H/2+20;
  drawAxes(cx,cy,30);
  // 画 y=x²/4
  ctx.strokeStyle='#a78bfa';ctx.lineWidth=3;ctx.shadowColor='#a78bfa';ctx.shadowBlur=8;
  ctx.beginPath();
  for(let x=-4;x<=4;x+=0.05){
    const y=x*x/4;
    const px=cx+x*30,py=cy-y*30;
    if(x===-4)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  }
  ctx.stroke();ctx.shadowBlur=0;
  drawText('f(x) = x²',cx+120,cy-130,'#a78bfa',13);
  // y 轴对称动画
  const x=2.5+Math.sin(time)*0.5;
  const y=x*x/4;
  const px=cx+x*30,py=cy-y*30;
  const mx=cx-x*30,my=cy-y*30;
  // 对折线
  ctx.strokeStyle='rgba(251,191,36,0.5)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(cx,cy-200);ctx.lineTo(cx,cy+200);ctx.stroke();
  ctx.setLineDash([]);
  // 连接两点的水平线
  ctx.strokeStyle='rgba(251,191,36,0.3)';ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(mx,my);ctx.stroke();ctx.setLineDash([]);
  // 两点
  ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(px,py,8,0,7);ctx.fill();
  drawText('(x, f(x))',px,py-18,'#fbbf24',11);
  ctx.fillStyle='#34d399';ctx.beginPath();ctx.arc(mx,my,8,0,7);ctx.fill();
  drawText('(-x, f(x))',mx,my-18,'#34d399',11);
  // 对折动画点
  const fold=(Math.sin(time*1.5)+1)/2;
  const fx=px+(mx-px)*fold;
  ctx.fillStyle='#f87171';ctx.beginPath();ctx.arc(fx,py,6,0,7);ctx.fill();
  // 公式
  drawText('f(-x) = (-x)² = x² = f(x) ✓',W/2,H-45,'#34d399',13);
  drawText('图象关于 y 轴轴对称',W/2,H-25,'#9ab0d0',12);
}

// ===== 场景 7：周期性 =====
function drawPeriodScene(time){
  const W=cv.width,H=cv.height;
  drawText('周期性 · f(x+T) = f(x) · 平移 T 重合',W/2,30,'#fbbf24',16);
  const cx=W/2,cy=H/2+30;
  drawAxes(cx,cy,30);
  // 画 y = sin(x)
  ctx.strokeStyle='#3a4a6a';ctx.lineWidth=1;
  // 周期 T = 2π ≈ 6.28，缩放后用 scale=30
  ctx.strokeStyle='#06b6d4';ctx.lineWidth=2.5;ctx.shadowColor='#06b6d4';ctx.shadowBlur=6;
  ctx.beginPath();
  for(let x=-4;x<=4;x+=0.03){
    const y=Math.sin(x)*2;
    const px=cx+x*30,py=cy-y*30;
    if(x===-4)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  }
  ctx.stroke();ctx.shadowBlur=0;
  drawText('f(x) = sin x',cx+130,cy-100,'#06b6d9',13);
  // 周期 T 标记
  const Tx=2*Math.PI*30/1; // 视觉上的 2π 太宽，用近似
  // 用 T=4 单位（视觉周期）
  const Tvis=2*Math.PI;
  const x0=-1+Math.sin(time)*1.5;
  const y0=Math.sin(x0)*2;
  const x1=x0+Tvis;
  const y1=Math.sin(x1)*2;
  // 两点高亮
  ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(cx+x0*30,cy-y0*30,7,0,7);ctx.fill();
  drawText('(x, f(x))',cx+x0*30,cy-y0*30-18,'#fbbf24',11);
  ctx.fillStyle='#34d399';ctx.beginPath();ctx.arc(cx+x1*30,cy-y1*30,7,0,7);ctx.fill();
  drawText('(x+T, f(x))',cx+x1*30,cy-y1*30-18,'#34d399',11);
  // T 箭头
  ctx.strokeStyle='#f87171';ctx.lineWidth=2;
  const ay=cy+60;
  ctx.beginPath();ctx.moveTo(cx+x0*30,ay);ctx.lineTo(cx+x1*30,ay);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+x1*30,ay);ctx.lineTo(cx+x1*30-8,ay-5);ctx.lineTo(cx+x1*30-8,ay+5);ctx.fill();
  drawText('T = 2π',cx+(x0+x1)*15,ay+15,'#f87171',13);
  // 平移动画：把右段曲线平移过来
  const shift=time%Tvis;
  ctx.strokeStyle='rgba(248,113,113,0.5)';ctx.lineWidth=2;
  ctx.beginPath();
  for(let x=-4;x<=4;x+=0.03){
    const y=Math.sin(x-shift)*2;
    const px=cx+x*30,py=cy-y*30;
    if(x===-4)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  }
  ctx.stroke();
  drawText('f(-x) = f(x+T) ：平移一个周期 T 后图象重合',W/2,H-45,'#34d399',12);
  drawText('sin/cos 最小正周期 = 2π，tan 最小正周期 = π',W/2,H-25,'#9ab0d0',11);
}

// ===== 场景 8：对称性 =====
function drawSymmetryScene(time){
  const W=cv.width,H=cv.height;
  drawText('对称性 · 关于 x=a / 关于点 (a,b)',W/2,30,'#fbbf24',16);
  const cx=W/2,cy=H/2+20;
  drawAxes(cx,cy,30);
  // 关于 x=1 对称的抛物线 y=(x-1)²-2
  const a=1;
  ctx.strokeStyle='#a78bfa';ctx.lineWidth=1;ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.moveTo(cx+a*30,cy-200);ctx.lineTo(cx+a*30,cy+200);ctx.stroke();ctx.setLineDash([]);
  drawText('x = a = 1',cx+a*30+10,cy-180,'#a78bfa',12);
  ctx.strokeStyle='#06b6d4';ctx.lineWidth=3;ctx.shadowColor='#06b6d4';ctx.shadowBlur=6;
  ctx.beginPath();
  for(let x=-3;x<=5;x+=0.05){
    const y=(x-a)*(x-a)-2;
    const px=cx+x*30,py=cy-y*30;
    if(x===-3)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  }
  ctx.stroke();ctx.shadowBlur=0;
  drawText('f(x)=(x-1)²-2',cx-150,cy-130,'#06b6d4',13);
  // 对称点
  const x=2.5+Math.sin(time)*0.5;
  const y=(x-a)*(x-a)-2;
  const sx=2*a-x;
  const sy=y;
  ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(cx+x*30,cy-y*30,7,0,7);ctx.fill();
  drawText('(x, f(x))',cx+x*30,cy-y*30-15,'#fbbf24',11);
  ctx.fillStyle='#34d399';ctx.beginPath();ctx.arc(cx+sx*30,cy-sy*30,7,0,7);ctx.fill();
  drawText('(2a-x, f(x))',cx+sx*30,cy-sy*30-15,'#34d399',11);
  // 公式
  drawText('轴对称：f(2a - x) = f(x)（关于 x=a）',W/2,H-55,'#34d399',13);
  drawText('中心对称：f(2a - x) + f(x) = 2b（关于 (a,b)）',W/2,H-30,'#9ab0d0',12);
}

// ===== 场景 9：综合 =====
function drawSummaryScene(){
  const W=cv.width,H=cv.height;
  drawText('函数性质 · 核心总结',W/2,40,'#fbbf24',18);
  const items=[
    {t:'函数三要素',d:'定义域 + 对应法则 + 值域',c:'#fbbf24'},
    {t:'单调性',d:'x₁<x₂ ⇒ f(x₁)<f(x₂) 增',c:'#06b6d4'},
    {t:'奇函数',d:'f(-x)=-f(x) 关于原点',c:'#a78bfa'},
    {t:'偶函数',d:'f(-x)=f(x) 关于 y 轴',c:'#34d399'},
    {t:'周期性',d:'f(x+T)=f(x) 最小正周期',c:'#f87171'},
    {t:'对称性',d:'f(2a-x)=f(x) 关于 x=a',c:'#fb923c'},
  ];
  items.forEach((m,i)=>{
    const col=i%3,row=Math.floor(i/3);
    const x=80+col*(W-160)/3;
    const y=100+row*180;
    ctx.fillStyle=m.c+'22';ctx.strokeStyle=m.c;ctx.lineWidth=2;
    roundRect(x+10,y,(W-160)/3-20,140,10);ctx.fill();ctx.stroke();
    drawText(m.t,x+(W-160)/6,y+50,m.c,15);
    drawText(m.d,x+(W-160)/6,y+90,'#fff',12);
  });
}

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  if(stepIdx===0)drawThreeElementsScene(t);
  else if(stepIdx===1)drawSameFunctionScene(t);
  else if(stepIdx===2)drawMonotonicDefScene(t);
  else if(stepIdx===3)drawMonotonicImageScene(t);
  else if(stepIdx===4)drawOddFunctionScene(t);
  else if(stepIdx===5)drawEvenFunctionScene(t);
  else if(stepIdx===6)drawPeriodScene(t);
  else if(stepIdx===7)drawSymmetryScene(t);
  else if(stepIdx===8)drawSummaryScene();
}

function syncStep(){
  const s=STEPS[stepIdx];
  document.getElementById('stepBadge').textContent=s.tag;
  document.getElementById('stepTitle').textContent=s.name;
  document.getElementById('stepBody').innerHTML=s.body;
  document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?.title||'')+'</h4><ul>'+((s.points?.items||[]).map(x=>'<li>'+x+'</li>').join(''))+'</ul>';
  document.querySelectorAll('.step').forEach((el,i)=>el.classList.toggle('active',i===stepIdx));
  statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;
  stepTime=0;
}

function update(dt){
  t+=dt*speed;
  if(!playing)return;
  stepTime+=dt*speed;
  if(stepTime>=STEP_DURATION){
    if(stepIdx<STEPS.length-1){stepIdx++;syncStep();}
    else{playing=false;playBtn.textContent='▶ 播放';statusEl.textContent='动画完成';}
  }
}

function loop(ts){
  if(!lastT)lastT=ts;
  const dt=(ts-lastT)/1000;lastT=ts;
  update(dt);draw();
  requestAnimationFrame(loop);
}

const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn');
const speedEl=document.getElementById('speed');
playBtn.onclick=()=>{playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';};
resetBtn.onclick=()=>{stepIdx=0;playing=false;syncStep();draw();playBtn.textContent='▶ 播放';};
stepFwdBtn.onclick=()=>{if(stepIdx<STEPS.length-1){stepIdx++;syncStep();draw();}};
stepBackBtn.onclick=()=>{if(stepIdx>0){stepIdx--;syncStep();draw();}};
speedEl.oninput=()=>{speed=parseFloat(speedEl.value);};

function buildStepbar(){
  const bar=document.getElementById('stepbar');
  bar.innerHTML='';
  STEPS.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='step'+(i===stepIdx?' active':'');
    el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>10?s.name.slice(0,9)+'…':s.name)+'</div>';
    el.onclick=()=>{stepIdx=i;syncStep();draw();};
    bar.appendChild(el);
  });
}

buildStepbar();syncStep();requestAnimationFrame(loop);
</script>
</body>
