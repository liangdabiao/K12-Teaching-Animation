<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>基本不等式 · √ab≤(a+b)/2 · 均值不等式</title>
<style>
:root{--bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;--accent:#fbbf24;--accent2:#06b6d4;--line:#243a5e;--good:#34d399;--warn:#fbbf24;--bad:#f87171;}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
.back{color:var(--accent2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap;background:rgba(6,182,212,.06)}
.back:hover{background:rgba(6,182,212,.14)}
.title{font-size:15px;font-weight:600}.subtitle{font-size:12px;color:var(--muted)}
.cards{display:flex;gap:10px;padding:10px 16px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(251,191,36,.06),transparent)}
.card{flex:1;min-width:160px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.card.s2::before{background:var(--accent2)}.card.s3::before{background:var(--good)}.card.s4::before{background:var(--bad)}
.card h4{margin:0 0 4px;font-size:13px}.card .v{font-size:11px;color:var(--muted);line-height:1.5}
.card .num{position:absolute;right:8px;top:6px;font-size:24px;font-weight:700;color:rgba(255,255,255,.07)}
main{flex:1;display:flex;min-height:0}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}
.panel{width:340px;flex:none;padding:14px;overflow:auto;border-left:1px solid var(--line);background:var(--panel);font-size:13px;line-height:1.7}
.panel h2{font-size:14px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--accent);color:#1a1a1a;font-size:11px;font-weight:600}
.body{color:var(--muted);margin:0 0 10px}.body strong{color:var(--ink)}
.body code{background:rgba(251,191,36,.2);color:#fde68a;padding:1px 5px;border-radius:4px;font-family:Consolas,Monaco,monospace;font-size:12px}
.points{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin-top:8px;border-left:3px solid var(--accent2)}
.points h4{margin:0 0 6px;font-size:13px}.points ul{margin:0;padding-left:18px;color:var(--muted)}
.points li{margin-bottom:3px}.points li strong{color:var(--accent)}
.stepbar{display:flex;gap:6px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);overflow-x:auto}
.step{flex:1;min-width:100px;padding:8px 10px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}
.step:hover{background:#1e345a;border-color:var(--accent2)}
.step.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1a1a;font-weight:600;border-color:transparent}
.controls{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}
button:hover{background:#1e345a}button.primary{background:var(--accent);border-color:var(--accent);color:#1a1a1a;font-weight:600}
.controls label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
input[type=range]{accent-color:var(--accent)}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}
</style>
</head>
<body>
<header class="topbar"><a class="back" href="../index.html">← 返回数学目录</a><span class="title">基本不等式</span><span class="subtitle">√(ab) ≤ (a+b)/2 · 均值不等式 · 几何意义 · 应用</span></header>
<div class="cards">
  <div class="card"><div class="num">1</div><h4>基本不等式</h4><div class="v">√(ab) ≤ (a+b)/2<br>a,b&gt;0，等号 a=b</div></div>
  <div class="card s2"><div class="num">2</div><h4>三种平均</h4><div class="v">调和 ≤ 几何 ≤ 算术 ≤ 平方<br>H ≤ G ≤ A ≤ Q</div></div>
  <div class="card s3"><div class="num">3</div><h4>几何意义</h4><div class="v">半弦长 ≤ 半径<br>CD=√(AC·BC) ≤ AB/2</div></div>
  <div class="card s4"><div class="num">4</div><h4>应用三要点</h4><div class="v">一正、二定、三相等<br>积定和最小，和定积最大</div></div>
</div>
<main>
  <div class="stage"><canvas id="cv"></canvas></div>
  <aside class="panel"><h2><span class="badge" id="stepBadge">基础</span><span id="stepTitle">基本不等式</span></h2><p class="body" id="stepBody"></p><div class="points" id="stepPoints"></div></aside>
</main>
<div class="stepbar" id="stepbar"></div>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button><button id="resetBtn">↺ 重置</button>
  <button id="stepBackBtn">◀ 上一步</button><button id="stepFwdBtn">下一步 ▶</button>
  <label>速度 <input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <span id="status" class="status">点击播放或选择步骤</span>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(520,Math.min(1100,r.width-12));cv.height=Math.max(400,Math.min(600,r.height-12));}
window.addEventListener('resize',()=>{fit();draw();});fit();
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawText(t,x,y,c,fs,a,b){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=a||'center';ctx.textBaseline=b||'middle';ctx.fillText(t,x,y);}

const STEPS=[
  {tag:'基础',name:'重要不等式',body:'<strong>重要不等式</strong>：对任意实数 a、b ∈ R，有 <code>a² + b² ≥ 2ab</code>，等号当且仅当 <strong>a = b</strong> 时成立。它由 <code>(a−b)² ≥ 0</code> 直接展开得到。',points:{title:'核心要点',items:['<strong>来源</strong>：(a−b)² ≥ 0 展开即得','<strong>等号条件</strong>：a = b','<strong>适用范围</strong>：a、b 为任意实数','<strong>是基本不等式的基础</strong>']}},
  {tag:'推导',name:'基本不等式推导',body:'当 <strong>a, b &gt; 0</strong> 时，在重要不等式中用 √a、√b 替换 a、b，得 <code>(√a−√b)² ≥ 0</code>，即 <strong>a + b ≥ 2√(ab)</strong>，亦即 <code>√(ab) ≤ (a+b)/2</code>。等号当 a=b 时成立。',points:{title:'推导链',items:['<strong>起点</strong>：(√a − √b)² ≥ 0','<strong>展开</strong>：a + b − 2√(ab) ≥ 0','<strong>变形</strong>：a + b ≥ 2√(ab)','<strong>结论</strong>：√(ab) ≤ (a+b)/2']}},
  {tag:'平均',name:'三种平均关系',body:'正数 a、b 的四种平均：调和 <code>H=2ab/(a+b)</code>、几何 <code>G=√(ab)</code>、算术 <code>A=(a+b)/2</code>、平方 <code>Q=√((a²+b²)/2)</code>。它们满足 <strong>H ≤ G ≤ A ≤ Q</strong>，等号当 a=b 时同时取到。',points:{title:'平均链 H≤G≤A≤Q',items:['<strong>调和 H</strong> = 2ab/(a+b)','<strong>几何 G</strong> = √(ab)','<strong>算术 A</strong> = (a+b)/2','<strong>平方 Q</strong> = √((a²+b²)/2)']}},
  {tag:'几何',name:'几何意义（半弦≤半径）',body:'直径为 AB 的圆，C 在 AB 上，CD⊥AB 交圆于 D。设 AC=a, BC=b，则半弦 <code>CD=√(ab) ≤ AB/2=(a+b)/2</code>，<strong>半径 = 算术平均</strong>，<strong>半弦 = 几何平均</strong>。当 C 为中点时取等。',points:{title:'圆中模型',items:['<strong>半径 r</strong> = (a+b)/2 = AB/2','<strong>半弦 h</strong> = √(ab)','<strong>结论</strong>：√(ab) ≤ (a+b)/2','<strong>等号</strong>：C 在圆心，a=b']}},
  {tag:'应用一',name:'和的最小值（积定）',body:'<strong>应用一</strong>：若正数 x、y 满足 <strong>xy = 定值 P</strong>，则 <code>x+y ≥ 2√(xy) = 2√P</code>，当 x=y=√P 时 <strong>x+y 取最小值 2√P</strong>。口诀：<strong>"积定和最小"</strong>。',points:{title:'积定和最小',items:['<strong>条件</strong>：xy = P（定值）','<strong>结论</strong>：x+y ≥ 2√P','<strong>取等</strong>：x = y = √P','<strong>例</strong>：xy=4，则 x+y ≥ 4']}},
  {tag:'应用二',name:'积的最大值（和定）',body:'<strong>应用二</strong>：若正数 x、y 满足 <strong>x+y = 定值 S</strong>，则 <code>xy ≤ ((x+y)/2)² = S²/4</code>，当 x=y=S/2 时 <strong>xy 取最大值 S²/4</strong>。口诀：<strong>"和定积最大"</strong>。',points:{title:'和定积最大',items:['<strong>条件</strong>：x+y = S（定值）','<strong>结论</strong>：xy ≤ S²/4','<strong>取等</strong>：x = y = S/2','<strong>例</strong>：x+y=6，则 xy ≤ 9']}},
  {tag:'应用三',name:'实际优化（最省最积）',body:'<strong>实际应用</strong>：建花园围栏（定周长求最大面积）、做容器（定材料求最大容积）、最省材料（定面积求最小周长）。先把目标函数配凑成能用均值不等式的形式。',points:{title:'解题流程',items:['<strong>设变量</strong>：合理设未知数','<strong>列函数</strong>：写出目标表达式','<strong>凑定值</strong>：变形为积定或和定','<strong>用不等式</strong>：求最值并验证取等']}},
  {tag:'要点',name:'使用三要点',body:'使用均值不等式求最值，必须同时满足<strong>"一正、二定、三相等"</strong>三个条件。任一不满足都不能直接用均值不等式取最值（需用单调性或其他方法）。',points:{title:'三要诀',items:['<strong>一正</strong>：各项必须同为正数','<strong>二定</strong>：求积最大需和定，求和最小需积定','<strong>三相等</strong>：等号要能取到','<strong>不满足</strong>：改用函数单调性分析']}},
  {tag:'综合',name:'综合对比验证',body:'左滑块调节 a、b，实时验证 √(ab)、(a+b)/2、√((a²+b²)/2)、2ab/(a+b) 的大小关系。当 a=b 时四者相等；偏离越大，差距越大。',points:{title:'实时演示',items:['<strong>四平均</strong>：H, G, A, Q','<strong>恒有</strong>：H ≤ G ≤ A ≤ Q','<strong>取等</strong>：仅当 a = b','<strong>差距</strong>：随 |a−b| 增大而增大']}},
];

let stepIdx=0,playing=false,lastT=0,speed=1,stepTime=0,t=0;
const STEP_DURATION=3.2;

// ===== 场景：重要不等式 (a-b)²≥0 =====
function drawImportantScene(time){
  const W=cv.width,H=cv.height;
  drawText('重要不等式 · (a−b)² ≥ 0',W/2,30,'#fbbf24',16);
  const a=2+1.5*Math.sin(time*0.6);
  const b=2+1.5*Math.cos(time*0.6);
  const cx=W/2,cy=H/2+20;
  // 三块面积
  const S1=a*a,S2=b*b,S3=2*a*b;
  const tot=S1+S2;
  const diff=(a-b)*(a-b);
  const max=Math.max(S1,S2,S3);
  // 左：a² 正方形
  ctx.fillStyle='rgba(251,191,36,0.35)';ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;
  const u=120/Math.sqrt(max);
  ctx.fillRect(cx-200,cy-60,u*Math.sqrt(S1),u*Math.sqrt(S1));
  ctx.strokeRect(cx-200,cy-60,u*Math.sqrt(S1),u*Math.sqrt(S1));
  drawText('a²',cx-200+u*Math.sqrt(S1)/2,cy-60+u*Math.sqrt(S1)/2,'#fbbf24',14);
  // 右：b² 正方形
  ctx.fillStyle='rgba(6,182,212,0.35)';ctx.strokeStyle='#06b6d4';
  ctx.fillRect(cx+20,cy-60,u*Math.sqrt(S2),u*Math.sqrt(S2));
  ctx.strokeRect(cx+20,cy-60,u*Math.sqrt(S2),u*Math.sqrt(S2));
  drawText('b²',cx+20+u*Math.sqrt(S2)/2,cy-60+u*Math.sqrt(S2)/2,'#06b6d4',14);
  // 中间：2ab 矩形
  ctx.fillStyle='rgba(52,211,153,0.3)';ctx.strokeStyle='#34d399';
  ctx.fillRect(cx-200,cy+90,u*Math.sqrt(S3)*0.6,40);
  ctx.strokeRect(cx-200,cy+90,u*Math.sqrt(S3)*0.6,40);
  drawText('2ab',cx-200+u*Math.sqrt(S3)*0.3,cy+110,'#34d399',13);
  // 公式与结论
  ctx.font='bold 18px serif';ctx.fillStyle='#fff';ctx.textAlign='center';
  ctx.fillText('a² + b² ≥ 2ab',W/2,H-85);
  drawText('a='+a.toFixed(2)+', b='+b.toFixed(2)+': '+(S1+S2).toFixed(2)+' ≥ '+S3.toFixed(2),W/2,H-55,'#34d399',13);
  drawText('差值 (a−b)² = '+(S1+S2-S3).toFixed(2)+' ≥ 0',W/2,H-30,'#9ab0d0',12);
}

// ===== 场景：基本不等式推导 =====
function drawDeriveScene(time){
  const W=cv.width,H=cv.height;
  drawText('基本不等式 · √(ab) ≤ (a+b)/2',W/2,30,'#fbbf24',16);
  const cx=W/2;
  // 推导步骤
  const lines=[
    {t:'起点',d:'(√a − √b)² ≥ 0',c:'#fbbf24'},
    {t:'展开',d:'a − 2√(ab) + b ≥ 0',c:'#a78bfa'},
    {t:'移项',d:'a + b ≥ 2√(ab)',c:'#06b6d4'},
    {t:'结论',d:'√(ab) ≤ (a+b)/2',c:'#34d399'},
  ];
  lines.forEach((s,i)=>{
    const y=90+i*70;
    ctx.fillStyle=s.c+'22';ctx.strokeStyle=s.c;ctx.lineWidth=2;
    roundRect(cx-220,y,440,50,8);ctx.fill();ctx.stroke();
    drawText(s.t,cx-180,y+25,s.c,14,'left');
    ctx.font='bold 16px serif';ctx.fillStyle='#fff';ctx.textAlign='left';
    ctx.fillText(s.d,cx-110,y+25);
    // 步骤编号
    ctx.fillStyle=s.c;ctx.font='bold 13px sans-serif';ctx.textAlign='center';
    ctx.fillText('步骤 '+(i+1),cx-180,y+8);
  });
  // 条件标注
  drawText('条件：a, b > 0   等号：a = b',W/2,H-60,'#fbbf24',13);
  // a=b 验证动画
  const a=2,b=2+Math.sin(time)*0.8;
  const ab=Math.sqrt(a*b),avg=(a+b)/2;
  drawText('a='+a.toFixed(1)+', b='+b.toFixed(1)+' → √(ab)='+ab.toFixed(2)+' ≤ '+avg.toFixed(2),W/2,H-30,'#9ab0d0',12);
}

// ===== 场景：三种平均 H≤G≤A≤Q =====
function drawMeansScene(time){
  const W=cv.width,H=cv.height;
  drawText('三种平均 · H ≤ G ≤ A ≤ Q',W/2,30,'#fbbf24',16);
  const a=2+1.5*Math.abs(Math.sin(time*0.4));
  const b=2+1.5*Math.abs(Math.cos(time*0.4));
  const Harm=2*a*b/(a+b),G=Math.sqrt(a*b),A=(a+b)/2,Q=Math.sqrt((a*a+b*b)/2);
  const arr=[{k:'H 调和',v:Harm,c:'#f87171'},{k:'G 几何',v:G,c:'#fbbf24'},{k:'A 算术',v:A,c:'#34d399'},{k:'Q 平方',v:Q,c:'#06b6d4'}];
  const maxV=Q;
  const barW=W-200,baseY=H-90,topY=110;
  const maxH=baseY-topY;
  // 网格线
  ctx.strokeStyle='#243a5e';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=topY+i*maxH/4;
    ctx.beginPath();ctx.moveTo(100,y);ctx.lineTo(W-100,y);ctx.stroke();
  }
  arr.forEach((m,i)=>{
    const x=130+i*(barW/4);
    const h=(m.v/maxV)*maxH;
    ctx.fillStyle=m.c+'88';ctx.strokeStyle=m.c;ctx.lineWidth=2;
    ctx.fillRect(x-30,baseY-h,60,h);ctx.strokeRect(x-30,baseY-h,60,h);
    drawText(m.k,x,baseY+18,m.c,12);
    drawText(m.v.toFixed(2),x,baseY-h-12,'#fff',12);
  });
  drawText('a='+a.toFixed(2)+', b='+b.toFixed(2)+'    等号仅当 a=b 时全部相等',W/2,H-50,'#9ab0d0',12);
  drawText('2ab/(a+b) ≤ √(ab) ≤ (a+b)/2 ≤ √((a²+b²)/2)',W/2,H-25,'#34d399',13);
  // 图示：四平均随 a/b 比值的差距
  ctx.strokeStyle='#3a4a6a';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(100,topY-20);ctx.lineTo(W-100,topY-20);ctx.stroke();
  drawText('四种平均：随 |a−b| 增大，差距越明显',W/2,topY-32,'#a78bfa',11);
  // 计算并标注 G/A 比值（重要指标）
  const ratio=(G/A*100).toFixed(1);
  drawText('G/A = '+ratio+'% （越接近100%，a、b 越接近）',W/2,topY-50,'#34d399',11);
  // 等号状态
  if(Math.abs(a-b)<0.08){
    drawText('★ a ≈ b，四平均相等（链中等号全部成立）',W/2,H-8,'#fbbf24',11);
  }
}

// ===== 场景：几何意义（圆中半弦≤半径）=====
function drawGeoScene(time){
  const W=cv.width,H=cv.height;
  drawText('几何意义 · 半弦 ≤ 半径',W/2,30,'#fbbf24',16);
  const cx=W/2,cy=H/2+30;
  const R=130;
  // 圆
  ctx.strokeStyle='#06b6d4';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(cx,cy,R,0,7);ctx.stroke();
  // 直径 AB
  ctx.strokeStyle='#a78bfa';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(cx-R,cy);ctx.lineTo(cx+R,cy);ctx.stroke();
  drawText('A',cx-R-15,cy,'#a78bfa',14);
  drawText('B',cx+R+15,cy,'#a78bfa',14);
  drawText('O',cx,cy+18,'#9ab0d0',12);
  // 圆心标记
  ctx.fillStyle='#9ab0d0';ctx.beginPath();ctx.arc(cx,cy,3,0,7);ctx.fill();
  // C 点（在 AB 上移动）
  const pos=0.3+0.4*(0.5+0.5*Math.sin(time*0.5));
  const Cx=cx-R+pos*2*R;
  const a=Cx-(cx-R),b=(cx+R)-Cx;
  // 半弦 CD = √(a·b)
  const half=Math.sqrt(a*b);
  const Dy=cy-half;
  // CD 弦
  ctx.strokeStyle='#fbbf24';ctx.lineWidth=3;
  ctx.shadowColor='#fbbf24';ctx.shadowBlur=10;
  ctx.beginPath();ctx.moveTo(Cx,cy);ctx.lineTo(Cx,Dy);ctx.stroke();
  ctx.shadowBlur=0;
  // D 点
  ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(Cx,Dy,6,0,7);ctx.fill();
  // C 点
  ctx.fillStyle='#34d399';ctx.beginPath();ctx.arc(Cx,cy,5,0,7).fill();ctx.fill();
  drawText('C',Cx,cy+18,'#34d399',13);
  drawText('D',Cx,Dy-12,'#fbbf24',13);
  // 标注 a, b
  drawText('a='+a.toFixed(0),cx-R+a/2,cy+35,'#67e8f9',11);
  drawText('b='+b.toFixed(0),Cx+b/2,cy+35,'#67e8f9',11);
  // 半径标注
  ctx.strokeStyle='#a78bfa';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx,cy-R);ctx.stroke();ctx.setLineDash([]);
  drawText('半径 r='+(R).toFixed(0)+' = (a+b)/2',cx+90,cy-R+10,'#a78bfa',11);
  // 结论
  drawText('CD = √(ab) = '+half.toFixed(1)+' ≤ 半径 r = '+R,W/2,H-60,'#34d399',13);
  drawText('等号：C 在圆心 (a=b='+R+')，此时 CD=R',W/2,H-35,'#9ab0d0',12);
  // 直角标记 CD⊥AB
  ctx.strokeStyle='#34d399';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(Cx-8,cy);ctx.lineTo(Cx-8,cy-8);ctx.lineTo(Cx,cy-8);ctx.stroke();
  drawText('直角',Cx-20,cy-18,'#34d399',9);
  // 连接 OD 形成等腰三角形（半径相等，视觉化）
  ctx.strokeStyle='#3a4a6a';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(Cx,Dy);ctx.stroke();ctx.setLineDash([]);
  drawText('弦 = 半径时取等',cx,cy-R-25,'#a78bfa',11);
  // 数学注释
  drawText('由相交弦定理 / 直角三角形相似：AC·BC = CD²',W/2,cy+R+40,'#67e8f9',11);
}

// ===== 场景：和的最小值（积定）=====

function drawSumMinScene(time){
  const W=cv.width,H=cv.height;
  drawText('应用一 · 积定和最小 (xy=P 定值)',W/2,30,'#fbbf24',16);
  const P=9;
  const x=1.5+2.5*(0.5+0.5*Math.sin(time*0.6));
  const y=P/x;
  const s=x+y;
  const minS=2*Math.sqrt(P);
  const cx=W/2,cy=H/2+20;
  // 矩形面积演示
  ctx.fillStyle='rgba(251,191,36,0.25)';ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;
  const sc=70/Math.max(x,y);
  ctx.fillRect(cx-x*sc,cy-y*sc,x*sc,y*sc);
  ctx.strokeRect(cx-x*sc,cy-y*sc,x*sc,y*sc);
  drawText('面积 xy = '+P+' (定值)',cx,cy+20,'#fbbf24',13);
  drawText('x',cx-x*sc/2,cy-y*sc-12,'#06b6d4',13);
  drawText('y',cx-x*sc-15,cy-y*sc/2,'#06b6d4',13);
  // 周长（和）
  ctx.fillStyle='#34d399';ctx.font='bold 18px sans-serif';ctx.textAlign='center';
  ctx.fillText('x + y = '+s.toFixed(2),W/2,H-110);
  drawText('最小值 = 2√P = 2√'+P+' = '+minS.toFixed(2)+' (当 x=y='+Math.sqrt(P).toFixed(2)+')',W/2,H-80,'#34d399',13);
  // 进度条
  const pct=Math.max(0,Math.min(1,(s-minS)/(minS)));
  ctx.fillStyle='#243a5e';ctx.fillRect(120,H-50,W-240,8);
  ctx.fillStyle='#fbbf24';ctx.fillRect(120,H-50,(W-240)*(1-pct*0.7),8);
  drawText('偏离 a=b 越远，x+y 越大',W/2,H-30,'#9ab0d0',11);
  // 提示文字
  drawText('积定（xy=P）→ 和（x+y）有最小值 2√P',cx,cy-y*sc-30,'#a78bfa',11);
}

// ===== 场景：积的最大值（和定）=====
function drawProdMaxScene(time){
  const W=cv.width,H=cv.height;
  drawText('应用二 · 和定积最大 (x+y=S 定值)',W/2,30,'#fbbf24',16);
  const S=8;
  const x=2+2*(0.5+0.5*Math.sin(time*0.6));
  const y=S-x;
  const prod=x*y;
  const maxP=(S/2)*(S/2);
  const cx=W/2,cy=H/2+20;
  // 正方形演示
  ctx.fillStyle='rgba(52,211,153,0.25)';ctx.strokeStyle='#34d399';ctx.lineWidth=2;
  const sc=160/S;
  ctx.fillRect(cx-x*sc/2,cy-y*sc/2,x*sc,y*sc);
  ctx.strokeRect(cx-x*sc/2,cy-y*sc/2,x*sc,y*sc);
  drawText('x='+x.toFixed(2),cx,cy-y*sc/2-15,'#06b6d4',12);
  drawText('y='+y.toFixed(2),cx-x*sc/2-30,cy,'#06b6d4',12);
  drawText('周长/2 = x+y = '+S+' (定值)',cx,cy+y*sc/2+20,'#34d399',13);
  // 积
  ctx.fillStyle='#fbbf24';ctx.font='bold 18px sans-serif';ctx.textAlign='center';
  ctx.fillText('xy = '+prod.toFixed(2),W/2,H-100);
  drawText('最大值 = (S/2)² = '+maxP.toFixed(2)+' (当 x=y='+(S/2)+')',W/2,H-70,'#fbbf24',13);
  // 进度条
  const pct=prod/maxP;
  ctx.fillStyle='#243a5e';ctx.fillRect(120,H-45,W-240,8);
  ctx.fillStyle='#34d399';ctx.fillRect(120,H-45,(W-240)*pct,8);
  drawText('x 越接近 y，xy 越大',W/2,H-25,'#9ab0d0',11);
  // 提示
  drawText('和定（x+y=S）→ 积（xy）有最大值 (S/2)²',cx,cy-y*sc/2-30,'#a78bfa',11);
}

// ===== 场景：实际应用 =====
function drawAppScene(time){
  const W=cv.width,H=cv.height;
  drawText('实际应用 · 围栏最大面积',W/2,30,'#fbbf24',16);
  // 问题：靠墙围栏，总长 20m 求最大面积
  const L=20;
  const x=3+5*(0.5+0.5*Math.sin(time*0.5));
  const y=(L-x)/2; // 靠墙，两宽 + 一长
  // 实际：靠墙，x 为垂直墙的两边总和 -> 简化：x 宽，y 长
  // 重定义：靠墙，宽 x 两条 + 长 y = L => y=L-2x, 面积 S=x(L-2x)
  const x2=2+4*(0.5+0.5*Math.cos(time*0.6));
  const y2=L-2*x2;
  const area=x2*y2;
  const maxA=(L/2)*(L/2)/2; // x=L/4 时最大
  const cx=W/2-100,cy=H/2+30;
  // 画墙
  ctx.strokeStyle='#a78bfa';ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(cx-150,cy);ctx.lineTo(cx+150,cy);ctx.stroke();
  drawText('墙',cx-170,cy,'#a78bfa',12);
  // 围栏
  ctx.strokeStyle='#06b6d4';ctx.lineWidth=3;
  const sc=10;
  ctx.beginPath();
  ctx.moveTo(cx-x2*sc,cy);ctx.lineTo(cx-x2*sc,cy+y2*sc);
  ctx.lineTo(cx+x2*sc,cy+y2*sc);ctx.lineTo(cx+x2*sc,cy);
  ctx.stroke();
  // 标注
  drawText('宽 x='+x2.toFixed(1),cx,cy+y2*sc+18,'#06b6d4',12);
  drawText('长 y='+y2.toFixed(1),cx+x2*sc+40,cy+y2*sc/2,'#67e8f9',12);
  // 结论
  ctx.fillStyle='#fff';ctx.font='bold 16px sans-serif';ctx.textAlign='center';
  ctx.fillText('面积 S = x·y = '+area.toFixed(2),W/2+150,cy-40);
  drawText('总长 2x+y = '+L+' (定值)',W/2+150,cy-15,'#34d399',12);
  drawText('最大面积 = '+(L*L/8).toFixed(1)+' m² (x='+(L/4).toFixed(1)+', y='+(L/2)+')',W/2+150,cy+10,'#fbbf24',12);
  drawText('化简：S=x(L−2x)，配凑 2x·(L−2x)/2 用均值不等式',W/2,H-50,'#9ab0d0',11);
  drawText('2x + (L−2x) = L 定值 → 积 ≤ (L/2)² → S ≤ L²/8',W/2,H-28,'#34d399',12);
  // 当前面积占比条
  const cur=Math.min(1,area/maxA);
  ctx.fillStyle='#243a5e';ctx.fillRect(120,H-60,W-240,6);
  ctx.fillStyle='#fbbf24';ctx.fillRect(120,H-60,(W-240)*cur,6);
  drawText('当前面积 / 最大面积 = '+(cur*100).toFixed(0)+'%',W/2,H-72,'#9ab0d0',10);
}

// ===== 场景：三要点 =====
function drawKeyPointsScene(){
  const W=cv.width,H=cv.height;
  drawText('使用三要点 · 一正 · 二定 · 三相等',W/2,30,'#fbbf24',16);
  const items=[
    {n:'一',t:'正',d:'各项 a, b, x, y 必须都 > 0',c:'#fbbf24',ex:'√(ab) 要求 ab ≥ 0'},
    {n:'二',t:'定',d:'求积最大需"和"为定值；求和最小需"积"为定值',c:'#06b6d4',ex:'x+y=S定 → xy 最大'},
    {n:'三',t:'相等',d:'等号必须能取到（验证 x=y 是否在定义域内）',c:'#34d399',ex:'x=y=√P 必须可行'},
  ];
  items.forEach((m,i)=>{
    const y=80+i*120;
    ctx.fillStyle=m.c+'22';ctx.strokeStyle=m.c;ctx.lineWidth=2;
    roundRect(80,y,W-160,100,10);ctx.fill();ctx.stroke();
    // 编号大字
    ctx.fillStyle=m.c;ctx.font='bold 36px sans-serif';ctx.textAlign='center';
    ctx.fillText(m.n,130,y+50);
    ctx.font='bold 20px sans-serif';ctx.fillStyle='#fff';
    ctx.fillText(m.t,180,y+50);
    // 说明
    ctx.font='14px sans-serif';ctx.fillStyle='#e8eef8';ctx.textAlign='left';
    ctx.fillText(m.d,230,y+40);
    ctx.fillStyle='#9ab0d0';ctx.font='12px sans-serif';
    ctx.fillText('例：'+m.ex,230,y+65);
  });
  drawText('三个条件缺一不可，否则不能用均值不等式取最值',W/2,H-35,'#f87171',13);
  drawText('口诀：一正二定三相等，等号取到最值成',W/2,H-15,'#fbbf24',12);
}

// ===== 场景：综合滑块验证 =====
function drawVerifyScene(time){
  const W=cv.width,H=cv.height;
  drawText('实时验证 · 四种平均对比',W/2,30,'#fbbf24',16);
  const a=1+3.5*(0.5+0.5*Math.sin(time*0.5));
  const b=1+3.5*(0.5+0.5*Math.cos(time*0.5));
  const H2=2*a*b/(a+b),G=Math.sqrt(a*b),A=(a+b)/2,Q=Math.sqrt((a*a+b*b)/2);
  const arr=[{k:'H 调和',v:H2,c:'#f87171'},{k:'G 几何',v:G,c:'#fbbf24'},{k:'A 算术',v:A,c:'#34d399'},{k:'Q 平方',v:Q,c:'#06b6d4'}];
  const maxV=Math.max(Q,5);
  const baseY=H-100,topY=90;
  const maxH=baseY-topY;
  arr.forEach((m,i)=>{
    const x=120+i*((W-240)/4);
    const h=(m.v/maxV)*maxH;
    ctx.fillStyle=m.c+'99';ctx.strokeStyle=m.c;ctx.lineWidth=2;
    ctx.fillRect(x-35,baseY-h,70,h);ctx.strokeRect(x-35,baseY-h,70,h);
    drawText(m.k,x,baseY+18,m.c,12);
    ctx.fillStyle='#fff';ctx.font='bold 14px sans-serif';ctx.textAlign='center';
    ctx.fillText(m.v.toFixed(3),x,baseY-h-12);
  });
  // 数值
  drawText('a = '+a.toFixed(2)+'   b = '+b.toFixed(2),W/2,H-55,'#9ab0d0',13);
  drawText('a − b = '+(a-b).toFixed(2)+'  →  差距越大，H/G/A/Q 差距越大',W/2,H-32,'#fbbf24',12);
  // 等号提示
  if(Math.abs(a-b)<0.1){
    drawText('★ a ≈ b，四平均几乎相等（等号成立）',W/2,H-12,'#34d399',12);
    drawText('验证：当 a=b 时，H=G=A=Q=a',W/2,topY-12,'#34d399',10);
  }else{
    drawText('a ≠ b，H < G < A < Q（严格不等）',W/2,H-12,'#f87171',12);
  }
}

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  if(stepIdx===0)drawImportantScene(t);
  else if(stepIdx===1)drawDeriveScene(t);
  else if(stepIdx===2)drawMeansScene(t);
  else if(stepIdx===3)drawGeoScene(t);
  else if(stepIdx===4)drawSumMinScene(t);
  else if(stepIdx===5)drawProdMaxScene(t);
  else if(stepIdx===6)drawAppScene(t);
  else if(stepIdx===7)drawKeyPointsScene();
  else if(stepIdx===8)drawVerifyScene(t);
}

function syncStep(){
  const s=STEPS[stepIdx];
  document.getElementById('stepBadge').textContent=s.tag;
  document.getElementById('stepTitle').textContent=s.name;
  document.getElementById('stepBody').innerHTML=s.body;
  document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?.title||'')+'</h4><ul>'+((s.points?.items||[]).map(x=>'<li>'+x+'</li>').join(''))+'</ul>';
  document.querySelectorAll('.step').forEach((el,i)=>el.classList.toggle('active',i===stepIdx));
  statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;
  stepTime=0;
}

function update(dt){
  t+=dt*speed;
  if(!playing)return;
  stepTime+=dt*speed;
  if(stepTime>=STEP_DURATION){
    if(stepIdx<STEPS.length-1){stepIdx++;syncStep();}
    else{playing=false;playBtn.textContent='▶ 播放';statusEl.textContent='动画完成';}
  }
}

function loop(ts){
  if(!lastT)lastT=ts;
  const dt=(ts-lastT)/1000;lastT=ts;
  update(dt);draw();
  requestAnimationFrame(loop);
}

const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn');
const speedEl=document.getElementById('speed');
playBtn.onclick=()=>{playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';};
resetBtn.onclick=()=>{stepIdx=0;playing=false;syncStep();draw();playBtn.textContent='▶ 播放';};
stepFwdBtn.onclick=()=>{if(stepIdx<STEPS.length-1){stepIdx++;syncStep();draw();}};
stepBackBtn.onclick=()=>{if(stepIdx>0){stepIdx--;syncStep();draw();}};
speedEl.oninput=()=>{speed=parseFloat(speedEl.value);};

function buildStepbar(){
  const bar=document.getElementById('stepbar');
  bar.innerHTML='';
  STEPS.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='step'+(i===stepIdx?' active':'');
    el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>10?s.name.slice(0,9)+'…':s.name)+'</div>';
    el.onclick=()=>{stepIdx=i;syncStep();draw();};
    bar.appendChild(el);
  });
}

buildStepbar();syncStep();requestAnimationFrame(loop);
</script>
