<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>反比例函数 · 双曲线与 k 的正负</title>
<style>:root{--bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;--accent:#3b82f6;--accent2:#74b9ff;--line:#243a5e;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
.back{color:var(--accent2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap;background:rgba(116,185,255,.06)}.back:hover{background:rgba(116,185,255,.14)}
.title{font-size:15px;font-weight:600}.subtitle{font-size:12px;color:var(--muted)}
.cards{display:flex;gap:10px;padding:10px 16px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(59,130,246,.06),transparent)}
.card{flex:1;min-width:200px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 12px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}.card.s2::before{background:var(--good)}.card.s3::before{background:var(--bad)}.card.s4::before{background:var(--warn)}
.card h4{margin:0 0 4px;font-size:13px}.card .v{font-size:11.5px;color:var(--muted);line-height:1.6;font-family:Consolas,Monaco,monospace;white-space:pre-wrap}
.card .num{position:absolute;right:8px;top:6px;font-size:22px;font-weight:700;color:rgba(255,255,255,.07)}
main{flex:1;display:flex;min-height:0}.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}
.panel{width:340px;flex:none;padding:14px;overflow:auto;border-left:1px solid var(--line);background:var(--panel);font-size:13px;line-height:1.7}
.panel h2{font-size:14px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--accent);color:#fff;font-size:11px;font-weight:600}
.body{color:var(--muted);margin:0 0 10px}.body strong{color:var(--ink)}.body code{background:rgba(59,130,246,.2);color:#bfdbfe;padding:1px 5px;border-radius:4px;font-family:Consolas,Monaco,monospace;font-size:12px}
.points{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin-top:8px;border-left:3px solid var(--accent2)}.points h4{margin:0 0 6px;font-size:13px}.points ul{margin:0;padding-left:18px;color:var(--muted)}.points li{margin-bottom:3px}.points li strong{color:var(--accent)}
.code{background:#0d1117;border:1px solid var(--line);border-radius:6px;padding:8px 10px;margin-top:8px;font-family:Consolas,Monaco,monospace;font-size:11.5px;line-height:1.6;color:#c9d1d9;white-space:pre-wrap}
.stepbar{display:flex;gap:6px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);overflow-x:auto}
.step{flex:1;min-width:90px;padding:8px 6px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}.step:hover{background:#1e345a;border-color:var(--accent2)}.step.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:600;border-color:transparent}
.controls{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}button:hover{background:#1e345a}button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}button.primary:hover{background:#4b91f8}
.controls label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}input[type=range]{accent-color:var(--accent);width:110px}
.pval{color:var(--accent2);font-size:12px;font-family:Consolas,Monaco,monospace;min-width:50px;display:inline-block}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}
</style></head>
<body>
<header class="topbar"><a class="back" href="../index.html">← 返回数学目录</a><span class="title">反比例函数 · 双曲线与 k 的正负</span><span class="subtitle">y = k/x · 拖动 k 实时观察</span></header>
<div class="cards">
  <div class="card s2"><div class="num">1</div><h4>函数（实时）</h4><div class="v" id="cardFn"></div></div>
  <div class="card s3"><div class="num">2</div><h4>k 的正负（实时）</h4><div class="v" id="cardSign"></div></div>
  <div class="card s4"><div class="num">3</div><h4>取点验证</h4><div class="v" id="cardPt"></div></div>
  <div class="card"><div class="num">4</div><h4>操作提示</h4><div class="v">拖动 k 滑块看双曲线变化；按 ▶ 自动演示五步</div></div>
</div>
<main><div class="stage"><canvas id="cv"></canvas></div>
<aside class="panel"><h2><span class="badge" id="stepBadge">引入</span><span id="stepTitle"></span></h2><p class="body" id="stepBody"></p><div class="points" id="stepPoints"></div><div class="code" id="stepCode"></div></aside>
</main>
<div class="stepbar" id="stepbar"></div>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button><button id="resetBtn">↺ 重置</button><button id="stepBackBtn">◀ 上一步</button><button id="stepFwdBtn">下一步 ▶</button>
  <label>k<input id="pk" type="range" min="-6" max="6" step="0.5" value="4"><span id="pkV" class="pval"></span></label>
  <label>速度<input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <span id="status" class="status">拖动 k 或按 ▶ 自动演示</span>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),statusEl=document.getElementById('status');
const pkEl=document.getElementById('pk'),pkV=document.getElementById('pkV');
const cardFn=document.getElementById('cardFn'),cardSign=document.getElementById('cardSign'),cardPt=document.getElementById('cardPt');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(560,Math.min(1100,r.width-12));cv.height=Math.max(420,Math.min(560,r.height-12));}
window.addEventListener('resize',()=>{fit();sceneDraw();});fit();
window.showTip=function(m){if(statusEl)statusEl.textContent=m;};
function drawText(t,x,y,c,fs,al,bl){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=al||'center';ctx.textBaseline=bl||'middle';ctx.fillText(t,x,y);}
function ease(t){t=t<0?0:t>1?1:t;return t*t*(3-2*t);}
let k=4,stepIdx=0,animT=0,playing=false,lastT=0,speed=1;
const STEP_DUR=1.5;
function fmt(x){return(Math.round(x*100)/100).toFixed(2);}
function readParams(){k=parseFloat(pkEl.value);pkV.textContent='k='+fmt(k);cardFn.textContent='y = '+fmt(k)+' / x   (x ≠ 0)';cardSign.textContent=k>0?('k = '+fmt(k)+' > 0\n图像过 第一、三 象限'):(k<0?('k = '+fmt(k)+' < 0\n图像过 第二、四 象限'):'k = 0 退化为 y = 0');var x=2;cardPt.textContent='x = 2  →  y = '+fmt(k/2)+'\nx = 4  →  y = '+fmt(k/4);}
pkEl.oninput=()=>{readParams();sceneDraw();};
function axes(){var W=cv.width,H=cv.height,ox=W/2,oy=H/2,sc=Math.min(W,H)/18;
  ctx.strokeStyle='rgba(36,58,94,.4)';ctx.lineWidth=1;
  for(var i=-9;i<=9;i++){if(i===0)continue;ctx.beginPath();ctx.moveTo(ox+i*sc,20);ctx.lineTo(ox+i*sc,H-20);ctx.stroke();ctx.beginPath();ctx.moveTo(20,oy+i*sc);ctx.lineTo(W-20,oy+i*sc);ctx.stroke();}
  ctx.strokeStyle='#3a5a8a';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(20,oy);ctx.lineTo(W-20,oy);ctx.moveTo(ox,20);ctx.lineTo(ox,H-20);ctx.stroke();
  ctx.fillStyle='#9ab0d0';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
  for(var i=-8;i<=8;i++){if(i===0)continue;ctx.fillText(i,ox+i*sc,oy+4);}
  ctx.textAlign='right';ctx.textBaseline='middle';
  for(var j=-8;j<=8;j++){if(j===0)continue;ctx.fillText(j,ox-6,oy-j*sc);}
  drawText('x',W-16,oy+12,'#74b9ff',13);drawText('y',ox+12,18,'#74b9ff',13);drawText('O',ox-8,oy+10,'#9ab0d0',11);
  return {ox,oy,sc};
}
// 画双曲线一支：x∈[xa,xb]（同号区间），progress 0..1 控制绘制比例
function drawBranch(ox,oy,sc,xa,xb,col,glow,progress){
  ctx.strokeStyle=col;ctx.lineWidth=3;if(glow){ctx.shadowColor=col;ctx.shadowBlur=10;}
  ctx.beginPath();var n=60;var started=false;var end=xa+(xb-xa)*progress;
  for(var i=0;i<=n;i++){var x=xa+(end-xa)*i/n;if(Math.abs(x)<0.0001)continue;var y=k/x;var px=ox+x*sc,py=oy-y*sc;
    if(py< -40||py>cv.height+40){started=false;continue;}
    if(!started){ctx.moveTo(px,py);started=true;}else ctx.lineTo(px,py);}
  ctx.stroke();ctx.shadowBlur=0;
}
function drawCurve(progress,glow){var {ox,oy,sc}=axes();var col=k>=0?'#34d399':'#f87171';
  drawBranch(ox,oy,sc,0.3,9,col,glow,progress);
  drawBranch(ox,oy,sc,-9,-0.3,col,glow,progress);
  drawText('y = '+fmt(k)+' / x',ox+ (k>=0?80:-80),oy-(k/x)*(sc) ,col,14);
}
function drawIntro(p){var W=cv.width,H=cv.height;axes();var pe=ease(Math.min(p/0.6,1));ctx.globalAlpha=pe;drawText('反比例函数  y = k / x   (k 为常数, k ≠ 0)',W/2,36,'#e8eef8',17);drawText('自变量 x ≠ 0；y 随 x 变化而变化',W/2,H-16,'#9ab0d0',13);ctx.globalAlpha=1;}
function drawPoints(p){var {ox,oy,sc}=axes();var xs=[1,2,4,8,-1,-2,-4];var pe=ease(Math.min(p/0.8,1));var n=Math.floor(pe*xs.length);
  for(var i=0;i<n&&i<xs.length;i++){var x=xs[i],y=k/x;var px=ox+x*sc,py=oy-y*sc;ctx.fillStyle='#fbbf24';ctx.shadowColor='#fbbf24';ctx.shadowBlur=8;ctx.beginPath();ctx.arc(px,py,5,0,7);ctx.fill();ctx.shadowBlur=0;drawText('('+x+', '+fmt(y)+')',px,py-14,'#fbbf24',11);}
  drawText('描点：取若干 x，算 y = k/x，得到散点',cv.width/2,cv.height-16,'#9ab0d0',12);
}
function drawHyper(p){var W=cv.width,H=cv.height;var pe=ease(Math.min(p/0.9,1));drawCurve(pe,true);drawText('用平滑曲线连接各点 → 双曲线',W/2,H-16,'#9ab0d0',13);}
function drawSign(p){var W=cv.width,H=cv.height,{ox,oy,sc}=axes();var pe=ease(Math.min(p/0.7,1));
  // 当前k曲线高亮 + 另一符号虚线对比
  var cur=k>=0?'#34d399':'#f87171';
  drawCurve(1,true);
  // 对比：相反符号的曲线（虚线）
  var k0=k;ctx.save();ctx.setLineDash([5,5]);ctx.globalAlpha=0.4;
  var opp=k>=0?-4:4;k=opp;drawCurve(1,false);k=k0;ctx.restore();
  ctx.globalAlpha=pe;
  drawText(k>0?'k > 0 → 双曲线在 第一、三 象限':(k<0?'k < 0 → 双曲线在 第二、四 象限':''),W/2,38,cur,16);
  ctx.globalAlpha=1;drawText('实线=当前 k，虚线=相反符号对比',W/2,H-16,'#9ab0d0',12);
}
function drawProp(p){var W=cv.width,H=cv.height,{ox,oy,sc}=axes();var pe=ease(Math.min(p/0.7,1));
  drawCurve(1,true);
  // 渐近线
  ctx.strokeStyle='rgba(251,191,36,.5)';ctx.lineWidth=1.5;ctx.setLineDash([6,5]);
  ctx.beginPath();ctx.moveTo(ox,20);ctx.lineTo(ox,H-20);ctx.moveTo(20,oy);ctx.lineTo(W-20,oy);ctx.stroke();ctx.setLineDash([]);
  ctx.globalAlpha=pe;
  drawText('渐近线：x 轴与 y 轴（无限靠近但不相交）',W/2,38,'#fbbf24',15);
  drawText(k>0?'每一支单调递减（x 增大 → y 减小）':'每一支单调递增',W/2,H-34,'#34d399',13);
  ctx.globalAlpha=1;
}
function sceneDraw(){var W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);var pp=ease(Math.min(animT/STEP_DUR,1));
  if(stepIdx===0)drawIntro(pp);else if(stepIdx===1)drawPoints(pp);else if(stepIdx===2)drawHyper(pp);else if(stepIdx===3)drawSign(pp);else if(stepIdx===4)drawProp(pp);
}
const STEPS=[
 {tag:"引入",name:"反比例函数",body:"形如 <code>y = k/x</code>（k 为常数，k≠0）的函数叫反比例函数。<strong>x 不能为 0</strong>（分母不能为 0）。x 与 y 的乘积恒等于 k。",points:{title:"定义",items:["y = k / x","k ≠ 0 常数","x ≠ 0","xy = k 恒成立"]},code:"y = k / x   (k ≠ 0)"},
 {tag:"描点",name:"列表描点",body:"取若干 x 值（正负都有），算出对应 y = k/x，在坐标系中描出这些点。注意 x 越接近 0，y 的绝对值越大。",points:{title:"取点",items:["x=1 → y=k","x=2 → y=k/2","x 越接近 0，|y| 越大","正负 x 都要取"]},code:"x:  1   2   4  -1  -2\ny:  k  k/2 k/4 -k  -k/2"},
 {tag:"双曲线",name:"连成双曲线",body:"用平滑曲线把各点连起来，得到<strong>双曲线</strong>，它有两支，分别位于两个象限。x=0 和 y=0 是它的渐近线。",points:{title:"图像",items:["两支曲线","分别在不同象限","不与坐标轴相交","关于原点对称"]},code:"平滑连线 → 双曲线"},
 {tag:"k正负",name:"k 的正负决定象限",body:"<strong>k > 0</strong>：双曲线在<strong>第一、三</strong>象限；<strong>k < 0</strong>：双曲线在<strong>第二、四</strong>象限。拖动 k 滑块穿越 0，图像会从一、三跳到二、四。",points:{title:"象限规律",items:["k > 0 → 一、三象限","k < 0 → 二、四象限","关于原点对称","k 越大离原点越远"]},code:"k>0: Q1,Q3\nk<0: Q2,Q4"},
 {tag:"性质",name:"渐近线与单调性",body:"双曲线无限靠近但<strong>永不相交</strong>于 x 轴、y 轴（渐近线）。k>0 时每一支<strong>单调递减</strong>，k<0 时每一支单调递增。",points:{title:"性质",items:["渐近线：x 轴、y 轴","无限靠近不相交","k>0 单调递减","k<0 单调递增"]},code:"渐近 x=0, y=0"}
];
function loadStep(){var s=STEPS[stepIdx];if(!s)return;animT=0;document.getElementById('stepBadge').textContent=s.tag;document.getElementById('stepTitle').textContent=s.name;document.getElementById('stepBody').innerHTML=s.body;document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?s.points.title:'')+'</h4><ul>'+((s.points?s.points.items:[]).map(function(x){return '<li>'+x+'</li>';}).join(''))+'</ul>';document.getElementById('stepCode').textContent=s.code||'';document.querySelectorAll('.step').forEach(function(el,i){el.classList.toggle('active',i===stepIdx);});statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;}
function buildStepbar(){var bar=document.getElementById('stepbar');bar.innerHTML='';STEPS.forEach(function(s,i){var el=document.createElement('div');el.className='step'+(i===stepIdx?' active':'');el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>7?s.name.slice(0,6)+'…':s.name)+'</div>';el.onclick=function(){stepIdx=i;loadStep();};bar.appendChild(el);});}
function sceneInit(){k=4;stepIdx=0;animT=0;playing=false;pkEl.value=k;readParams();}
function sceneReset(){k=4;stepIdx=0;animT=0;playing=false;pkEl.value=k;readParams();loadStep();statusEl.textContent='已重置';}
function sceneUpdate(dt){animT+=dt*speed;if(!playing&&animT>STEP_DUR)animT=STEP_DUR;if(playing&&animT>STEP_DUR+0.5){stepIdx=(stepIdx+1)%STEPS.length;loadStep();}}
const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn'),stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn'),speedEl=document.getElementById('speed');
playBtn.onclick=function(){playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';if(playing)animT=0;};
resetBtn.onclick=function(){sceneReset();};stepFwdBtn.onclick=function(){stepIdx=(stepIdx+1)%STEPS.length;loadStep();};stepBackBtn.onclick=function(){stepIdx=(stepIdx-1+STEPS.length)%STEPS.length;loadStep();};speedEl.oninput=function(){speed=parseFloat(speedEl.value);};
function loop(ts){if(!lastT)lastT=ts;var dt=(ts-lastT)/1000;lastT=ts;sceneUpdate(dt);sceneDraw();requestAnimationFrame(loop);}
sceneInit();buildStepbar();loadStep();requestAnimationFrame(loop);
</script></body></html>
