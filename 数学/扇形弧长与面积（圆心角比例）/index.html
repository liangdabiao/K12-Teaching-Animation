<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>扇形 · 弧长与面积</title><style>:root{--bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;--accent:#3b82f6;--accent2:#74b9ff;--line:#243a5e;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
.back{color:var(--accent2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap;background:rgba(116,185,255,.06)}.back:hover{background:rgba(116,185,255,.14)}
.title{font-size:15px;font-weight:600}.subtitle{font-size:12px;color:var(--muted)}
.cards{display:flex;gap:10px;padding:10px 16px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(59,130,246,.06),transparent)}
.card{flex:1;min-width:190px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 12px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}.card.s2::before{background:var(--good)}.card.s3::before{background:var(--bad)}.card.s4::before{background:var(--warn)}
.card h4{margin:0 0 4px;font-size:13px}.card .v{font-size:11.5px;color:var(--muted);line-height:1.6;font-family:Consolas,Monaco,monospace;white-space:pre-wrap}
.card .num{position:absolute;right:8px;top:6px;font-size:22px;font-weight:700;color:rgba(255,255,255,.07)}
main{flex:1;display:flex;min-height:0}.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}
.panel{width:340px;flex:none;padding:14px;overflow:auto;border-left:1px solid var(--line);background:var(--panel);font-size:13px;line-height:1.7}
.panel h2{font-size:14px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--accent);color:#fff;font-size:11px;font-weight:600}
.body{color:var(--muted);margin:0 0 10px}.body strong{color:var(--ink)}.body code{background:rgba(59,130,246,.2);color:#bfdbfe;padding:1px 5px;border-radius:4px;font-family:Consolas,Monaco,monospace;font-size:12px}
.points{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin-top:8px;border-left:3px solid var(--accent2)}.points h4{margin:0 0 6px;font-size:13px}.points ul{margin:0;padding-left:18px;color:var(--muted)}.points li{margin-bottom:3px}.points li strong{color:var(--accent)}
.code{background:#0d1117;border:1px solid var(--line);border-radius:6px;padding:8px 10px;margin-top:8px;font-family:Consolas,Monaco,monospace;font-size:11.5px;line-height:1.6;color:#c9d1d9;white-space:pre-wrap}
.stepbar{display:flex;gap:6px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);overflow-x:auto}
.step{flex:1;min-width:84px;padding:8px 6px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}.step:hover{background:#1e345a;border-color:var(--accent2)}.step.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:600;border-color:transparent}
.controls{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}button:hover{background:#1e345a}button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}button.primary:hover{background:#4b91f8}
.controls label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}input[type=range]{accent-color:var(--accent);width:90px}select{background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:4px 6px;font-size:12px}
.pval{color:var(--accent2);font-size:12px;font-family:Consolas,Monaco,monospace;min-width:50px;display:inline-block}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}</style></head>
<body>
<header class="topbar"><a class="back" href="../index.html">← 返回数学目录</a><span class="title">扇形 · 弧长与面积</span><span class="subtitle">弧长/面积 = 圆周/圆面积 × θ/360 · 拖动θ·R实时观察</span></header>
<div class="cards"><div class="card s2"><div class="num">1</div><h4>弧长 l（实时）</h4><div class="v" id="cardArc"></div></div><div class="card s3"><div class="num">2</div><h4>面积 S（实时）</h4><div class="v" id="cardArea"></div></div><div class="card s4"><div class="num">3</div><h4>参数（实时）</h4><div class="v" id="cardParam"></div></div><div class="card "><div class="num">4</div><h4>操作提示</h4><div class="v">拖动圆心角θ和半径R，弧长与面积实时更新</div></div></div>
<main><div class="stage"><canvas id="cv"></canvas></div>
<aside class="panel"><h2><span class="badge" id="stepBadge">基础</span><span id="stepTitle"></span></h2><p class="body" id="stepBody"></p><div class="points" id="stepPoints"></div><div class="code" id="stepCode"></div></aside>
</main>
<div class="stepbar" id="stepbar"></div>
<div class="controls">
<button id="playBtn" class="primary">▶ 播放</button><button id="resetBtn">↺ 重置</button><button id="stepBackBtn">◀ 上一步</button><button id="stepFwdBtn">下一步 ▶</button>
<label>圆心角θ<input id="pa" type="range" min="30" max="330" step="5" value="120"><span id="paV" class="pval"></span></label><label>半径R<input id="pb" type="range" min="1" max="4" step="0.2" value="2"><span id="pbV" class="pval"></span></label>
<label>速度<input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
<span id="status" class="status">拖动参数或按 ▶ 自动演示</span>
</div>
<script>const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(560,Math.min(1100,r.width-12));cv.height=Math.max(420,Math.min(560,r.height-12));}
window.addEventListener('resize',()=>{fit();sceneDraw();});fit();
window.showTip=function(m){if(statusEl)statusEl.textContent=m;};
function drawText(t,x,y,c,fs,al,bl){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=al||'center';ctx.textBaseline=bl||'middle';ctx.fillText(t,x,y);}
function ease(t){t=t<0?0:t>1?1:t;return t*t*(3-2*t);}
function lerp(a,b,t){return a+(b-a)*t;}
let stepIdx=0,animT=0,playing=false,lastT=0,speed=1;
const STEP_DUR=1.4;
function loop(ts){if(!lastT)lastT=ts;var dt=(ts-lastT)/1000;lastT=ts;sceneUpdate(dt);sceneDraw();requestAnimationFrame(loop);}
const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn'),stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn'),speedEl=document.getElementById('speed');
playBtn.onclick=function(){playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';if(playing)animT=0;};
resetBtn.onclick=function(){sceneReset();};
stepFwdBtn.onclick=function(){stepIdx=(stepIdx+1)%STEPS.length;loadStep();};
stepBackBtn.onclick=function(){stepIdx=(stepIdx-1+STEPS.length)%STEPS.length;loadStep();};
speedEl.oninput=function(){speed=parseFloat(speedEl.value);};
function loadStep(){var s=STEPS[stepIdx];if(!s)return;animT=0;if(typeof applyEx==='function'&&s.ex){applyEx(s.ex);}document.getElementById('stepBadge').textContent=s.tag;document.getElementById('stepTitle').textContent=s.name;document.getElementById('stepBody').innerHTML=s.body;document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?s.points.title:'')+'</h4><ul>'+((s.points?s.points.items:[]).map(function(x){return '<li>'+x+'</li>';}).join(''))+'</ul>';document.getElementById('stepCode').textContent=s.code||'';document.querySelectorAll('.step').forEach(function(el,i){el.classList.toggle('active',i===stepIdx);});statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;}
function buildStepbar(){var bar=document.getElementById('stepbar');bar.innerHTML='';STEPS.forEach(function(s,i){var el=document.createElement('div');el.className='step'+(i===stepIdx?' active':'');el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>7?s.name.slice(0,6)+'…':s.name)+'</div>';el.onclick=function(){stepIdx=i;loadStep();};bar.appendChild(el);});}
const STEPS=[{"tag": "引入", "name": "圆与扇形", "body": "圆上两点之间的部分叫<strong>弧</strong>，由弧和两条半径围成的图形叫<strong>扇形</strong>。扇形的圆心角 θ 决定它占整个圆的比例。", "points": {"title": "要素", "items": ["弧 + 两条半径 = 扇形", "圆心角 θ", "半径 R", "占圆的比例"]}, "code": "扇形 = 弧 + 2 半径"}, {"tag": "比例", "name": "占圆的比例", "body": "整个圆的圆心角是 360°。扇形圆心角 θ 占整圆的 <code>θ/360</code>。所以扇形的弧长和面积，都是整圆相应量的 θ/360。", "points": {"title": "比例", "items": ["整圆 360°", "扇形占比 θ/360", "弧长同比例", "面积同比例"]}, "code": "比例 = θ / 360"}, {"tag": "弧长", "name": "弧长公式", "body": "整圆周长 = 2πR。扇形弧长 = 周长 × θ/360 = <code>2πR × θ/360 = πRθ/180</code>。", "points": {"title": "弧长", "items": ["圆周 = 2πR", "弧长 = 2πR·θ/360", "= πRθ/180", "θ 用度"]}, "code": "l = 2πR · θ/360"}, {"tag": "面积", "name": "面积公式", "body": "整圆面积 = πR²。扇形面积 = 圆面积 × θ/360 = <code>πR² × θ/360</code>。", "points": {"title": "面积", "items": ["圆面积 = πR²", "扇形 = πR²·θ/360", "同比例", "与弧长同理"]}, "code": "S = πR² · θ/360"}, {"tag": "应用", "name": "应用与记忆", "body": "记忆诀窍：弧长/面积都是「整圆量 × θ/360」。半圆（θ=180）占一半，四分之一圆（θ=90）占四分之一。", "points": {"title": "应用", "items": ["θ=180 → 一半", "θ=90 → 四分之一", "θ=360 → 整圆", "按比例算"]}, "code": "半圆 θ=180 → 1/2"}];

const paEl=document.getElementById('pa'),pbEl=document.getElementById('pb'),paV=document.getElementById('paV'),pbV=document.getElementById('pbV');
const cardArc=document.getElementById('cardArc'),cardArea=document.getElementById('cardArea'),cardParam=document.getElementById('cardParam');
let TH=120,R=2;
function readParams(){TH=parseInt(paEl.value);R=parseFloat(pbEl.value);paV.textContent='θ='+TH+'°';pbV.textContent='R='+R.toFixed(1);var l=2*Math.PI*R*TH/360, s=Math.PI*R*R*TH/360;cardArc.textContent='l = 2πR·θ/360 = '+l.toFixed(2);cardArea.textContent='S = πR²·θ/360 = '+s.toFixed(2);cardParam.textContent='θ = '+TH+'°   R = '+R.toFixed(1)+'   整圆周 = '+(2*Math.PI*R).toFixed(2)+'   整圆面积 = '+(Math.PI*R*R).toFixed(2);}
paEl.oninput=function(){readParams();sceneDraw();};pbEl.oninput=function(){readParams();sceneDraw();};
function geom(){var W=cv.width,H=cv.height,cx=W/2,cy=H/2+10,rr=Math.min(W,H)*0.16*R;var th=TH*Math.PI/180,a0=-Math.PI/2-th/2;return{cx,cy,rr,th,a0};}
function drawCirc(){var{cx,cy,rr}=geom();ctx.strokeStyle='#3a5a8a';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(cx,cy,rr,0,7);ctx.stroke();return geom();}
function drawSector(pe){var{cx,cy,rr,th,a0}=geom();var end=a0+th*pe;ctx.fillStyle='rgba(59,130,246,.35)';ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,rr,a0,end);ctx.closePath();ctx.fill();ctx.strokeStyle='#74b9ff';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(cx,cy,rr,a0,end);ctx.stroke();ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+rr*Math.cos(a0),cy+rr*Math.sin(a0));ctx.moveTo(cx,cy);ctx.lineTo(cx+rr*Math.cos(end),cy+rr*Math.sin(end));ctx.stroke();}
function drawIntro(p){var W=cv.width,H=cv.height;drawCirc();var pe=ease(Math.min(p/0.7,1));drawSector(pe);var{cx,cy,rr,th,a0}=geom();ctx.fillStyle='#74b9ff';ctx.beginPath();ctx.arc(cx,cy,3,0,7);ctx.fill();drawText('O',cx-12,cy+12,'#74b9ff',12);drawText('R',cx+rr*0.6,cy+16,'#fbbf24',12);ctx.globalAlpha=pe;drawText('扇形：弧 + 两条半径',W/2,36,'#e8eef8',15);ctx.globalAlpha=1;}
function drawProp(p){var W=cv.width,H=cv.height;drawCirc();var pe=ease(Math.min(p/0.7,1));drawSector(1);ctx.globalAlpha=pe;drawText('占整圆的比例 = θ/360 = '+TH+'/360',W/2,36,'#fbbf24',15);ctx.globalAlpha=1;}
function drawArc(p){var W=cv.width,H=cv.height;drawCirc();var pe=ease(Math.min(p/0.8,1));drawSector(pe);var{cx,cy,rr,th,a0}=geom();ctx.globalAlpha=pe;ctx.strokeStyle='#34d399';ctx.lineWidth=4;ctx.beginPath();ctx.arc(cx,cy,rr,a0,a0+th*pe);ctx.stroke();ctx.globalAlpha=1;ctx.globalAlpha=pe;drawText('l = 2πR·θ/360 = '+(2*Math.PI*R*TH/360).toFixed(2),W/2,H-18,'#34d399',14);ctx.globalAlpha=1;}
function drawArea(p){var W=cv.width,H=cv.height;drawCirc();var pe=ease(Math.min(p/0.8,1));drawSector(pe);ctx.globalAlpha=pe;drawText('S = πR²·θ/360 = '+(Math.PI*R*R*TH/360).toFixed(2),W/2,36,'#74b9ff',14);ctx.globalAlpha=1;}
function drawApp(p){var W=cv.width,H=cv.height;drawCirc();drawSector(1);var pe=ease(Math.min(p/0.6,1));ctx.globalAlpha=pe;drawText('整圆量 × θ/360',W/2,36,'#e8eef8',15);ctx.globalAlpha=1;}
function sceneDraw(){var W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);var pp=ease(Math.min(animT/STEP_DUR,1));if(stepIdx===0)drawIntro(pp);else if(stepIdx===1)drawProp(pp);else if(stepIdx===2)drawArc(pp);else if(stepIdx===3)drawArea(pp);else if(stepIdx===4)drawApp(pp);}
function sceneInit(){TH=120;R=2;stepIdx=0;animT=0;playing=false;paEl.value=TH;pbEl.value=R;readParams();}
function sceneReset(){sceneInit();loadStep();}
function sceneUpdate(dt){animT+=dt*speed;if(!playing&&animT>STEP_DUR)animT=STEP_DUR;if(playing&&animT>STEP_DUR+0.5){stepIdx=(stepIdx+1)%STEPS.length;loadStep();}}

sceneInit();buildStepbar();loadStep();requestAnimationFrame(loop);</script></body></html>
