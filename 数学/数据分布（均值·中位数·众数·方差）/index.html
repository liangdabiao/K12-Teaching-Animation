<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>数据分布 · 均值·中位数·众数·方差</title><style>:root{--bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;--accent:#3b82f6;--accent2:#74b9ff;--line:#243a5e;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
.back{color:var(--accent2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap;background:rgba(116,185,255,.06)}.back:hover{background:rgba(116,185,255,.14)}
.title{font-size:15px;font-weight:600}.subtitle{font-size:12px;color:var(--muted)}
.cards{display:flex;gap:10px;padding:10px 16px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(59,130,246,.06),transparent)}
.card{flex:1;min-width:190px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 12px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}.card.s2::before{background:var(--good)}.card.s3::before{background:var(--bad)}.card.s4::before{background:var(--warn)}
.card h4{margin:0 0 4px;font-size:13px}.card .v{font-size:11.5px;color:var(--muted);line-height:1.6;font-family:Consolas,Monaco,monospace;white-space:pre-wrap}
.card .num{position:absolute;right:8px;top:6px;font-size:22px;font-weight:700;color:rgba(255,255,255,.07)}
main{flex:1;display:flex;min-height:0}.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}
.panel{width:340px;flex:none;padding:14px;overflow:auto;border-left:1px solid var(--line);background:var(--panel);font-size:13px;line-height:1.7}
.panel h2{font-size:14px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--accent);color:#fff;font-size:11px;font-weight:600}
.body{color:var(--muted);margin:0 0 10px}.body strong{color:var(--ink)}.body code{background:rgba(59,130,246,.2);color:#bfdbfe;padding:1px 5px;border-radius:4px;font-family:Consolas,Monaco,monospace;font-size:12px}
.points{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin-top:8px;border-left:3px solid var(--accent2)}.points h4{margin:0 0 6px;font-size:13px}.points ul{margin:0;padding-left:18px;color:var(--muted)}.points li{margin-bottom:3px}.points li strong{color:var(--accent)}
.code{background:#0d1117;border:1px solid var(--line);border-radius:6px;padding:8px 10px;margin-top:8px;font-family:Consolas,Monaco,monospace;font-size:11.5px;line-height:1.6;color:#c9d1d9;white-space:pre-wrap}
.stepbar{display:flex;gap:6px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);overflow-x:auto}
.step{flex:1;min-width:84px;padding:8px 6px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}.step:hover{background:#1e345a;border-color:var(--accent2)}.step.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:600;border-color:transparent}
.controls{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}button:hover{background:#1e345a}button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}button.primary:hover{background:#4b91f8}
.controls label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}input[type=range]{accent-color:var(--accent);width:90px}select{background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:4px 6px;font-size:12px}
.pval{color:var(--accent2);font-size:12px;font-family:Consolas,Monaco,monospace;min-width:50px;display:inline-block}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}</style></head>
<body>
<header class="topbar"><a class="back" href="../index.html">← 返回数学目录</a><span class="title">数据分布 · 均值·中位数·众数·方差</span><span class="subtitle">四个统计量刻画分布 · 拖动偏移点实时观察</span></header>
<div class="cards"><div class="card s2"><div class="num">1</div><h4>均值（实时）</h4><div class="v" id="cardMean"></div></div><div class="card s3"><div class="num">2</div><h4>中位数（实时）</h4><div class="v" id="cardMed"></div></div><div class="card s4"><div class="num">3</div><h4>众数·方差（实时）</h4><div class="v" id="cardStat"></div></div><div class="card "><div class="num">4</div><h4>操作提示</h4><div class="v">拖动 x₆ 观察均值/中位数/众数/方差如何随数据变化</div></div></div>
<main><div class="stage"><canvas id="cv"></canvas></div>
<aside class="panel"><h2><span class="badge" id="stepBadge">基础</span><span id="stepTitle"></span></h2><p class="body" id="stepBody"></p><div class="points" id="stepPoints"></div><div class="code" id="stepCode"></div></aside>
</main>
<div class="stepbar" id="stepbar"></div>
<div class="controls">
<button id="playBtn" class="primary">▶ 播放</button><button id="resetBtn">↺ 重置</button><button id="stepBackBtn">◀ 上一步</button><button id="stepFwdBtn">下一步 ▶</button>
<label>数据点x₆<input id="pa" type="range" min="-6" max="18" step="0.5" value="5"><span id="paV" class="pval"></span></label>
<label>速度<input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
<span id="status" class="status">拖动参数或按 ▶ 自动演示</span>
</div>
<script>const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(560,Math.min(1100,r.width-12));cv.height=Math.max(420,Math.min(560,r.height-12));}
window.addEventListener('resize',()=>{fit();sceneDraw();});fit();
window.showTip=function(m){if(statusEl)statusEl.textContent=m;};
function drawText(t,x,y,c,fs,al,bl){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=al||'center';ctx.textBaseline=bl||'middle';ctx.fillText(t,x,y);}
function ease(t){t=t<0?0:t>1?1:t;return t*t*(3-2*t);}
function lerp(a,b,t){return a+(b-a)*t;}
let stepIdx=0,animT=0,playing=false,lastT=0,speed=1;
const STEP_DUR=1.4;
function loop(ts){if(!lastT)lastT=ts;var dt=(ts-lastT)/1000;lastT=ts;sceneUpdate(dt);sceneDraw();requestAnimationFrame(loop);}
const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn'),stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn'),speedEl=document.getElementById('speed');
playBtn.onclick=function(){playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';if(playing)animT=0;};
resetBtn.onclick=function(){sceneReset();};
stepFwdBtn.onclick=function(){stepIdx=(stepIdx+1)%STEPS.length;loadStep();};
stepBackBtn.onclick=function(){stepIdx=(stepIdx-1+STEPS.length)%STEPS.length;loadStep();};
speedEl.oninput=function(){speed=parseFloat(speedEl.value);};
function loadStep(){var s=STEPS[stepIdx];if(!s)return;animT=0;if(typeof applyEx==='function'&&s.ex){applyEx(s.ex);}document.getElementById('stepBadge').textContent=s.tag;document.getElementById('stepTitle').textContent=s.name;document.getElementById('stepBody').innerHTML=s.body;document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?s.points.title:'')+'</h4><ul>'+((s.points?s.points.items:[]).map(function(x){return '<li>'+x+'</li>';}).join(''))+'</ul>';document.getElementById('stepCode').textContent=s.code||'';document.querySelectorAll('.step').forEach(function(el,i){el.classList.toggle('active',i===stepIdx);});statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;}
function buildStepbar(){var bar=document.getElementById('stepbar');bar.innerHTML='';STEPS.forEach(function(s,i){var el=document.createElement('div');el.className='step'+(i===stepIdx?' active':'');el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>7?s.name.slice(0,6)+'…':s.name)+'</div>';el.onclick=function(){stepIdx=i;loadStep();};bar.appendChild(el);});}
const STEPS=[{"tag": "引入", "name": "数据分布", "body": "一组数据的<strong>分布特征</strong>可用几个统计量刻画：<strong>集中趋势</strong>（均值、中位数、众数）与<strong>离散程度</strong>（方差）。下面用 6 个数据演示。", "points": {"title": "两类特征", "items": ["集中趋势", "均值/中位数/众数", "离散程度", "方差"]}, "code": "分布 = 集中 + 离散"}, {"tag": "均值", "name": "均值（平均数）", "body": "<strong>均值 = 数据总和 ÷ 个数</strong>。它利用了全部数据，但对<strong>极端值（离群点）</strong>很敏感。拖动 x₆ 看均值如何被拉偏。", "points": {"title": "均值", "items": ["总和/个数", "利用全部数据", "受离群点影响大", "平衡点"]}, "code": "均值 = Σx / n"}, {"tag": "中位数", "name": "中位数", "body": "将数据<strong>从小到大排序</strong>，位于<strong>正中间</strong>的数。个数偶数时取中间两数的平均。<strong>中位数对离群点不敏感</strong>，更能代表典型水平。", "points": {"title": "中位数", "items": ["排序取中间", "偶数取平均", "抗离群", "典型水平"]}, "code": "排序 → 中间"}, {"tag": "众数", "name": "众数", "body": "<strong>众数</strong>是数据中<strong>出现次数最多</strong>的值（可无或多个）。它反映最常出现的情况，但可能不唯一或不存在。", "points": {"title": "众数", "items": ["出现最多", "可无/多个", "反映常见值", "不唯一"]}, "code": "频数最高"}, {"tag": "方差", "name": "方差", "body": "<strong>方差 = 各数据与均值差的平方的平均</strong>。方差越大，数据越<strong>分散</strong>；越小越<strong>集中</strong>。拖大 x₆，方差会明显增大。", "points": {"title": "方差", "items": ["差平方的平均", "衡量离散", "越大越散", "越小越聚"]}, "code": "方差 = Σ(x−均值)² / n"}];

const paEl=document.getElementById('pa'),paV=document.getElementById('paV');
const cardMean=document.getElementById('cardMean'),cardMed=document.getElementById('cardMed'),cardStat=document.getElementById('cardStat');
let P6=5;
function data(){return [2,5,5,7,9,P6];}
function readParams(){P6=parseFloat(paEl.value);paV.textContent='x₆='+P6.toFixed(1);var d=data();var n=d.length;var mean=d.reduce(function(a,b){return a+b;},0)/n;var s=d.slice().sort(function(a,b){return a-b;});var med=n%2?s[(n-1)/2]:(s[n/2-1]+s[n/2])/2;var cnt={};d.forEach(function(x){cnt[x]=(cnt[x]||0)+1;});var mx=0,modes=[];for(var k in cnt){if(cnt[k]>mx){mx=cnt[k];modes=[k];}else if(cnt[k]===mx&&mx>1){modes.push(k);}}var modeTxt=mx<=1?'无（无重复）':modes.join(', ')+'（出现'+mx+'次）';var varr=d.reduce(function(a,x){return a+(x-mean)*(x-mean);},0)/n;cardMean.textContent='均值 = '+mean.toFixed(2);cardMed.textContent='中位数 = '+med.toFixed(2);cardStat.textContent='众数 = '+modeTxt+'   方差 = '+varr.toFixed(2);}
paEl.oninput=function(){readParams();sceneDraw();};
function axis(d){var W=cv.width,H=cv.height,pad=60,yAxis=H/2+20,x0=pad,x1=W-pad;var mn=Math.min.apply(null,d),mx=Math.max.apply(null,d);var lo=Math.floor(Math.min(mn-1.5,-2)),hi=Math.ceil(Math.max(mx+1.5,12));if(hi<=lo){hi=lo+4;}var span=hi-lo;function xOf(v){return x0+(v-lo)/span*(x1-x0);}return{W,H,x0,x1,yAxis,lo,hi,span,xOf};}
function freqMap(d){var c={};d.forEach(function(x){c[x]=(c[x]||0)+1;});return c;}
function drawAxisLine(ax){ctx.strokeStyle='#3a5a8a';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(ax.x0,ax.yAxis);ctx.lineTo(ax.x1,ax.yAxis);ctx.stroke();ctx.fillStyle='#9ab0d0';ctx.textAlign='center';ctx.textBaseline='top';ctx.font='11px sans-serif';for(var v=ax.lo;v<=ax.hi;v++){var x=ax.xOf(v);ctx.beginPath();ctx.moveTo(x,ax.yAxis);ctx.lineTo(x,ax.yAxis+6);ctx.stroke();if((v-ax.lo)%Math.max(1,Math.floor(ax.span/12))===0)ctx.fillText(String(v),x,ax.yAxis+10);}}
function drawDataPoints(d,highlightVals){var ax=axis(d);var c=freqMap(d);drawAxisLine(ax);var maxC=0;for(var k in c){if(c[k]>maxC)maxC=c[k];}var slotH=Math.min(18,(ax.H-ax.yAxis-70)/Math.max(maxC,1));ctx.textAlign='center';ctx.textBaseline='middle';for(var v in c){var x=ax.xOf(parseFloat(v)),cnt=c[v],hl=highlightVals&&highlightVals.indexOf(parseFloat(v))>=0;var fill=hl?'rgba(248,113,113,.55)':'rgba(116,185,255,.55)';var stroke=hl?'#f87171':'#74b9ff';for(var i=0;i<cnt;i++){var y=ax.yAxis-8-i*slotH;ctx.fillStyle=fill;ctx.beginPath();ctx.arc(x,y,5,0,7);ctx.fill();ctx.strokeStyle=stroke;ctx.lineWidth=1.5;ctx.stroke();}ctx.fillStyle=hl?'#f87171':'#9ab0d0';ctx.font='12px sans-serif';ctx.fillText(v+(hl?'×'+cnt:''),x,ax.yAxis+18);}return ax;}
function meanOf(d){return d.reduce(function(a,b){return a+b;},0)/d.length;}
function drawIntro(p){var d=data();var ax=drawDataPoints(d);var pe=ease(Math.min(p/0.7,1));ctx.globalAlpha=pe;drawText('原始数据：'+d.join(', '),ax.W/2,34,'#e8eef8',15);ctx.globalAlpha=1;}
function drawMean(p){var d=data(),mean=meanOf(d),ax=drawDataPoints(d);var xM=ax.xOf(mean);ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;ctx.setLineDash([6,4]);ctx.beginPath();ctx.moveTo(xM,ax.yAxis-55);ctx.lineTo(xM,ax.yAxis+55);ctx.stroke();ctx.setLineDash([]);drawText('均值 = '+mean.toFixed(2),xM,ax.yAxis-62,'#fbbf24',13);var pe=ease(Math.min(p/0.8,1));ctx.globalAlpha=pe;ctx.strokeStyle='rgba(251,191,36,.4)';ctx.lineWidth=1.5;for(var i=0;i<d.length;i++){var x=ax.xOf(d[i]),y=ax.yAxis-12-(i%4)*12;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(xM,y);ctx.stroke();}ctx.globalAlpha=1;ctx.globalAlpha=pe;drawText('各点到均值的距离决定“平衡点”',ax.W/2,ax.H-22,'#fbbf24',13);ctx.globalAlpha=1;}
function drawMed(p){var d=data(),s=d.slice().sort(function(a,b){return a-b;}),n=d.length,med=n%2?s[(n-1)/2]:(s[n/2-1]+s[n/2])/2,ax=drawDataPoints(d);var xM=ax.xOf(med);ctx.strokeStyle='#34d399';ctx.lineWidth=2;ctx.setLineDash([6,4]);ctx.beginPath();ctx.moveTo(xM,ax.yAxis-55);ctx.lineTo(xM,ax.yAxis+55);ctx.stroke();ctx.setLineDash([]);drawText('中位数 = '+med.toFixed(2),xM,ax.yAxis-62,'#34d399',13);var pe=ease(Math.min(p/0.8,1));ctx.globalAlpha=pe;ctx.fillStyle='rgba(52,211,153,.12)';ctx.fillRect(ax.x0,ax.yAxis+32,ax.x1-ax.x0,24);ctx.fillStyle='#34d399';ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='11px sans-serif';for(var i=0;i<s.length;i++){var x=ax.x0+(i+0.5)/s.length*(ax.x1-ax.x0);ctx.fillText('x'+(i+1)+'='+s[i],x,ax.yAxis+44);}ctx.globalAlpha=1;ctx.globalAlpha=pe;drawText('排序后取中间，不受极端值影响',ax.W/2,ax.H-22,'#34d399',13);ctx.globalAlpha=1;}
function drawMode(p){var d=data(),c=freqMap(d),mx=0,modes=[];for(var k in c){if(c[k]>mx){mx=c[k];modes=[parseFloat(k)];}else if(c[k]===mx&&mx>1){modes.push(parseFloat(k));}}var hasMode=mx>1;var ax=drawDataPoints(d,hasMode?modes:[]);var pe=ease(Math.min(p/0.7,1));ctx.globalAlpha=pe;if(hasMode){drawText('众数 = '+modes.join(', ')+'（各出现 '+mx+' 次）',ax.W/2,ax.H-22,'#f87171',13);}else{drawText('众数 = 无（所有值都只出现 1 次）',ax.W/2,ax.H-22,'#f87171',13);}ctx.globalAlpha=1;}
function drawVar(p){var d=data(),mean=meanOf(d),n=d.length;var ax=drawDataPoints(d);var xM=ax.xOf(mean);ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;ctx.setLineDash([5,4]);ctx.beginPath();ctx.moveTo(xM,ax.yAxis-55);ctx.lineTo(xM,ax.yAxis+55);ctx.stroke();ctx.setLineDash([]);drawText('均值 = '+mean.toFixed(2),xM,ax.yAxis-62,'#fbbf24',12);var pe=ease(Math.min(p/0.8,1));ctx.globalAlpha=pe;ctx.strokeStyle='rgba(248,113,113,.5)';ctx.lineWidth=2;for(var i=0;i<n;i++){var x=ax.xOf(d[i]),y=ax.yAxis-10-(i%4)*12;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(xM,y);ctx.stroke();var dev=d[i]-mean;ctx.fillStyle='#f87171';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText(dev>0?('+'+dev.toFixed(1)):'-'+Math.abs(dev).toFixed(1),(x+xM)/2,y-7);}var varr=d.reduce(function(a,x){return a+(x-mean)*(x-mean);},0)/n;ctx.fillStyle='rgba(251,191,36,.15)';var bw=170,bh=Math.min(90,varr*8);var bx=ax.W-bw-24,by=ax.yAxis-100-bh;ctx.fillRect(bx,by,bw,bh);ctx.strokeStyle='#fbbf24';ctx.lineWidth=1.5;ctx.strokeRect(bx,by,bw,bh);ctx.fillStyle='#fbbf24';ctx.font='12px sans-serif';ctx.textAlign='left';ctx.textBaseline='bottom';ctx.fillText('偏离均值的“平均平方” = 方差',bx,by-6);ctx.fillText('s² = '+varr.toFixed(2),bx,by-20);ctx.globalAlpha=1;ctx.globalAlpha=pe;drawText('方差越大，点离均值越远',ax.W/2,ax.H-22,'#fbbf24',13);ctx.globalAlpha=1;}
function sceneDraw(){var W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);var pp=ease(Math.min(animT/STEP_DUR,1));if(stepIdx===0)drawIntro(pp);else if(stepIdx===1)drawMean(pp);else if(stepIdx===2)drawMed(pp);else if(stepIdx===3)drawMode(pp);else if(stepIdx===4)drawVar(pp);}
function sceneInit(){P6=5;stepIdx=0;animT=0;playing=false;paEl.value=P6;readParams();}
function sceneReset(){sceneInit();loadStep();}
function sceneUpdate(dt){animT+=dt*speed;if(!playing&&animT>STEP_DUR)animT=STEP_DUR;if(playing&&animT>STEP_DUR+0.5){stepIdx=(stepIdx+1)%STEPS.length;loadStep();}}

sceneInit();buildStepbar();loadStep();requestAnimationFrame(loop);</script></body></html>
