<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>一元一次方程 · 移项与根</title>
<style>
:root{
  --bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;
  --accent:#3b82f6;--accent2:#74b9ff;--line:#243a5e;
  --good:#34d399;--warn:#fbbf24;--bad:#f87171;--info:#38bdf8;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
.back{color:var(--accent2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap;background:rgba(116,185,255,.06)}
.back:hover{background:rgba(116,185,255,.14)}
.title{font-size:15px;font-weight:600}
.subtitle{font-size:12px;color:var(--muted);font-family:Consolas,Monaco,monospace}
main{flex:1;display:flex;min-height:0}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0;position:relative}
canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}
.panel{width:340px;flex:none;padding:14px;overflow:auto;border-left:1px solid var(--line);background:var(--panel);font-size:13px;line-height:1.7}
.cureq{background:linear-gradient(135deg,rgba(59,130,246,.18),rgba(116,185,255,.08));border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:10px;display:flex;flex-direction:column;gap:2px}
.cureq .lbl{font-size:10px;color:var(--muted);letter-spacing:1px}
.cureq code{font-family:Consolas,Monaco,monospace;font-size:18px;font-weight:700;color:var(--accent2)}
.cureq .root{font-size:12px;color:var(--good)}
.cureq .root strong{font-family:Consolas,Monaco,monospace;font-size:14px}
.panel h2{font-size:14px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--accent);color:#fff;font-size:11px;font-weight:600}
.body{color:var(--muted);margin:0 0 10px}
.body strong{color:var(--ink)}
.body code{background:rgba(59,130,246,.2);color:#bfdbfe;padding:1px 5px;border-radius:4px;font-family:Consolas,Monaco,monospace;font-size:12px}
.points{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin-top:8px;border-left:3px solid var(--accent2)}
.points h4{margin:0 0 6px;font-size:13px;color:var(--ink)}
.points ul{margin:0;padding-left:18px;color:var(--muted)}
.points li{margin-bottom:3px}
.points li strong{color:var(--accent)}
.code{background:#0d1117;border:1px solid var(--line);border-radius:6px;padding:8px 10px;margin-top:8px;font-family:Consolas,Monaco,monospace;font-size:11px;line-height:1.6;color:#c9d1d9;white-space:pre-wrap}
.stepbar{display:flex;gap:6px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);overflow-x:auto}
.step{flex:1;min-width:110px;padding:8px 10px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}
.step:hover{background:#1e345a;border-color:var(--accent2)}
.step.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:600;border-color:transparent}
.step .tag{font-size:10px;opacity:.85;margin-bottom:2px}
.controls{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}
button:hover{background:#1e345a}
button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
button.primary:hover{background:#4b91f8}
.controls label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
input[type=range]{accent-color:var(--accent);width:80px;padding:0;border:none;background:transparent}
.val{display:inline-block;min-width:30px;text-align:center;background:rgba(59,130,246,.15);color:#bfdbfe;border-radius:4px;padding:1px 6px;font-family:Consolas,Monaco,monospace;font-size:12px}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}
</style>
</head>
<body>
<header class="topbar">
  <a class="back" href="../index.html">← 返回数学目录</a>
  <span class="title">一元一次方程 · 移项与根</span>
  <span class="subtitle">ax + b = 0</span>
</header>

<main>
  <div class="stage"><canvas id="cv"></canvas></div>
  <aside class="panel">
    <div class="cureq">
      <span class="lbl">当前方程</span>
      <code id="curEq">2x − 4 = 0</code>
      <span class="root">解（根）x = <strong id="curRoot">2</strong></span>
    </div>
    <h2><span class="badge" id="stepBadge">问题</span><span id="stepTitle">什么 x 使等式成立</span></h2>
    <p class="body" id="stepBody"></p>
    <div class="points" id="stepPoints"></div>
    <div class="code" id="stepCode"></div>
  </aside>
</main>

<div class="stepbar" id="stepbar"></div>

<div class="controls">
  <button id="playBtn" class="primary">▶ 自动演示</button>
  <button id="resetBtn">↺ 重置</button>
  <button id="stepBackBtn">◀ 上一步</button>
  <button id="stepFwdBtn">下一步 ▶</button>
  <label>速度 <input id="speed" type="range" min="0.3" max="2.5" step="0.1" value="1"></label>
  <label>系数 a <input id="aSlider" type="range" min="-5" max="5" step="1" value="2"><span class="val" id="aVal">2</span></label>
  <label>常数 b <input id="bSlider" type="range" min="-10" max="10" step="1" value="-4"><span class="val" id="bVal">−4</span></label>
  <span id="status" class="status">按"自动演示"开始</span>
</div>

<script>
// ======================== Canvas ========================
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(640,Math.min(1100,r.width-12));cv.height=Math.max(460,Math.min(620,r.height-12));}
window.addEventListener('resize',()=>{fit();});fit();

// ======================== Helpers ========================
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function easeInOut(t){t=clamp(t,0,1);return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function fmt(n){if(Math.abs(n-Math.round(n))<0.005)return String(Math.round(n));return(Math.round(n*100)/100).toString();}
function signChar(n){return n>=0?'+':'−';}
function drawText(t,x,y,c,fs,align,baseline){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=align||'center';ctx.textBaseline=baseline||'middle';ctx.fillText(t,x,y);}

// ======================== State ========================
var S={a:2,b:-4,phase:0,phaseT:0,playing:false,speed:1,pointX:-9,flashT:0};

// ======================== Phases ========================
const PHASES=[
  {tag:'问题',name:'什么 x 使等式成立',duration:0,
    body:'<strong>一元一次方程</strong>：只含一个未知数 x，且 x 的最高次数是 1。一般式 <code>ax + b = 0</code>（<strong>a ≠ 0</strong>）。',
    points:{title:'本节目标',items:[
      '<strong>方程</strong> = 含未知数的等式',
      '<strong>解 / 根</strong> = 使等式成立的 x 值',
      '问：什么 x 使 <code>2x − 4 = 0</code> 成立？',
      '下面用 <strong>移项</strong> 把它求出来'
    ]},
    code:'方程：   2x − 4 = 0\n未知数： x\n目标：   求出 x'},
  {tag:'移项',name:'把常数项移到右边',duration:3.4,
    body:'<strong>移项</strong>：把一项从等号一边移到另一边时，<strong>符号必须改变</strong>（+ 变 −，− 变 +）。这样把含 x 的项与常数项分开到等号两边。',
    points:{title:'观察常数项的旅行',items:[
      '<strong>− 4</strong> 从等号左边起飞',
      '飞越 <code>=</code> 时 <strong>变号</strong>',
      '落地成为 <strong>+ 4</strong>',
      '得到：<code>2x = 4</code>'
    ]},
    code:'2x − 4 = 0\n   ↓ 移项（变号）\n2x = 0 + 4\n   ↓ 合并\n2x = 4'},
  {tag:'除 a',name:'两边同除以 a',duration:3.4,
    body:'现在 x 前面还有系数 a。<strong>两边同时除以 a</strong>（a ≠ 0），就能把 x 单独求出来 —— 这一步叫"系数化为 1"。',
    points:{title:'系数化为 1',items:[
      '等号两边同时 <strong>÷ 2</strong>',
      '左边 <code>2x ÷ 2 = x</code>',
      '右边 <code>4 ÷ 2 = 2</code>',
      '<strong>x = 2</strong>  ← 方程的解（根）'
    ]},
    code:'2x = 4\n   ↓ 两边 ÷ 2\nx = 4 / 2\n   ↓ 化简\nx = 2'},
  {tag:'几何',name:'解 = 直线与 x 轴交点',duration:1.8,
    body:'把方程 <code>ax + b = 0</code> 看成函数 <code>y = ax + b</code> 的图像（一条直线）。<strong>方程的解 = 直线与 x 轴交点的横坐标</strong> —— 此处 <code>y = 0</code>，正好满足方程。',
    points:{title:'数形结合',items:[
      '直线 <code>y = 2x − 4</code>',
      '与 x 轴交于点 <strong>(2, 0)</strong>',
      '此处 <strong>y = 0</strong>，方程成立',
      '<strong>代数解 = 几何交点</strong>'
    ]},
    code:'y = ax + b\n令 y = 0\n→ ax + b = 0\n→ x = − b / a'},
  {tag:'验证',name:'动点滑向 y = 0',duration:6.0,
    body:'让一个点沿直线滑动。注意它的 y 值 —— 当滑到 <strong>y = 0</strong> 的位置时，正好对应方程的解。<strong>y = 0 ⟺ 方程被满足</strong>。',
    points:{title:'观察动点',items:[
      '黄点沿 <code>y = 2x − 4</code> 滑动',
      '观察 y 值由负变正',
      '滑到 <strong>(2, 0)</strong> 时 <strong>y = 0</strong>',
      '这一刻方程 2x − 4 = 0 成立'
    ]},
    code:'动点： (x, 2x − 4)\n当 y = 0 时\n→ 2x − 4 = 0\n→ x = 2'}
];

// ======================== Phase Control ========================
function nextPhase(){if(S.phase<PHASES.length-1){S.phase++;S.phaseT=0;if(S.phase===4)S.pointX=-9;updateUI();}}
function prevPhase(){if(S.phase>0){S.phase--;S.phaseT=0;updateUI();}}
function goToPhase(i){S.phase=clamp(i,0,PHASES.length-1);S.phaseT=0;if(S.phase===4)S.pointX=-9;updateUI();}
function resetScene(){S.phase=0;S.phaseT=0;S.pointX=-9;S.playing=false;playBtn.textContent='▶ 自动演示';updateUI();}

// ======================== Update ========================
function update(dt){
  var dts=dt*S.speed;
  S.phaseT+=dts;S.flashT+=dt;
  if(S.phase===4){
    var root=-S.b/S.a;
    if(S.pointX<root-0.02){
      var dist=root-S.pointX;
      var sp=Math.max(1.0,dist*1.4);
      S.pointX=Math.min(root,S.pointX+dts*sp);
    }
  }
  var dur=PHASES[S.phase].duration;
  if(dur>0&&S.phaseT>=dur&&S.phase<PHASES.length-1) nextPhase();
}

// ======================== Drawing ========================
function drawAxesAndGrid(W,H,ox,oy,sc){
  ctx.strokeStyle='rgba(36,58,94,0.35)';ctx.lineWidth=1;
  for(var i=-12;i<=12;i++){if(i===0)continue;
    ctx.beginPath();ctx.moveTo(ox+i*sc,40);ctx.lineTo(ox+i*sc,H-40);ctx.stroke();
    ctx.beginPath();ctx.moveTo(40,oy+i*sc);ctx.lineTo(W-40,oy+i*sc);ctx.stroke();
  }
  ctx.strokeStyle='#3a5a8a';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(40,oy);ctx.lineTo(W-40,oy);ctx.moveTo(ox,40);ctx.lineTo(ox,H-40);ctx.stroke();
  ctx.fillStyle='#3a5a8a';
  ctx.beginPath();ctx.moveTo(W-32,oy);ctx.lineTo(W-44,oy-5);ctx.lineTo(W-44,oy+5);ctx.fill();
  ctx.beginPath();ctx.moveTo(ox,32);ctx.lineTo(ox-5,44);ctx.lineTo(ox+5,44);ctx.fill();
  ctx.fillStyle='#9ab0d0';ctx.font='10px sans-serif';
  ctx.textAlign='center';ctx.textBaseline='top';
  for(var i=-10;i<=10;i++){if(i===0)continue;var x=ox+i*sc;if(x>30&&x<W-30)ctx.fillText(i,x,oy+4);}
  ctx.textAlign='right';ctx.textBaseline='middle';
  for(var j=-10;j<=10;j++){if(j===0)continue;var y=oy-j*sc;if(y>30&&y<H-30)ctx.fillText(j,ox-6,y);}
  drawText('O',ox-10,oy+10,'#9ab0d0',11);
  drawText('x',W-30,oy+14,'#74b9ff',13);
  drawText('y',ox+12,32,'#74b9ff',13);
}

function drawLine(W,H,ox,oy,sc,alpha){
  var a=S.a,b=S.b;
  ctx.save();ctx.globalAlpha=alpha;
  ctx.strokeStyle='#74b9ff';ctx.lineWidth=3;ctx.beginPath();
  var started=false;
  for(var px=40;px<=W-40;px+=1){
    var x=(px-ox)/sc,y=a*x+b,py=oy-y*sc;
    if(py>=30&&py<=H-30){if(!started){ctx.moveTo(px,py);started=true;}else ctx.lineTo(px,py);}
    else started=false;
  }
  ctx.stroke();
  var lx=W-90,ly=oy-(a*(lx-ox)/sc+b)*sc;
  if(ly>60&&ly<H-60)drawText('y = '+a+'x '+signChar(b)+' '+Math.abs(b),lx,ly-14,'#74b9ff',13);
  ctx.restore();
}

function drawEquation(W,eqY,fs){
  var a=S.a,b=S.b,absB=Math.abs(b),root=-b/a,cx=W/2;

  if(S.phase===0){
    drawText(a+'x '+signChar(b)+' '+absB+' = 0',cx,eqY,'#e8eef8',fs);
    var pulse=0.6+0.4*Math.sin(S.flashT*2.5);
    ctx.globalAlpha=pulse;
    drawText('?  什么 x 使它成立',cx,eqY+34,'#fbbf24',fs-8);
    ctx.globalAlpha=1;
  }
  else if(S.phase===1){
    var t=easeInOut(S.phaseT/2.4);
    var axPos=cx-130,eqPos=cx,zeroPos=cx+50;
    var bStart=cx-60,bEnd=cx+130;
    var bX=lerp(bStart,bEnd,t);
    var bY=eqY-Math.sin(t*Math.PI)*40;
    drawText(a+'x',axPos,eqY,'#e8eef8',fs);
    drawText('=',eqPos,eqY,'#9ab0d0',fs);
    drawText('0',zeroPos,eqY,'#9ab0d0',fs);
    var origSign=b>=0?'+':'−',flipSign=b>=0?'−':'+';
    var curSign=t<0.5?origSign:flipSign;
    var bColor=t<0.5?'#f87171':'#34d399';
    if(t>0.05&&t<0.95){
      ctx.strokeStyle='rgba(251,191,36,0.25)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.moveTo(bStart,eqY);ctx.lineTo(bX,bY);ctx.stroke();ctx.setLineDash([]);
    }
    drawText(curSign+' '+absB,bX,bY,bColor,fs);
    if(t>0.45&&t<0.55){
      var flash=1-Math.abs(t-0.5)*20;
      ctx.globalAlpha=flash;
      drawText('变号！',cx,eqY-58,'#fbbf24',13);
      ctx.globalAlpha=1;
    }
    if(S.phaseT>2.5){
      var t2=clamp((S.phaseT-2.5)/0.8,0,1);
      ctx.globalAlpha=t2;
      drawText('↓ 化简得    '+a+'x = '+absB,cx,eqY+50,'#34d399',fs-6);
      ctx.globalAlpha=1;
    }
  }
  else if(S.phase===2){
    var t=easeInOut(S.phaseT/2.4);
    var axPos=cx-90,eqPos=cx,rhsPos=cx+90;
    drawText('=',eqPos,eqY,'#9ab0d0',fs);
    if(t<0.55){
      ctx.fillStyle='#fbbf24';ctx.font='bold '+(fs-4)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(String(a),axPos-14,eqY);
      drawText('x',axPos+14,eqY,'#e8eef8',fs);
      drawText(String(absB),rhsPos,eqY,'#e8eef8',fs);
    }else{
      drawText('x',axPos,eqY,'#e8eef8',fs);
      if(t<0.85){
        ctx.fillStyle='#e8eef8';ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(String(absB),rhsPos,eqY-11);
        ctx.fillText(String(a),rhsPos,eqY+11);
        ctx.strokeStyle='#9ab0d0';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(rhsPos-13,eqY);ctx.lineTo(rhsPos+13,eqY);ctx.stroke();
      }else{
        drawText(fmt(root),rhsPos,eqY,'#34d399',fs);
      }
    }
    if(t>0.1&&t<0.95){
      var alpha=Math.sin(t*Math.PI);
      ctx.globalAlpha=alpha;
      drawText('两边同时 ÷ '+a,cx,eqY+44,'#fbbf24',14);
      ctx.globalAlpha=1;
    }
    if(S.phaseT>2.6){
      var t2=clamp((S.phaseT-2.6)/0.8,0,1);
      ctx.globalAlpha=t2;
      drawText('✓  x = '+fmt(root)+'   ← 方程的根',cx,eqY+56,'#34d399',fs-6);
      ctx.globalAlpha=1;
    }
  }
  else if(S.phase===3){
    drawText(a+'x '+signChar(b)+' '+absB+' = 0',cx-140,eqY,'#9ab0d0',fs-4);
    drawText('→',cx-15,eqY,'#9ab0d0',fs-4);
    drawText('x = '+fmt(root),cx+115,eqY,'#34d399',fs);
    var pulse=0.5+0.5*Math.sin(S.flashT*4);
    ctx.globalAlpha=pulse*0.85;
    drawText('↑ 此即直线与 x 轴的交点',cx,eqY+32,'#34d399',fs-8);
    ctx.globalAlpha=1;
  }
  else if(S.phase===4){
    var py=S.a*S.pointX+S.b;
    var isRoot=Math.abs(S.pointX-root)<0.03;
    var ptColor=isRoot?'#34d399':'#fbbf24';
    drawText('点 ('+fmt(S.pointX)+', '+fmt(py)+')',cx-90,eqY,ptColor,fs-4);
    if(isRoot){
      var pulse=0.6+0.4*Math.sin(S.flashT*5);
      ctx.globalAlpha=pulse;
      drawText('y = 0 ⟹ 方程成立 → 这就是根',cx+70,eqY,'#34d399',fs-7);
      ctx.globalAlpha=1;
    }else{
      drawText('y = '+fmt(py)+' ≠ 0',cx+70,eqY,'#fbbf24',fs-7);
    }
  }
}

function drawGeometry(W,H,ox,oy,sc){
  var a=S.a,b=S.b,root=-b/a;
  var rx=ox+root*sc;
  if(S.phase>=3&&rx>30&&rx<W-30){
    var pulse=1+0.2*Math.sin(S.flashT*3);
    ctx.fillStyle='rgba(52,211,153,0.18)';
    ctx.beginPath();ctx.arc(rx,oy,18*pulse,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#34d399';
    ctx.beginPath();ctx.arc(rx,oy,8,0,Math.PI*2);ctx.fill();
    drawText('根 x = '+fmt(root),rx,oy+28,'#34d399',13);
    drawText('y = 0',rx,oy-18,'#34d399',11);
  }
  if(S.phase===4){
    var px=ox+S.pointX*sc;
    var py=oy-(a*S.pointX+b)*sc;
    var isRoot=Math.abs(S.pointX-root)<0.03;
    ctx.strokeStyle='rgba(251,191,36,0.25)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(ox+(-9)*sc,oy-(a*-9+b)*sc);ctx.lineTo(px,py);ctx.stroke();
    ctx.strokeStyle='rgba(251,191,36,0.5)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px,oy);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle=isRoot?'#34d399':'#fbbf24';
    ctx.beginPath();ctx.arc(px,py,7,0,Math.PI*2);ctx.fill();
    drawText('x = '+fmt(S.pointX),px,oy+14,isRoot?'#34d399':'#fbbf24',10);
    var yVal=a*S.pointX+b;
    drawText('y = '+fmt(yVal),px+34,py+(py<oy?-6:6),isRoot?'#34d399':'#fbbf24',12,'left');
  }
}

function draw(){
  var W=cv.width,H=cv.height,ox=W/2,oy=H/2;
  var sc=Math.min(W/22,H/16);
  ctx.clearRect(0,0,W,H);
  drawAxesAndGrid(W,H,ox,oy,sc);
  var lineAlpha=S.phase<3?0.22:1.0;
  drawLine(W,H,ox,oy,sc,lineAlpha);
  var eqY=50,eqFs=Math.max(20,Math.min(30,W/35));
  drawEquation(W,eqY,eqFs);
  drawGeometry(W,H,ox,oy,sc);
  var hints=[
    '蓝色直线是 y = '+S.a+'x '+signChar(S.b)+' '+Math.abs(S.b)+' 的图像（下一步求 x）',
    '观察红色 "'+signChar(S.b)+' '+Math.abs(S.b)+'" 飞过等号后变号',
    '两边同时除以 '+S.a+'，把 x 单独留下来',
    '绿色点 ('+fmt(-S.b/S.a)+', 0) 就是方程的根 —— 直线与 x 轴的交点',
    '黄点沿直线滑动，y 值在右下角显示；滑到 y=0 时即根'
  ];
  drawText(hints[S.phase],W/2,H-14,'#9ab0d0',12);
}

// ======================== Loop ========================
var lastT=0;
function loop(ts){
  if(!lastT)lastT=ts;
  var dt=Math.min(0.05,(ts-lastT)/1000);
  lastT=ts;
  if(S.playing)update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ======================== UI ========================
function buildStepbar(){
  var bar=document.getElementById('stepbar');bar.innerHTML='';
  PHASES.forEach((p,i)=>{
    var el=document.createElement('div');
    el.className='step'+(i===S.phase?' active':'');
    var short=p.name.length>8?p.name.slice(0,7)+'…':p.name;
    el.innerHTML='<div class="tag">'+p.tag+'</div><div>'+short+'</div>';
    el.onclick=()=>goToPhase(i);
    bar.appendChild(el);
  });
}
function updatePanel(){
  var p=PHASES[S.phase];
  document.getElementById('stepBadge').textContent=p.tag;
  document.getElementById('stepTitle').textContent=p.name;
  document.getElementById('stepBody').innerHTML=p.body;
  document.getElementById('stepPoints').innerHTML='<h4>'+p.points.title+'</h4><ul>'+p.points.items.map(x=>'<li>'+x+'</li>').join('')+'</ul>';
  document.getElementById('stepCode').innerHTML=p.code||'';
}
function updateStatus(){
  var p=PHASES[S.phase];
  var msg='阶段 '+(S.phase+1)+' / '+PHASES.length+' · '+p.name;
  if(S.playing)msg+=' （演示中）';
  document.getElementById('status').textContent=msg;
}
function updateUI(){buildStepbar();updatePanel();updateStatus();updateCurEq();}
function updateCurEq(){
  document.getElementById('curEq').textContent=S.a+'x '+signChar(S.b)+' '+Math.abs(S.b)+' = 0';
  document.getElementById('curRoot').textContent=fmt(-S.b/S.a);
  document.getElementById('aVal').textContent=S.a;
  document.getElementById('bVal').textContent=(S.b>=0?'+':'−')+Math.abs(S.b);
}

// ======================== Controls ========================
var playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn'),
    stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn'),
    speedEl=document.getElementById('speed'),aSlider=document.getElementById('aSlider'),bSlider=document.getElementById('bSlider');

playBtn.onclick=()=>{S.playing=!S.playing;playBtn.textContent=S.playing?'⏸ 暂停':'▶ 自动演示';updateStatus();};
resetBtn.onclick=()=>resetScene();
stepFwdBtn.onclick=()=>{nextPhase();updateStatus();};
stepBackBtn.onclick=()=>{prevPhase();updateStatus();};
speedEl.oninput=()=>{S.speed=parseFloat(speedEl.value);};

aSlider.oninput=()=>{
  var newA=parseInt(aSlider.value);
  if(newA===0){newA=S.a>0?1:-1;aSlider.value=newA;}
  S.a=newA;
  if(S.phase===4)S.pointX=-9;
  S.phaseT=0;
  updateUI();
};
bSlider.oninput=()=>{
  S.b=parseInt(bSlider.value);
  if(S.phase===4)S.pointX=-9;
  S.phaseT=0;
  updateUI();
};

// ======================== Init ========================
updateUI();
requestAnimationFrame(loop);
</script>
</body>
</html>
