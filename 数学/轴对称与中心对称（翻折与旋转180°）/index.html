<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>轴对称与中心对称 · 翻折与旋转180°</title>
<style>:root{--bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;--accent:#3b82f6;--accent2:#74b9ff;--line:#243a5e;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
.back{color:var(--accent2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap;background:rgba(116,185,255,.06)}.back:hover{background:rgba(116,185,255,.14)}
.title{font-size:15px;font-weight:600}.subtitle{font-size:12px;color:var(--muted)}
.cards{display:flex;gap:10px;padding:10px 16px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(59,130,246,.06),transparent)}
.card{flex:1;min-width:190px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 12px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}.card.s2::before{background:var(--good)}.card.s3::before{background:var(--bad)}.card.s4::before{background:var(--warn)}
.card h4{margin:0 0 4px;font-size:13px}.card .v{font-size:11.5px;color:var(--muted);line-height:1.6;white-space:pre-wrap}
.card .num{position:absolute;right:8px;top:6px;font-size:22px;font-weight:700;color:rgba(255,255,255,.07)}
main{flex:1;display:flex;min-height:0}.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}
.panel{width:340px;flex:none;padding:14px;overflow:auto;border-left:1px solid var(--line);background:var(--panel);font-size:13px;line-height:1.7}
.panel h2{font-size:14px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--accent);color:#fff;font-size:11px;font-weight:600}
.body{color:var(--muted);margin:0 0 10px}.body strong{color:var(--ink)}.body code{background:rgba(59,130,246,.2);color:#bfdbfe;padding:1px 5px;border-radius:4px;font-family:Consolas,Monaco,monospace;font-size:12px}
.points{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin-top:8px;border-left:3px solid var(--accent2)}.points h4{margin:0 0 6px;font-size:13px}.points ul{margin:0;padding-left:18px;color:var(--muted)}.points li{margin-bottom:3px}.points li strong{color:var(--accent)}
.code{background:#0d1117;border:1px solid var(--line);border-radius:6px;padding:8px 10px;margin-top:8px;font-family:Consolas,Monaco,monospace;font-size:11.5px;line-height:1.6;color:#c9d1d9;white-space:pre-wrap}
.stepbar{display:flex;gap:6px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);overflow-x:auto}
.step{flex:1;min-width:84px;padding:8px 6px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}.step:hover{background:#1e345a;border-color:var(--accent2)}.step.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:600;border-color:transparent}
.controls{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}button:hover{background:#1e345a}button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}button.primary:hover{background:#4b91f8}
.controls label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}input[type=range]{accent-color:var(--accent);width:110px}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}
</style></head>
<body>
<header class="topbar"><a class="back" href="../index.html">← 返回数学目录</a><span class="title">轴对称与中心对称</span><span class="subtitle">翻折 vs 旋转180° · 拖动"进度"手动控制变换</span></header>
<div class="cards">
  <div class="card s2"><div class="num">1</div><h4>轴对称</h4><div class="v">沿一条直线翻折后重合；直线叫对称轴。变换=翻折。</div></div>
  <div class="card s3"><div class="num">2</div><h4>中心对称</h4><div class="v">绕某点旋转 180° 后重合；该点叫对称中心。变换=旋转。</div></div>
  <div class="card s4"><div class="num">3</div><h4>关键区别</h4><div class="v">轴对称→镜像（左右反）；中心对称→倒置（上下左右都反）。</div></div>
  <div class="card"><div class="num">4</div><h4>操作提示</h4><div class="v">拖动"进度"滑块手动控制翻折/旋转；按 ▶ 自动演示。</div></div>
</div>
<main><div class="stage"><canvas id="cv"></canvas></div>
<aside class="panel"><h2><span class="badge" id="stepBadge">轴对称</span><span id="stepTitle"></span></h2><p class="body" id="stepBody"></p><div class="points" id="stepPoints"></div><div class="code" id="stepCode"></div></aside>
</main>
<div class="stepbar" id="stepbar"></div>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button><button id="resetBtn">↺ 重置</button><button id="stepBackBtn">◀ 上一步</button><button id="stepFwdBtn">下一步 ▶</button>
  <label>进度<input id="prog" type="range" min="0" max="1" step="0.01" value="0"></label>
  <label>速度<input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <span id="status" class="status">拖动进度或按 ▶</span>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),statusEl=document.getElementById('status');
const progEl=document.getElementById('prog');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(560,Math.min(1100,r.width-12));cv.height=Math.max(420,Math.min(560,r.height-12));}
window.addEventListener('resize',()=>{fit();sceneDraw();});fit();
window.showTip=function(m){if(statusEl)statusEl.textContent=m;};
function drawText(t,x,y,c,fs,al,bl){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=al||'center';ctx.textBaseline=bl||'middle';ctx.fillText(t,x,y);}
function ease(t){t=t<0?0:t>1?1:t;return t*t*(3-2*t);}
let stepIdx=0,animT=0,playing=false,lastT=0,speed=1,manual=null;
const STEP_DUR=1.6;
// F 形本地顶点（已居中）：宽3 高4，中心(0,0)
const F=[[-1.5,-2],[-1.5,2],[1.5,2],[1.5,1],[-0.5,1],[-0.5,0.4],[0.9,0.4],[0.9,-0.4],[-0.5,-0.4],[-0.5,-2]];
function drawFLocal(fill,stroke,sw){ctx.beginPath();ctx.moveTo(F[0][0],F[0][1]);for(var i=1;i<F.length;i++)ctx.lineTo(F[i][0],F[i][1]);ctx.closePath();if(fill){ctx.fillStyle=fill;ctx.fill();}if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw||2;ctx.stroke();}}
function curP(){return manual!==null?manual:ease(Math.min(animT/STEP_DUR,1));}
function u(){return Math.min(cv.width,cv.height)/15;}
// 轴对称：在 axisX 处翻折。绘制原图(蓝)+翻折副本(绿)
function drawAxisSym(axisX,cy,p,showProp){
  var uu=u(),d=2.6*uu;
  // 对称轴
  ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;ctx.setLineDash([7,5]);ctx.beginPath();ctx.moveTo(axisX,30);ctx.lineTo(axisX,cv.height-30);ctx.stroke();ctx.setLineDash([]);
  drawText('对称轴',axisX,20,'#fbbf24',12);
  // 原图（左，蓝）
  ctx.save();ctx.translate(axisX-d,cy);ctx.scale(uu,uu);drawFLocal('rgba(59,130,246,.55)','#74b9ff',2/u);ctx.restore();
  ctx.save();ctx.translate(axisX-d,cy);ctx.scale(uu,uu);drawFLocal(null,'#74b9ff',0.12);ctx.restore();
  // 翻折副本（绿）：scaleX = cos(p*π)
  ctx.save();ctx.translate(axisX,cy);ctx.scale(uu*Math.cos(p*Math.PI),uu);ctx.translate(-d,0);drawFLocal('rgba(52,211,153,.6)','#34d399',2/u);ctx.restore();
  if(showProp){
    // 取顶点 (1.5,2) 作 P，其像 P'
    var Px=axisX-d+1.5*uu, Py=cy+2*uu;
    var Px2=axisX+d-1.5*uu, Py2=cy+2*uu;
    ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(Px,Py,5,0,7);ctx.fill();ctx.beginPath();ctx.arc(Px2,Py2,5,0,7);ctx.fill();
    drawText('P',Px,Py-14,'#fbbf24',12);drawText("P'",Px2,Py2-14,'#fbbf24',12);
    ctx.strokeStyle='rgba(251,191,36,.6)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(Px,Py);ctx.lineTo(Px2,Py2);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#34d399';ctx.beginPath();ctx.arc(axisX,Py,4,0,7);ctx.fill();drawText('中点在对称轴上',axisX,Py-22,'#34d399',11);
    // 直角标记
    ctx.strokeStyle='#34d399';ctx.lineWidth=1.5;ctx.strokeRect(axisX-6,Py-6,6,6);
    drawText('PP′ 被对称轴垂直平分',cv.width/2,cv.height-16,'#9ab0d0',13);
  }
}
// 中心对称：绕 旋转180°
function drawCentSym(cx,cy,p,showProp){
  var uu=u(),d=2.6*uu;
  // 中心点
  ctx.fillStyle='#f87171';ctx.beginPath();ctx.arc(cx,cy,5,0,7);ctx.fill();drawText('对称中心',cx,cy-16,'#f87171',12);
  // 原图（左，蓝）
  ctx.save();ctx.translate(cx-d,cy);ctx.scale(uu,uu);drawFLocal('rgba(59,130,246,.55)','#74b9ff',2/u);ctx.restore();
  ctx.save();ctx.translate(cx-d,cy);ctx.scale(uu,uu);drawFLocal(null,'#74b9ff',0.12);ctx.restore();
  // 旋转副本（绿）
  ctx.save();ctx.translate(cx,cy);ctx.rotate(p*Math.PI);ctx.scale(uu,uu);ctx.translate(-d,0);drawFLocal('rgba(52,211,153,.6)','#34d399',2/u);ctx.restore();
  if(showProp){
    var Px=cx-d+1.5*uu, Py=cy+2*uu;
    var Px2=cx+d-1.5*uu, Py2=cy-2*uu;
    ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(Px,Py,5,0,7);ctx.fill();ctx.beginPath();ctx.arc(Px2,Py2,5,0,7);ctx.fill();
    drawText('P',Px,Py-14,'#fbbf24',12);drawText("P'",Px2,Py2+14,'#fbbf24',12);
    ctx.strokeStyle='rgba(251,191,36,.6)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(Px,Py);ctx.lineTo(Px2,Py2);ctx.stroke();ctx.setLineDash([]);
    drawText('PP′ 过中心且被中心平分',cv.width/2,cv.height-16,'#9ab0d0',13);
  }
}
function sceneDraw(){var W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);var p=curP();var cx=W/2,cy=H/2+10;
  if(stepIdx===0){drawAxisSym(cx,cy,p,false);drawText('轴对称：沿对称轴翻折后重合',W/2,H-40,'#e8eef8',15);}
  else if(stepIdx===1){drawAxisSym(cx,cy,1,true);drawText('性质：对应点连线被对称轴垂直平分',W/2,40,'#fbbf24',14);}
  else if(stepIdx===2){drawCentSym(cx,cy,p,false);drawText('中心对称：绕中心旋转 180° 后重合',W/2,H-40,'#e8eef8',15);}
  else if(stepIdx===3){drawCentSym(cx,cy,1,true);drawText('性质：对应点连线过中心且被平分',W/2,40,'#fbbf24',14);}
  else if(stepIdx===4){
    // 对比：左轴对称，右中心对称
    drawAxisSym(W*0.27,H/2,p,false);drawText('轴对称（翻折）',W*0.27,H-30,'#74b9ff',13);
    drawCentSym(W*0.73,H/2,p,false);drawText('中心对称（旋转180°）',W*0.73,H-30,'#f87171',13);
    drawText('左=镜像  右=倒置（上下左右都反）',W/2,36,'#e8eef8',14);
  }
  if(manual===null)progEl.value=p;
}
const STEPS=[
 {tag:"轴对称",name:"翻折变换",body:"<strong>轴对称</strong>：把一个图形沿一条直线<strong>翻折</strong>，如果它能与另一个图形重合，就说这两个图形关于这条直线成轴对称。这条直线叫<strong>对称轴</strong>。拖动「进度」看 F 形翻折过去。",points:{title:"要点",items:["沿直线翻折","直线=对称轴","翻折后重合","镜像（左右相反）"]},code:"轴对称 = 翻折\n对称轴 = 直线"},
 {tag:"性质",name:"轴对称性质",body:"成轴对称的两个图形，<strong>对应点的连线被对称轴垂直平分</strong>。即对称轴是任一组对应点连线的<strong>中垂线</strong>。",points:{title:"性质",items:["对应点连线段","被对称轴垂直平分","对称轴=中垂线","对应点到轴等距"]},code:"PP′ ⊥ 对称轴\n且被对称轴平分"},
 {tag:"中心对称",name:"旋转180°",body:"<strong>中心对称</strong>：把一个图形绕某一点<strong>旋转 180°</strong>，如果它与另一个图形重合，就说它们关于该点成中心对称。这个点叫<strong>对称中心</strong>。",points:{title:"要点",items:["绕一点旋转 180°","点=对称中心","旋转后重合","上下左右都相反"]},code:"中心对称 = 旋转180°\n对称中心 = 点"},
 {tag:"性质",name:"中心对称性质",body:"成中心对称的两个图形，<strong>对应点连线过对称中心，且被对称中心平分</strong>。即对称中心是每组对应点连线的<strong>中点</strong>。",points:{title:"性质",items:["对应点连线过中心","中心是连线中点","PP′ 被中心平分","P 与 P′ 关于中心对称"]},code:"PP′ 过对称中心\n中心 = PP′ 中点"},
 {tag:"对比",name:"两种对称对比",body:"<strong>轴对称</strong>是「翻折」（关于一条<strong>直线</strong>），得到镜像（左右反）；<strong>中心对称</strong>是「旋转 180°」（关于一个<strong>点</strong>），得到倒置（上下左右都反）。例：矩形既是轴对称也是中心对称；平行四边形只是中心对称。",points:{title:"区别",items:["轴对称：翻折·直线·镜像","中心对称：旋转·点·倒置","矩形：两者皆是","平行四边形：仅中心对称"]},code:"轴对称 ~ 直线(翻折)\n中心对称 ~ 点(旋转180°)"}
];
function loadStep(){var s=STEPS[stepIdx];if(!s)return;animT=0;manual=null;document.getElementById('stepBadge').textContent=s.tag;document.getElementById('stepTitle').textContent=s.name;document.getElementById('stepBody').innerHTML=s.body;document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?s.points.title:'')+'</h4><ul>'+((s.points?s.points.items:[]).map(function(x){return '<li>'+x+'</li>';}).join(''))+'</ul>';document.getElementById('stepCode').textContent=s.code||'';document.querySelectorAll('.step').forEach(function(el,i){el.classList.toggle('active',i===stepIdx);});statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;}
function buildStepbar(){var bar=document.getElementById('stepbar');bar.innerHTML='';STEPS.forEach(function(s,i){var el=document.createElement('div');el.className='step'+(i===stepIdx?' active':'');el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>6?s.name.slice(0,5)+'…':s.name)+'</div>';el.onclick=function(){stepIdx=i;loadStep();};bar.appendChild(el);});}
function sceneInit(){stepIdx=0;animT=0;manual=null;playing=false;}
function sceneReset(){sceneInit();loadStep();statusEl.textContent='已重置';}
function sceneUpdate(dt){if(manual!==null)return;animT+=dt*speed;if(!playing&&animT>STEP_DUR)animT=STEP_DUR;if(playing&&animT>STEP_DUR+0.5){stepIdx=(stepIdx+1)%STEPS.length;loadStep();}}
const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn'),stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn'),speedEl=document.getElementById('speed');
playBtn.onclick=function(){playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';manual=null;if(playing)animT=0;};
resetBtn.onclick=function(){sceneReset();};stepFwdBtn.onclick=function(){stepIdx=(stepIdx+1)%STEPS.length;loadStep();};stepBackBtn.onclick=function(){stepIdx=(stepIdx-1+STEPS.length)%STEPS.length;loadStep();};speedEl.oninput=function(){speed=parseFloat(speedEl.value);};
progEl.oninput=function(){manual=parseFloat(progEl.value);playing=false;playBtn.textContent='▶ 播放';};
function loop(ts){if(!lastT)lastT=ts;var dt=(ts-lastT)/1000;lastT=ts;sceneUpdate(dt);sceneDraw();requestAnimationFrame(loop);}
sceneInit();buildStepbar();loadStep();requestAnimationFrame(loop);
</script></body></html>
