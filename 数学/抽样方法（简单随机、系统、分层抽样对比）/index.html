<style>
:root{--bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;--accent:#fbbf24;--accent2:#06b6d4;--line:#243a5e;--good:#34d399;--warn:#fbbf24;--bad:#f87171;}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
.back{color:var(--accent2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap;background:rgba(6,182,212,.06)}
.back:hover{background:rgba(6,182,212,.14)}

.card.s2::before{background:var(--accent2)}.card.s3::before{background:var(--good)}.card.s4::before{background:var(--bad)}

main{flex:1;display:flex;min-height:0}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}

.body{color:var(--muted);margin:0 0 10px}.body strong{color:var(--ink)}
.body code{background:rgba(251,191,36,.2);color:#fde68a;padding:1px 5px;border-radius:4px;font-family:Consolas,Monaco,monospace;font-size:12px}

.points li{margin-bottom:3px}.points li strong{color:var(--accent)}
.stepbar{display:flex;gap:6px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);overflow-x:auto}
.step{flex:1;min-width:100px;padding:8px 10px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}
.step:hover{background:#1e345a;border-color:var(--accent2)}
.step.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1a1a;font-weight:600;border-color:transparent}

button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}
button:hover{background:#1e345a}button.primary{background:var(--accent);border-color:var(--accent);color:#1a1a1a;font-weight:600}
.controls label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
input[type=range]{accent-color:var(--accent)}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}

<body>
<header class="topbar"><a class="back" href="../index.html">← 返回数学目录</a><span class="title">抽样方法</span><span class="subtitle">简单随机 · 系统 · 分层抽样对比</span></header>
<div class="cards">
  <div class="card"><div class="num">1</div><h4>简单随机抽样</h4><div class="v">逐个不放回抽取<br>每个个体等概率</div></div>
  <div class="card s2"><div class="num">2</div><h4>系统抽样</h4><div class="v">编号后等距抽取<br>间隔 k = N / n</div></div>
  <div class="card s3"><div class="num">3</div><h4>分层抽样</h4><div class="v">按特征分层<br>层内按比例抽取</div></div>
  <div class="card s4"><div class="num">4</div><h4>三种方法对比</h4><div class="v">共同点：等概率<br>差异：适用范围</div></div>
</div>
<main>
  <div class="stage"><canvas id="cv"></canvas></div>
  <aside class="panel"><h2><span class="badge" id="stepBadge">基础</span><span id="stepTitle">抽样概念</span></h2><p class="body" id="stepBody"></p><div class="points" id="stepPoints"></div></aside>
</main>
<div class="stepbar" id="stepbar"></div>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button><button id="resetBtn">↺ 重置</button>
  <button id="stepBackBtn">◀ 上一步</button><button id="stepFwdBtn">下一步 ▶</button>
  <label>速度 <input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <span id="status" class="status">点击播放或选择步骤</span>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(520,Math.min(1100,r.width-12));cv.height=Math.max(400,Math.min(600,r.height-12));}
window.addEventListener('resize',()=>{fit();draw();});fit();
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawText(t,x,y,c,fs,a,b){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=a||'center';ctx.textBaseline=b||'middle';ctx.fillText(t,x,y);}

// ============================================================
// 总体：100 个小球（固定布局 10×10 网格），代表全体研究对象
// ============================================================
const N_TOTAL=100;     // 总体容量
const N_COLS=10;       // 每行小球数
const N_ROWS=10;       // 总行数
// 样本容量设定：简单随机 18、系统 20、分层 13（按 3+6+4，演示用）
// 计算网格中每个小球的屏幕坐标
function ballGrid(){
  const cells=[];
  const W=cv.width,H=cv.height;
  const size=Math.min(40,Math.floor((W-180)/N_COLS));
  const gap=6;
  const startX=(W-(size+gap)*N_COLS)/2;
  const startY=90;
  for(let i=0;i<N_TOTAL;i++){
    const r=Math.floor(i/N_COLS);
    const c=i%N_COLS;
    cells.push({
      i:i+1,
      x:startX+c*(size+gap),
      y:startY+r*(size+gap),
      size:size
    });
  }
  return cells;
}
// 固定抽取集合（保证动画稳定，避免每帧抖动）
// 简单随机抽样：模拟逐个不放回抽取 18 个
const SRS_SET=new Set([
  3,7,12,18,24,29,
  35,41,46,52,58,63,
  69,74,80,86,91,95
]);
// 系统抽样参数：k = N/n = 100/20 = 5，起点 i = 4
const SYS_START=4;     // 第一组随机起点
const SYS_K=5;         // 间隔
function sysSet(){
  const s=[];
  for(let v=SYS_START;v<=N_TOTAL;v+=SYS_K){
    s.push(v);
  }
  return s;
}
const SYS_SET=new Set(sysSet());
// 分层：前 30 为 A 层（学优），中 50 为 B 层（中等），后 20 为 C 层（学困）
// 抽样比例 n=13：A 抽 4、B 抽 6、C 抽 3（近似按 3:5:2 比例）
const LAYERS=[
  {name:'A',start:1,end:30,color:'#34d399',sample:[2,9,17,24]},
  {name:'B',start:31,end:80,color:'#06b6d4',sample:[33,40,48,55,62,70]},
  {name:'C',start:81,end:100,color:'#fbbf24',sample:[85,93,99]}
];
const LAYER_SET=new Set([].concat(...LAYERS.map(l=>l.sample)));
// 总体均值与样本均值的演示数据（每个小球的"值"）
const POP_VALUES=(function(){
  const arr=[];
  for(let i=0;i<N_TOTAL;i++){
    // 让分层与值相关：A 层偏高、C 层偏低
    let v;
    if(i<30) v=80+Math.floor(Math.sin(i*1.3)*8)+i%5;
    else if(i<80) v=60+Math.floor(Math.cos(i*0.9)*10)+i%7;
    else v=40+Math.floor(Math.sin(i*1.7)*6)+i%4;
    arr.push(Math.max(20,Math.min(100,v)));
  }
  return arr;
})();
const POP_MEAN=POP_VALUES.reduce((a,b)=>a+b,0)/N_TOTAL;

const STEPS=[
  {tag:'概念',name:'抽样概念',body:'<strong>抽样</strong>是从<strong>总体</strong>（全部研究对象）中按规则抽取<strong>样本</strong>（部分个体）的过程。好的抽样方法应保证每个个体<strong>被抽到的概率相等</strong>，从而用样本推断总体。',points:{title:'核心术语',items:['<strong>总体</strong>：研究对象的全体（N 个）','<strong>样本</strong>：抽取出的部分（n 个）','<strong>样本容量</strong>：n','<strong>目标</strong>：每个个体等概率被抽到']}},
  {tag:'简单随机',name:'简单随机抽样',body:'<strong>简单随机抽样</strong>：从总体 N 中<strong>逐个不放回</strong>抽取 n 个，每个个体被抽到的概率<strong>相等</strong>。常用方法：<strong>抽签法</strong>、<strong>随机数法</strong>。',points:{title:'方法要点',items:['<strong>特点</strong>：不放回、等概率','<strong>抽签法</strong>：编号 → 摇匀 → 抽取','<strong>随机数法</strong>：编号 → 查随机数表','<strong>适用</strong>：总体小、个体差异小']}},
  {tag:'简单随机',name:'抽签法演示',body:'<strong>抽签法</strong>：将总体编号写在相同的签上，放入容器<strong>充分搅匀</strong>后逐个抽取。关键操作是<strong>充分搅匀</strong>，保证每一签被抽到的机会均等。',points:{title:'操作要点',items:['<strong>① 编号</strong>：1 ~ N 写在相同签上','<strong>② 搅匀</strong>：保证均匀分布','<strong>③ 不放回</strong>：逐个抽出','<strong>④ 抽 n 个</strong>：组成样本']}},
  {tag:'系统',name:'系统抽样步骤',body:'<strong>系统抽样</strong>（等距抽样）步骤：①将 N 个个体<strong>编号</strong> 1~N；②计算间隔 <code>k = N/n</code>；③在第 1 组（1~k）中随机抽取一个起点 i；④依次抽取 <code>i, i+k, i+2k, ...</code>，共 n 个。',points:{title:'四步法',items:['<strong>① 编号</strong>：1 ~ N','<strong>② 算间隔</strong>：k = N/n','<strong>③ 定起点</strong>：第一组随机抽 i','<strong>④ 等距抽取</strong>：i, i+k, i+2k ...']}},
  {tag:'系统',name:'系统抽样例题',body:'<strong>例</strong>：从 100 名学生中用系统抽样抽取 20 名。解：k = 100/20 = 5，在 1~5 中随机抽得 i=4，则抽取编号：<code>4, 9, 14, 19, ...</code>，直到第 20 个。',points:{title:'解题示范',items:['<strong>k = 100/20 = 5</strong>','<strong>起点 i = 4</strong>（1~5 随机）','<strong>抽取</strong>：4, 9, 14, 19, ...','<strong>共 20 个</strong>：覆盖全段','<strong>适用</strong>：N 大、无周期性差异']}},
  {tag:'分层',name:'分层抽样步骤',body:'<strong>分层抽样</strong>：按某特征（如年级、性别）将总体分成<strong>若干互不重叠的层</strong>，然后<strong>各层内独立</strong>进行简单随机或系统抽样。',points:{title:'分层流程',items:['<strong>① 分层</strong>：按特征划分','<strong>② 比例</strong>：nᵢ = n×(Nᵢ/N)','<strong>③ 层内抽样</strong>：简单随机 / 系统','<strong>④ 合并</strong>：组成总样本']}},
  {tag:'分层',name:'分层比例计算',body:'<strong>比例公式</strong>：<code>nᵢ = n × (Nᵢ / N)</code>。例：总体 100 人，A 层 30、B 层 50、C 层 20，抽 n=10。则 A 层抽 3、B 层抽 5、C 层抽 2。',points:{title:'比例分配',items:['<strong>A 层</strong>：30 人 → 抽 3','<strong>B 层</strong>：50 人 → 抽 5','<strong>C 层</strong>：20 人 → 抽 2','<strong>合计</strong>：n = 10','<strong>适用</strong>：差异明显的几部分']}},
  {tag:'分层',name:'分层动图演示',body:'将总体按 A、B、C 三层（绿/蓝/黄）显示，按比例在各层内<strong>独立抽取</strong>样本。分层抽样保证每层都被<strong>合理代表</strong>，避免某些子群被漏抽。',points:{title:'分层优势',items:['<strong>代表性强</strong>：覆盖各子群','<strong>精度高</strong>：层内差异小','<strong>可对比</strong>：层间可单独分析','<strong>应用广</strong>：教育、社会调查']}},
  {tag:'对比',name:'总体与样本均值',body:'<strong>总体均值 μ</strong>：N 个数据的平均值；<strong>样本均值 x̄</strong>：n 个样本的平均值。好的抽样让 x̄ <strong>接近</strong> μ。<strong>抽样误差</strong> = |x̄ - μ|，随 n 增大而减小。',points:{title:'均值与误差',items:['<strong>μ</strong>：总体真实均值','<strong>x̄</strong>：样本均值（估计量）','<strong>抽样误差</strong>：|x̄ - μ|','<strong>n 越大</strong>：误差通常越小','<strong>样本容量</strong>：权衡精度与成本']}},
  {tag:'对比',name:'三种方法对比',body:'<strong>共同点</strong>：三种方法都保证<strong>每个个体被抽到的概率相等</strong>。<strong>不同点</strong>：适用范围、操作复杂度、对总体结构的要求不同。',points:{title:'选法指南',items:['<strong>简单随机</strong>：N 小、个体差异小','<strong>系统</strong>：N 大、无周期性','<strong>分层</strong>：差异明显、结构清晰','<strong>都满足</strong>：等概率原则']}},
];

let stepIdx=0,playing=false,lastT=0,speed=1,stepTime=0,t=0;
const STEP_DURATION=3.4;

// 绘制 100 个小球网格
function drawGrid(activeSet,highlightColor,progress){
  const W=cv.width,H=cv.height;
  const cells=ballGrid();
  // 计算当前应激活的个数
  const fullSet=Array.from(activeSet);
  const showCount=Math.floor(fullSet.length*progress);
  const nowActive=new Set(fullSet.slice(0,Math.max(1,showCount)));
  cells.forEach(c=>{
    const on=nowActive.has(c.i);
    ctx.beginPath();ctx.arc(c.x+c.size/2,c.y+c.size/2,c.size/2-2,0,7);
    if(on){ctx.fillStyle=highlightColor;ctx.shadowColor=highlightColor;ctx.shadowBlur=10;}
    else{ctx.fillStyle='#1e345a';ctx.shadowBlur=0;}
    ctx.fill();ctx.shadowBlur=0;
    ctx.strokeStyle='#243a5e';ctx.lineWidth=1;ctx.stroke();
    drawText(c.i,c.x+c.size/2,c.y+c.size/2,on?'#1a1a1a':'#7a8aaa',Math.max(9,c.size/3));
  });
  return nowActive.size;
}

// ===== 场景 0：抽样概念 =====
function drawConceptScene(time){
  const W=cv.width,H=cv.height;
  drawText('总体 N = 100 → 样本 n',W/2,30,'#fbbf24',16);
  const cells=ballGrid();
  const pulse=(Math.sin(time*2)+1)/2;
  cells.forEach(c=>{
    ctx.beginPath();ctx.arc(c.x+c.size/2,c.y+c.size/2,c.size/2-2,0,7);
    ctx.fillStyle='#1e345a';ctx.fill();
    ctx.strokeStyle='#243a5e';ctx.lineWidth=1;ctx.stroke();
    drawText(c.i,c.x+c.size/2,c.y+c.size/2,'#7a8aaa',Math.max(9,c.size/3));
  });
  // 框出代表样本的几个（用呼吸光圈）
  [12,35,58,80,95].forEach(i=>{
    const c=cells[i-1];const cx=c.x+c.size/2,cy=c.y+c.size/2;
    ctx.strokeStyle='rgba(251,191,36,'+(0.4+0.6*pulse)+')';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(cx,cy,c.size/2+3+2*pulse,0,7);ctx.stroke();
  });
  drawText('每个小球代表一个个体，目标是公平地抽出一部分',W/2,H-50,'#9ab0d0',12);
  drawText('好的抽样方法：每个个体被抽到的概率相等',W/2,H-28,'#34d399',12);
}

// ===== 场景 1：简单随机 =====
function drawSRSScene(time){
  const W=cv.width,H=cv.height;
  drawText('简单随机抽样 · 等概率不放回',W/2,30,'#fbbf24',16);
  // progress 在 0~1 之间循环
  const p=(Math.sin(time*0.8)*0.5+0.5);
  const cnt=drawGrid(SRS_SET,'#fbbf24',p);
  drawText('抽签法 / 随机数法：每次抽一个，不放回',W/2,H-55,'#9ab0d0',12);
  drawText('已抽取 '+cnt+' 个，每个个体被抽到概率相等',W/2,H-30,'#34d399',12);
}

// ===== 场景 2：系统抽样步骤 =====
function drawSysStepScene(time){
  const W=cv.width,H=cv.height;
  drawText('系统抽样 · k = N/n = 5，起点 i = 4',W/2,30,'#06b6d4',16);
  const cells=ballGrid();
  // 分组高亮：每 5 个一组，第一组用淡色边框
  cells.forEach(c=>{
    const grp=Math.floor((c.i-1)/SYS_K);
    const isStart=(c.i-1)%SYS_K===0;
    ctx.beginPath();ctx.arc(c.x+c.size/2,c.y+c.size/2,c.size/2-2,0,7);
    ctx.fillStyle='#1e345a';ctx.fill();
    ctx.strokeStyle=isStart?'#06b6d4':'#243a5e';ctx.lineWidth=isStart?2:1;ctx.stroke();
    drawText(c.i,c.x+c.size/2,c.y+c.size/2,'#7a8aaa',Math.max(9,c.size/3));
  });
  // 动画等距抽取
  const p=(Math.sin(time*0.8)*0.5+0.5);
  const cnt=drawGrid(SYS_SET,'#06b6d4',p);
  drawText('间隔 k=5：从 i=4 起，抽取 4, 9, 14, 19, ...',W/2,H-55,'#9ab0d0',12);
  drawText('已抽取 '+cnt+' 个，等距覆盖整个总体',W/2,H-30,'#34d399',12);
}

// ===== 场景 3：系统抽样例题 =====
function drawSysExScene(){
  const W=cv.width,H=cv.height;
  drawText('例题 · 100 人中系统抽 20 人',W/2,30,'#06b6d4',16);
  ctx.fillStyle='rgba(255,255,255,0.03)';ctx.strokeStyle='#06b6d4';ctx.lineWidth=1.5;
  roundRect(80,60,W-160,120,8);ctx.fill();ctx.stroke();
  drawText('【例题】',120,80,'#06b6d4',13,'left');
  drawText('从 100 名学生中用系统抽样抽取 20 名，写出抽取编号。',120,105,'#fff',13,'left');
  drawText('解：① k = 100 / 20 = 5；② 在 1~5 中随机抽得 i = 4',120,130,'#fff',13,'left');
  drawText('③ 抽取编号：4, 9, 14, 19, 24, ... 共 20 个',120,160,'#fff',13,'left');
  // 编号串
  const arr=[];for(let v=SYS_START;v<=N_TOTAL;v+=SYS_K)arr.push(v);
  const cols=10,row=Math.ceil(arr.length/cols);
  const cw=Math.min(60,(W-160)/cols);
  arr.forEach((n,i)=>{
    const r=Math.floor(i/cols),c=i%cols;
    const x=80+c*cw,y=210+r*40;
    ctx.fillStyle='#06b6d422';ctx.strokeStyle='#06b6d4';ctx.lineWidth=1;
    roundRect(x+4,y,cw-8,30,5);ctx.fill();ctx.stroke();
    drawText('#'+n,x+cw/2,y+15,'#67e8f9',12);
  });
  drawText('等距覆盖 1 ~ 100，无重复无遗漏',W/2,H-30,'#34d399',13);
}

// ===== 场景 4：分层抽样步骤 =====
function drawLayerStepScene(time){
  const W=cv.width,H=cv.height;
  drawText('分层抽样 · 按特征分层后层内抽取',W/2,30,'#34d399',16);
  const cells=ballGrid();
  cells.forEach(c=>{
    let col='#1e345a',label='#7a8aaa';
    let layer=LAYERS.find(l=>c.i>=l.start&&c.i<=l.end);
    if(layer){col=layer.color+'33';label=layer.color;}
    ctx.beginPath();ctx.arc(c.x+c.size/2,c.y+c.size/2,c.size/2-2,0,7);
    ctx.fillStyle=col;ctx.fill();
    ctx.strokeStyle='#243a5e';ctx.lineWidth=1;ctx.stroke();
    drawText(c.i,c.x+c.size/2,c.y+c.size/2,label,Math.max(9,c.size/3));
  });
  // 层标签
  drawText('A 层（30）','#34d399',0,'#34d399',12);
  // 在底部画分层条
  const barY=H-70;
  LAYERS.forEach(l=>{
    const w=(l.end-l.start+1)/N_TOTAL*(W-160);
    const idx=LAYERS.indexOf(l);
    const xStart=80+LAYERS.slice(0,idx).reduce((s,p)=>s+(p.end-p.start+1)/N_TOTAL*(W-160),0);
    ctx.fillStyle=l.color+'66';ctx.strokeStyle=l.color;ctx.lineWidth=1.5;
    roundRect(xStart,barY,w,18,4);ctx.fill();ctx.stroke();
    drawText(l.name+'层 '+(l.end-l.start+1)+'人',xStart+w/2,barY+9,'#fff',11);
  });
  drawText('按特征分成互不重叠的层 → 各层独立抽取',W/2,H-30,'#9ab0d0',12);
}

// ===== 场景 5：分层比例计算 =====
function drawLayerRatioScene(time){
  const W=cv.width,H=cv.height;
  drawText('分层比例 · nᵢ = n × (Nᵢ / N)，n = 10',W/2,30,'#34d399',16);
  const cells=ballGrid();
  // 激活抽样
  const p=(Math.sin(time*0.7)*0.5+0.5);
  const fullSet=[].concat(...LAYERS.map(l=>l.sample));
  const showCount=Math.floor(fullSet.length*p);
  const nowActive=new Set(fullSet.slice(0,Math.max(1,showCount)));
  cells.forEach(c=>{
    let layer=LAYERS.find(l=>c.i>=l.start&&c.i<=l.end);
    const on=nowActive.has(c.i);
    ctx.beginPath();ctx.arc(c.x+c.size/2,c.y+c.size/2,c.size/2-2,0,7);
    if(on){ctx.fillStyle=layer.color;ctx.shadowColor=layer.color;ctx.shadowBlur=10;}
    else{ctx.fillStyle=layer.color+'33';ctx.shadowBlur=0;}
    ctx.fill();ctx.shadowBlur=0;
    ctx.strokeStyle='#243a5e';ctx.lineWidth=1;ctx.stroke();
    drawText(c.i,c.x+c.size/2,c.y+c.size/2,on?'#1a1a1a':'#7a8aaa',Math.max(9,c.size/3));
  });
  // 比例标注
  drawText('A层: 30 → 抽 3    B层: 50 → 抽 5    C层: 20 → 抽 2',W/2,H-50,'#34d399',12);
  drawText('已抽取 '+nowActive.size+' 个，按比例代表各层',W/2,H-28,'#9ab0d0',12);
}

// ===== 场景：抽签法演示 =====
function drawLotteryScene(time){
  const W=cv.width,H=cv.height;
  drawText('抽签法 · 编号 → 摇匀 → 不放回抽取',W/2,30,'#fbbf24',16);
  // 左侧：盒子里的签（10 张视觉化）
  const boxX=80,boxY=100,boxW=Math.min(220,W*0.3),boxH=H-200;
  ctx.fillStyle='#1e345a';ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;
  roundRect(boxX,boxY,boxW,boxH,10);ctx.fill();ctx.stroke();
  drawText('签筒（已搅匀）',boxX+boxW/2,boxY+22,'#fbbf24',12);
  // 签
  const sigs=[5,23,47,66,81,12,38,59,7,94];
  sigs.forEach((n,i)=>{
    const shake=Math.sin(time*3+i)*3;
    const sx=boxX+20+(i%2)*(boxW-50);
    const sy=boxY+50+Math.floor(i/2)*30+shake;
    ctx.fillStyle='#fbbf2444';ctx.strokeStyle='#fbbf24';ctx.lineWidth=1;
    roundRect(sx,sy,boxW-50,22,4);ctx.fill();ctx.stroke();
    drawText('#'+n,sx+(boxW-50)/2,sy+11,'#fde68a',11);
  });
  // 右侧：抽出的样本
  const sx2=boxX+boxW+40;
  drawText('已抽出（不放回）',sx2+(W-sx2-40)/2,boxY+22,'#34d399',13);
  const p=(Math.sin(time*0.7)*0.5+0.5);
  const all=sigs.slice(0,SRS_SET.size>10?10:SRS_SET.size);
  const show=Math.floor(all.length*p);
  const arr=SRS_SET.size>10?Array.from(SRS_SET).slice(0,10):Array.from(SRS_SET);
  arr.slice(0,Math.max(1,show)).forEach((n,i)=>{
    const col=i%2,row=Math.floor(i/2);
    const cx=sx2+col*60,cy=boxY+60+row*40;
    ctx.fillStyle='#fbbf24';ctx.shadowColor='#fbbf24';ctx.shadowBlur=8;
    roundRect(cx,cy,50,30,6);ctx.fill();ctx.shadowBlur=0;
    drawText('#'+n,cx+25,cy+15,'#1a1a1a',13);
  });
  drawText('每次抽一签 → 记录 → 不放回 → 继续',W/2,H-50,'#9ab0d0',12);
  drawText('关键是"摇匀"：保证每签被抽到的机会均等',W/2,H-28,'#34d399',12);
}

// ===== 场景：分层动图演示 =====
function drawLayerAnimScene(time){
  const W=cv.width,H=cv.height;
  drawText('分层抽样动画 · 按比例独立抽取',W/2,30,'#34d399',16);
  const cells=ballGrid();
  const p=(Math.sin(time*0.7)*0.5+0.5);
  const fullSet=[].concat(...LAYERS.map(l=>l.sample));
  const show=Math.floor(fullSet.length*p);
  const nowActive=new Set(fullSet.slice(0,Math.max(1,show)));
  cells.forEach(c=>{
    const layer=LAYERS.find(l=>c.i>=l.start&&c.i<=l.end);
    const on=nowActive.has(c.i);
    ctx.beginPath();ctx.arc(c.x+c.size/2,c.y+c.size/2,c.size/2-2,0,7);
    if(on){ctx.fillStyle=layer.color;ctx.shadowColor=layer.color;ctx.shadowBlur=10;}
    else{ctx.fillStyle=layer.color+'22';ctx.shadowBlur=0;}
    ctx.fill();ctx.shadowBlur=0;
    ctx.strokeStyle='#243a5e';ctx.lineWidth=1;ctx.stroke();
    drawText(c.i,c.x+c.size/2,c.y+c.size/2,on?'#1a1a1a':'#7a8aaa',Math.max(9,c.size/3));
  });
  // 分层色带
  const barY=H-70;
  LAYERS.forEach((l,idx)=>{
    const w=(l.end-l.start+1)/N_TOTAL*(W-160);
    const xStart=80+LAYERS.slice(0,idx).reduce((s,p2)=>s+(p2.end-p2.start+1)/N_TOTAL*(W-160),0);
    ctx.fillStyle=l.color+'66';ctx.strokeStyle=l.color;ctx.lineWidth=1.5;
    roundRect(xStart,barY,w,18,4);ctx.fill();ctx.stroke();
    drawText(l.name+'层 '+(l.end-l.start+1)+'人 / 抽'+l.sample.length,xStart+w/2,barY+9,'#fff',11);
  });
  drawText('A 层抽 '+Math.min(4,show)+' / B 层抽 '+Math.min(6,Math.max(0,show-4))+' / C 层抽 '+Math.min(3,Math.max(0,show-10)),W/2,H-30,'#34d399',12);
}

// ===== 场景：总体与样本均值 =====
function drawMeanScene(time){
  const W=cv.width,H=cv.height;
  drawText('总体均值 μ 与 样本均值 x̄',W/2,30,'#fbbf24',16);
  const cells=ballGrid();
  // 每个球用颜色深浅表示数值
  cells.forEach(c=>{
    const v=POP_VALUES[c.i-1];
    const hue=200+v*1.2; // 20~120 蓝→绿
    ctx.beginPath();ctx.arc(c.x+c.size/2,c.y+c.size/2,c.size/2-2,0,7);
    ctx.fillStyle='hsl('+hue+',55%,45%)';ctx.fill();
    ctx.strokeStyle='#243a5e';ctx.lineWidth=1;ctx.stroke();
    drawText(v,c.x+c.size/2,c.y+c.size/2,'#fff',Math.max(8,c.size/3));
  });
  // 计算样本均值（用 SRS_SET）
  const srsArr=Array.from(SRS_SET);
  const xBar=srsArr.reduce((s,i)=>s+POP_VALUES[i-1],0)/srsArr.length;
  // 信息框
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.strokeStyle='#fbbf24';ctx.lineWidth=1.5;
  roundRect(W-260,90,240,90,8);ctx.fill();ctx.stroke();
  drawText('总体均值 μ',W-140,110,'#9ab0d0',12);
  drawText('μ = '+POP_MEAN.toFixed(2),W-140,135,'#34d399',16);
  drawText('样本均值 x̄',W-140,160,'#9ab0d0',12);
  drawText('x̄ = '+xBar.toFixed(2),W-140,180,'#fbbf24',14);
  // 抽样误差
  const pulse=(Math.sin(time*2)+1)/2;
  drawText('抽样误差 |x̄ − μ| = '+Math.abs(xBar-POP_MEAN).toFixed(2),W/2,H-50,'#f87171',13);
  drawText('n 越大，x̄ 越接近 μ（大数定律）',W/2,H-28,'#34d399',12);
}

// ===== 场景：三种方法对比 =====
function drawCompareScene(){
  const W=cv.width,H=cv.height;
  drawText('三种抽样方法对比',W/2,30,'#fbbf24',18);
  const rows=[
    {t:'简单随机',m:'逐个不放回',fit:'N 小、差异小',col:'#fbbf24'},
    {t:'系统抽样',m:'等距 k=N/n',fit:'N 大、无周期',col:'#06b6d4'},
    {t:'分层抽样',m:'分层按比例',fit:'差异明显',col:'#34d399'},
  ];
  const headY=80,rowH=70;
  // 表头
  drawText('方法',180,headY,'#9ab0d0',13);
  drawText('操作方式',W/2,headY,'#9ab0d0',13);
  drawText('适用范围',W-180,headY,'#9ab0d0',13);
  ctx.strokeStyle='#243a5e';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(100,headY+18);ctx.lineTo(W-100,headY+18);ctx.stroke();
  rows.forEach((r,i)=>{
    const y=headY+50+i*rowH;
    ctx.fillStyle=r.col+'22';ctx.strokeStyle=r.col;ctx.lineWidth=1.5;
    roundRect(100,y-22,W-200,46,8);ctx.fill();ctx.stroke();
    drawText(r.t,180,y,r.col,14);
    drawText(r.m,W/2,y,'#fff',13);
    drawText(r.fit,W-180,y,'#e8eef8',13);
  });
  drawText('共同点：三种方法都使每个个体被抽到的概率相等',W/2,H-55,'#34d399',13);
  drawText('不同点：适用范围与操作复杂度',W/2,H-30,'#9ab0d0',12);
}

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  if(stepIdx===0)drawConceptScene(t);
  else if(stepIdx===1)drawSRSScene(t);
  else if(stepIdx===2)drawLotteryScene(t);
  else if(stepIdx===3)drawSysStepScene(t);
  else if(stepIdx===4)drawSysExScene();
  else if(stepIdx===5)drawLayerStepScene(t);
  else if(stepIdx===6)drawLayerRatioScene(t);
  else if(stepIdx===7)drawLayerAnimScene(t);
  else if(stepIdx===8)drawMeanScene(t);
  else if(stepIdx===9)drawCompareScene();
}

function syncStep(){
  const s=STEPS[stepIdx];
  document.getElementById('stepBadge').textContent=s.tag;
  document.getElementById('stepTitle').textContent=s.name;
  document.getElementById('stepBody').innerHTML=s.body;
  document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?.title||'')+'</h4><ul>'+((s.points?.items||[]).map(x=>'<li>'+x+'</li>').join(''))+'</ul>';
  document.querySelectorAll('.step').forEach((el,i)=>el.classList.toggle('active',i===stepIdx));
  statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;
  stepTime=0;
}

function update(dt){
  t+=dt*speed;
  if(!playing)return;
  stepTime+=dt*speed;
  if(stepTime>=STEP_DURATION){
    if(stepIdx<STEPS.length-1){stepIdx++;syncStep();}
    else{playing=false;playBtn.textContent='▶ 播放';statusEl.textContent='动画完成';}
  }
}

function loop(ts){
  if(!lastT)lastT=ts;
  const dt=(ts-lastT)/1000;lastT=ts;
  update(dt);draw();
  requestAnimationFrame(loop);
}

const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn');
const speedEl=document.getElementById('speed');
playBtn.onclick=()=>{playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';};
resetBtn.onclick=()=>{stepIdx=0;playing=false;syncStep();draw();playBtn.textContent='▶ 播放';};
stepFwdBtn.onclick=()=>{if(stepIdx<STEPS.length-1){stepIdx++;syncStep();draw();}};
stepBackBtn.onclick=()=>{if(stepIdx>0){stepIdx--;syncStep();draw();}};
speedEl.oninput=()=>{speed=parseFloat(speedEl.value);};

function buildStepbar(){
  const bar=document.getElementById('stepbar');
  bar.innerHTML='';
  STEPS.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='step'+(i===stepIdx?' active':'');
    el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>10?s.name.slice(0,9)+'…':s.name)+'</div>';
    el.onclick=()=>{stepIdx=i;syncStep();draw();};
    bar.appendChild(el);
  });
}

buildStepbar();syncStep();requestAnimationFrame(loop);
</script>
