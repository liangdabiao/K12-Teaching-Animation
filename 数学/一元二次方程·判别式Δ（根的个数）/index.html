<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>一元二次方程 · 判别式 Δ 与根的个数</title>
<style>:root{--bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;--accent:#3b82f6;--accent2:#74b9ff;--line:#243a5e;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
.back{color:var(--accent2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap;background:rgba(116,185,255,.06)}.back:hover{background:rgba(116,185,255,.14)}
.title{font-size:15px;font-weight:600}.subtitle{font-size:12px;color:var(--muted)}
.cards{display:flex;gap:10px;padding:10px 16px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(59,130,246,.06),transparent)}
.card{flex:1;min-width:190px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 12px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}.card.s2::before{background:var(--good)}.card.s3::before{background:var(--bad)}.card.s4::before{background:var(--warn)}
.card h4{margin:0 0 4px;font-size:13px}.card .v{font-size:11.5px;color:var(--muted);line-height:1.6;font-family:Consolas,Monaco,monospace;white-space:pre-wrap}
.card .num{position:absolute;right:8px;top:6px;font-size:22px;font-weight:700;color:rgba(255,255,255,.07)}
main{flex:1;display:flex;min-height:0}.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}
.panel{width:340px;flex:none;padding:14px;overflow:auto;border-left:1px solid var(--line);background:var(--panel);font-size:13px;line-height:1.7}
.panel h2{font-size:14px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--accent);color:#fff;font-size:11px;font-weight:600}
.body{color:var(--muted);margin:0 0 10px}.body strong{color:var(--ink)}.body code{background:rgba(59,130,246,.2);color:#bfdbfe;padding:1px 5px;border-radius:4px;font-family:Consolas,Monaco,monospace;font-size:12px}
.points{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin-top:8px;border-left:3px solid var(--accent2)}.points h4{margin:0 0 6px;font-size:13px}.points ul{margin:0;padding-left:18px;color:var(--muted)}.points li{margin-bottom:3px}.points li strong{color:var(--accent)}
.code{background:#0d1117;border:1px solid var(--line);border-radius:6px;padding:8px 10px;margin-top:8px;font-family:Consolas,Monaco,monospace;font-size:11.5px;line-height:1.6;color:#c9d1d9;white-space:pre-wrap}
.stepbar{display:flex;gap:6px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);overflow-x:auto}
.step{flex:1;min-width:84px;padding:8px 6px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}.step:hover{background:#1e345a;border-color:var(--accent2)}.step.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:600;border-color:transparent}
.controls{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}button:hover{background:#1e345a}button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}button.primary:hover{background:#4b91f8}
.controls label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}input[type=range]{accent-color:var(--accent);width:80px}
.pval{color:var(--accent2);font-size:12px;font-family:Consolas,Monaco,monospace;min-width:46px;display:inline-block}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}
</style></head>
<body>
<header class="topbar"><a class="back" href="../index.html">← 返回数学目录</a><span class="title">一元二次方程 · 判别式 Δ</span><span class="subtitle">根的个数由 Δ=b²−4ac 决定 · 拖动 a/b/c 实时观察</span></header>
<div class="cards">
  <div class="card s2"><div class="num">1</div><h4>判别式 Δ（实时）</h4><div class="v" id="cardD"></div></div>
  <div class="card s3"><div class="num">2</div><h4>根的个数（实时）</h4><div class="v" id="cardN"></div></div>
  <div class="card s4"><div class="num">3</div><h4>方程（实时）</h4><div class="v" id="cardEq"></div></div>
  <div class="card"><div class="num">4</div><h4>操作提示</h4><div class="v">拖动 a/b/c 看 Δ 与交点变化；点击下方步骤自动载入示例</div></div>
</div>
<main><div class="stage"><canvas id="cv"></canvas></div>
<aside class="panel"><h2><span class="badge" id="stepBadge">引入</span><span id="stepTitle"></span></h2><p class="body" id="stepBody"></p><div class="points" id="stepPoints"></div><div class="code" id="stepCode"></div></aside>
</main>
<div class="stepbar" id="stepbar"></div>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button><button id="resetBtn">↺ 重置</button><button id="stepBackBtn">◀ 上一步</button><button id="stepFwdBtn">下一步 ▶</button>
  <label>a<input id="pa" type="range" min="-2" max="2" step="0.1" value="1"><span id="paV" class="pval"></span></label>
  <label>b<input id="pb" type="range" min="-5" max="5" step="0.2" value="-2"><span id="pbV" class="pval"></span></label>
  <label>c<input id="pc" type="range" min="-5" max="5" step="0.2" value="-3"><span id="pcV" class="pval"></span></label>
  <label>速度<input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <span id="status" class="status">拖动 a/b/c 或点击步骤</span>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),statusEl=document.getElementById('status');
const paEl=document.getElementById('pa'),pbEl=document.getElementById('pb'),pcEl=document.getElementById('pc'),paV=document.getElementById('paV'),pbV=document.getElementById('pbV'),pcV=document.getElementById('pcV');
const cardD=document.getElementById('cardD'),cardN=document.getElementById('cardN'),cardEq=document.getElementById('cardEq');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(560,Math.min(1100,r.width-12));cv.height=Math.max(420,Math.min(560,r.height-12));}
window.addEventListener('resize',()=>{fit();sceneDraw();});fit();
window.showTip=function(m){if(statusEl)statusEl.textContent=m;};
function drawText(t,x,y,c,fs,al,bl){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=al||'center';ctx.textBaseline=bl||'middle';ctx.fillText(t,x,y);}
function ease(t){t=t<0?0:t>1?1:t;return t*t*(3-2*t);}
let A=1,B=-2,C=-3,stepIdx=0,animT=0,playing=false,lastT=0,speed=1;
const STEP_DUR=1.4;
function fmt(x){return(Math.round(x*100)/100).toFixed(2);}
function sgn(n){return n>=0?'+':'−';}
function readParams(){A=parseFloat(paEl.value);B=parseFloat(pbEl.value);C=parseFloat(pcEl.value);if(Math.abs(A)<0.05){A=A>=0?0.1:-0.1;paEl.value=A;}
  paV.textContent='a='+fmt(A);pbV.textContent='b='+fmt(B);pcV.textContent='c='+fmt(C);
  var d=B*B-4*A*C;cardD.textContent='Δ = b²−4ac = '+fmt(B*B)+' − '+fmt(4*A*C)+' = '+fmt(d);
  var roots='';
  if(d>1e-6){var s=Math.sqrt(d);var x1=(-B-s)/(2*A),x2=(-B+s)/(2*A);roots='两个不等实根\nx₁='+fmt(x1)+'   x₂='+fmt(x2);cardN.textContent='Δ > 0\n'+roots;}
  else if(Math.abs(d)<1e-6){var x=-B/(2*A);cardN.textContent='Δ = 0\n一个实根（重根）x = '+fmt(x);}
  else{cardN.textContent='Δ < 0\n无实数根（不与 x 轴相交）';}
  cardEq.textContent=fmt(A)+'x² '+sgn(B)+' '+fmt(Math.abs(B))+'x '+sgn(C)+' '+fmt(Math.abs(C))+' = 0';
}
paEl.oninput=()=>{readParams();sceneDraw();};pbEl.oninput=()=>{readParams();sceneDraw();};pcEl.oninput=()=>{readParams();sceneDraw();};
function coord(){var W=cv.width,H=cv.height;var cx=W/2,cy=H/2+20,unit=Math.min(34,W/24);return{cx,cy,unit};}
function m2p(mx,my){var{cx,cy,unit}=coord();return[cx+mx*unit,cy-my*unit];}
function drawAxes(){var W=cv.width,H=cv.height,{cx,cy,unit}=coord();
  ctx.strokeStyle='rgba(36,58,94,.4)';ctx.lineWidth=1;
  for(var i=-12;i<=12;i++){var x=cx+i*unit;if(x>20&&x<W-20){ctx.beginPath();ctx.moveTo(x,24);ctx.lineTo(x,H-24);ctx.stroke();}}
  for(var j=-8;j<=8;j++){var y=cy-j*unit;if(y>24&&y<H-24){ctx.beginPath();ctx.moveTo(20,y);ctx.lineTo(W-20,y);ctx.stroke();}}
  ctx.strokeStyle='#3a5a8a';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(20,cy);ctx.lineTo(W-20,cy);ctx.moveTo(cx,24);ctx.lineTo(cx,H-24);ctx.stroke();
  drawText('x',W-16,cy+12,'#9ab0d0',12);drawText('y',cx+12,18,'#9ab0d0',12);drawText('O',cx-8,cy+10,'#9ab0d0',11);
}
function drawParabola(col,glow,progress){var W=cv.width,H=cv.height,{cx,cy,unit}=coord();if(Math.abs(A)<1e-6)return;
  ctx.strokeStyle=col;ctx.lineWidth=3;if(glow){ctx.shadowColor=col;ctx.shadowBlur=10;}
  ctx.beginPath();var started=false;var xMax=8;var xb=xMax*progress;
  for(var mx=-xb;mx<=xb;mx+=0.06){var my=A*mx*mx+B*mx+C;var px=cx+mx*unit,py=cy-my*unit;if(py< -30||py>H+30){started=false;continue;}if(!started){ctx.moveTo(px,py);started=true;}else ctx.lineTo(px,py);}
  ctx.stroke();ctx.shadowBlur=0;
}
function drawScene(progress){var W=cv.width,H=cv.height;drawAxes();var d=B*B-4*A*C;var pe=ease(progress);
  // 抛物线淡入到实色
  drawParabola(pe>=0.5?'#74b9ff':'rgba(116,185,255,'+(0.3+0.7*pe*2)+')', pe>0.5, pe);
  // 顶点
  if(Math.abs(A)>1e-6&&pe>0.5){var h=-B/(2*A),k=(4*A*C-B*B)/(4*A);var[px,py]=m2p(h,k);ctx.fillStyle='#fbbf24';ctx.shadowColor='#fbbf24';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(px,py,5,0,7);ctx.fill();ctx.shadowBlur=0;drawText('顶点('+fmt(h)+','+fmt(k)+')',px,py-16,'#fbbf24',11);}
  // 根
  if(pe>0.7){
    if(d>1e-6){var s=Math.sqrt(d);var x1=(-B-s)/(2*A),x2=(-B+s)/(2*A);
      [[x1,0],[x2,0]].forEach(function(p,i){var[qx,qy]=m2p(p[0],p[1]);ctx.fillStyle='#34d399';ctx.shadowColor='#34d399';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(qx,qy,6,0,7);ctx.fill();ctx.shadowBlur=0;drawText('x'+(i+1)+'='+fmt(p[0]),qx,qy+18,'#34d399',12);});
      drawText('Δ > 0：两个不等实根',W/2,H-20,'#34d399',14);
    }else if(Math.abs(d)<1e-6){var x=-B/(2*A);var[qx,qy]=m2p(x,0);ctx.fillStyle='#fbbf24';ctx.shadowColor='#fbbf24';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(qx,qy,6,0,7);ctx.fill();ctx.shadowBlur=0;drawText('重根 x='+fmt(x),qx,qy+18,'#fbbf24',12);drawText('Δ = 0：一个实根（顶点在 x 轴）',W/2,H-20,'#fbbf24',14);}
    else{drawText('Δ < 0：无实数根（不与 x 轴相交）',W/2,H-20,'#f87171',14);}
  }
  // Δ 数值
  drawText('Δ = '+fmt(d),W/2,30,d>1e-6?'#34d399':(Math.abs(d)<1e-6?'#fbbf24':'#f87171'),16);
}
function sceneDraw(){var W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);var p=ease(Math.min(animT/STEP_DUR,1));drawScene(p);}
const STEPS=[
 {tag:"引入",name:"方程与抛物线",body:"一元二次方程 <code>ax²+bx+c=0</code>（a≠0）的根，就是抛物线 <code>y=ax²+bx+c</code> 与 <strong>x 轴交点</strong>的横坐标。交点个数由<strong>判别式 Δ=b²−4ac</strong> 决定。",points:{title:"核心",items:["根 = 抛物线与 x 轴交点","Δ = b² − 4ac","Δ 决定根的个数","a ≠ 0"]},ex:{a:1,b:-2,c:-3},code:"ax²+bx+c=0\nΔ = b²−4ac"},
 {tag:"Δ>0",name:"两个不等实根",body:"当 <strong>Δ > 0</strong>，抛物线与 x 轴有<strong>两个交点</strong>，方程有两个不等实根：<code>x = (−b ± √Δ) / 2a</code>。",points:{title:"情形一",items:["Δ > 0","两个交点","两个不等实根","x=(−b±√Δ)/2a"]},ex:{a:1,b:-2,c:-3},code:"x = (−b ± √Δ) / 2a"},
 {tag:"Δ=0",name:"一个实根（重根）",body:"当 <strong>Δ = 0</strong>，抛物线<strong>顶点恰在 x 轴上</strong>，方程有两个相等的实根（即一个根，重根）：<code>x = −b/2a</code>。",points:{title:"情形二",items:["Δ = 0","顶点在 x 轴","两个相等实根","x = −b/2a"]},ex:{a:1,b:-2,c:1},code:"x = −b / 2a"},
 {tag:"Δ<0",name:"无实数根",body:"当 <strong>Δ < 0</strong>，抛物线<strong>不与 x 轴相交</strong>，方程没有实数根（在实数范围内无解）。",points:{title:"情形三",items:["Δ < 0","不与 x 轴相交","无实数根","实数范围无解"]},ex:{a:1,b:0,c:1},code:"Δ < 0  →  无实根"},
 {tag:"公式",name:"求根公式与韦达",body:"不论 Δ 如何，<strong>求根公式</strong> x=(−b±√Δ)/2a 恒成立（Δ<0 时根为复数）。<strong>韦达定理</strong>：x₁+x₂=−b/a，x₁·x₂=c/a（根与系数的关系）。",points:{title:"公式",items:["x=(−b±√Δ)/2a","x₁+x₂=−b/a","x₁·x₂=c/a","Δ<0 时为复根"]},ex:{a:1,b:-5,c:6},code:"x=(−b±√Δ)/2a\nx₁+x₂=−b/a\nx₁·x₂=c/a"}
];
function loadStep(){var s=STEPS[stepIdx];if(!s)return;animT=0;
  if(s.ex){A=s.ex.a;B=s.ex.b;C=s.ex.c;paEl.value=A;pbEl.value=B;pcEl.value=C;readParams();}
  document.getElementById('stepBadge').textContent=s.tag;document.getElementById('stepTitle').textContent=s.name;document.getElementById('stepBody').innerHTML=s.body;document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?s.points.title:'')+'</h4><ul>'+((s.points?s.points.items:[]).map(function(x){return '<li>'+x+'</li>';}).join(''))+'</ul>';document.getElementById('stepCode').textContent=s.code||'';document.querySelectorAll('.step').forEach(function(el,i){el.classList.toggle('active',i===stepIdx);});statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;}
function buildStepbar(){var bar=document.getElementById('stepbar');bar.innerHTML='';STEPS.forEach(function(s,i){var el=document.createElement('div');el.className='step'+(i===stepIdx?' active':'');el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>6?s.name.slice(0,5)+'…':s.name)+'</div>';el.onclick=function(){stepIdx=i;loadStep();};bar.appendChild(el);});}
function sceneInit(){A=1;B=-2;C=-3;stepIdx=0;animT=0;playing=false;paEl.value=A;pbEl.value=B;pcEl.value=C;readParams();}
function sceneReset(){sceneInit();loadStep();statusEl.textContent='已重置';}
function sceneUpdate(dt){animT+=dt*speed;if(!playing&&animT>STEP_DUR)animT=STEP_DUR;if(playing&&animT>STEP_DUR+0.5){stepIdx=(stepIdx+1)%STEPS.length;loadStep();}}
const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn'),stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn'),speedEl=document.getElementById('speed');
playBtn.onclick=function(){playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';if(playing)animT=0;};
resetBtn.onclick=function(){sceneReset();};stepFwdBtn.onclick=function(){stepIdx=(stepIdx+1)%STEPS.length;loadStep();};stepBackBtn.onclick=function(){stepIdx=(stepIdx-1+STEPS.length)%STEPS.length;loadStep();};speedEl.oninput=function(){speed=parseFloat(speedEl.value);};
function loop(ts){if(!lastT)lastT=ts;var dt=(ts-lastT)/1000;lastT=ts;sceneUpdate(dt);sceneDraw();requestAnimationFrame(loop);}
sceneInit();buildStepbar();loadStep();requestAnimationFrame(loop);
</script></body></html>
