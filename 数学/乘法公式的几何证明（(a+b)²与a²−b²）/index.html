<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>乘法公式 · 面积拼图证明</title>
<style>:root{
  --bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;
  --accent:#3b82f6;--accent2:#74b9ff;--line:#243a5e;
  --good:#34d399;--warn:#fbbf24;--bad:#f87171;--info:#38bdf8;
}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
.back{color:var(--accent2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap;background:rgba(116,185,255,.06)}
.back:hover{background:rgba(116,185,255,.14)}
.title{font-size:15px;font-weight:600}
.subtitle{font-size:12px;color:var(--muted)}
.cards{display:flex;gap:10px;padding:10px 16px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(59,130,246,.06),transparent)}
.card{flex:1;min-width:200px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 12px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.card.s2::before{background:var(--good)}.card.s3::before{background:var(--bad)}.card.s4::before{background:var(--warn)}
.card h4{margin:0 0 4px;font-size:13px;color:var(--ink)}
.card .v{font-size:11.5px;color:var(--muted);line-height:1.6;font-family:Consolas,Monaco,monospace;white-space:pre-wrap}
.card .num{position:absolute;right:8px;top:6px;font-size:22px;font-weight:700;color:rgba(255,255,255,.07)}
main{flex:1;display:flex;min-height:0}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}
.panel{width:340px;flex:none;padding:14px;overflow:auto;border-left:1px solid var(--line);background:var(--panel);font-size:13px;line-height:1.7}
.panel h2{font-size:14px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--accent);color:#fff;font-size:11px;font-weight:600}
.body{color:var(--muted);margin:0 0 10px}
.body strong{color:var(--ink)}
.body code{background:rgba(59,130,246,.2);color:#bfdbfe;padding:1px 5px;border-radius:4px;font-family:Consolas,Monaco,monospace;font-size:12px}
.points{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin-top:8px;border-left:3px solid var(--accent2)}
.points h4{margin:0 0 6px;font-size:13px;color:var(--ink)}
.points ul{margin:0;padding-left:18px;color:var(--muted)}
.points li{margin-bottom:3px}
.points li strong{color:var(--accent)}
.code{background:#0d1117;border:1px solid var(--line);border-radius:6px;padding:8px 10px;margin-top:8px;font-family:Consolas,Monaco,monospace;font-size:11.5px;line-height:1.6;color:#c9d1d9;white-space:pre-wrap}
.stepbar{display:flex;gap:6px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);overflow-x:auto}
.step{flex:1;min-width:96px;padding:8px 8px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}
.step:hover{background:#1e345a;border-color:var(--accent2)}
.step.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:600;border-color:transparent}
.controls{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}
button:hover{background:#1e345a}
button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
button.primary:hover{background:#4b91f8}
.controls label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
input[type=range]{accent-color:var(--accent);width:90px}
.pval{color:var(--accent2);font-size:12px;margin-left:2px;font-family:Consolas,Monaco,monospace;min-width:54px;display:inline-block}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}
</style>
</head>
<body>
<header class="topbar">
  <a class="back" href="../index.html">← 返回数学目录</a>
  <span class="title">乘法公式 · 面积拼图证明</span>
  <span class="subtitle">(a+b)² 与 a²−b² · 可拖动 a/b 实时验证</span>
</header>
<div class="cards">
  <div class="card s2"><div class="num">1</div><h4>完全平方（实时）</h4><div class="v" id="cardSq"></div></div>
  <div class="card s3"><div class="num">2</div><h4>平方差（实时）</h4><div class="v" id="cardDiff"></div></div>
  <div class="card s4"><div class="num">3</div><h4>当前参数</h4><div class="v" id="cardParam"></div></div>
  <div class="card "><div class="num">4</div><h4>操作提示</h4><div class="v">拖动下方 a、b 滑块，左右两边始终相等；按 ▶ 可自动演示六步</div></div>
</div>
<main>
  <div class="stage"><canvas id="cv"></canvas></div>
  <aside class="panel">
    <h2><span class="badge" id="stepBadge">引入</span><span id="stepTitle"></span></h2>
    <p class="body" id="stepBody"></p>
    <div class="points" id="stepPoints"></div>
    <div class="code" id="stepCode"></div>
  </aside>
</main>
<div class="stepbar" id="stepbar"></div>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button>
  <button id="resetBtn">↺ 重置</button>
  <button id="stepBackBtn">◀ 上一步</button>
  <button id="stepFwdBtn">下一步 ▶</button>
  <label>a<input id="pa" type="range" min="2.5" max="7" step="0.1" value="4"><span id="paV" class="pval"></span></label>
  <label>b<input id="pb" type="range" min="0.5" max="5" step="0.1" value="2.4"><span id="pbV" class="pval"></span></label>
  <label>速度<input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <span id="status" class="status">拖动 a/b 或按 ▶ 自动演示</span>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const statusEl=document.getElementById('status');
const paEl=document.getElementById('pa'),pbEl=document.getElementById('pb'),paV=document.getElementById('paV'),pbV=document.getElementById('pbV');
const cardSq=document.getElementById('cardSq'),cardDiff=document.getElementById('cardDiff'),cardParam=document.getElementById('cardParam');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(560,Math.min(1100,r.width-12));cv.height=Math.max(420,Math.min(560,r.height-12));}
window.addEventListener('resize',()=>{fit();sceneDraw();});fit();
window.showTip=function(m){if(statusEl)statusEl.textContent=m;};
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawText(t,x,y,c,fs,align,baseline){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=align||'center';ctx.textBaseline=baseline||'middle';ctx.fillText(t,x,y);}
function fillReg(x,y,w,h,fill){ctx.fillStyle=fill;ctx.fillRect(x,y,w,h);}
function poly(pts,fill,stroke,sw){ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(var i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.closePath();if(fill){ctx.fillStyle=fill;ctx.fill();}if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw||2;ctx.stroke();}}
function dimH(x,y,len,label,color){ctx.strokeStyle=color||'#9ab0d0';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+len,y);ctx.stroke();ctx.beginPath();ctx.moveTo(x,y-4);ctx.lineTo(x,y+4);ctx.moveTo(x+len,y-4);ctx.lineTo(x+len,y+4);ctx.stroke();drawText(label,x+len/2,y-9,color||'#9ab0d0',11);}
function dimV(x,y,len,label,color){ctx.strokeStyle=color||'#9ab0d0';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+len);ctx.stroke();ctx.beginPath();ctx.moveTo(x-4,y);ctx.lineTo(x+4,y);ctx.moveTo(x-4,y+len);ctx.lineTo(x+4,y+len);ctx.stroke();drawText(label,x-9,y+len/2,color||'#9ab0d0',11,'right');}
function ease(t){t=t<0?0:t>1?1:t;return t*t*(3-2*t);}

let a=4,b=2.4,stepIdx=0,animT=0,playing=false,lastT=0,speed=1;
const STEP_DUR=1.5;
let u=1,ox=0,oy=0; // 当前作图单位与原点（各 draw 函数设置）

function fmt(x){return (Math.round(x*100)/100).toFixed(2);}
function readParams(){
  a=parseFloat(paEl.value); b=parseFloat(pbEl.value);
  if(a-b<0.4){ b=a-0.4; pbEl.value=b; }
  if(b<0.5){ b=0.5; pbEl.value=b; }
  paV.textContent='a='+fmt(a); pbV.textContent='b='+fmt(b);
  var sq=(a+b)*(a+b), sm=a*a+2*a*b+b*b, df=a*a-b*b, df2=(a-b)*(a+b);
  cardSq.textContent='(a+b)² = '+fmt(sq)+'\na²+2ab+b² = '+fmt(a*a)+' + '+fmt(2*a*b)+' + '+fmt(b*b)+' = '+fmt(sm)+'  ✓';
  cardDiff.textContent='a²−b² = '+fmt(df)+'\n(a−b)(a+b) = '+fmt(a-b)+' × '+fmt(a+b)+' = '+fmt(df2)+'  ✓';
  cardParam.textContent='a = '+fmt(a)+'   b = '+fmt(b)+'\na − b = '+fmt(a-b)+'   a + b = '+fmt(a+b);
}
paEl.oninput=()=>{readParams();sceneDraw();};
pbEl.oninput=()=>{readParams();sceneDraw();};

// (a+b)² 组用的布局
function layoutAB(){
  var W=cv.width,H=cv.height,maxS=a+b;
  u=Math.min((W-100)/maxS,(H-160)/maxS);
  var size=(a+b)*u;
  ox=(W-size)/2; oy=(H-size)/2+8;
}
// a²−b² 组用的布局（最终矩形宽 a+b，故按 a+b 留出宽度）
function layoutDiff(){
  var W=cv.width,H=cv.height;
  u=Math.min((W-110)/(a+b),(H-170)/a);
  var contentLeft=(W-(a+b)*u)/2;
  ox=contentLeft+b*u; oy=(H-a*u)/2;
}
// Piece A（左侧 (a−b)×a 块）旋转 q(0..1) 后的四角
function pieceACorners(q){
  var w0=(a-b)*u, h0=a*u;
  var cx0=ox+w0/2, cy0=oy+h0/2;
  var cxt=ox-b*u+a*u/2, cyt=oy+b*u+(a-b)*u/2;
  var cx=cx0+(cxt-cx0)*q, cy=cy0+(cyt-cy0)*q;
  var ang=Math.PI/2*q, c=Math.cos(ang), s=Math.sin(ang);
  var loc=[[-w0/2,-h0/2],[w0/2,-h0/2],[w0/2,h0/2],[-w0/2,h0/2]];
  return loc.map(function(p){return [cx+p[0]*c+p[1]*s, cy-p[0]*s+p[1]*c];});
}

// ===== 步骤0：(a+b)² 引入 =====
function drawIntro(p){
  layoutAB();
  var W=cv.width,H=cv.height,size=(a+b)*u,cx=W/2,cy=H/2;
  var s2=size*ease(Math.min(p/0.7,1));
  ctx.strokeStyle='rgba(116,185,255,.22)';ctx.lineWidth=1;ctx.setLineDash([5,4]);ctx.strokeRect(ox,oy,size,size);ctx.setLineDash([]);
  fillReg(cx-s2/2,cy-s2/2,s2,s2,'rgba(59,130,246,.16)');
  ctx.strokeStyle='#74b9ff';ctx.lineWidth=3;ctx.strokeRect(cx-s2/2,cy-s2/2,s2,s2);
  if(p>0.45){
    drawText('边长 = a + b',cx,oy-18,'#e8eef8',15);
    dimH(ox,oy-6,a*u,'a','#74b9ff'); dimH(ox+a*u,oy-6,b*u,'b','#74b9ff');
    drawText('面积 = (a+b)²',cx,oy+size+26,'#fbbf24',17);
  }
}

// ===== 步骤1：切成四块 =====
function drawPartition(p){
  layoutAB();
  var W=cv.width,H=cv.height,size=(a+b)*u,cx=W/2;
  ctx.strokeStyle='#e8eef8';ctx.lineWidth=2;ctx.strokeRect(ox,oy,size,size);
  dimH(ox,oy-8,a*u,'a','#74b9ff'); dimH(ox+a*u,oy-8,b*u,'b','#74b9ff');
  dimV(ox-8,oy,a*u,'a','#74b9ff'); dimV(ox-8,oy+a*u,b*u,'b','#74b9ff');
  var cp=ease(Math.min(p/0.4,1));
  ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(ox+a*u,oy);ctx.lineTo(ox+a*u,oy+size*cp);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ox,oy+a*u);ctx.lineTo(ox+size*cp,oy+a*u);ctx.stroke();
  ctx.setLineDash([]);
  if(p>0.4){
    var q=(p-0.4)/0.6, seg=Math.min(q*4,4);
    if(seg>0){var al=Math.min(seg,1);fillReg(ox,oy,a*u,a*u,'rgba(59,130,246,'+(0.5*al)+')');if(al>=0.9)drawText('a²',ox+a*u/2,oy+a*u/2,'#fff',16);}
    if(seg>1){var al=Math.min(seg-1,1);fillReg(ox+a*u,oy,b*u,a*u,'rgba(52,211,153,'+(0.5*al)+')');if(al>=0.9)drawText('ab',ox+a*u+b*u/2,oy+a*u/2,'#fff',13);}
    if(seg>2){var al=Math.min(seg-2,1);fillReg(ox,oy+a*u,a*u,b*u,'rgba(52,211,153,'+(0.5*al)+')');if(al>=0.9)drawText('ab',ox+a*u/2,oy+a*u+b*u/2,'#fff',13);}
    if(seg>3){var al=Math.min(seg-3,1);fillReg(ox+a*u,oy+a*u,b*u,b*u,'rgba(248,113,113,'+(0.5*al)+')');if(al>=0.9)drawText('b²',ox+a*u+b*u/2,oy+a*u+b*u/2,'#fff',16);}
    ctx.strokeStyle='rgba(255,255,255,.45)';ctx.lineWidth=1.5;ctx.strokeRect(ox,oy,size,size);
  }
  drawText('竖切 x=a，横切 y=a → 四块',cx,oy+size+30,'#9ab0d0',12);
}

// ===== 步骤2：求和验证 =====
function drawSum(p){
  layoutAB();
  var W=cv.width,H=cv.height,size=(a+b)*u,cx=W/2;
  fillReg(ox,oy,a*u,a*u,'rgba(59,130,246,.5)'); drawText('a²',ox+a*u/2,oy+a*u/2,'#fff',16);
  fillReg(ox+a*u,oy,b*u,a*u,'rgba(52,211,153,.5)'); drawText('ab',ox+a*u+b*u/2,oy+a*u/2,'#fff',13);
  fillReg(ox,oy+a*u,a*u,b*u,'rgba(52,211,153,.5)'); drawText('ab',ox+a*u/2,oy+a*u+b*u/2,'#fff',13);
  fillReg(ox+a*u,oy+a*u,b*u,b*u,'rgba(248,113,113,.5)'); drawText('b²',ox+a*u+b*u/2,oy+a*u+b*u/2,'#fff',16);
  ctx.strokeStyle='#e8eef8';ctx.lineWidth=2;ctx.strokeRect(ox,oy,size,size);
  dimH(ox,oy-8,a*u,'a','#74b9ff'); dimH(ox+a*u,oy-8,b*u,'b','#74b9ff');
  var y=oy+size+34;
  var hi=Math.floor(ease(Math.min(p/0.8,1))*4);
  var terms=[['a²',hi>0],['ab',hi>1],['ab',hi>2],['b²',hi>3]];
  var line='';
  terms.forEach(function(t,i){line+=(i?' + ':'')+(t[1]?'':'·');line+=t[0];});
  drawText('a² + ab + ab + b²  =  a² + 2ab + b²  =  (a+b)²',cx,y,'#e8eef8',15);
  drawText(fmt(a*a)+' + '+fmt(a*b)+' + '+fmt(a*b)+' + '+fmt(b*b)+' = '+fmt(a*a+2*a*b+b*b)+' = '+fmt((a+b)*(a+b)),cx,y+24,'#fbbf24',13);
}

// ===== 步骤3：a²−b² 的 L 形 =====
function drawDiffIntro(p){
  layoutDiff();
  var W=cv.width,H=cv.height,cx=W/2;
  ctx.strokeStyle='#e8eef8';ctx.lineWidth=2;ctx.strokeRect(ox,oy,a*u,a*u);
  dimH(ox,oy-8,(a-b)*u,'a−b','#74b9ff'); dimH(ox+(a-b)*u,oy-8,b*u,'b','#74b9ff');
  dimV(ox-8,oy,a*u,'a','#74b9ff');
  drawText('a²',ox+(a-b)*u/2,oy+a*u*0.62,'#bfdbfe',16);
  var cp=ease(Math.min(p/0.6,1));
  fillReg(ox+(a-b)*u,oy,b*u,b*u*cp,'rgba(20,30,50,.88)');
  ctx.strokeStyle='#f87171';ctx.lineWidth=2;ctx.setLineDash([4,3]);ctx.strokeRect(ox+(a-b)*u,oy,b*u,b*u);ctx.setLineDash([]);
  if(cp>0.3) drawText('b²',ox+(a-b)*u+b*u/2,oy+b*u/2,'#f87171',14);
  drawText('L 形面积 = a² − b²',cx,oy+a*u+30,'#fbbf24',16);
}

// ===== 步骤4：剪开 + 旋转重组 =====
function drawRearrange(p){
  layoutDiff();
  var W=cv.width,H=cv.height,cx=W/2;
  ctx.strokeStyle='rgba(232,238,248,.5)';ctx.lineWidth=1.5;ctx.strokeRect(ox,oy,a*u,a*u);
  fillReg(ox+(a-b)*u,oy,b*u,b*u,'rgba(20,30,50,.72)'); // 已剪去的 b²
  ctx.strokeStyle='#f87171';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.strokeRect(ox+(a-b)*u,oy,b*u,b*u);ctx.setLineDash([]);
  // Piece B 右下块（绿色）
  fillReg(ox+(a-b)*u,oy+b*u,b*u,(a-b)*u,'rgba(52,211,153,.45)');
  ctx.strokeStyle='#34d399';ctx.lineWidth=1.5;ctx.strokeRect(ox+(a-b)*u,oy+b*u,b*u,(a-b)*u);
  if(p<0.25){
    var cp=p/0.25;
    ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(ox+(a-b)*u,oy);ctx.lineTo(ox+(a-b)*u,oy+a*u*cp);ctx.stroke();ctx.setLineDash([]);
    drawText('沿 x=a−b 竖切',cx,oy+a*u+30,'#9ab0d0',12);
  }
  var q=p<0.25?0:ease((p-0.25)/0.75);
  var pts=pieceACorners(q);
  poly(pts,'rgba(59,130,246,.5)','#74b9ff',2);
  if(q>0.15){ drawText('a',pts[0][0]+(pts[1][0]-pts[0][0])*0.5,pts[0][1]+(pts[2][1]-pts[0][1])*0.5,'#fff',13); }
  if(q>0.95){
    var rx=ox-b*u, ry=oy+b*u, rw=(a+b)*u, rh=(a-b)*u;
    ctx.strokeStyle='#e8eef8';ctx.lineWidth=2;ctx.strokeRect(rx,ry,rw,rh);
    dimH(rx,ry-8,a*u,'a','#74b9ff'); dimH(rx+a*u,ry-8,b*u,'b','#74b9ff');
    dimV(ox+a*u+8,ry,rh,'a−b','#74b9ff');
    drawText('两块高度都是 (a−b)，拼成长 (a+b) 的长方形',cx,ry+rh+26,'#fbbf24',13);
  }
}

// ===== 步骤5：结论 =====
function drawConclusion(p){
  layoutDiff();
  var W=cv.width,H=cv.height,cx=W/2;
  var rx=ox-b*u, ry=oy+b*u, rw=(a+b)*u, rh=(a-b)*u;
  var pe=ease(Math.min(p/0.5,1));
  fillReg(rx,ry,a*u,rh*pe,'rgba(59,130,246,.5)');
  fillReg(rx+a*u,ry,b*u,rh*pe,'rgba(52,211,153,.5)');
  if(pe>=0.99){
    ctx.strokeStyle='#e8eef8';ctx.lineWidth=2;ctx.strokeRect(rx,ry,rw,rh);
    drawText('a',rx+a*u/2,ry+rh/2,'#fff',15); drawText('b',rx+a*u+b*u/2,ry+rh/2,'#fff',13);
    dimH(rx,ry-8,rw,'a + b','#fbbf24'); dimV(rx+rw+8,ry,rh,'a − b','#fbbf24');
  }
  if(p>0.4){
    drawText('面积 = 长 × 宽 = (a+b)(a−b)',cx,ry+rh+30,'#e8eef8',15);
    drawText('又由 a²−b² 的 L 形拼成  ⇒  a² − b² = (a−b)(a+b)',cx,ry+rh+54,'#fbbf24',15);
  }
}

function sceneDraw(){
  var W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  var p=ease(Math.min(animT/STEP_DUR,1));
  if(stepIdx===0)drawIntro(p);
  else if(stepIdx===1)drawPartition(p);
  else if(stepIdx===2)drawSum(p);
  else if(stepIdx===3)drawDiffIntro(p);
  else if(stepIdx===4)drawRearrange(p);
  else if(stepIdx===5)drawConclusion(p);
}

const STEPS=[
  {tag:"引入",name:"(a+b)²的面积",body:"把乘法变成面积。一个边长为 <code>(a+b)</code> 的正方形，面积就是 <code>(a+b)²</code>。下面把它切开，看看这个平方里到底藏着什么——这比死记展开式可靠得多。",points:{title:"核心思想",items:["边长 (a+b) 的正方形","面积 = 边长² = (a+b)²","数形结合：用面积解释代数","目标：验证 (a+b)²=a²+2ab+b²"]},code:"(a+b)² = ?\n面积 = 边长 × 边长"},
  {tag:"划分",name:"切成四块",body:"在大正方形中，沿距左边 <code>a</code> 处竖切、距上边 <code>a</code> 处横切，得到四块：<strong>a×a</strong>（a²）、<strong>b×b</strong>（b²），以及两个 <strong>a×b</strong>（ab）。两个 ab 长方形一上一下、一左一右。",points:{title:"四块区域",items:["左上 a×a = a²","右上 b×a = ab","左下 a×b = ab","右下 b×b = b²"]},code:"竖切 x=a，横切 y=a\n→ a², ab, ab, b²"},
  {tag:"求和",name:"面积求和验证",body:"四块面积相加：<code>a² + ab + ab + b² = a² + 2ab + b²</code>。而四块拼起来恰好是大正方形，面积 = <code>(a+b)²</code>，所以 <strong>(a+b)² = a² + 2ab + b²</strong>。上方数值随 a、b 实时变化，等式始终成立。",points:{title:"验证",items:["a² + ab + ab + b²","= a² + 2ab + b²","= (a+b)²","对任意 a、b 恒成立"]},code:"a² + 2ab + b²\n= (a+b)²   ✓"},
  {tag:"平方差",name:"a²−b²的L形",body:"再看平方差。一个 <code>a×a</code> 大正方形（面积 <code>a²</code>），从右上角剪去一个 <code>b×b</code> 小正方形（面积 <code>b²</code>），剩下的是 <strong>L 形</strong>，面积 = <code>a² − b²</code>。下一步把它重新拼成长方形。",points:{title:"L 形",items:["大正方形面积 a²","剪去角落 b²","剩余 L 形","面积 = a² − b²"]},code:"a² − b² = ?\nL 形面积"},
  {tag:"剪拼",name:"剪开与旋转重组",body:"沿距左边 <code>(a−b)</code> 处把 L 形竖切一刀，分成两块：左侧 <code>(a−b)×a</code>、右下 <code>b×(a−b)</code>。把左侧大块<strong>旋转 90°</strong>放到右下块旁边——两块高度都变成 <code>(a−b)</code>，拼成 <code>(a+b) × (a−b)</code> 的长方形。",points:{title:"剪拼三步",items:["竖切分成两块","左块旋转 90°","两块高度都是 (a−b)","拼成 (a+b)×(a−b)"]},code:"左块 (a−b)×a 旋转 90°\n+ 右下 b×(a−b)\n= (a+b) × (a−b)"},
  {tag:"结论",name:"平方差公式",body:"重组后的长方形面积 = 长 × 宽 = <code>(a+b)(a−b)</code>，而它由 a²−b² 的 L 形拼成，所以 <strong>a² − b² = (a−b)(a+b)</strong>。这就是平方差公式，反过来就是因式分解。应用：99²−1 = (99−1)(99+1) = 98×100 = 9800。",points:{title:"结论与应用",items:["a²−b² = (a−b)(a+b)","因式分解（逆向用）","简便计算","配凑平方差"]},code:"a² − b² = (a−b)(a+b)\n99² − 1 = 98 × 100 = 9800"}
];

function loadStep(){
  var s=STEPS[stepIdx]; if(!s)return;
  animT=0;
  document.getElementById('stepBadge').textContent=s.tag;
  document.getElementById('stepTitle').textContent=s.name;
  document.getElementById('stepBody').innerHTML=s.body;
  document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?s.points.title:'')+'</h4><ul>'+((s.points?s.points.items:[]).map(function(x){return '<li>'+x+'</li>';}).join(''))+'</ul>';
  document.getElementById('stepCode').textContent=s.code||'';
  document.querySelectorAll('.step').forEach(function(el,i){el.classList.toggle('active',i===stepIdx);});
  statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;
}
function buildStepbar(){
  var bar=document.getElementById('stepbar');bar.innerHTML='';
  STEPS.forEach(function(s,i){var el=document.createElement('div');el.className='step'+(i===stepIdx?' active':'');el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>8?s.name.slice(0,7)+'…':s.name)+'</div>';el.onclick=function(){stepIdx=i;loadStep();};bar.appendChild(el);});
}

function sceneInit(){a=4;b=2.4;stepIdx=0;animT=0;playing=false;paEl.value=a;pbEl.value=b;readParams();}
function sceneReset(){a=4;b=2.4;stepIdx=0;animT=0;playing=false;paEl.value=a;pbEl.value=b;readParams();loadStep();statusEl.textContent='已重置';}
function sceneUpdate(dt){
  animT+=dt*speed;
  if(!playing && animT>STEP_DUR) animT=STEP_DUR;
  if(playing && animT>STEP_DUR+0.5){ stepIdx=(stepIdx+1)%STEPS.length; loadStep(); }
}

const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn'),stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn'),speedEl=document.getElementById('speed');
playBtn.onclick=function(){playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';if(playing)animT=0;};
resetBtn.onclick=function(){sceneReset();};
stepFwdBtn.onclick=function(){stepIdx=(stepIdx+1)%STEPS.length;loadStep();};
stepBackBtn.onclick=function(){stepIdx=(stepIdx-1+STEPS.length)%STEPS.length;loadStep();};
speedEl.oninput=function(){speed=parseFloat(speedEl.value);};

function loop(ts){if(!lastT)lastT=ts;var dt=(ts-lastT)/1000;lastT=ts;sceneUpdate(dt);sceneDraw();requestAnimationFrame(loop);}

sceneInit();buildStepbar();loadStep();requestAnimationFrame(loop);
</script>
