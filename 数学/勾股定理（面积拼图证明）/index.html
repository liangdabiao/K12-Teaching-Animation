<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>勾股定理 · 面积拼图证明</title>
<style>:root{--bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;--accent:#3b82f6;--accent2:#74b9ff;--line:#243a5e;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
.back{color:var(--accent2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap;background:rgba(116,185,255,.06)}.back:hover{background:rgba(116,185,255,.14)}
.title{font-size:15px;font-weight:600}.subtitle{font-size:12px;color:var(--muted)}
.cards{display:flex;gap:10px;padding:10px 16px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(59,130,246,.06),transparent)}
.card{flex:1;min-width:200px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 12px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}.card.s2::before{background:var(--good)}.card.s3::before{background:var(--bad)}.card.s4::before{background:var(--warn)}
.card h4{margin:0 0 4px;font-size:13px}.card .v{font-size:11.5px;color:var(--muted);line-height:1.6;font-family:Consolas,Monaco,monospace;white-space:pre-wrap}
.card .num{position:absolute;right:8px;top:6px;font-size:22px;font-weight:700;color:rgba(255,255,255,.07)}
main{flex:1;display:flex;min-height:0}.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}
.panel{width:340px;flex:none;padding:14px;overflow:auto;border-left:1px solid var(--line);background:var(--panel);font-size:13px;line-height:1.7}
.panel h2{font-size:14px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--accent);color:#fff;font-size:11px;font-weight:600}
.body{color:var(--muted);margin:0 0 10px}.body strong{color:var(--ink)}.body code{background:rgba(59,130,246,.2);color:#bfdbfe;padding:1px 5px;border-radius:4px;font-family:Consolas,Monaco,monospace;font-size:12px}
.points{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin-top:8px;border-left:3px solid var(--accent2)}.points h4{margin:0 0 6px;font-size:13px}.points ul{margin:0;padding-left:18px;color:var(--muted)}.points li{margin-bottom:3px}.points li strong{color:var(--accent)}
.code{background:#0d1117;border:1px solid var(--line);border-radius:6px;padding:8px 10px;margin-top:8px;font-family:Consolas,Monaco,monospace;font-size:11.5px;line-height:1.6;color:#c9d1d9;white-space:pre-wrap}
.stepbar{display:flex;gap:6px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);overflow-x:auto}
.step{flex:1;min-width:90px;padding:8px 6px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}.step:hover{background:#1e345a;border-color:var(--accent2)}.step.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:600;border-color:transparent}
.controls{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}button:hover{background:#1e345a}button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}button.primary:hover{background:#4b91f8}
.controls label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}input[type=range]{accent-color:var(--accent);width:90px}
.pval{color:var(--accent2);font-size:12px;font-family:Consolas,Monaco,monospace;min-width:50px;display:inline-block}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}
</style></head>
<body>
<header class="topbar"><a class="back" href="../index.html">← 返回数学目录</a><span class="title">勾股定理 · 面积拼图证明</span><span class="subtitle">a² + b² = c² · 可拖动 a/b 实时验证</span></header>
<div class="cards">
  <div class="card s2"><div class="num">1</div><h4>勾股关系（实时）</h4><div class="v" id="cardSq"></div></div>
  <div class="card s3"><div class="num">2</div><h4>斜边 c（实时）</h4><div class="v" id="cardC"></div></div>
  <div class="card s4"><div class="num">3</div><h4>当前参数</h4><div class="v" id="cardParam"></div></div>
  <div class="card"><div class="num">4</div><h4>操作提示</h4><div class="v">拖动 a、b 滑块，等式恒成立；按 ▶ 自动演示五步</div></div>
</div>
<main><div class="stage"><canvas id="cv"></canvas></div>
<aside class="panel"><h2><span class="badge" id="stepBadge">引入</span><span id="stepTitle"></span></h2><p class="body" id="stepBody"></p><div class="points" id="stepPoints"></div><div class="code" id="stepCode"></div></aside>
</main>
<div class="stepbar" id="stepbar"></div>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button><button id="resetBtn">↺ 重置</button><button id="stepBackBtn">◀ 上一步</button><button id="stepFwdBtn">下一步 ▶</button>
  <label>a<input id="pa" type="range" min="1" max="5" step="0.5" value="3"><span id="paV" class="pval"></span></label>
  <label>b<input id="pb" type="range" min="1" max="5" step="0.5" value="4"><span id="pbV" class="pval"></span></label>
  <label>速度<input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <span id="status" class="status">拖动 a/b 或按 ▶ 自动演示</span>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),statusEl=document.getElementById('status');
const paEl=document.getElementById('pa'),pbEl=document.getElementById('pb'),paV=document.getElementById('paV'),pbV=document.getElementById('pbV');
const cardSq=document.getElementById('cardSq'),cardC=document.getElementById('cardC'),cardParam=document.getElementById('cardParam');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(560,Math.min(1100,r.width-12));cv.height=Math.max(420,Math.min(560,r.height-12));}
window.addEventListener('resize',()=>{fit();sceneDraw();});fit();
window.showTip=function(m){if(statusEl)statusEl.textContent=m;};
function drawText(t,x,y,c,fs,al,bl){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=al||'center';ctx.textBaseline=bl||'middle';ctx.fillText(t,x,y);}
function fillTri(p,fill,stroke,sw){ctx.beginPath();ctx.moveTo(p[0][0],p[0][1]);ctx.lineTo(p[1][0],p[1][1]);ctx.lineTo(p[2][0],p[2][1]);ctx.closePath();if(fill){ctx.fillStyle=fill;ctx.fill();}if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw||2;ctx.stroke();}}
function ease(t){t=t<0?0:t>1?1:t;return t*t*(3-2*t);}
function lerp(a,b,t){return a+(b-a)*t;}
let a=3,b=4,stepIdx=0,animT=0,playing=false,lastT=0,speed=1;
const STEP_DUR=1.5;
function fmt(x){return(Math.round(x*100)/100).toFixed(2);}
function readParams(){a=parseFloat(paEl.value);b=parseFloat(pbEl.value);paV.textContent='a='+fmt(a);pbV.textContent='b='+fmt(b);var c=Math.hypot(a,b);cardSq.textContent='a²+b² = '+fmt(a*a)+' + '+fmt(b*b)+' = '+fmt(a*a+b*b)+'\nc² = '+fmt(c*c)+'   ✓';cardC.textContent='c = √(a²+b²) = '+fmt(c);cardParam.textContent='a = '+fmt(a)+'   b = '+fmt(b)+'\nc = '+fmt(c)+'   |b−a| = '+fmt(Math.abs(b-a));}
paEl.oninput=()=>{readParams();sceneDraw();};pbEl.oninput=()=>{readParams();sceneDraw();};

// 直角三角形布局：直角在 (ox,oy)，a 水平向右，b 竖直向上
function triLayout(){var W=cv.width,H=cv.height,c=Math.hypot(a,b);var u=Math.min((W-160)/Math.max(a,c),(H-180)/Math.max(b,c));var ox=(W-a*u)/2,oy=H/2+b*u/2+20;return {u,ox,oy,c};}

function drawIntro(p){var W=cv.width,H=cv.height,{u,ox,oy,c}=triLayout();var pe=ease(Math.min(p/0.7,1));
  ctx.strokeStyle='rgba(116,185,255,.25)';ctx.lineWidth=1;ctx.setLineDash([5,4]);
  var pts=[[ox,oy],[ox+a*u,oy],[ox,oy-b*u]];
  ctx.beginPath();ctx.moveTo(lerp(ox,ox,pe),lerp(oy,oy,pe));ctx.lineTo(lerp(ox,ox+a*u,pe),oy);ctx.lineTo(ox,lerp(oy,oy-b*u,pe));ctx.closePath();ctx.setLineDash([]);ctx.strokeStyle='#74b9ff';ctx.lineWidth=3;ctx.stroke();
  // 直角标记
  ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;ctx.strokeRect(ox,oy-10,10,10);
  if(pe>0.6){drawText('a',ox+a*u/2,oy+16,'#34d399',14);drawText('b',ox-16,oy-b*u/2,'#34d399',14);drawText('c',ox+a*u*0.55,oy-b*u*0.45,'#fbbf24',14);drawText('直角三角形：a² + b² = c² ?',W/2,40,'#e8eef8',16);}
}

function drawSquares(p){var W=cv.width,H=cv.height,{u,ox,oy,c}=triLayout();var pe=ease(Math.min(p/0.8,1));
  // 三角形
  fillTri([[ox,oy],[ox+a*u,oy],[ox,oy-b*u]],'rgba(59,130,246,.15)','#74b9ff',2);
  ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;ctx.strokeRect(ox,oy-10,10,10);
  drawText('a',ox+a*u/2,oy+16,'#34d399',12);drawText('b',ox-16,oy-b*u/2,'#34d399',12);
  // a² 正方形（在 a 边下方）
  var sa=a*u*pe;ctx.fillStyle='rgba(59,130,246,.4)';ctx.fillRect(ox,oy,sa,sa);ctx.strokeStyle='#74b9ff';ctx.lineWidth=1.5;ctx.strokeRect(ox,oy,sa,sa);if(pe>0.9)drawText('a²',ox+sa/2,oy+sa/2,'#fff',14);
  // b² 正方形（在 b 边左侧）
  var sb=b*u*pe;ctx.fillStyle='rgba(52,211,153,.4)';ctx.fillRect(ox-sb,oy-sb,sb,sb);ctx.strokeRect(ox-sb,oy-sb,sb,sb);if(pe>0.9)drawText('b²',ox-sb/2,oy-sb/2,'#fff',14);
  // c² 正方形（在斜边外侧）斜边方向: 从(ox+a*u,oy)到(ox,oy-b*u)，外法向背离直角顶点指向右上
  var hx=ox+a*u,hy=oy,vx=ox,vy=oy-b*u;var dx=vx-hx,dy=vy-hy;var L=Math.hypot(dx,dy);var nx=-dy/L,ny=dx/L; // 外法向 = (b/c,-a/c)，指向右上，正确背离直角顶点
  var sc=c*u*pe;var p3=[hx+nx*sc,hy+ny*sc],p4=[vx+nx*sc,vy+ny*sc];
  ctx.fillStyle='rgba(248,113,113,.35)';ctx.beginPath();ctx.moveTo(hx,hy);ctx.lineTo(vx,vy);ctx.lineTo(p4[0],p4[1]);ctx.lineTo(p3[0],p3[1]);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#f87171';ctx.lineWidth=1.5;ctx.stroke();
  if(pe>0.9)drawText('c²',(hx+vx+p3[0]+p4[0])/4,(hy+vy+p3[1]+p4[1])/4,'#fff',14);
  drawText('三边各作正方形：面积 a²、b²、c²',W/2,H-16,'#9ab0d0',13);
}

// 赵爽弦图：外正方形边 c，4 个直角三角形斜边贴外边，内部 (b−a) 小正方形
function drawXiantu(p){var W=cv.width,H=cv.height,c=Math.hypot(a,b);var u=Math.min((W-120)/c,(H-160)/c);var gx=(W-c*u)/2,gy=(H-c*u)/2;var C=c*u,A2=a*a/c*u,AB=a*b/c*u;
  // 外正方形
  ctx.strokeStyle='rgba(232,238,248,.5)';ctx.lineWidth=2;ctx.strokeRect(gx,gy,C,C);
  // 4 三角形目标顶点
  var T=[[[gx,gy],[gx+C,gy],[gx+A2,gy+AB]],[[gx+C,gy],[gx+C,gy+C],[gx+C-AB,gy+A2]],[[gx+C,gy+C],[gx,gy+C],[gx+C-A2,gy+C-AB]],[[gx,gy+C],[gx,gy],[gx+AB,gy+C-A2]]];
  var pe=ease(Math.min(p/0.8,1));
  // 起始偏移：各三角形从外侧飞入
  var off=[[0,-40],[40,0],[0,40],[-40,0]];
  for(var i=0;i<4;i++){var s=T[i].map(function(pt,j){return [pt[0]+off[i][0]*(1-pe),pt[1]+off[i][1]*(1-pe)];});fillTri(s,'rgba(59,130,246,'+(0.35+0.15*i*0)+')','#74b9ff',1.5);}
  // 内部小正方形 (b−a)
  if(pe>0.85){var d=Math.abs(b-a)*u;var inner=[[gx+A2,gy+AB],[gx+C-AB,gy+A2],[gx+C-A2,gy+C-AB],[gx+AB,gy+C-A2]];ctx.fillStyle='rgba(251,191,36,.5)';ctx.beginPath();ctx.moveTo(inner[0][0],inner[0][1]);for(var k=1;k<4;k++)ctx.lineTo(inner[k][0],inner[k][1]);ctx.closePath();ctx.fill();ctx.strokeStyle='#fbbf24';ctx.lineWidth=1.5;ctx.stroke();drawText('|b−a|²',gx+C/2,gy+C/2,'#fff',12);}
  drawText('4×(½ab) + (b−a)² = c²',W/2,H-16,'#fbbf24',14);
}

function deriveStr(){return 'c² = 4×(½ab) + (b−a)²\n   = 2ab + (b² − 2ab + a²)\n   = a² + b²   ✓';}
function drawDerive(p){var W=cv.width,H=cv.height,cx=W/2,cy=H/2;var pe=ease(Math.min(p/0.6,1));var lines=deriveStr().split('\n');
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(var i=0;i<lines.length;i++){var y=cy-60+i*34;ctx.globalAlpha=pe;ctx.fillStyle=i===lines.length-1?'#34d399':'#e8eef8';ctx.font=(i===lines.length-1?'bold ':'')+(i===0?20:18)+'px Consolas,monospace';ctx.fillText(lines[i],cx,y);}
  ctx.globalAlpha=1;drawText('4 个三角形面积 + 中间小正方形 = 大正方形',cx,cy+90,'#9ab0d0',13);
}

function drawApply(p){var W=cv.width,H=cv.height,cx=W/2;var pe=ease(Math.min(p/0.6,1));
  drawText('应用：已知两边求第三边',cx,60,'#e8eef8',16);
  ctx.globalAlpha=pe;drawText('c = √(a² + b²)',cx,H/2-30,'#74b9ff',20);
  drawText('a = √(c² − b²)',cx,H/2+0,'#74b9ff',20);
  drawText('例：3² + 4² = 9 + 16 = 25 = 5²  →  c = 5',cx,H/2+40,'#34d399',16);
  drawText('当前：'+fmt(a)+'² + '+fmt(b)+'² = '+fmt(a*a+b*b)+' = '+fmt(Math.hypot(a,b))+'²',cx,H/2+70,'#fbbf24',15);ctx.globalAlpha=1;
}

function sceneDraw(){var W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);var p=ease(Math.min(animT/STEP_DUR,1));
  if(stepIdx===0)drawIntro(p);else if(stepIdx===1)drawSquares(p);else if(stepIdx===2)drawXiantu(p);else if(stepIdx===3)drawDerive(p);else if(stepIdx===4)drawApply(p);
}

const STEPS=[
 {tag:"引入",name:"直角三角形",body:"直角三角形中，两直角边的平方和等于斜边的平方：<strong>a² + b² = c²</strong>。a、b 是直角边，c 是斜边（对着直角的那条）。",points:{title:"要点",items:["<strong>直角</strong>对边为斜边 c","<strong>a、b</strong> 为直角边","c² = a² + b²","数形结合的基石"]},code:"a² + b² = c²"},
 {tag:"三边正方形",name:"三边作正方形",body:"以三边为边分别作正方形，面积各为 <strong>a²、b²、c²</strong>。勾股定理就是说：两小正方形面积之和，正好等于大正方形面积。",points:{title:"观察",items:["a 边外正方形 = a²","b 边外正方形 = b²","c 边外正方形 = c²","a² + b² = c²"]},code:"S(a²) + S(b²) = S(c²)"},
 {tag:"赵爽弦图",name:"赵爽弦图证明",body:"把 4 个相同的直角三角形（两直角边 a、b）斜边向外拼成边长为 c 的大正方形，中间空出一个小正方形（边长 <strong>|b−a|</strong>）。大正方形面积 = 4 个三角形 + 中间小正方形。",points:{title:"拼图",items:["4 个直角三角形","拼成边长 c 的大正方形","中间空出 |b−a| 小正方形","面积 = 4×(½ab) + (b−a)²"]},code:"c² = 4×(½ab) + (b−a)²"},
 {tag:"推导",name:"代数推导",body:"展开右边：<code>c² = 4×(½ab) + (b−a)² = 2ab + b² − 2ab + a² = a² + b²</code>。中间项 2ab 抵消，只剩 a²+b²。这就是无字证明背后的代数。",points:{title:"化简",items:["4×(½ab) = 2ab","(b−a)² = b² − 2ab + a²","2ab 相互抵消","得 a² + b² = c²"]},code:deriveStr()},
 {tag:"应用",name:"求边长",body:"已知任意两边可求第三边：<code>c = √(a²+b²)</code>，<code>a = √(c²−b²)</code>。最经典的是 <strong>3-4-5</strong>。常用于求距离、高度、最短路径。",points:{title:"例题",items:["3-4-5 最常见","c=√(3²+4²)=5","已知斜边求直角边","实际测量与距离"]},code:"c = √(a²+b²)\n3²+4²=5²"}
];
function loadStep(){var s=STEPS[stepIdx];if(!s)return;animT=0;document.getElementById('stepBadge').textContent=s.tag;document.getElementById('stepTitle').textContent=s.name;document.getElementById('stepBody').innerHTML=s.body;document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?s.points.title:'')+'</h4><ul>'+((s.points?s.points.items:[]).map(function(x){return '<li>'+x+'</li>';}).join(''))+'</ul>';document.getElementById('stepCode').textContent=s.code||'';document.querySelectorAll('.step').forEach(function(el,i){el.classList.toggle('active',i===stepIdx);});statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;}
function buildStepbar(){var bar=document.getElementById('stepbar');bar.innerHTML='';STEPS.forEach(function(s,i){var el=document.createElement('div');el.className='step'+(i===stepIdx?' active':'');el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>7?s.name.slice(0,6)+'…':s.name)+'</div>';el.onclick=function(){stepIdx=i;loadStep();};bar.appendChild(el);});}
function sceneInit(){a=3;b=4;stepIdx=0;animT=0;playing=false;paEl.value=a;pbEl.value=b;readParams();}
function sceneReset(){a=3;b=4;stepIdx=0;animT=0;playing=false;paEl.value=a;pbEl.value=b;readParams();loadStep();statusEl.textContent='已重置';}
function sceneUpdate(dt){animT+=dt*speed;if(!playing&&animT>STEP_DUR)animT=STEP_DUR;if(playing&&animT>STEP_DUR+0.5){stepIdx=(stepIdx+1)%STEPS.length;loadStep();}}
const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn'),stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn'),speedEl=document.getElementById('speed');
playBtn.onclick=function(){playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';if(playing)animT=0;};
resetBtn.onclick=function(){sceneReset();};stepFwdBtn.onclick=function(){stepIdx=(stepIdx+1)%STEPS.length;loadStep();};stepBackBtn.onclick=function(){stepIdx=(stepIdx-1+STEPS.length)%STEPS.length;loadStep();};speedEl.oninput=function(){speed=parseFloat(speedEl.value);};
function loop(ts){if(!lastT)lastT=ts;var dt=(ts-lastT)/1000;lastT=ts;sceneUpdate(dt);sceneDraw();requestAnimationFrame(loop);}
sceneInit();buildStepbar();loadStep();requestAnimationFrame(loop);
</script></body></html>
