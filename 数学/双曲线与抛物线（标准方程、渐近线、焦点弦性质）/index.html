<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>双曲线与抛物线 · 标准方程 · 渐近线 · 焦点弦性质</title>
<style>
:root{--bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;--accent:#fbbf24;--accent2:#06b6d4;--line:#243a5e;--good:#34d399;--warn:#fbbf24;--bad:#f87171;}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
.back{color:var(--accent2);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap;background:rgba(6,182,212,.06)}
.back:hover{background:rgba(6,182,212,.14)}
.title{font-size:15px;font-weight:600}.subtitle{font-size:12px;color:var(--muted)}
.cards{display:flex;gap:10px;padding:10px 16px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(251,191,36,.06),transparent)}
.card{flex:1;min-width:160px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.card.s2::before{background:var(--accent2)}.card.s3::before{background:var(--good)}.card.s4::before{background:var(--bad)}
.card h4{margin:0 0 4px;font-size:13px}.card .v{font-size:11px;color:var(--muted);line-height:1.5}
.card .num{position:absolute;right:8px;top:6px;font-size:24px;font-weight:700;color:rgba(255,255,255,.07)}
main{flex:1;display:flex;min-height:0}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}
.panel{width:340px;flex:none;padding:14px;overflow:auto;border-left:1px solid var(--line);background:var(--panel);font-size:13px;line-height:1.7}
.panel h2{font-size:14px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--accent);color:#1a1a1a;font-size:11px;font-weight:600}
.body{color:var(--muted);margin:0 0 10px}.body strong{color:var(--ink)}
.body code{background:rgba(251,191,36,.2);color:#fde68a;padding:1px 5px;border-radius:4px;font-family:Consolas,Monaco,monospace;font-size:12px}
.points{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin-top:8px;border-left:3px solid var(--accent2)}
.points h4{margin:0 0 6px;font-size:13px}.points ul{margin:0;padding-left:18px;color:var(--muted)}
.points li{margin-bottom:3px}.points li strong{color:var(--accent)}
.stepbar{display:flex;gap:6px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line);overflow-x:auto}
.step{flex:1;min-width:100px;padding:8px 10px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .15s}
.step:hover{background:#1e345a;border-color:var(--accent2)}
.step.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1a1a;font-weight:600;border-color:transparent}
.controls{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap}
button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}
button:hover{background:#1e345a}button.primary{background:var(--accent);border-color:var(--accent);color:#1a1a1a;font-weight:600}
.controls label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
input[type=range]{accent-color:var(--accent)}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}
</style>
</head>
<body>
<header class="topbar"><a class="back" href="../index.html">← 返回数学目录</a><span class="title">双曲线与抛物线</span><span class="subtitle">标准方程 · 渐近线 · 焦点弦性质</span></header>
<div class="cards">
  <div class="card"><div class="num">1</div><h4>双曲线标准方程</h4><div class="v">x²/a² − y²/b² = 1<br>焦点在 x 轴，c²=a²+b²</div></div>
  <div class="card s2"><div class="num">2</div><h4>渐近线与离心率</h4><div class="v">y=±(b/a)x<br>e=c/a，e&gt;1 越大越开</div></div>
  <div class="card s3"><div class="num">3</div><h4>抛物线四种方程</h4><div class="v">y²=±2px，x²=±2py<br>右左上下四种开口</div></div>
  <div class="card s4"><div class="num">4</div><h4>焦点与准线</h4><div class="v">焦准距 p，F(p/2,0)<br>通径长 2p（最短焦点弦）</div></div>
</div>
<main>
  <div class="stage"><canvas id="cv"></canvas></div>
  <aside class="panel"><h2><span class="badge" id="stepBadge">基础</span><span id="stepTitle">双曲线定义</span></h2><p class="body" id="stepBody"></p><div class="points" id="stepPoints"></div></aside>
</main>
<div class="stepbar" id="stepbar"></div>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button><button id="resetBtn">↺ 重置</button>
  <button id="stepBackBtn">◀ 上一步</button><button id="stepFwdBtn">下一步 ▶</button>
  <label>速度 <input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <label>e <input id="ecc" type="range" min="1.1" max="3" step="0.1" value="1.5"></label>
  <span id="status" class="status">点击播放或选择步骤</span>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(520,Math.min(1100,r.width-12));cv.height=Math.max(400,Math.min(600,r.height-12));}
window.addEventListener('resize',()=>{fit();draw();});fit();
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawText(t,x,y,c,fs,a,b){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=a||'center';ctx.textBaseline=b||'middle';ctx.fillText(t,x,y);}

const STEPS=[
  {tag:'双曲线',name:'双曲线定义',body:'<strong>双曲线</strong>是平面上到两定点 F₁、F₂ 距离之差的绝对值为常数 2a（且 2a &lt; |F₁F₂|）的点的轨迹。<code>||PF₁| − |PF₂|| = 2a</code>',points:{title:'定义要点',items:['<strong>两焦点</strong>：F₁、F₂ 定点','<strong>距离差</strong>：|PF₁|−|PF₂| 的绝对值','<strong>常数 2a</strong>：必须 < |F₁F₂|','<strong>两支</strong>：轨迹分两支（含原点对称']}},
  {tag:'双曲线',name:'双曲线标准方程',body:'<strong>焦点在 x 轴</strong>：<code>x²/a² − y²/b² = 1</code>，其中 <code>c² = a² + b²</code>，焦点 F(±c, 0)。<strong>焦点在 y 轴</strong>：<code>y²/a² − x²/b² = 1</code>，焦点 F(0, ±c)。',points:{title:'标准方程两种',items:['<strong>x 轴型</strong>：x²/a² − y²/b² = 1','<strong>y 轴型</strong>：y²/a² − x²/b² = 1','<strong>关系</strong>：c² = a² + b²','<strong>焦点坐标</strong>：(±c, 0) 或 (0, ±c)']}},
  {tag:'双曲线',name:'渐近线与离心率',body:'双曲线的<strong>渐近线</strong>：焦点在 x 轴时为 <code>y = ±(b/a) x</code>。双曲线无限接近但不相交。<strong>离心率</strong> <code>e = c/a</code>，e&gt;1，e 越大开口越开阔。',points:{title:'性质总结',items:['<strong>渐近线</strong>：y = ±(b/a) x','<strong>范围</strong>：|x| ≥ a（x 轴型）','<strong>离心率</strong>：e = c/a &gt; 1','<strong>e 越大</strong>：开口越开阔']}},
  {tag:'双曲线',name:'等轴双曲线',body:'当 <strong>a = b</strong> 时，称为<strong>等轴双曲线</strong>。方程 <code>x² − y² = a²</code>，渐近线 <code>y = ±x</code>（互相垂直），离心率 <code>e = √2</code>。',points:{title:'等轴双曲线特征',items:['<strong>条件</strong>：a = b','<strong>方程</strong>：x² − y² = a²','<strong>渐近线</strong>：y = ±x（互相垂直）','<strong>离心率</strong>：e = √2 ≈ 1.414']}},
  {tag:'抛物线',name:'抛物线定义',body:'<strong>抛物线</strong>是平面上到定点 F（焦点）与定直线 l（准线）距离相等的点的轨迹。一焦点 F，一准线 l，F 不在 l 上。',points:{title:'定义核心',items:['<strong>定点 F</strong>：称为焦点','<strong>定直线 l</strong>：称为准线','<strong>|PF| = |P到l的距离|</strong>','<strong>焦准距 p</strong>：F 到 l 的距离']}},
  {tag:'抛物线',name:'抛物线四种方程',body:'<strong>y² = 2px</strong>（右开口，F(p/2,0)）；<strong>y² = −2px</strong>（左开口）；<strong>x² = 2py</strong>（上开口）；<strong>x² = −2py</strong>（下开口）。',points:{title:'四种标准方程',items:['<strong>y²=2px</strong>：右开口 F(p/2,0)','<strong>y²=−2px</strong>：左开口 F(−p/2,0)','<strong>x²=2py</strong>：上开口 F(0,p/2)','<strong>x²=−2py</strong>：下开口 F(0,−p/2)']}},
  {tag:'抛物线',name:'焦点弦性质',body:'过焦点 F 的弦称为<strong>焦点弦</strong>。<strong>焦半径</strong>（右开口）：|PF| = x + p/2。<strong>通径</strong>（最短焦点弦）长 <code>2p</code>，是过焦点垂直于对称轴的弦。',points:{title:'焦点弦核心',items:['<strong>焦半径</strong>：|PF| = x + p/2（右开口）','<strong>通径长</strong>：2p（最短焦点弦）','<strong>通径方向</strong>：⊥ 对称轴','<strong>过焦点</strong>：所有焦点弦中通径最短']}},
  {tag:'总结',name:'核心速记',body:'双曲线：距离差为常数 2a，方程 x²/a²−y²/b²=1，渐近线 y=±(b/a)x，e=c/a&gt;1。抛物线：到焦点距离等于到准线距离，y²=2px 四种，通径长 2p。',points:{title:'两曲线速记',items:['<strong>双曲线定义</strong>：距离差 = 2a','<strong>双曲线渐近线</strong>：y=±(b/a)x','<strong>抛物线定义</strong>：|PF|=到准线距离','<strong>通径</strong>：2p（最短焦点弦）']}},
];

let stepIdx=0,playing=false,lastT=0,speed=1,stepTime=0,t=0,ecc=1.5;
const STEP_DURATION=3.6;
const eccEl=document.getElementById('ecc');
eccEl.oninput=()=>{ecc=parseFloat(eccEl.value);};

// 坐标系绘制（通用）
function drawAxes(cx,cy,scale){
  ctx.strokeStyle='#243a5e';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(40,cy);ctx.lineTo(cv.width-40,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,40);ctx.lineTo(cx,cv.height-40);ctx.stroke();
  drawText('x',cv.width-30,cy,'#9ab0d0',13);
  drawText('y',cx,30,'#9ab0d0',13);
  drawText('O',cx-12,cy+12,'#9ab0d0',11);
  // 箭头
  ctx.fillStyle='#243a5e';
  ctx.beginPath();ctx.moveTo(cv.width-40,cy);ctx.lineTo(cv.width-50,cy-5);ctx.lineTo(cv.width-50,cy+5);ctx.fill();
  ctx.beginPath();ctx.moveTo(cx,40);ctx.lineTo(cx-5,50);ctx.lineTo(cx+5,50);ctx.fill();
}

// ===== 场景1：双曲线定义（距离差） =====
function drawHyperDef(time){
  const W=cv.width,H=cv.height;
  drawText('双曲线定义 · ||PF₁|−|PF₂|| = 2a',W/2,30,'#fbbf24',16);
  const cx=W/2,cy=H/2+20,scale=50;
  drawAxes(cx,cy,scale);
  const a=1.5,b=1.2,c=Math.sqrt(a*a+b*b);
  const F1x=cx-c*scale,F2x=cx+c*scale;
  // 双曲线两支
  ctx.strokeStyle='#06b6d4';ctx.lineWidth=3;
  ctx.shadowColor='#06b6d4';ctx.shadowBlur=8;
  for(const sgn of [-1,1]){
    ctx.beginPath();
    for(let x=a;x<=5;x+=0.05){
      const y=Math.sqrt((x*x/(a*a)-1)*b*b);
      const px=cx+sgn*x*scale,py1=cy-y*scale,py2=cy+y*scale;
      if(x===a){ctx.moveTo(px,py1);}else{ctx.lineTo(px,py1);}
    }
    ctx.stroke();
    ctx.beginPath();
    for(let x=a;x<=5;x+=0.05){
      const y=Math.sqrt((x*x/(a*a)-1)*b*b);
      const px=cx+sgn*x*scale,py2=cy+y*scale;
      if(x===a){ctx.moveTo(px,py2);}else{ctx.lineTo(px,py2);}
    }
    ctx.stroke();
  }
  ctx.shadowBlur=0;
  // 焦点
  ctx.fillStyle='#fbbf24';
  ctx.beginPath();ctx.arc(F1x,cy,6,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(F2x,cy,6,0,7);ctx.fill();
  drawText('F₁',F1x,cy+20,'#fbbf24',13);
  drawText('F₂',F2x,cy+20,'#fbbf24',13);
  // 动点 P 在双曲线上移动
  const tt=(time*0.6)%(Math.PI*2);
  const px=cx+2.5*Math.cos(tt)*scale;
  const py=cy+b*Math.sqrt(2.5*2.5/(a*a)-1)*Math.sin(tt)*Math.sign(Math.sin(tt)||1);
  // 动点
  ctx.fillStyle='#34d399';
  ctx.beginPath();ctx.arc(px,py,6,0,7);ctx.fill();
  drawText('P',px,py-15,'#34d399',13);
  // 连线到两焦点
  ctx.strokeStyle='#f8717188';ctx.lineWidth=2;
  ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(F1x,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(F2x,cy);ctx.stroke();
  ctx.setLineDash([]);
  // 距离显示
  const d1=Math.sqrt((px-F1x)**2+(py-cy)**2)/scale;
  const d2=Math.sqrt((px-F2x)**2+(py-cy)**2)/scale;
  drawText('|PF₁|−|PF₂| = '+Math.abs(d1-d2).toFixed(2)+' ≈ 2a = '+(2*a).toFixed(2),W/2,H-50,'#34d399',13);
  drawText('两支：距离差恒为 2a',W/2,H-28,'#9ab0d0',12);
}

// ===== 场景2：双曲线标准方程 =====
function drawHyperEq(){
  const W=cv.width,H=cv.height;
  drawText('双曲线标准方程 · x²/a² − y²/b² = 1',W/2,30,'#fbbf24',16);
  const cx=W/2,cy=H/2+20,scale=50;
  drawAxes(cx,cy,scale);
  const a=1.6,b=1.2,c=Math.sqrt(a*a+b*b);
  // 画双曲线
  ctx.strokeStyle='#06b6d4';ctx.lineWidth=3;
  ctx.shadowColor='#06b6d4';ctx.shadowBlur=8;
  for(const sgn of [-1,1]){
    for(const ysgn of [-1,1]){
      ctx.beginPath();
      let first=true;
      for(let x=a;x<=4.5;x+=0.05){
        const y=Math.sqrt((x*x/(a*a)-1)*b*b)*ysgn;
        const px=cx+sgn*x*scale,py=cy-y*scale;
        if(first){ctx.moveTo(px,py);first=false;}else{ctx.lineTo(px,py);}
      }
      ctx.stroke();
    }
  }
  ctx.shadowBlur=0;
  // 顶点
  ctx.fillStyle='#34d399';
  ctx.beginPath();ctx.arc(cx-a*scale,cy,5,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(cx+a*scale,cy,5,0,7);ctx.fill();
  drawText('−a',cx-a*scale,cy+20,'#34d399',11);
  drawText('+a',cx+a*scale,cy+20,'#34d399',11);
  // 焦点
  ctx.fillStyle='#fbbf24';
  ctx.beginPath();ctx.arc(cx-c*scale,cy,6,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(cx+c*scale,cy,6,0,7);ctx.fill();
  drawText('F₁(−c,0)',cx-c*scale,cy+38,'#fbbf24',12);
  drawText('F₂(c,0)',cx+c*scale,cy+38,'#fbbf24',12);
  // 标注 a b c
  drawText('c² = a² + b²',W-130,80,'#fbbf24',13,'left');
  drawText('a='+a.toFixed(1)+' b='+b.toFixed(1)+' c='+c.toFixed(2),W-130,105,'#9ab0d0',12,'left');
  drawText('注意：双曲线 c²=a²+b²（与椭圆相反）',W/2,H-40,'#f87171',12);
}

// ===== 场景3：渐近线与离心率 =====
function drawAsympEcc(time){
  const W=cv.width,H=cv.height;
  drawText('渐近线 y=±(b/a)x · 离心率 e=c/a',W/2,30,'#fbbf24',16);
  const cx=W/2,cy=H/2+20,scale=50;
  drawAxes(cx,cy,scale);
  const a=1.5;
  const c=ecc*a;
  const b=Math.sqrt(c*c-a*a);
  // 渐近线（虚线）
  ctx.strokeStyle='#f87171';ctx.lineWidth=2;
  ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(cx-5*scale,cy+5*b/a*scale);ctx.lineTo(cx+5*scale,cy-5*b/a*scale);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-5*scale,cy-5*b/a*scale);ctx.lineTo(cx+5*scale,cy+5*b/a*scale);ctx.stroke();
  ctx.setLineDash([]);
  drawText('y=(b/a)x',cx+4.5*scale,cy-4.5*b/a*scale-12,'#f87171',11);
  drawText('y=−(b/a)x',cx+4.5*scale,cy+4.5*b/a*scale+12,'#f87171',11);
  // 双曲线
  ctx.strokeStyle='#06b6d4';ctx.lineWidth=3;
  ctx.shadowColor='#06b6d4';ctx.shadowBlur=8;
  for(const sgn of [-1,1]){
    for(const ysgn of [-1,1]){
      ctx.beginPath();let first=true;
      for(let x=a;x<=5;x+=0.05){
        const y=Math.sqrt((x*x/(a*a)-1)*b*b)*ysgn;
        const px=cx+sgn*x*scale,py=cy-y*scale;
        if(first){ctx.moveTo(px,py);first=false;}else{ctx.lineTo(px,py);}
      }
      ctx.stroke();
    }
  }
  ctx.shadowBlur=0;
  // 参数显示
  drawText('e = c/a = '+ecc.toFixed(2)+'（拖动滑块调节）',W/2,H-70,'#fbbf24',13);
  drawText('b/a = '+(b/a).toFixed(2)+'，e 越大开口越开',W/2,H-48,'#9ab0d0',12);
  drawText('双曲线无限接近渐近线但不相交',W/2,H-26,'#34d399',12);
}

// ===== 场景4：等轴双曲线 =====
function drawIsoHyper(){
  const W=cv.width,H=cv.height;
  drawText('等轴双曲线 · a = b · e = √2',W/2,30,'#fbbf24',16);
  const cx=W/2,cy=H/2+20,scale=50;
  drawAxes(cx,cy,scale);
  const a=1.5,b=1.5,c=Math.sqrt(2)*a;
  // 渐近线 y=±x（垂直）
  ctx.strokeStyle='#f87171';ctx.lineWidth=2;
  ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(cx-5*scale,cy+5*scale);ctx.lineTo(cx+5*scale,cy-5*scale);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-5*scale,cy-5*scale);ctx.lineTo(cx+5*scale,cy+5*scale);ctx.stroke();
  ctx.setLineDash([]);
  drawText('y=x',cx+4.3*scale,cy-4.3*scale-12,'#f87171',11);
  drawText('y=−x',cx+4.3*scale,cy+4.3*scale+12,'#f87171',11);
  // 等轴双曲线 x²−y²=a²
  ctx.strokeStyle='#06b6d4';ctx.lineWidth=3;
  ctx.shadowColor='#06b6d4';ctx.shadowBlur=8;
  for(const sgn of [-1,1]){
    for(const ysgn of [-1,1]){
      ctx.beginPath();let first=true;
      for(let x=a;x<=5;x+=0.05){
        const y=Math.sqrt(x*x-a*a)*ysgn;
        const px=cx+sgn*x*scale,py=cy-y*scale;
        if(first){ctx.moveTo(px,py);first=false;}else{ctx.lineTo(px,py);}
      }
      ctx.stroke();
    }
  }
  ctx.shadowBlur=0;
  // 焦点
  ctx.fillStyle='#fbbf24';
  ctx.beginPath();ctx.arc(cx-c*scale,cy,6,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(cx+c*scale,cy,6,0,7);ctx.fill();
  drawText('F₁',cx-c*scale,cy+20,'#fbbf24',12);
  drawText('F₂',cx+c*scale,cy+20,'#fbbf24',12);
  drawText('a = b，渐近线 y = ±x 互相垂直',W/2,H-55,'#34d399',13);
  drawText('e = c/a = √2 ≈ '+c.toFixed(3),W/2,H-32,'#fbbf24',13);
}

// ===== 场景5：抛物线定义 =====
function drawParaDef(time){
  const W=cv.width,H=cv.height;
  drawText('抛物线定义 · |PF| = |P到准线距离|',W/2,30,'#fbbf24',16);
  const cx=W/2,cy=H/2+20,scale=60;
  drawAxes(cx,cy,scale);
  const p=1.5;
  // 准线 x = -p/2
  ctx.strokeStyle='#f87171';ctx.lineWidth=2;
  ctx.setLineDash([6,4]);
  const lx=cx-p/2*scale;
  ctx.beginPath();ctx.moveTo(lx,40);ctx.lineTo(lx,H-40);ctx.stroke();
  ctx.setLineDash([]);
  drawText('准线 l: x=−p/2',lx,cy-5*scale,'#f87171',12);
  // 焦点
  const fx=cx+p/2*scale;
  ctx.fillStyle='#fbbf24';
  ctx.beginPath();ctx.arc(fx,cy,7,0,7);ctx.fill();
  drawText('F(p/2,0)',fx,cy+22,'#fbbf24',12);
  // 抛物线 y²=2px
  ctx.strokeStyle='#06b6d4';ctx.lineWidth=3;
  ctx.shadowColor='#06b6d4';ctx.shadowBlur=8;
  ctx.beginPath();
  for(let yy=-4;yy<=4;yy+=0.1){
    const xx=yy*yy/(2*p);
    const px=cx+xx*scale,py=cy-yy*scale;
    if(yy===-4)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  }
  ctx.stroke();
  ctx.shadowBlur=0;
  // 动点 P
  const tt=(time*0.7)%4-2;
  const pxx=cx+tt*tt/(2*p)*scale,pyy=cy-tt*scale;
  ctx.fillStyle='#34d399';
  ctx.beginPath();ctx.arc(pxx,pyy,6,0,7);ctx.fill();
  drawText('P',pxx,pyy-15,'#34d399',13);
  // |PF|
  ctx.strokeStyle='#34d39988';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(pxx,pyy);ctx.lineTo(fx,cy);ctx.stroke();
  // |P到准线|
  ctx.strokeStyle='#f8717188';ctx.lineWidth=2;
  ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(pxx,pyy);ctx.lineTo(lx,pyy);ctx.stroke();
  ctx.setLineDash([]);
  drawText('p = '+p.toFixed(1)+'（焦准距）',W/2,H-55,'#9ab0d0',13);
  drawText('|PF| = |P到l距离|（始终相等）',W/2,H-32,'#34d399',13);
}

// ===== 场景6：抛物线四种方程 =====
function drawParaFour(){
  const W=cv.width,H=cv.height;
  drawText('抛物线四种标准方程对比',W/2,30,'#fbbf24',16);
  const positions=[
    {cx:W*0.27,cy:H*0.32,title:'y²=2px（右）',dir:1,axis:'x',flip:1},
    {cx:W*0.73,cy:H*0.32,title:'y²=−2px（左）',dir:-1,axis:'x',flip:1},
    {cx:W*0.27,cy:H*0.75,title:'x²=2py（上）',dir:1,axis:'y',flip:-1},
    {cx:W*0.73,cy:H*0.75,title:'x²=−2py（下）',dir:-1,axis:'y',flip:-1},
  ];
  const p=0.8,scale=30;
  positions.forEach((m,i)=>{
    const ccx=m.cx,ccy=m.cy;
    // 小坐标轴
    ctx.strokeStyle='#243a5e';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(ccx-70,ccy);ctx.lineTo(ccx+70,ccy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ccx,ccy-60);ctx.lineTo(ccx,ccy+60);ctx.stroke();
    const colors=['#06b6d4','#34d399','#fbbf24','#a78bfa'];
    ctx.strokeStyle=colors[i];ctx.lineWidth=2.5;
    ctx.shadowColor=colors[i];ctx.shadowBlur=6;
    ctx.beginPath();
    if(m.axis==='x'){
      for(let y=-3;y<=3;y+=0.1){
        const x=m.dir*y*y/(2*p);
        const px=ccx+x*scale,py=ccy-y*scale;
        if(y===-3)ctx.moveTo(px,py);else ctx.lineTo(px,py);
      }
    }else{
      for(let x=-3;x<=3;x+=0.1){
        const y=m.dir*x*x/(2*p);
        const px=ccx+x*scale,py=ccy-y*m.flip*scale;
        if(x===-3)ctx.moveTo(px,py);else ctx.lineTo(px,py);
      }
    }
    ctx.stroke();
    ctx.shadowBlur=0;
    // 焦点
    ctx.fillStyle='#fbbf24';
    const fx=m.axis==='x'?ccx+m.dir*p/2*scale:ccx;
    const fy=m.axis==='x'?ccy:ccy-m.dir*p/2*scale*m.flip;
    ctx.beginPath();ctx.arc(fx,fy,4,0,7);ctx.fill();
    drawText(m.title,ccx,ccy-78,'#e8eef8',12);
  });
  drawText('p 为焦准距（焦点到准线的距离）',W/2,H-45,'#9ab0d0',13);
  drawText('焦点 F 都在开口方向内侧',W/2,H-25,'#34d399',12);
}

// ===== 场景7：焦点弦性质 =====
function drawFocusChord(time){
  const W=cv.width,H=cv.height;
  drawText('焦点弦性质 · 通径（最短焦点弦）长 2p',W/2,30,'#fbbf24',16);
  const cx=W/2,cy=H/2+20,scale=60;
  drawAxes(cx,cy,scale);
  const p=1.5;
  // 准线
  ctx.strokeStyle='#f8717188';ctx.lineWidth=1.5;
  ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(cx-p/2*scale,40);ctx.lineTo(cx-p/2*scale,H-40);ctx.stroke();
  ctx.setLineDash([]);
  drawText('准线',cx-p/2*scale,55,'#f87171',11);
  // 抛物线
  ctx.strokeStyle='#06b6d4';ctx.lineWidth=3;
  ctx.shadowColor='#06b6d4';ctx.shadowBlur=8;
  ctx.beginPath();
  for(let y=-4;y<=4;y+=0.1){
    const x=y*y/(2*p);
    const px=cx+x*scale,py=cy-y*scale;
    if(y===-4)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  }
  ctx.stroke();
  ctx.shadowBlur=0;
  // 焦点
  const fx=cx+p/2*scale;
  ctx.fillStyle='#fbbf24';
  ctx.beginPath();ctx.arc(fx,cy,7,0,7);ctx.fill();
  drawText('F',fx,cy+22,'#fbbf24',13);
  // 通径（垂直于对称轴，长 2p）
  ctx.strokeStyle='#34d399';ctx.lineWidth=4;
  ctx.shadowColor='#34d399';ctx.shadowBlur=10;
  ctx.beginPath();ctx.moveTo(fx,cy-p*scale);ctx.lineTo(fx,cy+p*scale);ctx.stroke();
  ctx.shadowBlur=0;
  drawText('通径',fx+30,cy,'#34d399',13,'left');
  drawText('2p',fx-18,cy-p*scale+12,'#34d399',13);
  // 动态焦点弦（旋转）
  const ang=time*0.6;
  const k=Math.tan(ang);
  // 与抛物线 y²=2px 交点（过焦点斜率 k）
  // x = (y²)/(2p), 弦过 (p/2, 0): y=k(x-p/2)
  // 代入：y = k(y²/2p - p/2) => 2py = ky² - kp² => ky²-2py+kp²=0
  // y1*y2 = p², 通径是斜率无穷（k=∞）情况
  let y1,y2;
  if(Math.abs(k)>0.1){
    const disc=4*p*p-4*k*k*p*p;
    if(disc>=0){
      y1=(2*p+Math.sqrt(disc))/(2*k);
      y2=(2*p-Math.sqrt(disc))/(2*k);
    }else{y1=p;y2=-p;}
  }else{y1=p*3;y2=-p*3;}
  // 限制范围
  y1=Math.max(-4,Math.min(4,y1));
  y2=Math.max(-4,Math.min(4,y2));
  const x1=y1*y1/(2*p),x2=y2*y2/(2*p);
  ctx.strokeStyle='#fbbf24aa';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(cx+x1*scale,cy-y1*scale);ctx.lineTo(cx+x2*scale,cy-y2*scale);ctx.stroke();
  drawText('通径长 = 2p = '+(2*p).toFixed(2)+'（最短焦点弦）',W/2,H-50,'#34d399',13);
  drawText('焦半径 |PF| = x + p/2（右开口）',W/2,H-28,'#9ab0d0',12);
}

// ===== 场景8：总结 =====
function drawSummary(){
  const W=cv.width,H=cv.height;
  drawText('双曲线与抛物线核心总结',W/2,40,'#fbbf24',18);
  const items=[
    {t:'双曲线定义',d:'||PF₁|−|PF₂|| = 2a',c:'#fbbf24'},
    {t:'双曲线方程',d:'x²/a² − y²/b² = 1',c:'#06b6d4'},
    {t:'双曲线渐近线',d:'y = ±(b/a) x',c:'#34d399'},
    {t:'等轴双曲线',d:'a=b，e=√2',c:'#a78bfa'},
    {t:'抛物线定义',d:'|PF| = 到准线距离',c:'#fb923c'},
    {t:'抛物线方程',d:'y²=2px（右开口）',c:'#ec4899'},
    {t:'焦半径',d:'|PF| = x + p/2',c:'#67e8f9'},
    {t:'通径',d:'长 2p，最短焦点弦',c:'#fde047'},
  ];
  items.forEach((m,i)=>{
    const col=i%4,row=Math.floor(i/4);
    const x=40+col*(W-80)/4;
    const y=90+row*200;
    ctx.fillStyle=m.c+'22';ctx.strokeStyle=m.c;ctx.lineWidth=2;
    roundRect(x+8,y,(W-80)/4-16,150,10);ctx.fill();ctx.stroke();
    drawText(m.t,x+(W-80)/8,y+45,m.c,13);
    drawText(m.d,x+(W-80)/8,y+95,'#fff',12);
  });
  drawText('c²=a²+b²（双曲线）vs p（抛物线焦准距）',W/2,H-30,'#9ab0d0',12);
}

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  if(stepIdx===0)drawHyperDef(t);
  else if(stepIdx===1)drawHyperEq();
  else if(stepIdx===2)drawAsympEcc(t);
  else if(stepIdx===3)drawIsoHyper();
  else if(stepIdx===4)drawParaDef(t);
  else if(stepIdx===5)drawParaFour();
  else if(stepIdx===6)drawFocusChord(t);
  else if(stepIdx===7)drawSummary();
}

function syncStep(){
  const s=STEPS[stepIdx];
  document.getElementById('stepBadge').textContent=s.tag;
  document.getElementById('stepTitle').textContent=s.name;
  document.getElementById('stepBody').innerHTML=s.body;
  document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?.title||'')+'</h4><ul>'+((s.points?.items||[]).map(x=>'<li>'+x+'</li>').join(''))+'</ul>';
  document.querySelectorAll('.step').forEach((el,i)=>el.classList.toggle('active',i===stepIdx));
  statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;
  stepTime=0;
}

function update(dt){
  t+=dt*speed;
  if(!playing)return;
  stepTime+=dt*speed;
  if(stepTime>=STEP_DURATION){
    if(stepIdx<STEPS.length-1){stepIdx++;syncStep();}
    else{playing=false;playBtn.textContent='▶ 播放';statusEl.textContent='动画完成';}
  }
}

function loop(ts){
  if(!lastT)lastT=ts;
  const dt=(ts-lastT)/1000;lastT=ts;
  update(dt);draw();
  requestAnimationFrame(loop);
}

const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn');
const speedEl=document.getElementById('speed');
playBtn.onclick=()=>{playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';};
resetBtn.onclick=()=>{stepIdx=0;playing=false;syncStep();draw();playBtn.textContent='▶ 播放';};
stepFwdBtn.onclick=()=>{if(stepIdx<STEPS.length-1){stepIdx++;syncStep();draw();}};
stepBackBtn.onclick=()=>{if(stepIdx>0){stepIdx--;syncStep();draw();}};
speedEl.oninput=()=>{speed=parseFloat(speedEl.value);};

function buildStepbar(){
  const bar=document.getElementById('stepbar');
  bar.innerHTML='';
  STEPS.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='step'+(i===stepIdx?' active':'');
    el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>10?s.name.slice(0,9)+'…':s.name)+'</div>';
    el.onclick=()=>{stepIdx=i;syncStep();draw();};
    bar.appendChild(el);
  });
}

buildStepbar();syncStep();requestAnimationFrame(loop);
</script>
