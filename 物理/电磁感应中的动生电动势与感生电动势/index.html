<head>

<style>
:root{--bg:#0a1628;--panel:#11203a;--card:#172a4a;--ink:#e8eef8;--muted:#9ab0d0;--accent:#a78bfa;--accent2:#06b6d4;--line:#243a5e;--good:#34d399;--warn:#fbbf24;--bad:#f87171;}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}

.back:hover{background:rgba(6,182,212,.14)}
.title{font-size:15px;font-weight:600}.subtitle{font-size:12px;color:var(--muted)}
.cards{display:flex;gap:10px;padding:10px 16px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(167,139,250,.06),transparent)}
.card{flex:1;min-width:160px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}

main{flex:1;display:flex;min-height:0}.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{background:#06101f;border:1px solid var(--line);border-radius:12px;max-width:100%;max-height:100%;display:block}

.step:hover{background:#1e345a;border-color:var(--accent2)}

button{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}
button:hover{background:#1e345a}button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.controls label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
input[type=range]{accent-color:var(--accent)}
.status{font-size:12px;color:var(--muted);margin-left:auto}
@media(max-width:960px){main{flex-direction:column}.panel{width:auto;border-left:none;border-top:1px solid var(--line);max-height:240px}}
</style>

<body>
<header class="topbar"><a class="back" href="../index.html">← 返回物理目录</a><span class="title">电磁感应</span><span class="subtitle">动生电动势 · 感生电动势 · 法拉第定律 · 楞次定律</span></header>
<div class="cards">
  <div class="card"><div class="num">1</div><h4>法拉第定律</h4><div class="v">ε=ΔΦ/Δt<br>磁通量变化产生电动势</div></div>
  <div class="card s2"><div class="num">2</div><h4>动生电动势</h4><div class="v">ε=BLv<br>导体切割磁感线</div></div>

</div>
<main>
  <div class="stage"><canvas id="cv"></canvas></div>
  <aside class="panel"><h2><span class="badge" id="stepBadge">基础</span><span id="stepTitle">电磁感应</span></h2><p class="body" id="stepBody"></p><div class="points" id="stepPoints"></div></aside>
</main>

  <button id="playBtn" class="primary">▶ 播放</button><button id="resetBtn">↺ 重置</button>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(520,Math.min(1100,r.width-12));cv.height=Math.max(400,Math.min(600,r.height-12));}
window.addEventListener('resize',()=>{fit();draw();});fit();
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawText(t,x,y,c,fs,a,b){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=a||'center';ctx.textBaseline=b||'middle';ctx.fillText(t,x,y);}

const STEPS=[
  {tag:'基础',name:'法拉第电磁感应',body:'<strong>法拉第（1831）</strong>发现：<strong>磁通量变化</strong>会产生感应电动势。<code>ε = ΔΦ/Δt</code>。这是发电机的物理基础。',points:{title:'核心定律',items:['<strong>磁通量</strong>：Φ = BScosθ','<strong>磁通变化</strong>：B、S、θ 任一变化','<strong>感应电动势</strong>：ε ∝ ΔΦ/Δt','<strong>感应电流</strong>：闭合回路才有']}},
  {tag:'动生',name:'动生电动势',body:'<strong>动生电动势</strong>：导体棒在磁场中<strong>切割磁感线</strong>时产生。公式 <code>ε = BLv</code>（B⊥v⊥L）。本质是洛伦兹力对载流子做功。',points:{title:'动生 ε 三要素',items:['<strong>B</strong>：磁感应强度','<strong>L</strong>：导体有效长度','<strong>v</strong>：导体运动速度','<strong>方向</strong>：右手定则判断']}},
  {tag:'动生',name:'右手定则',body:'<strong>右手定则</strong>判断动生电动势方向：<strong>磁感线穿掌心</strong>，<strong>拇指指向导体运动方向</strong>，<strong>四指</strong>指向感应电流方向（正电荷积累端为高电势）。',points:{title:'与左手定则对比',items:['<strong>左手定则</strong>：判安培力（外电路通电流）','<strong>右手定则</strong>：判感应电流（导体受力运动）','<strong>右手</strong>：拇指=v，四指=I','<strong>左手</strong>：四指=I，拇指=F']}},
  {tag:'感生',name:'感生电动势',body:'<strong>感生电动势</strong>：导体不动，<strong>磁场变化</strong>引起的感应电动势。本质是<strong>变化的磁场在空间产生涡旋电场</strong>（麦克斯韦理论）。',points:{title:'感生 ε 来源',items:['<strong>磁场变化</strong>：ΔB/Δt','<strong>涡旋电场</strong>：B 变化激发 E','<strong>不动导体</strong>：自由电荷受涡旋 E 推动','<strong>变压器原理</strong>：交变 B 感应 ε']}},
  {tag:'感生',name:'涡旋电场可视化',body:'变化的磁场在<strong>周围空间</strong>产生<strong>环形（涡旋）电场</strong>。即使没有导体也存在，是电磁波的本质。',points:{title:'涡旋 E 场特征',items:['<strong>闭合环线</strong>：电场线无始末','<strong>方向</strong>：阻碍 B 变化（楞次）','<strong>麦克斯韦</strong>：贡献了电磁波理论','<strong>电子感应加速器</strong>：利用此原理']}},
  {tag:'对比',name:'动生 vs 感生',body:'动生和感生本质不同：<strong>动生</strong>来源于洛伦兹力（电荷在磁场中运动）；<strong>感生</strong>来源于变化的磁场产生涡旋电场（不需要电荷运动）。',points:{title:'两者对比',items:['<strong>动生</strong>：导体动，B 不变 → ε=BLv','<strong>感生</strong>：导体静，B 变 → ε=-ΔΦ/Δt','<strong>动生力源</strong>：洛伦兹力','<strong>感生源</strong>：涡旋电场']}},
  {tag:'楞次',name:'楞次定律',body:'<strong>楞次定律</strong>：感应电流的方向总是使它<strong>阻碍</strong>引起感应电流的<strong>磁通量变化</strong>。是能量守恒的体现。',points:{title:'楞次定律四步',items:['<strong>① 明确原磁场</strong>方向','<strong>② 判断磁通变化</strong>增或减','<strong>③ 感应磁场</strong>：阻碍变化','<strong>④ 右手螺旋</strong>：判感应电流方向']}},
  {tag:'应用',name:'发电机原理',body:'<strong>发电机</strong>：线圈在磁场中<strong>转动</strong>，磁通量周期性变化，产生<strong>交变电动势</strong> ε=ε₀sin(ωt)。机械能 → 电能。',points:{title:'发电机核心',items:['<strong>线圈转动</strong>：动生电动势','<strong>ε=NBωA·cos(ωt)</strong>：N 匝、ω 角速','<strong>中国交流电</strong>：50 Hz、220 V','<strong>三相交流</strong>：工业用']}},
  {tag:'应用',name:'变压器与电磁炉',body:'<strong>变压器</strong>：原线圈交流电→铁芯磁通变化→副线圈感应电动势（电压比=匝数比）。<strong>电磁炉</strong>：交变磁场在锅底产生涡流发热。',points:{title:'感生应用',items:['<strong>变压器</strong>：U₁/U₂=N₁/N₂','<strong>电磁炉</strong>：涡流生热','<strong>无线充电</strong>：磁共振耦合','<strong>都是磁场变化→感应电动势</strong>']}},
  {tag:'总结',name:'电磁感应核心',body:'<strong>法拉第 ε=|ΔΦ/Δt|</strong>，<strong>动生 ε=BLv</strong>，<strong>感生来源于涡旋电场</strong>，<strong>楞次定律判方向</strong>。是发电机、变压器、电磁炉的物理基础。',points:{title:'核心速记',items:['<strong>动生</strong>：ε=BLv（右手定则）','<strong>感生</strong>：ε=-ΔΦ/Δt（楞次）','<strong>能量守恒</strong>：楞次体现','<strong>发电机/变压器</strong>：现代电气基础']}},
];

let stepIdx=0,playing=false,lastT=0,speed=1,stepTime=0,t=0;
const STEP_DURATION=3.5;

// 场景：动生电动势
function drawMotionalEMFScene(time){
  const W=cv.width,H=cv.height;
  drawText('动生电动势 · 导体棒切割磁感线',W/2,30,'#a78bfa',16);
  const cx=W/2,cy=H/2;
  // 磁场区域（圆点表示出纸面）
  ctx.fillStyle='rgba(167,139,250,0.08)';
  ctx.fillRect(cx-200,cy-100,400,200);
  // B 场点（出纸面）
  for(let i=0;i<8;i++)for(let j=0;j<5;j++){
    const x=cx-180+i*45;
    const y=cy-80+j*40;
    ctx.fillStyle='#a78bfa';
    ctx.beginPath();ctx.arc(x,y,3,0,7);ctx.fill();
  }
  drawText('B （出纸面 ⊙）',cx,cy-130,'#a78bfa',13);
  // U 型导轨
  ctx.strokeStyle='#67e8f9';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(cx-200,cy-80);ctx.lineTo(cx-200,cy+80);ctx.lineTo(cx+200,cy+80);ctx.lineTo(cx+200,cy-80);ctx.stroke();
  // 导体棒（在导轨上左右运动）
  const bx=cx-150+((Math.sin(time*1.5)+1)/2)*300;
  ctx.strokeStyle='#fbbf24';ctx.lineWidth=4;
  ctx.shadowColor='#fbbf24';ctx.shadowBlur=10;
  ctx.beginPath();ctx.moveTo(bx,cy-80);ctx.lineTo(bx,cy+80);ctx.stroke();
  ctx.shadowBlur=0;
  // 速度箭头
  const vDir=Math.cos(time*1.5)>0?1:-1;
  if(Math.abs(Math.cos(time*1.5))>0.3){
    ctx.fillStyle='#34d399';
    ctx.beginPath();ctx.moveTo(bx+vDir*40,cy-100);ctx.lineTo(bx+vDir*15,cy-108);ctx.lineTo(bx+vDir*15,cy-92);ctx.fill();
    drawText('v',bx+vDir*55,cy-100,'#34d399',14);
  }
  // 电流方向（根据右手定则，B 出纸面，v 向右，则 I 向上）
  const iDir=-vDir; // 向上=负y
  // 电流箭头沿导轨
  ctx.strokeStyle='#f87171';ctx.lineWidth=2.5;
  ctx.beginPath();
  // 从 bx 上端沿导轨一周
  ctx.moveTo(bx,cy-80);ctx.lineTo(bx+iDir*100,cy-80);
  ctx.stroke();
  ctx.fillStyle='#f87171';
  ctx.beginPath();ctx.moveTo(bx+iDir*100,cy-80);ctx.lineTo(bx+iDir*95,cy-87);ctx.lineTo(bx+iDir*95,cy-73);ctx.fill();
  drawText('I',bx+iDir*120,cy-80,'#f87171',14);
  // ε 计算实时
  const v=Math.abs(Math.cos(time*1.5))*5;
  const B=0.5,L=1.6;
  const eps=B*L*v;
  drawText('v = '+v.toFixed(2)+' m/s',cx,cy+120,'#34d399',13);
  drawText('B = '+B+' T,  L = '+L+' m',cx,cy+145,'#a78bfa',13);
  drawText('ε = BLv = '+eps.toFixed(3)+' V',cx,cy+170,'#fbbf24',14);
}

// 场景：感生电动势（磁铁插入）
function drawInducedEMFScene(time){
  const W=cv.width,H=cv.height;
  drawText('感生电动势 · 磁铁插入/拔出线圈',W/2,30,'#a78bfa',16);
  const cx=W/2,cy=H/2;
  // 线圈（5 圈）
  ctx.strokeStyle='#67e8f9';ctx.lineWidth=2.5;
  for(let i=0;i<6;i++){
    ctx.beginPath();ctx.ellipse(cx-50+i*20,cy,15,60,0,0,7);ctx.stroke();
  }
  // 磁铁（左右运动）
  const mx=cx-300+((Math.sin(time*1.2)+1)/2)*400;
  ctx.save();
  ctx.translate(mx,cy);
  // N 极（红色）
  ctx.fillStyle='#f87171';ctx.strokeStyle='#f87171';ctx.lineWidth=2;
  roundRect(-50,-25,50,50,5);ctx.fill();ctx.stroke();
  drawText('N',-25,0,'#fff',15);
  // S 极（蓝色）
  ctx.fillStyle='#67e8f9';
  roundRect(0,-25,50,50,5);ctx.fill();ctx.stroke();
  drawText('S',25,0,'#fff',15);
  ctx.restore();
  // 磁场线
  ctx.strokeStyle='rgba(248,113,113,0.4)';ctx.lineWidth=1.5;
  for(let i=0;i<4;i++){
    ctx.beginPath();
    const y=cy-30+i*20;
    ctx.moveTo(mx+50,y);
    ctx.bezierCurveTo(cx-100,y-15,cx+50,y-15,cx-100,y);
    ctx.stroke();
  }
  // 电流方向（楞次定律）
  const dir=Math.cos(time*1.2); // 速度方向
  const speed=Math.abs(Math.sin(time*1.2));
  if(speed>0.1){
    const iColor=dir>0?'#fbbf24':'#34d399';
    ctx.strokeStyle=iColor;ctx.lineWidth=3;
    ctx.shadowColor=iColor;ctx.shadowBlur=10;
    // 电流环绕线圈
    for(let i=0;i<6;i++){
      ctx.beginPath();
      ctx.ellipse(cx-50+i*20,cy,18,62,0,dir>0?Math.PI:0,dir>0?2*Math.PI:Math.PI);
      ctx.stroke();
    }
    ctx.shadowBlur=0;
    drawText(dir>0?'磁铁插入 → 阻碍 → 感应电流反向':'磁铁拔出 → 阻碍 → 感应电流同向',W/2,H-60,iColor,13);
  }
  drawText('|dΦ/dt| ∝ 感应电动势',W/2,H-35,'#9ab0d0',12);
}

// 场景：涡旋电场
function drawVortexEScene(time){
  const W=cv.width,H=cv.height;
  drawText('涡旋电场 · 变化磁场激发环形 E 场',W/2,30,'#a78bfa',16);
  const cx=W/2,cy=H/2;
  // 中心变化的磁场（用大小表示强度）
  const bIntensity=0.5+0.5*Math.sin(time*2);
  ctx.fillStyle='rgba(248,113,113,'+(0.3+bIntensity*0.4)+')';
  ctx.strokeStyle='#f87171';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(cx,cy,30+bIntensity*15,0,7);ctx.fill();ctx.stroke();
  drawText('B↑',cx,cy,'#fff',16);
  drawText('变化磁场 ΔB/Δt',cx,cy-70,'#f87171',13);
  // 涡旋电场（环形箭头）
  const eIntensity=Math.abs(Math.cos(time*2));
  for(let r=80;r<=180;r+=40){
    ctx.strokeStyle='rgba(167,139,250,'+(0.4+eIntensity*0.4)+')';ctx.lineWidth=2.5;
    // 沿环画几个箭头
    const phase=time*0.5;
    for(let i=0;i<6;i++){
      const a=i*Math.PI/3+phase;
      const x1=cx+Math.cos(a)*r;
      const y1=cy+Math.sin(a)*r;
      const x2=cx+Math.cos(a+0.3)*r;
      const y2=cy+Math.sin(a+0.3)*r;
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
      // 箭头
      ctx.fillStyle='rgba(167,139,250,'+(0.4+eIntensity*0.4)+')';
      ctx.save();
      ctx.translate(x2,y2);
      ctx.rotate(a+0.3+Math.PI/2);
      ctx.beginPath();ctx.moveTo(0,-5);ctx.lineTo(-3,3);ctx.lineTo(3,3);ctx.fill();
      ctx.restore();
    }
    // 圆形虚线
    ctx.strokeStyle='rgba(167,139,250,0.15)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.arc(cx,cy,r,0,7);ctx.stroke();
    ctx.setLineDash([]);
  }
  drawText('E （涡旋电场）',cx+180,cy+100,'#a78bfa',13);
  drawText('麦克斯韦：变化 B → 涡旋 E',W/2,H-60,'#34d399',13);
  drawText('这是电磁波的本质（无需介质）',W/2,H-35,'#9ab0d0',12);
}

// 场景：变压器
function drawTransformerScene(time){
  const W=cv.width,H=cv.height;
  drawText('变压器 · 互感原理',W/2,30,'#a78bfa',16);
  const cx=W/2,cy=H/2;
  // 铁芯（矩形）
  ctx.fillStyle='rgba(125,125,125,0.2)';ctx.strokeStyle='#9ab0d0';ctx.lineWidth=2;
  roundRect(cx-100,cy-80,200,160,8);ctx.fill();ctx.stroke();
  drawText('铁芯',cx,cy,'#9ab0d0',12);
  // 原线圈（左）
  ctx.strokeStyle='#06b6d4';ctx.lineWidth=2;
  for(let i=0;i<5;i++){
    ctx.beginPath();ctx.ellipse(cx-110,cy-50+i*20,12,8,0,0,7);ctx.stroke();
  }
  drawText('原线圈 N₁',cx-180,cy,'#06b6d4',12);
  // 电源（交流）
  ctx.fillStyle='#fbbf24';
  drawText('U₁ ~',cx-180,cy+50,'#fbbf24',13);
  // 副线圈（右）
  ctx.strokeStyle='#f87171';ctx.lineWidth=2;
  for(let i=0;i<8;i++){
    ctx.beginPath();ctx.ellipse(cx+110,cy-60+i*16,12,8,0,0,7);ctx.stroke();
  }
  drawText('副线圈 N₂',cx+180,cy,'#f87171',12);
  // 负载
  ctx.fillStyle='#34d399';
  drawText('U₂ →',cx+180,cy+50,'#34d399',13);
  // 交流波形
  ctx.strokeStyle='#fbbf24';ctx.lineWidth=1.5;
  ctx.beginPath();
  for(let x=0;x<60;x+=1){
    const px=cx-260+x*1;
    const py=cy-130+Math.sin(x*0.3+time*4)*15;
    if(x===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  }
  ctx.stroke();
  // 公式
  drawText('U₁ / U₂ = N₁ / N₂',cx,cy+130,'#fbbf24',16);
  // 升压降压
  drawText('N₂ > N₁ 升压 · N₂ < N₁ 降压',cx,cy+160,'#9ab0d0',12);
}

// 场景：发电机
function drawGeneratorScene(time){
  const W=cv.width,H=cv.height;
  drawText('交流发电机 · 线圈在磁场中转动',W/2,30,'#a78bfa',16);
  const cx=W/2,cy=H/2-30;
  // 磁极
  ctx.fillStyle='#f8717133';ctx.fillRect(cx-180,cy-80,60,160);
  ctx.fillStyle='#67e8f933';ctx.fillRect(cx+120,cy-80,60,160);
  drawText('N',cx-150,cy-100,'#f87171',16);
  drawText('S',cx+150,cy-100,'#67e8f9',16);
  // B 箭头
  ctx.strokeStyle='#a78bfa';ctx.lineWidth=1.5;
  for(let i=-50;i<=50;i+=25){
    ctx.beginPath();ctx.moveTo(cx-100,cy+i);ctx.lineTo(cx+100,cy+i);ctx.stroke();
  }
  drawText('B →',cx,cy-100,'#a78bfa',13);
  // 线圈旋转
  const angle=time*2;
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(angle);
  ctx.strokeStyle='#06b6d4';ctx.lineWidth=3;
  ctx.strokeRect(-50,-40,100,80);
  // 电流方向标记
  ctx.fillStyle='#fbbf24';
  ctx.beginPath();ctx.arc(0,-40,7,0,7);ctx.fill();
  ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(0,-40,3,0,7);ctx.fill();
  ctx.fillStyle='#fbbf24';
  ctx.beginPath();ctx.arc(0,40,7,0,7);ctx.fill();
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-4,36);ctx.lineTo(4,44);ctx.moveTo(-4,44);ctx.lineTo(4,36);ctx.stroke();
  ctx.restore();
  // 输出电压波形
  ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;
  ctx.shadowColor='#fbbf24';ctx.shadowBlur=8;
  ctx.beginPath();
  for(let x=0;x<=W-160;x+=2){
    const px=80+x;
    const py=H-80+Math.sin(x*0.03+time*2)*30;
    if(x===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  }
  ctx.stroke();
  ctx.shadowBlur=0;
  drawText('输出电压 ε = ε₀ sin(ωt)',W/2,H-50,'#fbbf24',13);
  drawText('中国市电：220V · 50 Hz',W/2,H-25,'#9ab0d0',12);
}

// 场景：右手定则
function drawRightHandScene(time){
  const W=cv.width,H=cv.height;
  drawText('右手定则 · 判动生电流方向',W/2,30,'#a78bfa',16);
  const cx=W/2,cy=H/2;
  // 磁场（出纸面）
  ctx.fillStyle='rgba(167,139,250,0.1)';
  ctx.fillRect(cx-150,cy-150,300,300);
  for(let i=0;i<5;i++)for(let j=0;j<5;j++){
    ctx.fillStyle='#a78bfa';
    ctx.beginPath();ctx.arc(cx-130+i*65,cy-130+j*65,3,0,7);ctx.fill();
  }
  drawText('B （出纸面 ⊙）',cx,cy-180,'#a78bfa',13);
  // 导体棒运动（向右）
  const v=1;
  ctx.strokeStyle='#fbbf24';ctx.lineWidth=4;
  ctx.shadowColor='#fbbf24';ctx.shadowBlur=10;
  ctx.beginPath();ctx.moveTo(cx,cy-60);ctx.lineTo(cx,cy+60);ctx.stroke();
  ctx.shadowBlur=0;
  // v 箭头
  ctx.fillStyle='#34d399';
  ctx.beginPath();ctx.moveTo(cx+80,cy);ctx.lineTo(cx+50,cy-8);ctx.lineTo(cx+50,cy+8);ctx.fill();
  drawText('v（拇指）',cx+100,cy,'#34d399',13);
  // 电流方向（向上）
  ctx.strokeStyle='#f87171';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(cx,cy-60);ctx.lineTo(cx,cy-100);ctx.stroke();
  ctx.fillStyle='#f87171';
  ctx.beginPath();ctx.moveTo(cx,cy-100);ctx.lineTo(cx-7,cy-90);ctx.lineTo(cx+7,cy-90);ctx.fill();
  drawText('I（四指）',cx,cy-130,'#f87171',14);
  // 步骤
  drawText('右手：磁感线穿掌心（掌心对源磁场方向）',W/2,H-100,'#9ab0d0',12);
  drawText('拇指指向 v（导体运动方向）',W/2,H-75,'#34d399',12);
  drawText('四指指向 I（感应电流方向）',W/2,H-50,'#f87171',12);
  drawText('与左手定则相反：左手判力，右手判感应',W/2,H-25,'#fbbf24',12);
}

function drawSummaryScene(){
  const W=cv.width,H=cv.height;
  drawText('电磁感应核心总结',W/2,40,'#a78bfa',18);
  const items=[
    {t:'法拉第定律',d:'ε = |ΔΦ/Δt|',c:'#a78bfa'},
    {t:'动生电动势',d:'ε = BLv（右手定则）',c:'#06b6d4'},
    {t:'感生电动势',d:'变化B→涡旋E（楞次）',c:'#fbbf24'},
    {t:'楞次定律',d:'阻碍磁通变化',c:'#34d399'},
    {t:'发电机',d:'ε=ε₀sin(ωt)',c:'#fb923c'},
    {t:'变压器',d:'U₁/U₂=N₁/N₂',c:'#ec4899'},
  ];
  items.forEach((m,i)=>{
    const col=i%3,row=Math.floor(i/3);
    const x=80+col*(W-160)/3;
    const y=100+row*180;
    ctx.fillStyle=m.c+'22';ctx.strokeStyle=m.c;ctx.lineWidth=2;
    roundRect(x+10,y,(W-160)/3-20,140,10);ctx.fill();ctx.stroke();
    drawText(m.t,x+(W-160)/6,y+50,m.c,15);
    drawText(m.d,x+(W-160)/6,y+90,'#fff',12);
  });
}

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  if(stepIdx===0)drawMotionalEMFScene(t);
  else if(stepIdx===1||stepIdx===2)drawRightHandScene(t);
  else if(stepIdx===3||stepIdx===4)drawVortexEScene(t);
  else if(stepIdx===5)drawMotionalEMFScene(t);
  else if(stepIdx===6)drawInducedEMFScene(t);
  else if(stepIdx===7)drawGeneratorScene(t);
  else if(stepIdx===8)drawTransformerScene(t);
  else if(stepIdx===9)drawSummaryScene();
}

function syncStep(){
  const s=STEPS[stepIdx];
  document.getElementById('stepBadge').textContent=s.tag;
  document.getElementById('stepTitle').textContent=s.name;
  document.getElementById('stepBody').innerHTML=s.body;
  document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?.title||'')+'</h4><ul>'+((s.points?.items||[]).map(x=>'<li>'+x+'</li>').join(''))+'</ul>';
  document.querySelectorAll('.step').forEach((el,i)=>el.classList.toggle('active',i===stepIdx));
  statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;
  stepTime=0;
}

function update(dt){
  t+=dt*speed;
  if(!playing)return;
  stepTime+=dt*speed;
  if(stepTime>=STEP_DURATION){
    if(stepIdx<STEPS.length-1){stepIdx++;syncStep();}
    else{playing=false;playBtn.textContent='▶ 播放';statusEl.textContent='动画完成';}
  }
}

function loop(ts){
  if(!lastT)lastT=ts;
  const dt=(ts-lastT)/1000;lastT=ts;
  update(dt);draw();
  requestAnimationFrame(loop);
}

const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn');
const speedEl=document.getElementById('speed');
playBtn.onclick=()=>{playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';};
resetBtn.onclick=()=>{stepIdx=0;playing=false;syncStep();draw();playBtn.textContent='▶ 播放';};
stepFwdBtn.onclick=()=>{if(stepIdx<STEPS.length-1){stepIdx++;syncStep();draw();}};
stepBackBtn.onclick=()=>{if(stepIdx>0){stepIdx--;syncStep();draw();}};
speedEl.oninput=()=>{speed=parseFloat(speedEl.value);};

function buildStepbar(){
  const bar=document.getElementById('stepbar');
  bar.innerHTML='';
  STEPS.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='step'+(i===stepIdx?' active':'');
    el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>10?s.name.slice(0,9)+'…':s.name)+'</div>';
    el.onclick=()=>{stepIdx=i;syncStep();draw();};
    bar.appendChild(el);
  });
}

buildStepbar();syncStep();requestAnimationFrame(loop);
</script>
</body>
</html>
