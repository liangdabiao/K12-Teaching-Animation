<style>

<body>
<header class="topbar"><a class="back" href="../index.html">← 返回物理目录</a><span class="title">电场与电场线</span><span class="subtitle">点电荷电场分布 · 电势等高线 · E=kQ/r²</span></header>
<div class="cards">

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(520,Math.min(1100,r.width-12));cv.height=Math.max(400,Math.min(600,r.height-12));}
window.addEventListener('resize',()=>{fit();draw();});fit();
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawText(t,x,y,c,fs,a,b){ctx.fillStyle=c||'#9ab0d0';ctx.font=(fs||12)+'px sans-serif';ctx.textAlign=a||'center';ctx.textBaseline=b||'middle';ctx.fillText(t,x,y);}

const STEPS=[
  {tag:'基础',name:'电场概念',body:'<strong>电场</strong>是<strong>电荷在周围空间激发的特殊物质</strong>。电荷之间不直接接触，而是通过电场发生相互作用：电荷 A 的电场对电荷 B 施加电场力。电场虽然看不见，但客观存在。',points:{title:'核心要点',items:['<strong>电场</strong>：电荷周围空间存在','<strong>基本性质</strong>：对放入其中的电荷施加电场力','<strong>产生条件</strong>：静止电荷激发静电场','<strong>传递方式</strong>：电荷—电场—电荷']}},
  {tag:'基础',name:'电场强度 E=F/q',body:'<strong>电场强度</strong>是描述电场<strong>强弱和方向</strong>的物理量，定义式 <code>E = F/q</code>。q 为试探电荷电量，F 为其所受电场力。E 是<strong>矢量</strong>，方向规定为<strong>正电荷受力方向</strong>。',points:{title:'电场强度要点',items:['<strong>定义式</strong>：E = F/q','<strong>单位</strong>：N/C 或 V/m','<strong>方向</strong>：正电荷受力方向','<strong>与试探电荷无关</strong>：E 由电场本身决定']}},
  {tag:'基础',name:'点电荷电场 E=kQ/r²',body:'真空中<strong>点电荷</strong> Q 产生的电场强度：<code>E = kQ/r²</code>，其中 k 为静电力常量，r 为到 Q 的距离。<strong>正电荷</strong>电场向外，<strong>负电荷</strong>电场向内，电场大小与 r² 成反比。',points:{title:'点电荷电场',items:['<strong>公式</strong>：E = kQ/r²','<strong>k</strong>：9.0×10⁹ N·m²/C²','<strong>球对称</strong>：以 Q 为中心向外辐射','<strong>距离</strong>：r 越大 E 越小（平方反比）']}},
  {tag:'性质',name:'电场线性质',body:'<strong>电场线</strong>是用来形象化描绘电场的<strong>假想曲线</strong>。它从<strong>正电荷出发</strong>到<strong>负电荷终止</strong>（或延伸至无穷远），<strong>任意两条不相交</strong>，曲线上每一点的<strong>切线方向</strong>就是该点的电场强度 E 方向。',points:{title:'电场线四条性质',items:['<strong>起点</strong>：正电荷（或无穷远）','<strong>终点</strong>：负电荷（或无穷远）','<strong>不相交</strong>：否则一点有两个 E 方向','<strong>切线方向</strong>：即 E 矢量方向']}},
  {tag:'性质',name:'疏密表示场强',body:'电场线的<strong>疏密程度</strong>表示电场强度的<strong>大小</strong>：<strong>越密</strong>的地方 E 越大，<strong>越疏</strong>的地方 E 越小。但电场线<strong>不是真实存在</strong>的线，而是一种形象化描述工具。',points:{title:'疏密规律',items:['<strong>密集</strong>：E 大（场强强）','<strong>稀疏</strong>：E 小（场强弱）','<strong>匀强电场</strong>：平行等距的直线','<strong>注意</strong>：电场线为假想曲线']}},
  {tag:'图样',name:'常见电场线',body:'常见电场分布：<strong>孤立点电荷</strong>呈辐射状；<strong>电偶极子</strong>（等量异种电荷对）电场线从正电荷弯向负电荷；<strong>平行板电容器</strong>板间为<strong>匀强电场</strong>，电场线平行等距。',points:{title:'三种典型电场',items:['<strong>孤立电荷</strong>：辐射状发散或汇聚','<strong>电偶极子</strong>：弯曲弧线连接正负','<strong>平行板</strong>：板间匀强平行直线','<strong>等量同种</strong>：中垂线为零场位置']}},
  {tag:'电势',name:'电势与等势面',body:'<strong>电势 φ</strong>是描述电场能性质的标量。沿电场线方向电势逐渐<strong>降低</strong>。<strong>等势面</strong>是电势相等的点连成的曲面，沿等势面移动电荷电场力<strong>不做功</strong>。',points:{title:'电势规律',items:['<strong>沿电场线</strong>：电势降低','<strong>等势面</strong>：φ 相等的曲面','<strong>等势移动</strong>：W = 0','<strong>公式</strong>：U_AB = φ_A − φ_B']}},
  {tag:'电势',name:'电场线⊥等势面',body:'<strong>电场线与等势面处处垂直</strong>。若不垂直，电场力会有沿等势面分量，导致做功，与等势面定义矛盾。点电荷的等势面是<strong>同心球面</strong>，匀强电场的等势面是<strong>平行平面</strong>。',points:{title:'垂直关系',items:['<strong>电场线 ⊥ 等势面</strong>','<strong>点电荷</strong>：等势面为同心球面','<strong>匀强电场</strong>：等势面为平行平面','<strong>等势面密集处</strong>：场强大']}},
  {tag:'应用',name:'应用与解题',body:'例：相距 0.1 m 的两点电荷带电量 Q=1×10⁻⁹ C，求其连线中点 r=0.05 m 处的场强。解：E = kQ/r² = 9×10⁹×10⁻⁹/0.0025 = 3600 N/C，方向沿 Q 向外。',points:{title:'解题步骤',items:['<strong>步骤1</strong>：识别 Q、r 等量','<strong>步骤2</strong>：判断场源电荷正负','<strong>步骤3</strong>：代入 E = kQ/r²','<strong>步骤4</strong>：判断方向（沿径向）']}},
  {tag:'总结',name:'核心速记',body:'电场是<strong>电荷周围空间</strong>的特殊物质，用电场强度 <code>E=F/q</code> 描述，点电荷 <code>E=kQ/r²</code>。电场线<strong>起于正终于负</strong>，<strong>不相交</strong>，<strong>切线即 E 方向</strong>。<strong>电场线 ⊥ 等势面</strong>。',points:{title:'三句话总结',items:['<strong>大小</strong>：E = F/q；点电荷 E = kQ/r²','<strong>方向</strong>：电场线切线（正电荷受力）','<strong>疏密</strong>：越密场强越大','<strong>关系</strong>：电场线 ⊥ 等势面']}},
];

let stepIdx=0,playing=false,lastT=0,speed=1,stepTime=0,t=0;
const STEP_DURATION=3.2;

// ===== 通用：计算多电荷场强 =====
function fieldAt(x,y,charges){
  let Ex=0,Ey=0;
  for(const c of charges){
    const dx=x-c.x,dy=y-c.y;
    const r2=dx*dx+dy*dy;
    if(r2<100)continue;
    const r=Math.sqrt(r2);
    const E=c.q/r2*5000;
    Ex+=E*dx/r;Ey+=E*dy/r;
  }
  return {Ex,Ey};
}

// ===== 场景1：孤立正电荷辐射状电场线 =====
function drawPosRadialScene(time){
  const W=cv.width,H=cv.height;
  drawText('孤立正电荷 · 辐射状电场线',W/2,30,'#a78bfa',16);
  const cx=W/2,cy=H/2+20;
  // 电场线（向外辐射）
  const nLines=16;
  for(let i=0;i<nLines;i++){
    const a=i/nLines*Math.PI*2;
    const r1=22,r2=180;
    const x1=cx+Math.cos(a)*r1,y1=cy+Math.sin(a)*r1;
    const x2=cx+Math.cos(a)*r2,y2=cy+Math.sin(a)*r2;
    ctx.strokeStyle='rgba(253,203,110,0.7)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    // 流动箭头
    const phase=(time*1.5+i*0.3)%1;
    const px=cx+Math.cos(a)*(r1+(r2-r1)*phase);
    const py=cy+Math.sin(a)*(r1+(r2-r1)*phase);
    ctx.fillStyle='#fbbf24';
    ctx.beginPath();ctx.arc(px,py,3,0,7);ctx.fill();
    // 末端箭头
    ctx.fillStyle='rgba(253,203,110,0.9)';
    const ah=8;
    ctx.beginPath();
    ctx.moveTo(x2,y2);
    ctx.lineTo(x2-Math.cos(a-0.3)*ah,y2-Math.sin(a-0.3)*ah);
    ctx.lineTo(x2-Math.cos(a+0.3)*ah,y2-Math.sin(a+0.3)*ah);
    ctx.fill();
  }
  // 正电荷球
  ctx.fillStyle='#f87171';
  ctx.shadowColor='#f87171';ctx.shadowBlur=20;
  ctx.beginPath();ctx.arc(cx,cy,18,0,7);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='bold 20px sans-serif';ctx.textAlign='center';
  ctx.fillText('+',cx,cy+1);
  // 说明
  drawText('电场线从正电荷向外发散',W/2,H-60,'#9ab0d0',12);
  drawText('距离越远 → 电场线越疏 → 场强越小',W/2,H-35,'#34d399',12);
  drawText('E = kQ/r²',120,80,'#a78bfa',14,'left');
}

// ===== 场景2：孤立负电荷辐射状电场线 =====
function drawNegRadialScene(time){
  const W=cv.width,H=cv.height;
  drawText('孤立负电荷 · 电场线向内汇聚',W/2,30,'#a78bfa',16);
  const cx=W/2,cy=H/2+20;
  const nLines=16;
  for(let i=0;i<nLines;i++){
    const a=i/nLines*Math.PI*2;
    const r1=22,r2=180;
    const x1=cx+Math.cos(a)*r2,y1=cy+Math.sin(a)*r2;
    const x2=cx+Math.cos(a)*r1,y2=cy+Math.sin(a)*r1;
    ctx.strokeStyle='rgba(103,232,249,0.7)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    // 流动箭头（向内）
    const phase=(time*1.5+i*0.3)%1;
    const px=cx+Math.cos(a)*(r2-(r2-r1)*phase);
    const py=cy+Math.sin(a)*(r2-(r2-r1)*phase);
    ctx.fillStyle='#06b6d4';
    ctx.beginPath();ctx.arc(px,py,3,0,7);ctx.fill();
    // 内端箭头（指向中心）
    ctx.fillStyle='rgba(103,232,249,0.9)';
    const ah=8;
    ctx.beginPath();
    ctx.moveTo(x2,y2);
    ctx.lineTo(x2+Math.cos(a-0.3)*ah,y2+Math.sin(a-0.3)*ah);
    ctx.lineTo(x2+Math.cos(a+0.3)*ah,y2+Math.sin(a+0.3)*ah);
    ctx.fill();
  }
  // 负电荷球
  ctx.fillStyle='#06b6d4';
  ctx.shadowColor='#06b6d4';ctx.shadowBlur=20;
  ctx.beginPath();ctx.arc(cx,cy,18,0,7);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='bold 22px sans-serif';ctx.textAlign='center';
  ctx.fillText('−',cx,cy+1);
  drawText('电场线从外部汇聚到负电荷',W/2,H-60,'#9ab0d0',12);
  drawText('负电荷是电场线的"终点"',W/2,H-35,'#34d399',12);
  drawText('E 指向负电荷',W-120,80,'#06b6d4',14,'left');
}

// ===== 场景3：电偶极子 =====
function drawDipoleScene(time){
  const W=cv.width,H=cv.height;
  drawText('电偶极子 · 弯曲电场线（+ −）',W/2,30,'#a78bfa',16);
  const cx=W/2,cy=H/2+20;
  const sep=110;
  const pos={x:cx-sep,y:cy,q:1};
  const neg={x:cx+sep,y:cy,q:-1};
  const charges=[pos,neg];
  // 数值积分电场线（从正电荷出发）
  const nLines=10;
  for(let i=0;i<nLines;i++){
    const a=i/nLines*Math.PI*2;
    let px=pos.x+Math.cos(a)*20,py=pos.y+Math.sin(a)*20;
    ctx.strokeStyle='rgba(253,203,110,0.6)';ctx.lineWidth=1.3;
    ctx.beginPath();ctx.moveTo(px,py);
    for(let s=0;s<300;s++){
      const {Ex,Ey}=fieldAt(px,py,charges);
      const Em=Math.sqrt(Ex*Ex+Ey*Ey);
      if(Em<0.01)break;
      const ds=2.5;
      px+=Ex/Em*ds;py+=Ey/Em*ds;
      // 接近负电荷时停止
      const dxn=px-neg.x,dyn=py-neg.y;
      if(dxn*dxn+dyn*dyn<400)break;
      if(px<10||px>W-10||py<10||py>H-10)break;
      ctx.lineTo(px,py);
    }
    ctx.stroke();
  }
  // 流动粒子（沿一条示例电场线）
  const phase=(time*0.6)%1;
  let px=pos.x+20,py=pos.y;
  const trail=[];
  for(let s=0;s<300;s++){
    const {Ex,Ey}=fieldAt(px,py,charges);
    const Em=Math.sqrt(Ex*Ex+Ey*Ey);
    if(Em<0.01)break;
    px+=Ex/Em*2.5;py+=Ey/Em*2.5;
    const dxn=px-neg.x,dyn=py-neg.y;
    if(dxn*dxn+dyn*dyn<400)break;
    if(px<10||px>W-10||py<10||py>H-10)break;
    trail.push({x:px,y:py});
  }
  if(trail.length){
    const idx=Math.floor(phase*trail.length);
    const pt=trail[idx];
    ctx.fillStyle='#fbbf24';ctx.shadowColor='#fbbf24';ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(pt.x,pt.y,5,0,7);ctx.fill();
    ctx.shadowBlur=0;
  }
  // 正负电荷
  ctx.fillStyle='#f87171';ctx.shadowColor='#f87171';ctx.shadowBlur=15;
  ctx.beginPath();ctx.arc(pos.x,pos.y,16,0,7);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='bold 18px sans-serif';ctx.textAlign='center';
  ctx.fillText('+',pos.x,pos.y+1);
  ctx.fillStyle='#06b6d4';ctx.shadowColor='#06b6d4';ctx.shadowBlur=15;
  ctx.beginPath();ctx.arc(neg.x,neg.y,16,0,7);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='bold 20px sans-serif';
  ctx.fillText('−',neg.x,neg.y+1);
  drawText('电场线从 + 出发，弯曲后终止于 −',W/2,H-50,'#34d399',12);
  drawText('中垂线上 E 方向由 + 指向 −',W/2,H-30,'#9ab0d0',11);
}

// ===== 场景4：平行板匀强电场 =====
function drawParallelScene(time){
  const W=cv.width,H=cv.height;
  drawText('平行板电容器 · 匀强电场',W/2,30,'#a78bfa',16);
  const cx=W/2,cy=H/2+20;
  const plateW=320,plateGap=200;
  // 上板（正）
  ctx.fillStyle='#f87171';ctx.strokeStyle='#f87171';ctx.lineWidth=3;
  ctx.fillRect(cx-plateW/2,cy-plateGap/2-8,plateW,8);
  drawText('+ + + + + + + + + +',cx,cy-plateGap/2-20,'#f87171',14);
  // 下板（负）
  ctx.fillStyle='#06b6d4';
  ctx.fillRect(cx-plateW/2,cy+plateGap/2,plateW,8);
  drawText('− − − − − − − − − −',cx,cy+plateGap/2+20,'#06b6d4',14);
  // 匀强电场线（平行等距）
  const nLines=9;
  for(let i=0;i<nLines;i++){
    const lx=cx-plateW/2+30+(plateW-60)*i/(nLines-1);
    const y1=cy-plateGap/2,y2=cy+plateGap/2;
    ctx.strokeStyle='rgba(253,203,110,0.7)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(lx,y1);ctx.lineTo(lx,y2);ctx.stroke();
    // 流动箭头
    const phase=(time*1.2+i*0.15)%1;
    const py=y1+(y2-y1)*phase;
    ctx.fillStyle='#fbbf24';
    ctx.beginPath();ctx.arc(lx,py,3,0,7);ctx.fill();
    // 中点箭头
    ctx.fillStyle='rgba(253,203,110,0.9)';
    ctx.beginPath();
    ctx.moveTo(lx,cy+8);
    ctx.lineTo(lx-5,cy);
    ctx.lineTo(lx+5,cy);
    ctx.fill();
  }
  // E 标签
  drawText('E',cx-plateW/2-30,cy,'#fbbf24',16);
  drawText('E = U/d （匀强电场）',cx,cy-plateGap/2-50,'#a78bfa',13);
  // 等势面（水平虚线）
  ctx.strokeStyle='rgba(52,211,153,0.4)';ctx.lineWidth=1;
  ctx.setLineDash([5,5]);
  for(let i=1;i<5;i++){
    const y=cy-plateGap/2+plateGap*i/5;
    ctx.beginPath();ctx.moveTo(cx-plateW/2+20,y);ctx.lineTo(cx+plateW/2-20,y);ctx.stroke();
  }
  ctx.setLineDash([]);
  drawText('绿色虚线为等势面（⊥ 电场线）',cx,H-40,'#34d399',12);
}

// ===== 场景5：等势面 + 电场线垂直 =====
function drawEquipotentialScene(time){
  const W=cv.width,H=cv.height;
  drawText('等势面 ⊥ 电场线（同心圆 + 辐射线）',W/2,30,'#a78bfa',16);
  const cx=W/2,cy=H/2+20;
  // 等势面（同心圆）
  ctx.strokeStyle='rgba(52,211,153,0.6)';ctx.lineWidth=1.5;
  ctx.setLineDash([6,4]);
  for(let r=50;r<=220;r+=35){
    ctx.beginPath();ctx.arc(cx,cy,r,0,7);ctx.stroke();
  }
  ctx.setLineDash([]);
  // 电场线（辐射）
  const nLines=12;
  for(let i=0;i<nLines;i++){
    const a=i/nLines*Math.PI*2;
    const x1=cx+Math.cos(a)*22,y1=cy+Math.sin(a)*22;
    const x2=cx+Math.cos(a)*230,y2=cy+Math.sin(a)*230;
    ctx.strokeStyle='rgba(253,203,110,0.6)';ctx.lineWidth=1.3;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    const phase=(time*1.2+i*0.2)%1;
    const px=cx+Math.cos(a)*(22+(230-22)*phase);
    const py=cy+Math.sin(a)*(22+(230-22)*phase);
    ctx.fillStyle='#fbbf24';
    ctx.beginPath();ctx.arc(px,py,2.5,0,7);ctx.fill();
  }
  // 正电荷
  ctx.fillStyle='#f87171';ctx.shadowColor='#f87171';ctx.shadowBlur=15;
  ctx.beginPath();ctx.arc(cx,cy,18,0,7);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='bold 20px sans-serif';ctx.textAlign='center';
  ctx.fillText('+',cx,cy+1);
  // 标签
  drawText('黄色实线 = 电场线',cx-200,H-60,'#fbbf24',12);
  drawText('绿色虚线 = 等势面',cx+200,H-60,'#34d399',12);
  drawText('电场线 ⊥ 等势面（处处垂直）',W/2,H-35,'#a78bfa',13);
}

// ===== 场景6：试探电荷受力 =====
function drawTestChargeScene(time){
  const W=cv.width,H=cv.height;
  drawText('试探电荷在电场中受力 · F = qE',W/2,30,'#a78bfa',16);
  const cx=W/2,cy=H/2+20;
  const sep=120;
  const pos={x:cx-sep,y:cy,q:1};
  const neg={x:cx+sep,y:cy,q:-1};
  const charges=[pos,neg];
  // 电场线（简化）
  const nLines=8;
  for(let i=0;i<nLines;i++){
    const a=i/nLines*Math.PI*2;
    let px=pos.x+Math.cos(a)*20,py=pos.y+Math.sin(a)*20;
    ctx.strokeStyle='rgba(253,203,110,0.35)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(px,py);
    for(let s=0;s<300;s++){
      const {Ex,Ey}=fieldAt(px,py,charges);
      const Em=Math.sqrt(Ex*Ex+Ey*Ey);
      if(Em<0.01)break;
      px+=Ex/Em*2.5;py+=Ey/Em*2.5;
      const dxn=px-neg.x,dyn=py-neg.y;
      if(dxn*dxn+dyn*dyn<400)break;
      if(px<10||px>W-10||py<10||py>H-10)break;
      ctx.lineTo(px,py);
    }
    ctx.stroke();
  }
  // 电荷球
  ctx.fillStyle='#f87171';ctx.shadowColor='#f87171';ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(pos.x,pos.y,14,0,7);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='bold 16px sans-serif';ctx.textAlign='center';
  ctx.fillText('+',pos.x,pos.y+1);
  ctx.fillStyle='#06b6d4';ctx.shadowColor='#06b6d4';ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(neg.x,neg.y,14,0,7);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='bold 18px sans-serif';
  ctx.fillText('−',neg.x,neg.y+1);
  // 沿电场线移动的试探电荷
  const phase=(time*0.5)%1;
  let px=pos.x+20,py=pos.y+Math.sin(phase*Math.PI)*40;
  // 从一个固定点出发
  px=pos.x+20;py=pos.y+30;
  const trail=[{x:px,y:py}];
  for(let s=0;s<300;s++){
    const {Ex,Ey}=fieldAt(px,py,charges);
    const Em=Math.sqrt(Ex*Ex+Ey*Ey);
    if(Em<0.01)break;
    px+=Ex/Em*2.5;py+=Ey/Em*2.5;
    const dxn=px-neg.x,dyn=py-neg.y;
    if(dxn*dxn+dyn*dyn<400)break;
    if(px<10||px>W-10||py<10||py>H-10)break;
    trail.push({x:px,y:py});
  }
  if(trail.length){
    const idx=Math.floor(phase*trail.length);
    const pt=trail[Math.min(idx,trail.length-1)];
    // 试探电荷
    ctx.fillStyle='#fbbf24';ctx.shadowColor='#fbbf24';ctx.shadowBlur=18;
    ctx.beginPath();ctx.arc(pt.x,pt.y,8,0,7);ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#1a1a1a';ctx.font='bold 12px sans-serif';
    ctx.fillText('+',pt.x,pt.y+1);
    // 受力方向（沿场强切线）
    const {Ex,Ey}=fieldAt(pt.x,pt.y,charges);
    const Em=Math.sqrt(Ex*Ex+Ey*Ey);
    if(Em>0.01){
      const fl=45;
      const fx=pt.x+Ex/Em*fl,fy=pt.y+Ey/Em*fl;
      ctx.strokeStyle='#f87171';ctx.lineWidth=3;
      ctx.shadowColor='#f87171';ctx.shadowBlur=10;
      ctx.beginPath();ctx.moveTo(pt.x,pt.y);ctx.lineTo(fx,fy);ctx.stroke();
      ctx.fillStyle='#f87171';
      const ang=Math.atan2(Ey,Ex);
      ctx.beginPath();
      ctx.moveTo(fx,fy);
      ctx.lineTo(fx-Math.cos(ang-0.4)*12,fy-Math.sin(ang-0.4)*12);
      ctx.lineTo(fx-Math.cos(ang+0.4)*12,fy-Math.sin(ang+0.4)*12);
      ctx.fill();
      ctx.shadowBlur=0;
      drawText('F=qE',fx+Ex/Em*15,fy+Ey/Em*15,'#f87171',13);
    }
  }
  drawText('试探电荷受力方向沿电场线切线',W/2,H-50,'#34d399',12);
  drawText('正电荷：F 与 E 同向；负电荷：F 与 E 反向',W/2,H-30,'#9ab0d0',11);
}

// ===== 场景7：疏密表示场强 =====
function drawDensityScene(time){
  const W=cv.width,H=cv.height;
  drawText('电场线疏密表示场强大小',W/2,30,'#a78bfa',16);
  const cx=W/2,cy=H/2+20;
  // 左：点电荷（疏密变化）
  drawText('点电荷',cx-180,cy-150,'#a78bfa',13);
  const px1=cx-180;
  for(let r=30;r<=180;r+=30){
    ctx.strokeStyle='rgba(253,203,110,'+(0.8-r/250)+')';ctx.lineWidth=1.3;
    for(let i=0;i<12;i++){
      const a=i/12*Math.PI*2;
      const x1=px1+Math.cos(a)*r,y1=cy+Math.sin(a)*r;
      const x2=px1+Math.cos(a)*(r+28),y2=cy+Math.sin(a)*(r+28);
      if(r+28>180)continue;
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    }
  }
  // 流动粒子（近处密集，远处稀疏）
  for(let i=0;i<12;i++){
    const a=i/12*Math.PI*2;
    const phase=(time*1.5+i*0.2)%1;
    const r=20+phase*160;
    const op=Math.max(0,1-phase);
    ctx.fillStyle='rgba(251,191,36,'+op+')';
    ctx.beginPath();ctx.arc(px1+Math.cos(a)*r,cy+Math.sin(a)*r,2.5,0,7);ctx.fill();
  }
  ctx.fillStyle='#f87171';ctx.shadowColor='#f87171';ctx.shadowBlur=10;
  ctx.beginPath();ctx.arc(px1,cy,12,0,7);ctx.fill();
  ctx.shadowBlur=0;
  drawText('近密远疏',px1,cy+200,'#fbbf24',12);
  drawText('E 近大远小',px1,cy+220,'#34d399',12);
  // 右：匀强电场（等距）
  drawText('匀强电场',cx+180,cy-150,'#a78bfa',13);
  const px2=cx+180;
  ctx.strokeStyle='#67e8f9';ctx.lineWidth=2;
  ctx.strokeRect(px2-90,cy-100,180,200);
  for(let i=0;i<7;i++){
    const lx=px2-75+i*25;
    ctx.strokeStyle='rgba(253,203,110,0.7)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(lx,cy-100);ctx.lineTo(lx,cy+100);ctx.stroke();
    const phase=(time*1.2+i*0.1)%1;
    const py=cy-100+200*phase;
    ctx.fillStyle='#fbbf24';
    ctx.beginPath();ctx.arc(lx,py,2.5,0,7);ctx.fill();
  }
  drawText('处处等距',px2,cy+120,'#fbbf24',12);
  drawText('E 处处相等',px2,cy+140,'#34d399',12);
  // 中间对比
  drawText('对比',cx,cy,'#a78bfa',15);
  drawText('电场线越密 → 场强 E 越大',W/2,H-40,'#34d399',13);
}

// ===== 场景：计算示例 =====
function drawCalcScene(){
  const W=cv.width,H=cv.height;
  drawText('点电荷电场 · 计算示例',W/2,30,'#a78bfa',16);
  ctx.fillStyle='rgba(255,255,255,0.03)';ctx.strokeStyle='#a78bfa';ctx.lineWidth=1.5;
  roundRect(80,70,W-160,120,8);ctx.fill();ctx.stroke();
  drawText('【例题】',120,90,'#a78bfa',13,'left');
  drawText('真空中点电荷 Q = 1×10⁻⁹ C，',120,115,'#fff',13,'left');
  drawText('求距其 r = 0.05 m 处的场强 E。',120,140,'#fff',13,'left');
  drawText('（静电力常量 k = 9×10⁹ N·m²/C²）',120,165,'#9ab0d0',12,'left');
  const steps=[
    {t:'① 已知',d:'Q = 1×10⁻⁹ C, r = 0.05 m, k = 9×10⁹',c:'#06b6d4'},
    {t:'② 公式',d:'E = kQ / r²',c:'#a78bfa'},
    {t:'③ 代入',d:'E = 9×10⁹ × 10⁻⁹ / 0.05²',c:'#67e8f9'},
    {t:'④ 计算',d:'E = 9 / 0.0025 = 3600 N/C',c:'#34d399'},
    {t:'⑤ 方向',d:'沿径向背离正电荷 Q',c:'#fbbf24'},
  ];
  steps.forEach((s,i)=>{
    const y=215+i*42;
    ctx.fillStyle=s.c+'22';ctx.strokeStyle=s.c;ctx.lineWidth=1.5;
    roundRect(100,y,W-200,34,6);ctx.fill();ctx.stroke();
    drawText(s.t,140,y+17,s.c,13,'left');
    drawText(s.d,260,y+17,'#fff',13,'left');
  });
}

// ===== 场景：总结 =====
function drawSummaryScene(){
  const W=cv.width,H=cv.height;
  drawText('电场与电场线 · 核心总结',W/2,40,'#a78bfa',18);
  const items=[
    {t:'定义公式',d:'E = F/q',c:'#a78bfa'},
    {t:'点电荷',d:'E = kQ/r²',c:'#06b6d4'},
    {t:'匀强电场',d:'E = U/d',c:'#34d399'},
    {t:'电场线',d:'起于正、终于负、不相交',c:'#fbbf24'},
    {t:'方向',d:'切线即 E 方向',c:'#fb923c'},
    {t:'等势面',d:'⊥ 电场线',c:'#ec4899'},
  ];
  items.forEach((m,i)=>{
    const col=i%3,row=Math.floor(i/3);
    const x=80+col*(W-160)/3;
    const y=100+row*180;
    ctx.fillStyle=m.c+'22';ctx.strokeStyle=m.c;ctx.lineWidth=2;
    roundRect(x+10,y,(W-160)/3-20,140,10);ctx.fill();ctx.stroke();
    drawText(m.t,x+(W-160)/6,y+50,m.c,15);
    drawText(m.d,x+(W-160)/6,y+90,'#fff',12);
  });
  drawText('电场是真实存在的物质，电场线是形象化工具',W/2,H-50,'#34d399',13);
}

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  if(stepIdx===0)drawPosRadialScene(t);
  else if(stepIdx===1)drawPosRadialScene(t);
  else if(stepIdx===2)drawPosRadialScene(t);
  else if(stepIdx===3)drawDipoleScene(t);
  else if(stepIdx===4)drawDensityScene(t);
  else if(stepIdx===5)drawDipoleScene(t);
  else if(stepIdx===6)drawParallelScene(t);
  else if(stepIdx===7)drawEquipotentialScene(t);
  else if(stepIdx===8)drawCalcScene();
  else if(stepIdx===9)drawSummaryScene();
  else drawSummaryScene();
}

function syncStep(){
  const s=STEPS[stepIdx];
  document.getElementById('stepBadge').textContent=s.tag;
  document.getElementById('stepTitle').textContent=s.name;
  document.getElementById('stepBody').innerHTML=s.body;
  document.getElementById('stepPoints').innerHTML='<h4>'+(s.points?.title||'')+'</h4><ul>'+((s.points?.items||[]).map(x=>'<li>'+x+'</li>').join(''))+'</ul>';
  document.querySelectorAll('.step').forEach((el,i)=>el.classList.toggle('active',i===stepIdx));
  statusEl.textContent='步骤 '+(stepIdx+1)+' / '+STEPS.length+' · '+s.name;
  stepTime=0;
}

function update(dt){
  t+=dt*speed;
  if(!playing)return;
  stepTime+=dt*speed;
  if(stepTime>=STEP_DURATION){
    if(stepIdx<STEPS.length-1){stepIdx++;syncStep();}
    else{playing=false;playBtn.textContent='▶ 播放';statusEl.textContent='动画完成';}
  }
}

function loop(ts){
  if(!lastT)lastT=ts;
  const dt=(ts-lastT)/1000;lastT=ts;
  update(dt);draw();
  requestAnimationFrame(loop);
}

const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn');
const speedEl=document.getElementById('speed');
playBtn.onclick=()=>{playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';};
resetBtn.onclick=()=>{stepIdx=0;playing=false;syncStep();draw();playBtn.textContent='▶ 播放';};
stepFwdBtn.onclick=()=>{if(stepIdx<STEPS.length-1){stepIdx++;syncStep();draw();}};
stepBackBtn.onclick=()=>{if(stepIdx>0){stepIdx--;syncStep();draw();}};
speedEl.oninput=()=>{speed=parseFloat(speedEl.value);};

function buildStepbar(){
  const bar=document.getElementById('stepbar');
  bar.innerHTML='';
  STEPS.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='step'+(i===stepIdx?' active':'');
    el.innerHTML='<div>'+s.tag+'</div><div>'+(s.name.length>10?s.name.slice(0,9)+'…':s.name)+'</div>';
    el.onclick=()=>{stepIdx=i;syncStep();draw();};
    bar.appendChild(el);
  });
}

buildStepbar();syncStep();requestAnimationFrame(loop);
</script>
