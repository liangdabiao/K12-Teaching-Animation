<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>%(title)s</title>
<style>%(css)s</style>
</head>
<body>
<header class="topbar">
  <a class="back" href="../index.html">← 返回学科目录</a>
  <span class="title">%(title)s</span>
</header>
<main>
  <div class="stage"><canvas id="cv"></canvas></div>
  <aside class="panel">
    <h2>原理说明</h2>
    <p>%(desc)s</p>
    <div class="legend">%(legend)s</div>
  </aside>
</main>
<div class="controls">
  <button id="playBtn" class="primary">▶ 播放</button>
  <button id="resetBtn">↺ 重置</button>
  <button id="stepBackBtn">◀ 上一步</button>
  <button id="stepFwdBtn">下一步 ▶</button>
  <label>速度 <input id="speed" type="range" min="0.3" max="3" step="0.1" value="1"></label>
  <span id="status" class="status"></span>
</div>
<script>
const cv=document.getElementById('cv');const ctx=cv.getContext('2d');
const statusEl=document.getElementById('status');
function fit(){const r=cv.parentElement.getBoundingClientRect();cv.width=Math.max(360,Math.min(980,r.width-8));cv.height=Math.max(360,Math.min(560,r.height-8));}
window.addEventListener('resize',()=>{fit();draw();});fit();

const T={t:0,p:0,kind:0};
function sceneInit(){sceneReset();}
function sceneReset(){T.t=0;T.p=0;T.kind=0;}
function sceneUpdate(dt){if(T.p<1)T.p=Math.min(1,T.p+dt*0.2);}
function curve(x0,y0,w,h,flat){ctx.strokeStyle='#7dd3fc';ctx.lineWidth=3;ctx.beginPath();
  const seg=20;
  for(let i=0;i<=seg;i++){const u=i/seg;let v;
    if(u<0.3)v=u/0.3; else if(u<0.6){v=1;} // plateau
    else v=1+(u-0.6)/0.4;
    const x=x0+u*w, y=y0-h*Math.min(1.3,v/1.3);
    i?ctx.lineTo(x,y):ctx.moveTo(x,y);
  } ctx.stroke();
  if(flat){ctx.fillStyle='#fbbf24';ctx.fillText('熔点平台（晶体）',x0+w*0.35,y0-h*0.78);}
  else{ctx.setLineDash([5,5]);ctx.strokeStyle='#f59e0b';ctx.beginPath();ctx.moveTo(x0,y0-h*0.7);ctx.lineTo(x0+w,y0-h*0.78);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#f59e0b';ctx.fillText('无确定熔点（非晶体）',x0+w*0.4,y0-h*0.5);}
}
function sceneDraw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  const x0=70,y0=cv.height-90,w=cv.width-140,h=200;
  ctx.strokeStyle='#7f93b5';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x0,y0-h-20);ctx.lineTo(x0+w,y0);ctx.stroke();
  ctx.fillStyle='#9fb0c8';ctx.font='12px sans-serif';ctx.textAlign='left';ctx.fillText('温度',x0-30,y0-h-10);ctx.fillText('时间',x0+w-30,y0+18);
  curve(x0,y0,w*0.48,h,true);
  curve(x0+w*0.52,y0,w*0.48,h,false);
  ctx.fillStyle='#cdd7ea';ctx.fillText('晶体（有熔点）',x0+w*0.12,y0+30);ctx.fillText('非晶体（无熔点）',x0+w*0.62,y0+30);
  statusEl.textContent='晶体熔化时温度不变（平台），非晶体无确定熔点';
}

let playing=false,lastT=0,speed=1,t=0;
const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const stepBackBtn=document.getElementById('stepBackBtn'),stepFwdBtn=document.getElementById('stepFwdBtn');
const speedEl=document.getElementById('speed');
function loop(ts){if(!lastT)lastT=ts;const dt=(ts-lastT)/1000;lastT=ts;if(playing){t+=dt*speed;if(window.sceneUpdate)sceneUpdate(dt*speed);}draw();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
playBtn.onclick=()=>{playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 播放';};
resetBtn.onclick=()=>{if(window.sceneReset)sceneReset();t=0;playing=false;playBtn.textContent='▶ 播放';draw();};
stepFwdBtn.onclick=()=>{if(window.sceneStep)sceneStep(1);draw();};
stepBackBtn.onclick=()=>{if(window.sceneStep)sceneStep(-1);draw();};
speedEl.oninput=()=>{speed=parseFloat(speedEl.value);};
function draw(){if(window.sceneDraw)sceneDraw();}
if(window.sceneInit)sceneInit();
draw();
</script>
</body>
</html>
